<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>YouTube Live Direct – Outils Online</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #FDFCF0;
            --surface: #FFFFFF;
            --text-main: #0A2472;
            --color-primary: #0A2472;
            --color-secondary: #006466;
            --color-accent: #F46060;
            --color-highlight: #FFD972;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--surface);
            padding: 36px 32px 32px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08), 0 1px 3px rgba(10, 36, 114, 0.08);
            width: 380px;
            text-align: center;
            position: relative;
            border: 1px solid var(--color-highlight);
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(to right,
                    var(--color-primary) 60%,
                    var(--color-secondary) 60% 75%,
                    var(--color-accent) 75% 90%,
                    var(--color-highlight) 90%);
            border-radius: 16px 16px 0 0;
        }

        /* ----- Bouton de fermeture (iframe) ----- */
        .exit-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 1.5px solid var(--color-secondary);
            background: transparent;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            line-height: 1;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            z-index: 10;
        }

        .exit-btn:hover {
            background: var(--color-accent);
            border-color: var(--color-accent);
            color: #fff;
            transform: scale(1.05);
        }

        /* ----- Logo Outils Online (adapté) ----- */
        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            margin-bottom: 24px;
            transition: transform 0.2s;
        }

        .logo-container:active {
            transform: scale(0.97);
        }

        .mosaic-core {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            overflow: hidden;
            background: var(--color-primary);
            box-shadow: 0 4px 12px rgba(10, 36, 114, 0.15);
            flex-shrink: 0;
        }

        #mosaic-svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .text-wrap {
            margin-left: 16px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .outils {
            font-size: 28px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            line-height: 0.9;
            letter-spacing: -0.5px;
            display: flex;
        }

        .online {
            color: var(--color-secondary);
            font-size: 14px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-top: 4px;
        }

        .letter {
            color: var(--color-primary);
            transition: color 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        /* ----- Sous-titre & éléments originaux ----- */
        h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -0.2px;
            margin: 0 0 18px;
            color: var(--color-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        h2 .icon-live {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            background: var(--color-accent);
            border-radius: 6px;
            color: #fff;
            font-size: 10px;
        }

        input {
            width: 100%;
            padding: 11px 14px;
            border-radius: 10px;
            border: 1.5px solid var(--color-highlight);
            background: var(--surface);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            margin-bottom: 10px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input::placeholder {
            color: #bbb0b0;
        }

        input:focus {
            border-color: var(--color-accent);
            box-shadow: 0 0 0 3px rgba(244, 96, 96, 0.2);
            background: var(--surface);
        }

        button {
            background: var(--color-accent);
            border: none;
            padding: 12px;
            border-radius: 10px;
            color: white;
            font-size: 14px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            letter-spacing: 0.1px;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
            box-shadow: 0 2px 8px rgba(244, 96, 96, 0.25);
        }

        button:hover {
            background: #d94444;
            box-shadow: 0 4px 14px rgba(244, 96, 96, 0.35);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
            box-shadow: 0 1px 4px rgba(244, 96, 96, 0.2);
        }

        .info {
            font-size: 11.5px;
            color: var(--text-main);
            opacity: 0.7;
            margin-top: 14px;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.1px;
        }

        .history {
            margin-top: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
        }

        .history button {
            width: auto;
            padding: 5px 12px;
            font-size: 12px;
            font-weight: 500;
            background: var(--color-highlight);
            border-radius: 999px;
            color: var(--text-main);
            box-shadow: none;
            border: 1px solid var(--color-secondary);
            gap: 5px;
            transition: background 0.15s, border-color 0.15s, color 0.15s;
        }

        .history button:hover {
            background: var(--color-accent);
            border-color: var(--color-accent);
            color: #fff;
            box-shadow: none;
            transform: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Bouton de fermeture (communication avec l'iframe parent) -->
        <div class="exit-btn" onclick="window.parent.postMessage('close-iframe', '*')" title="Fermer">✕</div>

        <!-- Logo Outils Online (mosaïque dynamique) -->
        <div class="logo-container" id="logoContainer" onclick="refreshLogo()">
            <div class="mosaic-core">
                <svg id="mosaic-svg" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
            </div>
            <div class="text-wrap">
                <div class="outils" id="word-outils"></div>
                <div class="online">ONLINE</div>
            </div>
        </div>

        <!-- Titre de l'outil -->
        <h2>
            <span class="icon-live"><i class="fa-solid fa-circle-dot"></i></span>
            Ouvrir live YouTube
        </h2>

        <input type="text" id="channel" placeholder="Ex: mrbeast ou @mrbeast">
        <button onclick="openLive()"><i class="fa-brands fa-youtube"></i> Ouvrir live en direct</button>

        <div class="history" id="history"></div>

        <div class="info">
            Redirection vers /@chaine/live + historique local
        </div>
    </div>

    <script>
        /* ==============================================
           LOGO OUTILS ONLINE – Mosaïque & Couleurs
           ============================================== */
        (function() {
            const vibrantColors = ['#006466', '#F46060', '#FFD972']; // secondaire, accent, highlight
            const darkBlue = '#0A2472'; // primaire

            const wordContainer = document.getElementById('word-outils');
            const word = "OUTILS";

            // Créer les lettres une seule fois
            word.split('').forEach(char => {
                const span = document.createElement('span');
                span.textContent = char;
                span.className = 'letter';
                wordContainer.appendChild(span);
            });

            window.refreshLogo = function() {
                const svg = document.getElementById('mosaic-svg');
                const letters = document.querySelectorAll('.letter');
                svg.innerHTML = '';

                const gridSize = 4;
                const step = 100 / (gridSize - 1);
                let points = [];
                let columnVibrantColors = [[], [], []];

                // Générer les points de la grille avec légère distorsion interne
                for (let y = 0; y < gridSize; y++) {
                    for (let x = 0; x < gridSize; x++) {
                        let px = x * step;
                        let py = y * step;
                        if (x > 0 && x < gridSize - 1 && y > 0 && y < gridSize - 1) {
                            px += (Math.random() - 0.5) * step * 0.8;
                            py += (Math.random() - 0.5) * step * 0.8;
                        }
                        points.push({ x: px, y: py });
                    }
                }

                // Créer les polygones
                for (let y = 0; y < gridSize - 1; y++) {
                    for (let x = 0; x < gridSize - 1; x++) {
                        const p1 = points[y * gridSize + x];
                        const p2 = points[y * gridSize + (x + 1)];
                        const p3 = points[(y + 1) * gridSize + (x + 1)];
                        const p4 = points[(y + 1) * gridSize + x];

                        const poly = document.createElementNS("http://www.w3.org/2000/svg", "polygon");

                        const isDark = Math.random() < 0.125;
                        const color = isDark ? darkBlue : vibrantColors[Math.floor(Math.random() * vibrantColors.length)];

                        if (!isDark) {
                            columnVibrantColors[x].push(color);
                        }

                        poly.setAttribute("points",
                            `${p1.x},${p1.y} ${p2.x},${p2.y} ${p3.x},${p3.y} ${p4.x},${p4.y}`);
                        poly.setAttribute("fill", color);
                        poly.setAttribute("stroke", color);
                        poly.setAttribute("stroke-width", "0.5");
                        svg.appendChild(poly);
                    }
                }

                // Attribuer les couleurs aux lettres (3 colonnes : 2,2,2 lettres)
                letters.forEach((letter, index) => {
                    let columnIndex = index < 2 ? 0 : (index < 4 ? 1 : 2);
                    const possibleColors = columnVibrantColors[columnIndex];
                    const finalColor = (possibleColors.length > 0) ?
                        possibleColors[Math.floor(Math.random() * possibleColors.length)] :
                        vibrantColors[Math.floor(Math.random() * vibrantColors.length)];
                    letter.style.color = finalColor;
                });
            };

            // Initialisation
            refreshLogo();

            const logoContainer = document.getElementById('logoContainer');
            logoContainer.addEventListener('mouseenter', refreshLogo);
            logoContainer.addEventListener('mouseleave', () => {
                document.querySelectorAll('.letter').forEach(l => l.style.color = '');
            });
        })();

        /* ==============================================
           FONCTIONNALITÉ YOUTUBE LIVE
           ============================================== */
        let history = JSON.parse(localStorage.getItem('yt_history') || '[]');

        function normalize(input) {
            return input
                .replace('https://www.youtube.com/', '')
                .replace('youtube.com/', '')
                .replace('@', '')
                .replace('/', '')
                .trim();
        }

        function saveHistory(name) {
            history = history.filter(x => x !== name);
            history.unshift(name);
            history = history.slice(0, 8);
            localStorage.setItem('yt_history', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            const box = document.getElementById('history');
            box.innerHTML = '';

            history.forEach(name => {
                const btn = document.createElement('button');
                btn.innerHTML = `<i class="fa-solid fa-clock-rotate-left"></i> ${name}`;
                btn.onclick = () => {
                    window.open(`https://www.youtube.com/@${name}/live`, '_blank');
                };
                box.appendChild(btn);
            });
        }

        function openLive() {
            let input = document.getElementById('channel').value.trim();
            if (!input) return alert('Entre une chaîne');

            const name = normalize(input);
            saveHistory(name);

            const url = `https://www.youtube.com/@${name}/live`;
            window.open(url, '_blank');
        }

        renderHistory();
    </script>
</body>
</html>
