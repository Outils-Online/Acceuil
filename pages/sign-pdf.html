<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sign&Go Pro+ | Outils Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#0A2472">
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root {
            --bg-main: #FDFCF0;
            --surface: #FFFFFF;
            --text-main: #0A2472;
            --color-primary: #0A2472;
            --color-secondary: #006466;
            --color-accent: #F46060;
            --color-highlight: #FFD972;
            --inv-scale: 1;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            overflow: hidden;
        }

        /* Bandeau supérieur */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background: var(--surface);
            border-bottom: 2px solid var(--color-highlight);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            box-sizing: border-box;
            z-index: 3000;
            box-shadow: 0 2px 10px rgba(10,36,114,0.05);
        }

        .exit-btn {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            background: var(--color-accent);
            color: white;
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            transition: background 0.2s;
        }
        .exit-btn:hover { background: #e05050; }

        .logo-mini {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            overflow: hidden;
            background: var(--color-primary);
            cursor: pointer;
        }
        .logo-mini svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Zone d'édition */
        .editor-area {
            position: absolute;
            top: 50px;
            bottom: 70px;
            left: 0;
            right: 0;
            background: var(--bg-main);
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: center; /* Centre verticalement l'état vide */
        }
        .editor-area.zoom-active {
            overflow: hidden !important;
            touch-action: none !important;
        }

        /* Conteneur centré pour le bouton de chargement */
        .empty-state {
            text-align: center;
        }

        #pdf-container {
            position: relative;
            background: white;
            margin: 20px auto;
            transform-origin: 0 0;
            will-change: transform;
            box-shadow: 0 8px 30px rgba(10,36,114,0.1);
            border: 1px solid var(--color-highlight);
            display: none; /* caché tant qu'aucun PDF chargé */
        }
        canvas { display: block; width: 100%; height: auto; }

        .draggable {
            position: absolute; z-index: 100; border: 2px dashed transparent;
            padding: 10px; touch-action: none;
            display: flex; align-items: center; justify-content: center;
        }
        .draggable.active {
            border-color: var(--color-accent);
            background: rgba(244, 96, 96, 0.08);
        }
        .delete-btn, .resizer {
            position: absolute; width: 30px; height: 30px; border-radius: 50%;
            display: none; z-index: 110; transform: scale(var(--inv-scale));
            align-items: center; justify-content: center; font-size: 14px;
            background: var(--color-accent); color: white; border: none; font-weight: bold;
        }
        .delete-btn { top: -15px; left: -15px; }
        .resizer { bottom: -15px; right: -15px; background: var(--color-primary); border: 2px solid white; }
        .draggable.active .delete-btn,
        .draggable.active .resizer { display: flex; }

        .text-item { color: black; font-weight: 700; pointer-events: none; white-space: nowrap; font-size: 20px; }
        .sig-item { pointer-events: none; width: 100%; height: 100%; object-fit: contain; }

        /* Barre d'outils */
        .toolbar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--surface); padding: 12px 10px;
            display: flex; gap: 10px; justify-content: center;
            border-top: 2px solid var(--color-highlight);
            z-index: 1000; box-sizing: border-box;
            height: 70px;
        }
        .btn {
            background: var(--color-accent); border: none; color: white;
            padding: 12px 14px; border-radius: 4px;
            font-weight: 700; font-family: 'Space Grotesk', sans-serif;
            font-size: 13px; cursor: pointer; text-transform: uppercase;
            letter-spacing: 0.5px; transition: background 0.2s;
            white-space: nowrap;
        }
        .btn:hover { background: #e05050; }
        #zoom-btn.active { background: var(--color-primary); color: white; }

        /* Modales */
        .modal {
            position: fixed; inset: 0;
            background: rgba(10,36,114,0.3); z-index: 2000;
            display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background: var(--surface); padding: 25px; border-radius: 12px;
            width: 92%; max-width: 400px; color: var(--text-main);
            text-align: center; box-sizing: border-box;
            border: 2px solid var(--color-highlight);
            box-shadow: 0 15px 40px rgba(10,36,114,0.15);
        }
        .modal-content h3 {
            margin: 0 0 20px 0; font-weight: 700; text-transform: uppercase;
            font-size: 18px; color: var(--color-primary); letter-spacing: 1px;
        }
        .input-pro {
            width: 100%; padding: 14px; border-radius: 4px;
            border: 2px solid var(--color-highlight); font-size: 16px;
            font-family: 'Space Grotesk', sans-serif; margin-bottom: 20px;
            box-sizing: border-box; outline: none; background: var(--bg-main);
        }
        #sig-canvas {
            background: var(--bg-main); width: 100%; height: 200px;
            border-radius: 8px; border: 2px dashed var(--color-secondary);
            touch-action: none;
        }
        .success-card {
            background: var(--surface); padding: 35px 25px; border-radius: 16px;
            border: 2px solid var(--color-highlight); width: 85%; max-width: 350px;
            text-align: center; color: var(--text-main);
        }
        .check-icon { font-size: 50px; color: var(--color-accent); margin-bottom: 10px; }
    </style>
</head>
<body>

    <!-- Bandeau supérieur -->
    <div class="top-bar">
        <div class="exit-btn" onclick="window.parent.postMessage('close-iframe', '*')" title="Fermer">✕</div>
        <div class="logo-mini" id="logo-mosaic" onclick="refreshLogo()">
            <svg id="mosaic-svg" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
        </div>
    </div>

    <div class="editor-area" id="editor">
        <!-- État vide : centré parfaitement -->
        <div id="empty-msg" class="empty-state">
            <input type="file" id="pdf-upload" style="display:none" accept=".pdf">
            <button class="btn" style="padding: 25px 40px; font-size: 18px; background: var(--color-accent);" onclick="document.getElementById('pdf-upload').click()">+ CHARGER UN PDF</button>
        </div>
        <div id="pdf-container"><canvas id="pdf-canvas"></canvas></div>
    </div>

    <div class="toolbar" id="tool-bar" style="display:none">
        <button id="zoom-btn" class="btn" onclick="toggleZoomMode()">🔍 ZOOM</button>
        <button class="btn" onclick="openAction('text')">+ TEXTE</button>
        <button class="btn" onclick="openAction('sig')">+ SIGNATURE</button>
        <button class="btn" onclick="saveFinalPDF()">ENREGISTRER</button>
    </div>

    <!-- Modales -->
    <div id="text-modal" class="modal">
        <div class="modal-content">
            <h3>Ajouter Texte</h3>
            <input type="text" id="text-input" placeholder="Tapez votre texte..." class="input-pro">
            <button class="btn" style="width:100%; padding:16px;" onclick="confirmText()">VALIDER</button>
            <p onclick="closeModals()" style="margin-top:20px; cursor:pointer; font-weight:700; color: var(--color-secondary)">ANNULER</p>
        </div>
    </div>

    <div id="sig-modal" class="modal">
        <div class="modal-content">
            <h3>Votre Signature</h3>
            <canvas id="sig-canvas"></canvas>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:20px">
                <button class="btn" onclick="clearSig()">EFFACER</button>
                <button class="btn" onclick="document.getElementById('sig-png').click()">📂 PNG</button>
                <input type="file" id="sig-png" style="display:none" accept="image/png, image/jpeg">
            </div>
            <button class="btn" style="width:100%; margin-top:10px; padding:16px;" onclick="confirmSignature()">VALIDER LE TRACÉ</button>
            <p onclick="closeModals()" style="margin-top:20px; cursor:pointer; font-weight:700; color: var(--color-secondary)">FERMER</p>
        </div>
    </div>

    <div id="success-overlay" class="modal">
        <div class="success-card">
            <div class="check-icon">✓</div>
            <h2 style="margin:0; color: var(--text-main);">Document Prêt !</h2>
            <p style="opacity:0.7; font-size:14px; margin: 10px 0 30px;">Fichier enregistré et disponible.</p>
            <button class="btn" style="width:100%; padding:16px; margin-bottom:15px;" onclick="shareDoc()">📤 PARTAGER</button>
            <button class="btn" style="background:transparent; border:2px solid var(--color-highlight); width:100%; color:var(--text-main);" onclick="location.reload()">NOUVEAU</button>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        let pdfDocLib = null, originalName = "Document", isZoomActive = false, lastPdfBlob = null;
        let scale = 1, posX = 0, posY = 0, lastX, lastY, lastDist;

        const editor = document.getElementById('editor');
        const container = document.getElementById('pdf-container');

        // ----- LOGO MOSAÏQUE -----
        const vibrantColors = ['#006466', '#F46060', '#FFD972'];
        const darkBlue = '#0A2472';

        function refreshLogo() {
            const svg = document.getElementById('mosaic-svg');
            svg.innerHTML = '';
            const gridSize = 4;
            const step = 100 / (gridSize - 1);
            let points = [];

            for (let y = 0; y < gridSize; y++) {
                for (let x = 0; x < gridSize; x++) {
                    let px = x * step;
                    let py = y * step;
                    if (x > 0 && x < gridSize - 1 && y > 0 && y < gridSize - 1) {
                        px += (Math.random() - 0.5) * step * 0.6;
                        py += (Math.random() - 0.5) * step * 0.6;
                    }
                    points.push({x: px, y: py});
                }
            }

            for (let y = 0; y < gridSize - 1; y++) {
                for (let x = 0; x < gridSize - 1; x++) {
                    const p1 = points[y * gridSize + x];
                    const p2 = points[y * gridSize + (x + 1)];
                    const p3 = points[(y + 1) * gridSize + (x + 1)];
                    const p4 = points[(y + 1) * gridSize + x];
                    const poly = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
                    const isDark = Math.random() < 0.125;
                    const color = isDark ? darkBlue : vibrantColors[Math.floor(Math.random() * vibrantColors.length)];
                    poly.setAttribute("points", `${p1.x},${p1.y} ${p2.x},${p2.y} ${p3.x},${p3.y} ${p4.x},${p4.y}`);
                    poly.setAttribute("fill", color);
                    poly.setAttribute("stroke", color);
                    poly.setAttribute("stroke-width", "0.5");
                    svg.appendChild(poly);
                }
            }
        }
        refreshLogo();

        // ----- CHARGEMENT PDF -----
        document.getElementById('pdf-upload').onchange = async (e) => {
            const file = e.target.files[0]; if(!file) return;
            originalName = file.name.replace(".pdf", "");
            const buffer = await file.arrayBuffer();
            pdfDocLib = await PDFLib.PDFDocument.load(buffer);
            const pdf = await pdfjsLib.getDocument({data: buffer}).promise;
            const page = await pdf.getPage(1);
            const canvas = document.getElementById('pdf-canvas');
            const vp = page.getViewport({scale: 2});
            canvas.height = vp.height; canvas.width = vp.width;
            canvas.style.width = Math.min(window.innerWidth * 0.94, 800) + "px";
            await page.render({canvasContext: canvas.getContext('2d'), viewport: vp}).promise;
            document.getElementById('empty-msg').style.display = 'none';
            container.style.display = 'block';
            document.getElementById('tool-bar').style.display = 'flex';
            // Retirer l'alignement centré de l'éditeur pour le défilement
            editor.style.alignItems = 'flex-start';
        };

        function toggleZoomMode(force = null) {
            isZoomActive = (force !== null) ? force : !isZoomActive;
            const btn = document.getElementById('zoom-btn');
            if(isZoomActive) {
                btn.classList.add('active'); editor.classList.add('zoom-active'); setActive({});
            } else {
                btn.classList.remove('active'); editor.classList.remove('zoom-active');
            }
        }

        function openAction(type) {
            toggleZoomMode(false); 
            if(type === 'text') document.getElementById('text-modal').style.display='flex';
            else showSigModal();
        }

        function updateTransform() {
            container.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
            document.documentElement.style.setProperty('--inv-scale', 1 / scale);
        }

        editor.addEventListener('touchstart', (e) => {
            if(!isZoomActive) return;
            if(e.touches.length === 1) { lastX = e.touches[0].pageX - posX; lastY = e.touches[0].pageY - posY; }
            else { lastDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY); }
        }, {passive: false});

        editor.addEventListener('touchmove', (e) => {
            if(!isZoomActive) return; e.preventDefault();
            if(e.touches.length === 1) { posX = e.touches[0].pageX - lastX; posY = e.touches[0].pageY - lastY; }
            else {
                const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                scale = Math.min(Math.max(1, scale * (dist / lastDist)), 4);
                lastDist = dist;
            }
            updateTransform();
        }, {passive: false});

        function addItem(content, type) {
            const wrap = document.createElement('div');
            wrap.className = 'draggable active';
            const rect = editor.getBoundingClientRect();
            wrap.style.left = ((editor.scrollLeft + rect.width/2 - posX) / scale - 60) + "px";
            wrap.style.top = ((editor.scrollTop + rect.height/2 - posY) / scale - 30) + "px";
            const del = document.createElement('button'); del.className = 'delete-btn'; del.innerHTML = '✕';
            del.onclick = (e) => { e.stopPropagation(); wrap.remove(); };
            const resizer = document.createElement('div'); resizer.className = 'resizer';
            let inner = type === 'text' ? document.createElement('div') : document.createElement('img');
            if(type === 'text') { inner.className = 'text-item'; inner.innerText = content; inner.style.fontSize = (22/scale) + "px"; }
            else { inner.className = 'sig-item'; inner.src = content; inner.style.width = (130/scale) + "px"; }
            wrap.appendChild(del); wrap.appendChild(inner); wrap.appendChild(resizer);
            container.appendChild(wrap); setActive(wrap);
            wrap.onpointerdown = (e) => {
                if(isZoomActive || e.target === resizer) return;
                setActive(wrap); wrap.setPointerCapture(e.pointerId);
                let ox = e.clientX/scale - wrap.offsetLeft; let oy = e.clientY/scale - wrap.offsetTop;
                wrap.onpointermove = (ev) => { wrap.style.left = (ev.clientX/scale - ox) + "px"; wrap.style.top = (ev.clientY/scale - oy) + "px"; };
                wrap.onpointerup = () => wrap.onpointermove = null;
            };
            resizer.onpointerdown = (e) => {
                e.stopPropagation(); resizer.setPointerCapture(e.pointerId);
                let sX = e.clientX/scale; let sSize = parseFloat(type === 'text' ? inner.style.fontSize : inner.style.width);
                resizer.onpointermove = (ev) => {
                    let diff = (ev.clientX/scale) - sX;
                    if(type==='text') inner.style.fontSize = Math.max(10, sSize + diff*0.5) + "px";
                    else inner.style.width = Math.max(40, sSize + diff) + "px";
                };
                resizer.onpointerup = () => resizer.onpointermove = null;
            };
        }

        function showSigModal() {
            document.getElementById('sig-modal').style.display='flex';
            const c = document.getElementById('sig-canvas'); const ctx = c.getContext('2d');
            c.width = c.offsetWidth; c.height = c.offsetHeight; ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = "#0A2472";
            let d = false; 
            c.onpointerdown=(e)=>{d=true; ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY)};
            c.onpointermove=(e)=>{if(d){ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke()}};
            window.onpointerup=()=>d=false;
        }
        document.getElementById('sig-png').onchange = (e) => {
            const file = e.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => { addItem(ev.target.result, 'img'); closeModals(); };
            reader.readAsDataURL(file);
        };
        function clearSig() { const c = document.getElementById('sig-canvas'); c.getContext('2d').clearRect(0,0,c.width,c.height); }
        function confirmText() { const v = document.getElementById('text-input').value; if(v) addItem(v, 'text'); closeModals(); }
        function confirmSignature() { addItem(document.getElementById('sig-canvas').toDataURL(), 'img'); closeModals(); }
        function closeModals() { document.querySelectorAll('.modal').forEach(m=>m.style.display='none'); document.getElementById('text-input').value=''; }
        function setActive(el) { document.querySelectorAll('.draggable').forEach(d=>d.classList.remove('active')); if(el.classList) el.classList.add('active'); }

        async function saveFinalPDF() {
            if(!pdfDocLib) return;
            const page = pdfDocLib.getPages()[0]; const {width, height} = page.getSize();
            const ratio = width / parseFloat(container.style.width);
            for(let item of document.querySelectorAll('.draggable')) {
                const inner = item.querySelector('.text-item, .sig-item');
                const x = (parseFloat(item.style.left) + 10) * ratio;
                const y = height - ((parseFloat(item.style.top) + 10) * ratio) - (inner.offsetHeight * ratio);
                if(inner.tagName === 'IMG') {
                    const img = await pdfDocLib.embedPng(inner.src);
                    page.drawImage(img, { x, y, width: inner.offsetWidth*ratio, height: inner.offsetHeight*ratio });
                } else {
                    page.drawText(inner.innerText, { x, y: y+(2*ratio), size: parseFloat(inner.style.fontSize)*ratio, color: PDFLib.rgb(0,0,0) });
                }
            }
            const bytes = await pdfDocLib.save();
            lastPdfBlob = new Blob([bytes], {type: "application/pdf"});
            const link = document.createElement('a'); link.href = URL.createObjectURL(lastPdfBlob);
            link.download = originalName + "_Signe.pdf"; link.click();
            document.getElementById('success-overlay').style.display = 'flex';
        }

        async function shareDoc() {
            if (!lastPdfBlob || !navigator.share) return alert("Partage non supporté. Le fichier a été téléchargé.");
            const file = new File([lastPdfBlob], originalName + "_Signe.pdf", { type: "application/pdf" });
            try { await navigator.share({ files: [file], title: 'Document Signé' }); } catch(e) { console.log(e); }
        }
    </script>
</body>
</html>
