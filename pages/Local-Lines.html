<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Citatio Pro - Focus Mode</title>
    
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg: #f5f2ee;
            --bg-card: #ffffff;
            --ink: #1a1714;
            --ink-muted: #6b6560;
            --ink-light: #a09b96;
            --accent: #c0392b;
            --accent-light: #e8d5d3;
            --border: #e0dbd5;
            --shadow: 0 2px 16px rgba(26,23,20,0.08);
            --radius: 4px;
            --radius-lg: 8px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg: #16140f;
            --bg-card: #1f1c17;
            --ink: #f0ebe4;
            --ink-muted: #9c9488;
            --ink-light: #5a554e;
            --accent: #e05a4e;
            --accent-light: #2e1a18;
            --border: #2e2a24;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background var(--transition);
        }

        /* --- BOUTON FERMER --- */
        .exit-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 1001;
            background: var(--bg-card);
            border: 1px solid var(--border);
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--shadow);
            color: var(--ink);
            font-size: 1.2rem;
        }

        /* --- LAYOUT --- */
        .main-container {
            max-width: 700px;
            margin: 0 auto;
            padding: 3.5rem 1rem 10rem 1rem;
        }

        /* --- RECHERCHE & FILTRES --- */
        .search-area {
            position: sticky;
            top: 10px;
            z-index: 10;
            margin-bottom: 2rem;
        }
        
        input#search {
            width: 100%;
            padding: 14px 20px;
            border: 1.5px solid var(--border);
            border-radius: 100px;
            background: var(--bg-card);
            color: var(--ink);
            font-size: 1rem;
            outline: none;
            box-shadow: var(--shadow);
        }

        .filter-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .type-filter {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            flex: 1;
            scrollbar-width: none;
        }
        .type-filter::-webkit-scrollbar { display: none; }

        .filter-btn {
            padding: 6px 15px;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: var(--bg-card);
            color: var(--ink-muted);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.2s;
        }
        .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* Bouton Spécial A-Z */
        .sort-btn {
            background: var(--bg-card);
            border: 1.5px solid var(--border);
            color: var(--ink);
            width: 35px;
            height: 35px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.7rem;
            cursor: pointer;
            flex-shrink: 0;
        }
        .sort-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

        /* --- CARTES --- */
        .citation-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            margin-bottom: 1.2rem;
            box-shadow: var(--shadow);
        }
        .cite-label { font-size: 0.7rem; text-transform: uppercase; font-weight: 700; color: var(--accent); margin-bottom: 0.8rem; }
        .cite-content { font-family: 'Libre Baskerville', serif; font-size: 1.05rem; line-height: 1.6; margin-bottom: 1.2rem; }
        .cite-meta { display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; color: var(--ink-light); }

        /* --- DRAWER --- */
        .side-drawer {
            position: fixed; top: 0; left: 0; width: 85%; max-width: 350px; height: 100%;
            background: var(--bg-card); z-index: 1000; transform: translateX(-100%);
            transition: var(--transition); padding: 2rem; overflow-y: auto;
        }
        .side-drawer.open { transform: translateX(0); }
        .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 999; display: none; }
        .drawer-overlay.visible { display: block; }
        .drawer-section { margin-bottom: 2rem; }
        .drawer-title { font-family: 'Libre Baskerville', serif; font-size: 1rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }

        /* --- BOUTONS FLOTTANTS --- */
        .fab-container { position: fixed; bottom: 20px; left: 20px; display: flex; flex-direction: column; gap: 12px; z-index: 100; }
        .btn-fab { width: 48px; height: 48px; border-radius: 50%; border: none; color: white; cursor: pointer; box-shadow: var(--shadow); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .fab-clean { background: var(--ink); }
        .fab-stats { background: var(--accent); }

        .theme-toggle { margin-top: 1rem; padding: 12px; width: 100%; border: 1px solid var(--border); background: var(--bg); border-radius: var(--radius); cursor: pointer; font-weight: 600; }

        /* --- OCR CARDS --- */
        .ocr-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            margin-bottom: 1.2rem;
            box-shadow: var(--shadow);
        }
        .ocr-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.8rem;
            gap: 1rem;
        }
        .ocr-source {
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--accent);
            flex-shrink: 0;
        }
        .ocr-page {
            font-size: 0.7rem;
            color: var(--ink-light);
            background: var(--bg);
            padding: 2px 8px;
            border-radius: 20px;
            flex-shrink: 0;
        }
        .ocr-text {
            font-family: 'Libre Baskerville', serif;
            font-size: 0.95rem;
            line-height: 1.65;
            color: var(--ink);
            white-space: pre-wrap;
            word-break: break-word;
        }
        .ocr-text mark {
            background: var(--accent-light);
            color: var(--ink);
            border-radius: 2px;
            padding: 0 2px;
        }
        .ocr-actions {
            margin-top: 1rem;
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }
        .ocr-empty {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--ink-muted);
            font-size: 0.9rem;
        }
        .ocr-empty .ocr-empty-icon { font-size: 2.5rem; margin-bottom: 0.8rem; }
        .ocr-stats-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 1.2rem;
            font-size: 0.78rem;
            color: var(--ink-muted);
        }
        .ocr-stat-pill {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 12px;
        }
    </style>
</head>
<body>

<div class="exit-btn" onclick="window.parent.postMessage('close-iframe', '*')" title="Fermer">✕</div>
<div class="drawer-overlay" id="overlay" onclick="toggleDrawer()"></div>

<aside class="side-drawer" id="drawer">
    <h2 style="font-family: 'Libre Baskerville'; margin-bottom: 1.5rem;">Citatio Pro</h2>
    <div class="drawer-section"><h3 class="drawer-title">📈 Usage</h3><canvas id="clickChart" style="max-height: 150px;"></canvas></div>
    <div class="drawer-section"><h3 class="drawer-title">💾 Sauvegarde</h3><div id="backupInfo" style="font-size:0.85rem; padding:10px; background:var(--bg); border-radius:4px;"></div></div>
    <button class="theme-toggle" onclick="toggleTheme()">🌓 Inverser le thème</button>
</aside>

<main class="main-container">
    <section class="search-area">
        <input type="text" id="search" placeholder="Rechercher..." oninput="render()">
        
        <div class="filter-row">
            <button id="alphaBtn" class="sort-btn" onclick="toggleAlphaSort()" title="Tri Alphabétique">A-Z</button>
            <div class="type-filter">
                <button class="filter-btn active" onclick="setView('citations'); setFilter('all', this)">Tous</button>
                <button class="filter-btn" onclick="setView('citations'); setFilter('livre', this)">Livres</button>
                <button class="filter-btn" onclick="setView('citations'); setFilter('web', this)">Web</button>
                <button class="filter-btn" onclick="setView('citations'); setFilter('video', this)">Vidéos</button>
                <button class="filter-btn" id="ocrTabBtn" onclick="setView('ocr', this)">📷 OCR</button>
            </div>
        </div>
    </section>

    <div id="citationList"></div>

    <!-- Contrôles spécifiques OCR (cachés par défaut) -->
    <div id="ocrControls" style="display:none; margin-bottom:1rem;">
        <select id="ocrSourceFilter" onchange="ocrState.sourceFiler = this.value; ocrState.page = 0; renderOCR();"
            style="width:100%; padding:10px 14px; border:1.5px solid var(--border); border-radius:var(--radius-lg);
                   background:var(--bg-card); color:var(--ink); font-size:0.85rem; font-family:'DM Sans',sans-serif;
                   outline:none; cursor:pointer; box-shadow:var(--shadow);">
            <option value="">— Toutes les sources —</option>
        </select>
    </div>

    <div id="ocrList" style="display:none;"></div>
    <div id="ocrLoadMore" style="display:none; text-align:center; margin-bottom:2rem;">
        <button onclick="ocrLoadMore()"
            style="padding:10px 28px; border:1.5px solid var(--accent); border-radius:20px; background:none;
                   color:var(--accent); font-weight:700; font-size:0.85rem; cursor:pointer;">
            Charger plus…
        </button>
    </div>
</main>

<div class="fab-container">
    <button class="btn-fab fab-stats" onclick="toggleDrawer()">📊</button>
    <button class="btn-fab fab-clean" onclick="smartClean()">🧹</button>
</div>

<script>
    const getD = (k) => JSON.parse(localStorage.getItem(k) || '[]');
    let citations = getD('citatio_history');
    const clics = JSON.parse(localStorage.getItem('clics') || '{}');
    const backupDate = localStorage.getItem('__last_backup_date__');
    
    let currentType = 'all';
    let isAlphaSort = false;
    let currentView = 'citations'; // 'citations' | 'ocr'
    let ocrSearch = '';

    function toggleDrawer() {
        document.getElementById('drawer').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('visible');
    }

    function toggleTheme() {
        const doc = document.documentElement;
        doc.setAttribute('data-theme', doc.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }

    function toggleAlphaSort() {
        isAlphaSort = !isAlphaSort;
        document.getElementById('alphaBtn').classList.toggle('active', isAlphaSort);
        if (currentView === 'citations') render();
        else renderOCR();
    }

    function setFilter(type, btn) {
        currentType = type;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function setView(view, btn) {
        currentView = view;
        document.getElementById('citationList').style.display = view === 'citations' ? '' : 'none';
        document.getElementById('ocrList').style.display = view === 'ocr' ? '' : 'none';
        document.getElementById('ocrControls').style.display = view === 'ocr' ? '' : 'none';
        document.getElementById('ocrLoadMore').style.display = 'none';
        document.getElementById('alphaBtn').style.display = view === 'ocr' ? 'none' : '';

        if (view === 'ocr') {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('ocrTabBtn').classList.add('active');
            document.getElementById('search').placeholder = 'Rechercher dans les textes OCR...';
            ocrState.page = 0;
            renderOCR();
        } else {
            document.getElementById('search').placeholder = 'Rechercher...';
        }
    }

    function render() {
        const container = document.getElementById('citationList');
        const search = document.getElementById('search').value.toLowerCase();
        container.innerHTML = "";

        let list = citations.filter(c => {
            const matchesSearch = c.text.toLowerCase().includes(search);
            const matchesType = currentType === 'all' || c.typeLabel.toLowerCase().includes(currentType);
            return matchesSearch && matchesType;
        });

        if (isAlphaSort) {
            list.sort((a, b) => a.text.localeCompare(b.text, 'fr', {sensitivity: 'base'}));
        } else {
            list.sort((a, b) => b.id - a.id);
        }

        list.forEach(cite => {
            const card = document.createElement('div');
            card.className = "citation-card";
            card.innerHTML = `
                <div class="cite-label">${cite.typeLabel}</div>
                <div class="cite-content">${cite.html}</div>
                <div class="cite-meta">
                    <span>${cite.date}</span>
                    <button onclick="copyText('${cite.id}')" style="background:none; border:1px solid var(--accent); color:var(--accent); padding:5px 12px; border-radius:4px; font-weight:700; cursor:pointer;">COPIER</button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    /* ================================================================
       OCR — Système v2
       parseOCRData()  : lecture & structuration depuis ocr_history_v1
       filterOCRData() : filtrage texte + source
       renderOCR()     : rendu paginé (BATCH_SIZE items par lot)
    ================================================================ */

    const BATCH_SIZE = 20;

    // État OCR centralisé
    const ocrState = {
        all: [],       // données brutes parsées (cache)
        filtered: [],  // après filtres actifs
        page: 0,       // lot courant
        sourceFiler: '', // valeur du <select>
    };

    /**
     * Lit ocr_history_v1 depuis le localStorage et retourne un tableau plat
     * d'objets { text, page, source, meta, savedAt }.
     * Chaque entry brute se termine par « p. XX » → extrait via regex.
     */
    function parseOCRData() {
        const PAGE_RE = /\bp\.?\s*(\d+)\s*$/i;
        const raw = localStorage.getItem('ocr_history_v1');
        if (!raw) return [];

        let parsed;
        try { parsed = JSON.parse(raw); } catch { return []; }
        if (!Array.isArray(parsed)) return [];

        const results = [];

        for (const doc of parsed) {
            if (!doc || typeof doc !== 'object') continue;

            const meta    = doc.meta    || {};
            const savedAt = doc.savedAt || '';
            const source  = meta.title  || meta.auteur || meta.author || meta.name || 'Source inconnue';
            const entries = Array.isArray(doc.entries) ? doc.entries : [];

            for (const entry of entries) {
                if (typeof entry !== 'string' || !entry.trim()) continue;

                const match = PAGE_RE.exec(entry);
                const page  = match ? match[1] : '';
                // Supprime « p. XX » de fin pour l'affichage
                const text  = entry.replace(PAGE_RE, '').trimEnd();

                results.push({ text, page, source, meta, savedAt });
            }
        }

        return results;
    }

    /**
     * Filtre ocrState.all selon la recherche textuelle et le select source.
     * Met à jour ocrState.filtered et remet page à 0.
     */
    function filterOCRData(search = '', source = '') {
        const q = search.toLowerCase().trim();
        ocrState.filtered = ocrState.all.filter(item => {
            const matchText   = !q || item.text.toLowerCase().includes(q) || item.source.toLowerCase().includes(q);
            const matchSource = !source || item.source === source;
            return matchText && matchSource;
        });
        ocrState.page = 0;
    }

    /** Popule le <select> avec les sources uniques */
    function populateSourceSelect() {
        const sel = document.getElementById('ocrSourceFilter');
        const sources = [...new Set(ocrState.all.map(d => d.source))].sort((a, b) =>
            a.localeCompare(b, 'fr', { sensitivity: 'base' })
        );
        // Vider sauf le premier option "Toutes"
        while (sel.options.length > 1) sel.remove(1);
        for (const s of sources) {
            const opt = document.createElement('option');
            opt.value = s;
            opt.textContent = s;
            sel.appendChild(opt);
        }
    }

    /** Échappe le HTML et surligne la query */
    function highlight(rawText, query) {
        const escaped = rawText.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        if (!query) return escaped;
        const safe = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        return escaped.replace(new RegExp(`(${safe})`, 'gi'), '<mark>$1</mark>');
    }

    /** Construit et insère un lot de cartes OCR dans le container */
    function appendOCRBatch(container, items, startIdx, search) {
        const frag = document.createDocumentFragment();
        for (let i = startIdx; i < items.length && i < startIdx + BATCH_SIZE; i++) {
            const item = items[i];
            const card = document.createElement('div');
            card.className = 'ocr-card';
            card.innerHTML = `
                <div class="ocr-header">
                    <span class="ocr-source">📷 ${item.source}</span>
                    ${item.page ? `<span class="ocr-page">p. ${item.page}</span>` : ''}
                </div>
                <div class="ocr-text">${highlight(item.text, search)}</div>
                <div class="ocr-actions">
                    <button data-global-idx="${i}"
                        style="background:none; border:1px solid var(--accent); color:var(--accent);
                               padding:5px 12px; border-radius:4px; font-weight:700; cursor:pointer; font-size:0.78rem;"
                        onclick="copyOCR(this)">COPIER</button>
                </div>`;
            frag.appendChild(card);
        }
        container.appendChild(frag);
    }

    /**
     * Rendu principal OCR.
     * Si reset=true (défaut), vide le container et repart du lot 0.
     * Si reset=false, ajoute simplement le lot suivant (bouton "Charger plus").
     */
    function renderOCR(reset = true) {
        const container    = document.getElementById('ocrList');
        const loadMoreBtn  = document.getElementById('ocrLoadMore');
        const search       = document.getElementById('search').value;

        // Premier appel : charger & cacher les données
        if (reset) {
            if (ocrState.all.length === 0) {
                ocrState.all = parseOCRData();
                populateSourceSelect();
            }
            filterOCRData(search, ocrState.sourceFiler);
            container.innerHTML = '';
        }

        const { filtered, page } = ocrState;

        // Aucune donnée dans le storage
        if (ocrState.all.length === 0) {
            container.innerHTML = `
                <div class="ocr-empty">
                    <div class="ocr-empty-icon">📷</div>
                    <strong>Aucune donnée OCR trouvée</strong>
                    <p style="margin-top:.5rem;font-size:.82rem;">
                        La clé <code>ocr_history_v1</code> est absente ou vide dans le localStorage.
                    </p>
                </div>`;
            loadMoreBtn.style.display = 'none';
            return;
        }

        // Stats bar (seulement au premier rendu du filtre)
        if (page === 0) {
            const allSources = [...new Set(filtered.map(d => d.source))];
            const statsBar = document.createElement('div');
            statsBar.className = 'ocr-stats-bar';
            statsBar.innerHTML = `
                <span class="ocr-stat-pill">📄 ${filtered.length} passage${filtered.length !== 1 ? 's' : ''}</span>
                <span class="ocr-stat-pill">📚 ${allSources.length} source${allSources.length !== 1 ? 's' : ''}</span>`;
            container.appendChild(statsBar);
        }

        // Aucun résultat après filtrage
        if (filtered.length === 0) {
            container.innerHTML += `
                <div class="ocr-empty">
                    <div class="ocr-empty-icon">🔍</div>
                    <strong>Aucun résultat</strong>
                </div>`;
            loadMoreBtn.style.display = 'none';
            return;
        }

        const startIdx = page * BATCH_SIZE;
        appendOCRBatch(container, filtered, startIdx, search);
        ocrState.page++;

        // Afficher ou cacher le bouton "Charger plus"
        loadMoreBtn.style.display = ocrState.page * BATCH_SIZE < filtered.length ? '' : 'none';
    }

    /** Appelé par le bouton "Charger plus" */
    function ocrLoadMore() {
        renderOCR(false);
    }

    window.copyOCR = (btn) => {
        const idx = parseInt(btn.dataset.globalIdx, 10);
        const item = ocrState.filtered[idx];
        if (!item) return;
        navigator.clipboard.writeText(`${item.text}${item.page ? ` (p. ${item.page})` : ''}`);
        const orig = btn.textContent;
        btn.textContent = '✓ COPIÉ';
        setTimeout(() => { btn.textContent = orig; }, 1500);
    };

    window.copyText = (id) => {
        const c = citations.find(x => x.id == id);
        navigator.clipboard.writeText(c.text);
    };

    window.smartClean = () => {
        const seen = new Set();
        const unique = citations.filter(c => {
            const isDup = seen.has(c.text);
            seen.add(c.text);
            return !isDup;
        });
        if(confirm(`Supprimer ${citations.length - unique.length} doublons ?`)) {
            localStorage.setItem('citatio_history', JSON.stringify(unique));
            location.reload();
        }
    };

    // Relancer le rendu quand on tape dans la recherche
    document.getElementById('search').addEventListener('input', () => {
        if (currentView === 'ocr') {
            ocrState.page = 0;
            renderOCR(true);
        } else {
            render();
        }
    });

    function initStats() {
        document.getElementById('backupInfo').innerHTML = backupDate ? `Synchro : ${new Date(backupDate).toLocaleString('fr-FR')}` : 'Aucun backup';
        const ctx = document.getElementById('clickChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: Object.keys(clics),
                datasets: [{ data: Object.values(clics), backgroundColor: '#c0392b', borderRadius: 4 }]
            },
            options: { indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { display: false } } } }
        });
    }

    initStats();
    render();
      // Dès que la page est chargée, on prévient le parent (index.html)
    window.onload = function() {
        window.parent.postMessage('etape_suivante', '*');
    };
</script>

</body>
</html>
