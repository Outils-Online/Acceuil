<html lang="fr" class="">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Local-Lines — Dashboard localStorage</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        fontFamily: {
          serif: ['Playfair Display', 'Georgia', 'serif'],
          mono: ['JetBrains Mono', 'monospace'],
          sans: ['DM Sans', 'sans-serif'],
        }
      }
    }
  }
</script>
<style>
  :root {
    /* ── Quartz Ink & Coral ── */
    --bg-main:          #FDFCF0;
    --surface:          #FFFFFF;
    --text-main:        #0A2472;
    --color-primary:    #0A2472;
    --color-secondary:  #006466;
    --color-accent:     #F46060;
    --color-highlight:  #FFD972;

    /* Legacy aliases — mapped to new palette */
    --ink:              var(--text-main);
    --paper:            var(--surface);
    --cream:            var(--bg-main);
    --accent-gold:      var(--color-highlight);
    --accent-sage:      var(--color-secondary);
    --accent-terracotta:var(--color-accent);
    --accent-slate:     var(--color-primary);

    --shadow-soft: 0 4px 24px rgba(10,36,114,0.08), 0 1px 4px rgba(10,36,114,0.04);
    --shadow-lift: 0 12px 40px rgba(10,36,114,0.14), 0 2px 8px rgba(10,36,114,0.07);
    --border-light: rgba(10,36,114,0.1);

    /* Mondrian stripe for headers / progress bars */
    --mondrian: linear-gradient(to right,
      var(--color-primary)   0%  60%,
      var(--color-secondary) 60% 75%,
      var(--color-accent)    75% 90%,
      var(--color-highlight) 90% 100%
    );
  }
  .dark {
    --bg-main:   #06091a;
    --surface:   #0d1230;
    --text-main: #d8e4ff;
    --ink:       var(--text-main);
    --paper:     var(--surface);
    --cream:     var(--bg-main);
    --border-light: rgba(255,255,255,0.09);
    --shadow-soft: 0 4px 24px rgba(0,0,0,0.3), 0 1px 4px rgba(0,0,0,0.2);
    --shadow-lift: 0 12px 40px rgba(0,0,0,0.4), 0 2px 8px rgba(0,0,0,0.25);
  }

  * { box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-main);
    color: var(--text-main);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }

  /* ── HEATMAP ── */
  .heatmap-cell {
    width: 11px; height: 11px;
    border-radius: 2px;
    background: rgba(10,36,114,0.08);
    cursor: pointer;
    transition: transform 0.1s;
    flex-shrink: 0;
  }
  .dark .heatmap-cell { background: rgba(255,255,255,0.06); }
  .heatmap-cell:hover { transform: scale(1.4); }
  .heatmap-cell[data-count="1"] { background: rgba(0,100,102,0.25); }
  .heatmap-cell[data-count="2"] { background: rgba(0,100,102,0.55); }
  .heatmap-cell[data-count="3"] { background: #006466; }
  .heatmap-cell[data-count="4"] { background: var(--color-primary); }
  .dark .heatmap-cell[data-count="1"] { background: rgba(0,100,102,0.3); }
  .dark .heatmap-cell[data-count="2"] { background: rgba(0,100,102,0.6); }
  .dark .heatmap-cell[data-count="3"] { background: #006466; }
  .dark .heatmap-cell[data-count="4"] { background: #FFD972; }

  /* ── WIDGET BASE ── */
  .widget {
    background: var(--surface);
    border-radius: 18px;
    box-shadow: var(--shadow-soft);
    border: 1px solid var(--border-light);
    overflow: hidden;
    transition: box-shadow 0.2s;
  }
  .widget:hover { box-shadow: var(--shadow-lift); }
  .widget-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 18px 22px 14px;
    border-bottom: 1px solid var(--border-light);
    border-top: 3px solid transparent;
    border-image: var(--mondrian) 1;
    cursor: grab;
    user-select: none;
  }
  .widget-header:active { cursor: grabbing; }
  .sortable-ghost { opacity: 0.3; }
  .sortable-chosen { box-shadow: var(--shadow-lift) !important; }

  /* ── CITATIONS ── */
  .citation-card {
    font-family: 'Playfair Display', serif;
    border-left: 3px solid var(--color-highlight);
    padding: 14px 18px;
    background: linear-gradient(135deg, rgba(255,217,114,0.07) 0%, transparent 100%);
    border-radius: 4px;
    position: relative;
  }
  .citation-card::before {
    content: '\201C';
    font-size: 48px;
    color: var(--color-highlight);
    opacity: 0.45;
    position: absolute;
    top: -4px; left: 8px;
    line-height: 1;
    font-family: 'Playfair Display', serif;
  }
  .citation-card .cite-content { padding-left: 20px; }
  .citation-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-family: 'DM Sans', sans-serif;
    font-size: 10px; font-weight: 600;
    padding: 2px 8px; border-radius: 20px;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .badge-periodique { background: rgba(244,96,96,0.12); color: var(--color-accent); }
  .badge-ouvrage    { background: rgba(0,100,102,0.12); color: var(--color-secondary); }

  /* ── OCR / ARCHIVE ── */
  .ocr-card {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    line-height: 1.7;
    background: #fffef5;
    border: 1px solid rgba(255,217,114,0.5);
    border-radius: 6px;
    padding: 16px 18px;
    position: relative;
    overflow: hidden;
  }
  .dark .ocr-card {
    background: rgba(255,217,114,0.04);
    border-color: rgba(255,217,114,0.15);
    color: #c8d8ff;
  }
  .ocr-card::after {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(transparent, transparent 23px, rgba(10,36,114,0.025) 23px, rgba(10,36,114,0.025) 24px);
    pointer-events: none;
  }
  .ocr-entry {
    position: relative; z-index: 1;
    padding: 3px 0;
    border-bottom: 1px dashed rgba(10,36,114,0.12);
  }
  .dark .ocr-entry { border-color: rgba(255,255,255,0.08); }
  .ocr-entry:last-child { border-bottom: none; }
  .scan-stamp {
    display: inline-block;
    border: 2px solid var(--color-accent);
    color: var(--color-accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; font-weight: 500;
    padding: 1px 6px; border-radius: 2px;
    text-transform: uppercase; letter-spacing: 0.08em;
    transform: rotate(-1deg);
  }

  /* ── CHECKLIST / LOGISTIQUE ── */
  .checklist-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px;
    border-radius: 8px;
    transition: background 0.15s;
    cursor: pointer;
  }
  .checklist-item:hover { background: rgba(10,36,114,0.04); }
  .dark .checklist-item:hover { background: rgba(255,217,114,0.05); }
  .checklist-item.done .item-label {
    text-decoration: line-through;
    opacity: 0.4;
  }
  .custom-checkbox {
    width: 18px; height: 18px;
    border: 2px solid rgba(10,36,114,0.2);
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .checklist-item.done .custom-checkbox {
    background: var(--color-secondary);
    border-color: var(--color-secondary);
    color: white;
  }
  .cost-badge {
    margin-left: auto;
    font-size: 11px; font-weight: 500;
    color: var(--color-secondary);
    font-variant-numeric: tabular-nums;
  }

  /* ── MICRO BADGES (CLICS) ── */
  .stat-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 12px;
    border-radius: 20px;
    background: var(--surface);
    border: 1px solid var(--border-light);
    box-shadow: var(--shadow-soft);
    font-size: 12px; font-weight: 500;
  }
  .stat-badge .stat-num {
    font-weight: 700; font-size: 13px;
    color: var(--color-primary);
  }

  /* ── SEARCH ── */
  .search-bar {
    position: sticky; top: 0; z-index: 50;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 3px solid transparent;
    border-image: var(--mondrian) 1;
  }

  /* ── JSON VIEWER ── */
  .json-viewer {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
    white-space: pre-wrap;
    word-break: break-all;
    background: rgba(0,0,0,0.02);
    border-radius: 8px;
    padding: 12px;
    max-height: 200px;
    overflow-y: auto;
  }
  .dark .json-viewer { background: rgba(255,255,255,0.03); }

  /* ── TOOLTIP ── */
  .tooltip-wrap { position: relative; }
  .tooltip-wrap .tooltip {
    display: none;
    position: absolute; bottom: 130%; left: 50%;
    transform: translateX(-50%);
    background: var(--color-primary);
    color: #fff;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
    white-space: nowrap;
    pointer-events: none;
    z-index: 100;
  }
  .tooltip-wrap:hover .tooltip { display: block; }

  /* ── COPY BTN ── */
  .copy-btn {
    opacity: 0;
    transition: opacity 0.15s;
    padding: 3px 8px;
    border-radius: 5px;
    font-size: 11px; font-weight: 500;
    background: rgba(10,36,114,0.07);
    cursor: pointer;
    border: none;
    color: var(--color-accent);
  }
  .citation-card:hover .copy-btn { opacity: 1; }
  .dark .copy-btn { background: rgba(255,255,255,0.08); }

  /* ── SECTION ACCENT LINES ── */
  .accent-line { height: 3px; border-radius: 99px; }

  /* ── SEARCH HIGHLIGHT ── */
  mark { background: rgba(244,96,96,0.18); border-radius: 2px; padding: 0 1px; color: var(--color-primary); }

  /* ── CATEGORY CHIP ── */
  .cat-chip {
    font-size: 10px; font-weight: 600;
    padding: 2px 7px; border-radius: 20px;
    background: rgba(0,0,0,0.06);
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .dark .cat-chip { background: rgba(255,255,255,0.08); }

  /* ── PROGRESS BAR ── */
  .progress-bar { height: 6px; border-radius: 99px; background: rgba(10,36,114,0.08); overflow: hidden; }
  .dark .progress-bar { background: rgba(255,255,255,0.08); }
  .progress-fill { height: 100%; border-radius: 99px; background: var(--mondrian); background-size: 300px 100%; transition: width 0.4s ease; }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .widget { animation: fadeUp 0.4s ease both; }
  .widget:nth-child(1) { animation-delay: 0.05s; }
  .widget:nth-child(2) { animation-delay: 0.1s; }
  .widget:nth-child(3) { animation-delay: 0.15s; }
  .widget:nth-child(4) { animation-delay: 0.2s; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 99px; }
  .dark ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); }

  /* ── HIDDEN ON SEARCH ── */
  .hidden-search { display: none !important; }

  /* ── SYNC SPIN ── */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinning { animation: spin 0.6s linear; }
</style>
</head>
<body class="antialiased">

<!-- ════════ SEARCH BAR ════════ -->
<div class="search-bar bg-white/85 dark:bg-[#06091a]/85 border-b border-black/5 dark:border-white/5">
  <div class="max-w-5xl mx-auto px-4 py-3 flex items-center gap-3">
    <div class="flex items-center gap-2 flex-1 bg-black/5 dark:bg-white/5 rounded-xl px-4 py-2">
      <i class="fas fa-search text-gray-400 text-sm"></i>
      <input id="searchInput" type="text" placeholder="Rechercher dans toutes les données…"
        class="flex-1 bg-transparent text-sm outline-none placeholder-gray-400 font-sans"
        style="color: var(--text-main)">
    </div>
    <button id="syncBtn" onclick="syncData()" title="Rafraîchir"
      class="w-9 h-9 rounded-xl bg-black/5 dark:bg-white/5 flex items-center justify-center hover:bg-black/10 dark:hover:bg-white/10 transition">
      <i id="syncIcon" class="fas fa-rotate-right text-sm text-gray-500"></i>
    </button>
    <button onclick="toggleDark()" title="Mode sombre"
      class="w-9 h-9 rounded-xl bg-black/5 dark:bg-white/5 flex items-center justify-center hover:bg-black/10 dark:hover:bg-white/10 transition">
      <i id="darkIcon" class="fas fa-moon text-sm text-gray-500"></i>
    </button>
  </div>
</div>

<!-- ════════ HEADER ════════ -->
<div class="max-w-5xl mx-auto px-4 pt-8 pb-4">
  <div class="flex items-end justify-between gap-4 mb-6">
    <div>
      <p class="text-xs font-semibold uppercase tracking-widest text-gray-400 mb-1">Dashboard</p>
      <h1 class="text-3xl font-bold tracking-tight" style="color: var(--color-primary)">
        Local<span style="color: var(--color-accent)">Lines</span>
      </h1>
      <p class="text-sm text-gray-400 mt-1">Visualisation intelligente du localStorage</p>
    </div>
    <div class="text-right">
      <p class="text-xs text-gray-400" id="lastSync">—</p>
    </div>
  </div>

  <!-- STAT BADGES -->
  <div id="statBadges" class="flex flex-wrap gap-2 mb-6"></div>

  <!-- HEATMAP -->
  <div class="widget mb-4 p-4">
    <div class="flex items-center justify-between mb-3">
      <span class="text-xs font-semibold uppercase tracking-widest text-gray-400">Activité de capture</span>
      <div class="flex items-center gap-2 text-xs text-gray-400">
        <span>Moins</span>
        <div class="flex gap-1">
          <div class="w-2.5 h-2.5 rounded-sm" style="background:rgba(10,36,114,0.08)"></div>
          <div class="w-2.5 h-2.5 rounded-sm" style="background:rgba(0,100,102,0.3)"></div>
          <div class="w-2.5 h-2.5 rounded-sm" style="background:#006466"></div>
          <div class="w-2.5 h-2.5 rounded-sm" style="background:#0A2472"></div>
        </div>
        <span>Plus</span>
      </div>
    </div>
    <div id="heatmapGrid" class="flex gap-1 flex-wrap overflow-x-auto pb-1"></div>
    <div id="heatmapTooltip" class="text-xs text-gray-400 mt-2 h-4"></div>
  </div>
</div>

<!-- ════════ SORTABLE WIDGETS ════════ -->
<div class="max-w-5xl mx-auto px-4 pb-12">
  <div id="widgetContainer" class="flex flex-col gap-4"></div>
</div>

// ═══════════════════════════════════════════
//  LOAD DATA (localStorage → fixture fallback)
// ═══════════════════════════════════════════
function loadData() {
  // Try real localStorage first, fill missing keys from fixture
  const data = {};
  for (const [k, v] of Object.entries(FIXTURE)) {
    try {
      data[k] = localStorage.getItem(k) !== null ? localStorage.getItem(k) : v;
    } catch { data[k] = v; }
  }
  // Also capture any extra real localStorage keys
  try {
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (!(k in data)) data[k] = localStorage.getItem(k);
    }
  } catch {}
  return data;
}

function safeJSON(str, fallback = null) {
  if (str === null || str === undefined) return fallback;
  if (typeof str !== 'string') return str;
  try { return JSON.parse(str); } catch { return fallback; }
}

// ═══════════════════════════════════════════
//  HEATMAP
// ═══════════════════════════════════════════
function buildHeatmap(data) {
  const citations = safeJSON(data['citatio_history'], []);
  const ocr = safeJSON(data['ocr_history_v1'], []);
  const counts = {};

  citations.forEach(c => {
    if (c.date) {
      const [d, m, y] = c.date.split(' ')[0].split('/');
      const key = `${y}-${m}-${d}`;
      counts[key] = (counts[key] || 0) + 1;
    }
  });
  ocr.forEach(o => {
    if (o.savedAt) {
      const key = o.savedAt.split('T')[0];
      counts[key] = (counts[key] || 0) + 1;
    }
  });

  const grid = document.getElementById('heatmapGrid');
  const tip = document.getElementById('heatmapTooltip');
  grid.innerHTML = '';

  // Generate last 90 days
  const today = new Date();
  for (let i = 89; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const key = d.toISOString().split('T')[0];
    const count = counts[key] || 0;
    const cell = document.createElement('div');
    cell.className = 'heatmap-cell tooltip-wrap';
    if (count > 0) cell.setAttribute('data-count', Math.min(count, 4));
    cell.title = '';
    cell.addEventListener('mouseenter', () => {
      const label = d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' });
      tip.textContent = count > 0 ? `${label} — ${count} élément${count > 1 ? 's' : ''}` : `${label} — aucune activité`;
    });
    cell.addEventListener('mouseleave', () => { tip.textContent = ''; });
    grid.appendChild(cell);
  }
}

function buildOCRCard(o, i) {

  const allText = (o.entries || []).join(' ').toLowerCase();
  return `
    <div class="ocr-card" data-searchable="${allText}">
      <div class="flex items-start justify-between gap-3 mb-3 flex-wrap">
        <div>
          ${m.prenom ? `<span class="font-mono text-xs font-semibold" style="color:var(--color-accent)">${escapeHtml(m.prenom)}</span>` : ''}
          ${m.titre ? `<span class="font-mono text-xs text-gray-500"> / ${escapeHtml(m.titre)}</span>` : ''}

            ${m.ville ? `<span class="cat-chip">${escapeHtml(m.ville)}</span>` : ''}
            ${m.editeur ? `<span class="cat-chip">${escapeHtml(m.editeur)}</span>` : ''}

    </div>`;
}

function buildLogistiqueWidget(data) {
  const ovni = safeJSON(data['ovni_v9'], null);
  if (!ovni) return null;
  const el = document.createElement('div');
  el.className = 'widget';
  el.dataset.widgetId = 'logistique';

  const currentId = ovni.currentSessionId;
  const sessions = ovni.sessions || {};
  const current = sessions[currentId];
  const list = (current && current.list) || [];
  const done = list.filter(i => i.done).length;
  const total = list.length;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  const totalCost = list.reduce((s, i) => s + (i.price || 0), 0);

  // Group by category
  const bycat = {};
  list.forEach(item => {
    const cat = item.cat || 'Autre';
    if (!bycat[cat]) bycat[cat] = [];
    bycat[cat].push(item);
  });

  const catHtml = Object.entries(bycat).map(([cat, items]) => `
    <div class="mb-3">
      <div class="text-xs font-semibold uppercase tracking-widest text-gray-400 mb-1 px-2">${escapeHtml(cat)}</div>
      ${items.map(item => buildCheckItem(item, currentId)).join('')}
    </div>`).join('');

  const recipeName = Object.keys(current?.recipes || {})[0] || '';

  el.innerHTML = `
    <div class="widget-header">
      <div class="accent-line w-8" style="background:var(--color-secondary)"></div>
      <i class="fas fa-shopping-basket" style="color:var(--color-secondary)"></i>
      <span class="font-semibold text-sm">${escapeHtml(current?.name || 'Courses')}</span>
      ${recipeName ? `<span class="ml-2 text-xs text-gray-400">— ${escapeHtml(recipeName)} ×${current.recipes[recipeName]}</span>` : ''}
      <span class="ml-auto text-xs text-gray-400 font-mono">${done}/${total} · ${totalCost.toFixed(2)}€</span>
    </div>
    <div class="p-4">
      <div class="progress-bar mb-4">
        <div class="progress-fill" style="width:${pct}%"></div>
      </div>
      <div id="checklistBody">${catHtml}</div>
    </div>`;
  return el;
}

function buildCheckItem(item, sessionId) {
  const doneClass = item.done ? 'done' : '';
  const checkIcon = item.done ? '<i class="fas fa-check text-white" style="font-size:9px"></i>' : '';
  const cost = item.price !== undefined ? `${item.price.toFixed(3)}€` : '';
  return `
    <div class="checklist-item ${doneClass}" data-name="${escapeHtml(item.name)}" data-session="${escapeHtml(sessionId)}" onclick="toggleItem(this)" data-searchable="${item.name.toLowerCase()}">

      <span class="text-xs text-gray-400">${item.qty}${item.unit}</span>
      <span class="cost-badge">${cost}</span>

}

// ═══════════════════════════════════════════
//  TOGGLE CHECKLIST ITEM
// ═══════════════════════════════════════════
function toggleItem(el) {
  const sessionId = el.dataset.session;
  const name = el.dataset.name;
  const isDone = el.classList.toggle('done');
  const checkbox = el.querySelector('.custom-checkbox');
  checkbox.innerHTML = isDone ? '<i class="fas fa-check text-white" style="font-size:9px"></i>' : '';
  el.querySelector('.item-label').style.textDecoration = isDone ? 'line-through' : '';
  el.querySelector('.item-label').style.opacity = isDone ? '0.4' : '';

  // Update localStorage
  try {
    const raw = localStorage.getItem('ovni_v9') || FIXTURE['ovni_v9'];
    const ovni = safeJSON(raw, null);
    if (ovni && ovni.sessions && ovni.sessions[sessionId]) {
      const item = ovni.sessions[sessionId].list.find(i => i.name === name);
      if (item) item.done = isDone;
      localStorage.setItem('ovni_v9', JSON.stringify(ovni));
    }
  } catch {}

  // Update progress bar
  const allItems = document.querySelectorAll('#checklistBody .checklist-item');
  const doneCount = document.querySelectorAll('#checklistBody .checklist-item.done').length;
  const pct = allItems.length > 0 ? Math.round((doneCount / allItems.length) * 100) : 0;
  const fill = document.querySelector('.progress-fill');
  if (fill) fill.style.width = pct + '%';
}

// ═══════════════════════════════════════════

// ═══════════════════════════════════════════
function copyText(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.innerHTML = '<i class="fas fa-check mr-1"></i>Copié !';
    btn.style.color = 'var(--color-secondary)';
    setTimeout(() => { btn.innerHTML = '<i class="fas fa-copy mr-1"></i>Copier'; btn.style.color = ''; }, 1500);
  }).catch(() => {});
}

function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let searchQuery = '';
document.getElementById('searchInput').addEventListener('input', function() {
  searchQuery = this.value.toLowerCase().trim();
  applySearch();
});

function applySearch() {
  if (!searchQuery) {
    document.querySelectorAll('[data-searchable]').forEach(el => {
      el.closest('.citation-card, .ocr-card, .checklist-item, .json-viewer')?.classList.remove('hidden-search');
      el.innerHTML = el.innerHTML.replace(/<mark>(.*?)<\/mark>/gi, '$1');
    });
    document.querySelectorAll('.widget').forEach(w => w.classList.remove('hidden-search'));
    return;
  }
  document.querySelectorAll('[data-searchable]').forEach(el => {
    const card = el.closest('.citation-card, .ocr-card, .checklist-item, .json-viewer') || el;
    if (el.dataset.searchable.includes(searchQuery)) {
      card.classList.remove('hidden-search');
    } else {
      card.classList.add('hidden-search');
    }
  });
}

    misc: () => buildMiscWidget(currentData),
  };

  const layout = getLayout();
  const all = [...new Set([...layout, ...WIDGET_ORDER_DEFAULT])];

  all.forEach(id => {
    if (builders[id]) {
      const widget = builders[id]();
      if (widget) container.appendChild(widget);
    }
  });

  initSortable();
  document.getElementById('lastSync').textContent = 'Sync : ' + new Date().toLocaleTimeString('fr-FR');
}

function syncData() {
  const icon = document.getElementById('syncIcon');
  icon.classList.add('spinning');
  setTimeout(() => { icon.classList.remove('spinning'); render(); }, 600);
}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
initDark();
render();
</script>
</body>
