<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Citatio Pro - Focus Mode</title>
    
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg: #f5f2ee;
            --bg-card: #ffffff;
            --ink: #1a1714;
            --ink-muted: #6b6560;
            --ink-light: #a09b96;
            --accent: #c0392b;
            --accent-light: #e8d5d3;
            --border: #e0dbd5;
            --shadow: 0 2px 16px rgba(26,23,20,0.08);
            --radius: 4px;
            --radius-lg: 8px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg: #16140f;
            --bg-card: #1f1c17;
            --ink: #f0ebe4;
            --ink-muted: #9c9488;
            --ink-light: #5a554e;
            --accent: #e05a4e;
            --accent-light: #2e1a18;
            --border: #2e2a24;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background var(--transition);
        }

        /* --- BOUTON FERMER --- */
        .exit-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 1001;
            background: var(--bg-card);
            border: 1px solid var(--border);
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--shadow);
            color: var(--ink);
            font-size: 1.2rem;
        }

        /* --- LAYOUT --- */
        .main-container {
            max-width: 700px;
            margin: 0 auto;
            padding: 3.5rem 1rem 10rem 1rem;
        }

        /* --- RECHERCHE & FILTRES --- */
        .search-area {
            position: sticky;
            top: 10px;
            z-index: 10;
            margin-bottom: 2rem;
        }
        
        input#search {
            width: 100%;
            padding: 14px 20px;
            border: 1.5px solid var(--border);
            border-radius: 100px;
            background: var(--bg-card);
            color: var(--ink);
            font-size: 1rem;
            outline: none;
            box-shadow: var(--shadow);
        }

        .filter-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .type-filter {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            flex: 1;
            scrollbar-width: none;
        }
        .type-filter::-webkit-scrollbar { display: none; }

        .filter-btn {
            padding: 6px 15px;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: var(--bg-card);
            color: var(--ink-muted);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.2s;
        }
        .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* Bouton Spécial A-Z */
        .sort-btn {
            background: var(--bg-card);
            border: 1.5px solid var(--border);
            color: var(--ink);
            width: 35px;
            height: 35px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.7rem;
            cursor: pointer;
            flex-shrink: 0;
        }
        .sort-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

        /* --- CARTES --- */
        .citation-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            margin-bottom: 1.2rem;
            box-shadow: var(--shadow);
        }
        .cite-label { font-size: 0.7rem; text-transform: uppercase; font-weight: 700; color: var(--accent); margin-bottom: 0.8rem; }
        .cite-content { font-family: 'Libre Baskerville', serif; font-size: 1.05rem; line-height: 1.6; margin-bottom: 1.2rem; }
        .cite-meta { display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; color: var(--ink-light); }

        /* --- DRAWER --- */
        .side-drawer {
            position: fixed; top: 0; left: 0; width: 85%; max-width: 350px; height: 100%;
            background: var(--bg-card); z-index: 1000; transform: translateX(-100%);
            transition: var(--transition); padding: 2rem; overflow-y: auto;
        }
        .side-drawer.open { transform: translateX(0); }
        .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 999; display: none; }
        .drawer-overlay.visible { display: block; }
        .drawer-section { margin-bottom: 2rem; }
        .drawer-title { font-family: 'Libre Baskerville', serif; font-size: 1rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }

        /* --- BOUTONS FLOTTANTS --- */
        .fab-container { position: fixed; bottom: 20px; left: 20px; display: flex; flex-direction: column; gap: 12px; z-index: 100; }
        .btn-fab { width: 48px; height: 48px; border-radius: 50%; border: none; color: white; cursor: pointer; box-shadow: var(--shadow); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .fab-clean { background: var(--ink); }
        .fab-stats { background: var(--accent); }

        .theme-toggle { margin-top: 1rem; padding: 12px; width: 100%; border: 1px solid var(--border); background: var(--bg); border-radius: var(--radius); cursor: pointer; font-weight: 600; }

        /* --- OCR CARDS --- */
        .ocr-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            margin-bottom: 1.2rem;
            box-shadow: var(--shadow);
        }
        .ocr-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.8rem;
            gap: 1rem;
        }
        .ocr-source {
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--accent);
            flex-shrink: 0;
        }
        .ocr-page {
            font-size: 0.7rem;
            color: var(--ink-light);
            background: var(--bg);
            padding: 2px 8px;
            border-radius: 20px;
            flex-shrink: 0;
        }
        .ocr-text {
            font-family: 'Libre Baskerville', serif;
            font-size: 0.95rem;
            line-height: 1.65;
            color: var(--ink);
            white-space: pre-wrap;
            word-break: break-word;
        }
        .ocr-text mark {
            background: var(--accent-light);
            color: var(--ink);
            border-radius: 2px;
            padding: 0 2px;
        }
        .ocr-actions {
            margin-top: 1rem;
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }
        .ocr-empty {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--ink-muted);
            font-size: 0.9rem;
        }
        .ocr-empty .ocr-empty-icon { font-size: 2.5rem; margin-bottom: 0.8rem; }
        .ocr-stats-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 1.2rem;
            font-size: 0.78rem;
            color: var(--ink-muted);
        }
        .ocr-stat-pill {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 12px;
        }
    </style>
</head>
<body>

<div class="exit-btn" onclick="window.parent.postMessage('close-iframe', '*')" title="Fermer">✕</div>
<div class="drawer-overlay" id="overlay" onclick="toggleDrawer()"></div>

<aside class="side-drawer" id="drawer">
    <h2 style="font-family: 'Libre Baskerville'; margin-bottom: 1.5rem;">Citatio Pro</h2>
    <div class="drawer-section"><h3 class="drawer-title">📈 Usage</h3><canvas id="clickChart" style="max-height: 150px;"></canvas></div>
    <div class="drawer-section"><h3 class="drawer-title">💾 Sauvegarde</h3><div id="backupInfo" style="font-size:0.85rem; padding:10px; background:var(--bg); border-radius:4px;"></div></div>
    <button class="theme-toggle" onclick="toggleTheme()">🌓 Inverser le thème</button>
</aside>

<main class="main-container">
    <section class="search-area">
        <input type="text" id="search" placeholder="Rechercher..." oninput="render()">
        
        <div class="filter-row">
            <button id="alphaBtn" class="sort-btn" onclick="toggleAlphaSort()" title="Tri Alphabétique">A-Z</button>
            <div class="type-filter">
                <button class="filter-btn active" onclick="setView('citations'); setFilter('all', this)">Tous</button>
                <button class="filter-btn" onclick="setView('citations'); setFilter('livre', this)">Livres</button>
                <button class="filter-btn" onclick="setView('citations'); setFilter('web', this)">Web</button>
                <button class="filter-btn" onclick="setView('citations'); setFilter('video', this)">Vidéos</button>
                <button class="filter-btn" id="ocrTabBtn" onclick="setView('ocr', this)">📷 OCR</button>
            </div>
        </div>
    </section>

    <div id="citationList"></div>
    <div id="ocrList" style="display:none;"></div>
</main>

<div class="fab-container">
    <button class="btn-fab fab-stats" onclick="toggleDrawer()">📊</button>
    <button class="btn-fab fab-clean" onclick="smartClean()">🧹</button>
</div>

<script>
    const getD = (k) => JSON.parse(localStorage.getItem(k) || '[]');
    let citations = getD('citatio_history');
    const clics = JSON.parse(localStorage.getItem('clics') || '{}');
    const backupDate = localStorage.getItem('__last_backup_date__');
    
    let currentType = 'all';
    let isAlphaSort = false;
    let currentView = 'citations'; // 'citations' | 'ocr'
    let ocrSearch = '';

    function toggleDrawer() {
        document.getElementById('drawer').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('visible');
    }

    function toggleTheme() {
        const doc = document.documentElement;
        doc.setAttribute('data-theme', doc.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }

    function toggleAlphaSort() {
        isAlphaSort = !isAlphaSort;
        document.getElementById('alphaBtn').classList.toggle('active', isAlphaSort);
        if (currentView === 'citations') render();
        else renderOCR();
    }

    function setFilter(type, btn) {
        currentType = type;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function setView(view, btn) {
        currentView = view;
        document.getElementById('citationList').style.display = view === 'citations' ? '' : 'none';
        document.getElementById('ocrList').style.display = view === 'ocr' ? '' : 'none';
        document.getElementById('alphaBtn').style.display = view === 'ocr' ? 'none' : '';

        if (view === 'ocr') {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('ocrTabBtn').classList.add('active');
            document.getElementById('search').placeholder = 'Rechercher dans les textes OCR...';
            renderOCR();
        } else {
            document.getElementById('search').placeholder = 'Rechercher...';
        }
    }

    function render() {
        const container = document.getElementById('citationList');
        const search = document.getElementById('search').value.toLowerCase();
        container.innerHTML = "";

        let list = citations.filter(c => {
            const matchesSearch = c.text.toLowerCase().includes(search);
            const matchesType = currentType === 'all' || c.typeLabel.toLowerCase().includes(currentType);
            return matchesSearch && matchesType;
        });

        if (isAlphaSort) {
            list.sort((a, b) => a.text.localeCompare(b.text, 'fr', {sensitivity: 'base'}));
        } else {
            list.sort((a, b) => b.id - a.id);
        }

        list.forEach(cite => {
            const card = document.createElement('div');
            card.className = "citation-card";
            card.innerHTML = `
                <div class="cite-label">${cite.typeLabel}</div>
                <div class="cite-content">${cite.html}</div>
                <div class="cite-meta">
                    <span>${cite.date}</span>
                    <button onclick="copyText('${cite.id}')" style="background:none; border:1px solid var(--accent); color:var(--accent); padding:5px 12px; border-radius:4px; font-weight:700; cursor:pointer;">COPIER</button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    /* ========== OCR ========== */

    function loadOCRData() {
        // Cherche toutes les clés du localStorage qui contiennent des données OCR
        const results = [];
        const knownOCRKeys = [];

        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            try {
                const raw = localStorage.getItem(key);
                if (!raw) continue;
                const parsed = JSON.parse(raw);

                // Détecte les structures OCR : tableaux avec objets ayant "text" ou "texts"
                if (Array.isArray(parsed)) {
                    parsed.forEach((item, idx) => {
                        // Format: [{source, texts:[{text, page}]}] ou [{text, page, source}]
                        if (item && typeof item === 'object') {
                            const source = item.source || item.title || item.name || key;

                            if (Array.isArray(item.texts)) {
                                item.texts.forEach(t => {
                                    if (t && t.text) {
                                        results.push({ source, page: t.page || t.p || '', text: t.text, storageKey: key });
                                    }
                                });
                                knownOCRKeys.push(key);
                            } else if (Array.isArray(item.pages)) {
                                item.pages.forEach(p => {
                                    const txt = p.text || p.content || '';
                                    if (txt) results.push({ source, page: p.page || p.num || '', text: txt, storageKey: key });
                                });
                                knownOCRKeys.push(key);
                            } else if (item.text && typeof item.text === 'string' && item.text.length > 30) {
                                results.push({ source, page: item.page || item.p || '', text: item.text, storageKey: key });
                            }
                        }
                    });
                } else if (parsed && typeof parsed === 'object') {
                    // Format objet direct: {source, texts:[...]}
                    if (Array.isArray(parsed.texts)) {
                        const source = parsed.source || parsed.title || key;
                        parsed.texts.forEach(t => {
                            if (t && t.text) results.push({ source, page: t.page || '', text: t.text, storageKey: key });
                        });
                        knownOCRKeys.push(key);
                    }
                }
            } catch(e) { /* pas du JSON */ }
        }

        return results;
    }

    function highlight(text, query) {
        if (!query) return text;
        const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
    }

    function renderOCR() {
        const container = document.getElementById('ocrList');
        const search = document.getElementById('search').value.toLowerCase().trim();
        container.innerHTML = '';

        let data = loadOCRData();

        if (data.length === 0) {
            container.innerHTML = `
                <div class="ocr-empty">
                    <div class="ocr-empty-icon">📷</div>
                    <strong>Aucune donnée OCR trouvée</strong>
                    <p style="margin-top:0.5rem; font-size:0.82rem;">Les données OCR doivent être stockées dans le localStorage sous forme de tableaux avec des champs <code>text</code>.</p>
                    <p style="margin-top:0.8rem; font-size:0.78rem; color:var(--ink-light);">Clés scannées : ${localStorage.length} entrées</p>
                </div>`;
            return;
        }

        // Filtrage
        if (search) {
            data = data.filter(d => d.text.toLowerCase().includes(search) || d.source.toLowerCase().includes(search));
        }

        // Tri
        if (isAlphaSort) {
            data.sort((a, b) => a.source.localeCompare(b.source, 'fr', {sensitivity: 'base'}));
        }

        // Stats
        const sources = [...new Set(data.map(d => d.source))];
        const statsBar = document.createElement('div');
        statsBar.className = 'ocr-stats-bar';
        statsBar.innerHTML = `
            <span class="ocr-stat-pill">📄 ${data.length} passage${data.length > 1 ? 's' : ''}</span>
            <span class="ocr-stat-pill">📚 ${sources.length} source${sources.length > 1 ? 's' : ''}</span>
        `;
        container.appendChild(statsBar);

        if (data.length === 0) {
            container.innerHTML += `<div class="ocr-empty"><div class="ocr-empty-icon">🔍</div><strong>Aucun résultat pour "${search}"</strong></div>`;
            return;
        }

        data.forEach((item, idx) => {
            const card = document.createElement('div');
            card.className = 'ocr-card';
            const displayText = highlight(item.text.replace(/</g, '&lt;').replace(/>/g, '&gt;'), search);
            card.innerHTML = `
                <div class="ocr-header">
                    <span class="ocr-source">📷 ${item.source}</span>
                    ${item.page ? `<span class="ocr-page">p. ${item.page}</span>` : ''}
                </div>
                <div class="ocr-text">${displayText}</div>
                <div class="ocr-actions">
                    <button onclick="copyOCR(${idx})" data-idx="${idx}" style="background:none; border:1px solid var(--accent); color:var(--accent); padding:5px 12px; border-radius:4px; font-weight:700; cursor:pointer; font-size:0.78rem;">COPIER</button>
                </div>
            `;
            container.appendChild(card);
        });

        // Stocker les données filtrées pour copie
        window.__ocrRendered = data;
    }

    window.copyOCR = (idx) => {
        const item = window.__ocrRendered[idx];
        if (item) navigator.clipboard.writeText(item.text);
    };

    window.copyText = (id) => {
        const c = citations.find(x => x.id == id);
        navigator.clipboard.writeText(c.text);
    };

    window.smartClean = () => {
        const seen = new Set();
        const unique = citations.filter(c => {
            const isDup = seen.has(c.text);
            seen.add(c.text);
            return !isDup;
        });
        if(confirm(`Supprimer ${citations.length - unique.length} doublons ?`)) {
            localStorage.setItem('citatio_history', JSON.stringify(unique));
            location.reload();
        }
    };

    // Relancer le rendu OCR quand on tape dans la recherche
    const origSearch = document.getElementById('search');
    origSearch.addEventListener('input', () => {
        if (currentView === 'ocr') renderOCR();
        else render();
    });

    function initStats() {
        document.getElementById('backupInfo').innerHTML = backupDate ? `Synchro : ${new Date(backupDate).toLocaleString('fr-FR')}` : 'Aucun backup';
        const ctx = document.getElementById('clickChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: Object.keys(clics),
                datasets: [{ data: Object.values(clics), backgroundColor: '#c0392b', borderRadius: 4 }]
            },
            options: { indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { display: false } } } }
        });
    }

    initStats();
    render();
</script>

</body>
</html>
