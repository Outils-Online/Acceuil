<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Citatio Pro - Focus Mode</title>
    
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg: #f5f2ee;
            --bg-card: #ffffff;
            --ink: #1a1714;
            --ink-muted: #6b6560;
            --ink-light: #a09b96;
            --accent: #c0392b;
            --accent-light: #e8d5d3;
            --border: #e0dbd5;
            --shadow: 0 2px 16px rgba(26,23,20,0.08);
            --radius: 4px;
            --radius-lg: 8px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg: #16140f;
            --bg-card: #1f1c17;
            --ink: #f0ebe4;
            --ink-muted: #9c9488;
            --ink-light: #5a554e;
            --accent: #e05a4e;
            --accent-light: #2e1a18;
            --border: #2e2a24;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background var(--transition);
        }

        /* --- LAYOUT FOCUS --- */
        .main-container {
            max-width: 700px;
            margin: 0 auto;
            padding: 2rem 1rem 5rem 1rem;
        }

        /* --- RECHERCHE --- */
        .search-area {
            position: sticky;
            top: 10px;
            z-index: 10;
            margin-bottom: 2rem;
        }
        
        input#search {
            width: 100%;
            padding: 14px 20px;
            border: 1.5px solid var(--border);
            border-radius: 100px;
            background: var(--bg-card);
            color: var(--ink);
            font-size: 1rem;
            outline: none;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }
        input#search:focus { border-color: var(--accent); }

        .type-filter {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 10px 0;
            scrollbar-width: none;
        }
        .type-filter::-webkit-scrollbar { display: none; }

        .filter-btn {
            padding: 6px 15px;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: var(--bg-card);
            color: var(--ink-muted);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        .filter-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* --- CARTES --- */
        .citation-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            margin-bottom: 1.2rem;
            box-shadow: var(--shadow);
        }
        .cite-label { font-size: 0.7rem; text-transform: uppercase; font-weight: 700; color: var(--accent); margin-bottom: 0.8rem; }
        .cite-content { font-family: 'Libre Baskerville', serif; font-size: 1.05rem; line-height: 1.6; margin-bottom: 1.2rem; }
        .cite-meta { display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; color: var(--ink-light); }

        /* --- DRAWER (ONGLET FERMABLE) --- */
        .side-drawer {
            position: fixed;
            top: 0;
            left: 0;
            width: 85%;
            max-width: 350px;
            height: 100%;
            background: var(--bg-card);
            z-index: 1000;
            box-shadow: 20px 0 50px rgba(0,0,0,0.2);
            transform: translateX(-100%);
            transition: var(--transition);
            padding: 2rem;
            overflow-y: auto;
        }
        .side-drawer.open { transform: translateX(0); }
        .drawer-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(2px);
            z-index: 999;
            display: none;
        }
        .drawer-overlay.visible { display: block; }

        .drawer-section { margin-bottom: 2rem; }
        .drawer-title { 
            font-family: 'Libre Baskerville', serif; 
            font-size: 1rem; 
            margin-bottom: 1rem; 
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .backup-card {
            background: var(--bg);
            padding: 12px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            font-size: 0.85rem;
        }

        /* --- BOUTONS FLOTTANTS --- */
        .fab-stats { position: fixed; bottom: 20px; left: 20px; background: var(--ink); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; z-index: 100; box-shadow: var(--shadow); }
        .fab-clean { position: fixed; bottom: 20px; right: 20px; background: var(--accent); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; z-index: 100; box-shadow: var(--shadow); }
        .theme-toggle { margin-top: 1rem; padding: 8px; width: 100%; border: 1px solid var(--border); background: var(--bg); border-radius: var(--radius); cursor: pointer; color: var(--ink); }

        .yt-tag { display: inline-block; background: var(--accent-light); color: var(--accent); padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; margin: 2px; font-weight: 600; }
    </style>
</head>
<body>

<div class="drawer-overlay" id="overlay" onclick="toggleDrawer()"></div>

<aside class="side-drawer" id="drawer">
    <h2 style="font-family: 'Libre Baskerville'; margin-bottom: 1.5rem;">Citatio Pro</h2>
    
    <div class="drawer-section">
        <h3 class="drawer-title">📈 Usage</h3>
        <canvas id="clickChart" style="max-height: 150px;"></canvas>
    </div>

    <div class="drawer-section">
        <h3 class="drawer-title">💾 Sauvegarde</h3>
        <div id="backupInfo" class="backup-card"></div>
    </div>

    <div class="drawer-section">
        <h3 class="drawer-title">📺 YouTube Tags</h3>
        <div id="ytList"></div>
    </div>

    <button class="theme-toggle" onclick="toggleTheme()">🌓 Inverser les couleurs</button>
</aside>

<main class="main-container">
    <section class="search-area">
        <input type="text" id="search" placeholder="Filtrer vos notes..." oninput="render()">
        <div class="type-filter">
            <button class="filter-btn active" onclick="setFilter('all', this)">Tous</button>
            <button class="filter-btn" onclick="setFilter('livre', this)">Livres</button>
            <button class="filter-btn" onclick="setFilter('web', this)">Web</button>
            <button class="filter-btn" onclick="setFilter('video', this)">Vidéos</button>
        </div>
    </section>

    <div id="citationList"></div>
</main>

<button class="fab-stats" onclick="toggleDrawer()" title="Infos et Stats">📊</button>
<button class="fab-clean" onclick="smartClean()" title="Nettoyer les doublons">🧹</button>

<script>
    const getD = (k) => JSON.parse(localStorage.getItem(k) || '[]');
    let citations = getD('citatio_history').sort((a,b) => b.id - a.id);
    const clics = JSON.parse(localStorage.getItem('clics') || '{}');
    const yt = getD('yt_history');
    const backupDate = localStorage.getItem('__last_backup_date__');
    let currentType = 'all';

    function toggleDrawer() {
        document.getElementById('drawer').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('visible');
    }

    function toggleTheme() {
        const doc = document.documentElement;
        doc.setAttribute('data-theme', doc.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }

    function setFilter(type, btn) {
        currentType = type;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function render() {
        const container = document.getElementById('citationList');
        const search = document.getElementById('search').value.toLowerCase();
        container.innerHTML = "";

        const filtered = citations.filter(c => {
            const matchesSearch = c.text.toLowerCase().includes(search);
            const matchesType = currentType === 'all' || c.typeLabel.toLowerCase().includes(currentType);
            return matchesSearch && matchesType;
        });

        filtered.forEach(cite => {
            const card = document.createElement('div');
            card.className = "citation-card";
            card.innerHTML = `
                <div class="cite-label">${cite.typeLabel}</div>
                <div class="cite-content">${cite.html}</div>
                <div class="cite-meta">
                    <span>${cite.date}</span>
                    <button onclick="copyText('${cite.id}')" style="background:none; border:none; color:var(--accent); font-weight:700; cursor:pointer;">COPIER</button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    window.copyText = (id) => {
        const c = citations.find(x => x.id == id);
        navigator.clipboard.writeText(c.text);
    };

    window.smartClean = () => {
        const seen = new Set();
        const unique = citations.filter(c => {
            const isDup = seen.has(c.text);
            seen.add(c.text);
            return !isDup;
        });
        if(confirm(`Supprimer ${citations.length - unique.length} doublons ?`)) {
            localStorage.setItem('citatio_history', JSON.stringify(unique));
            location.reload();
        }
    };

    function initStats() {
        // Infos Sauvegarde
        document.getElementById('backupInfo').innerHTML = `
            <strong>Dernière synchronisation</strong><br>
            ${backupDate ? new Date(backupDate).toLocaleString('fr-FR') : 'Aucun backup trouvé'}
        `;

        // YouTube Tags
        document.getElementById('ytList').innerHTML = yt.map(t => `<span class="yt-tag">#${t}</span>`).join('');

        // Chart
        const ctx = document.getElementById('clickChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: Object.keys(clics),
                datasets: [{ data: Object.values(clics), backgroundColor: '#c0392b' }]
            },
            options: { indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { display: false } } } }
        });
    }

    initStats();
    render();
</script>

</body>
</html>
