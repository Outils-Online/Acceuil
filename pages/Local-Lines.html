<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>LocalLines</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{
  --bg:#FDFCF0;--surface:#FFF;--text:#0A2472;--soft:#8892b8;
  --p:#0A2472;--s:#006466;--a:#F46060;--h:#FFD972;
  --border:rgba(10,36,114,0.09);--shadow:0 2px 14px rgba(10,36,114,0.07);
  --mondrian:linear-gradient(to right,#0A2472 0% 60%,#006466 60% 75%,#F46060 75% 90%,#FFD972 90%);
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:100;background:rgba(253,252,240,0.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.mondrian-bar{height:3px;background:var(--mondrian);box-shadow:0 1px 8px rgba(244,96,96,0.3)}
.topbar-inner{max-width:720px;margin:0 auto;padding:9px 14px;display:flex;align-items:center;gap:8px}
.logo{font-weight:700;font-size:15px;color:var(--p);flex-shrink:0;letter-spacing:-.3px}
.logo span{color:var(--a)}

/* ── SEARCH ── */
.search-wrap{flex:1;display:flex;align-items:center;gap:7px;background:rgba(10,36,114,0.055);border-radius:10px;padding:7px 11px;min-width:0}
.search-input{background:transparent;outline:none;border:none;font-size:13px;color:var(--text);width:100%;font-family:'DM Sans',sans-serif}
.search-input::placeholder{color:var(--soft)}
.search-count{font-size:11px;color:var(--soft);padding:2px 14px 5px;max-width:720px;margin:0 auto;min-height:16px}

/* ── ICON BTN ── */
.icon-btn{width:34px;height:34px;border-radius:9px;border:none;background:rgba(10,36,114,0.055);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--soft);font-size:12px;flex-shrink:0;transition:background .15s}
.icon-btn:hover{background:rgba(10,36,114,0.1)}
.icon-btn.accent{background:rgba(244,96,96,0.1);color:var(--a)}

/* ── MAIN ── */
.main{max-width:720px;margin:0 auto;padding:12px 14px 90px}

/* ── STAT ROW ── */
.stat-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.stat-pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;background:var(--surface);border:1px solid var(--border);font-size:11px;font-weight:500;box-shadow:var(--shadow);white-space:nowrap}
.stat-pill strong{color:var(--p);font-weight:700}
.stat-bar-wrap{width:36px;height:3px;background:rgba(10,36,114,0.08);border-radius:99px;overflow:hidden}
.stat-bar{height:100%;border-radius:99px}

/* ── HEATMAP COMPACT ── */
.heatmap-compact{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);padding:10px 14px;margin-bottom:10px}
.heatmap-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.hm-month-nav{display:flex;align-items:center;gap:6px}
.hm-nav-btn{width:24px;height:24px;border-radius:6px;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--soft);transition:all .15s}
.hm-nav-btn:hover{background:var(--p);color:#fff;border-color:var(--p)}
.hm-month-label{font-size:12px;font-weight:600;color:var(--p);min-width:90px;text-align:center}
.hm-legend{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--soft);margin-left:auto}
.hm-grid{display:flex;gap:4px}
.hm-day-col{display:flex;flex-direction:column;gap:3px;align-items:center}
.hm-day-label{font-size:8px;color:var(--soft);height:10px;line-height:10px;font-family:'JetBrains Mono',monospace}
.hm-cell{width:11px;height:11px;border-radius:2px;background:rgba(10,36,114,0.07);cursor:pointer;transition:transform .1s;position:relative;flex-shrink:0}
.hm-cell:hover{transform:scale(1.5);z-index:10}
.hm-cell[data-n="1"]{background:rgba(0,100,102,0.25)}
.hm-cell[data-n="2"]{background:rgba(0,100,102,0.55)}
.hm-cell[data-n="3"]{background:#006466}
.hm-cell[data-n="4"]{background:#0A2472}
.hm-tip{font-size:10px;color:var(--soft);margin-top:5px;min-height:14px;font-family:'JetBrains Mono',monospace}

/* ── SECTIONS ── */
.sections{display:flex;flex-direction:column;gap:8px}
.section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
.sec-head{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;user-select:none;transition:background .15s}
.sec-head:hover{background:rgba(10,36,114,0.02)}
.sec-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.sec-title{font-size:13px;font-weight:600;white-space:nowrap}
.sec-peek{font-size:11px;color:var(--soft);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-style:italic;margin-left:4px}
.section.open .sec-peek{display:none}
.sec-count{font-size:11px;color:var(--soft);font-family:'JetBrains Mono',monospace;white-space:nowrap;flex-shrink:0}
.chevron{font-size:9px;color:var(--soft);transition:transform .2s;margin-left:6px;flex-shrink:0}
.section.open .chevron{transform:rotate(90deg)}
.sec-body{display:none}
.section.open .sec-body{display:block}

/* ── TOOLBAR ── */
.toolbar{display:flex;align-items:center;gap:6px;padding:7px 14px;border-bottom:1px solid var(--border);background:rgba(10,36,114,0.013);flex-wrap:wrap}
.filter-chip{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;border:1.5px solid var(--border);background:transparent;cursor:pointer;color:var(--soft);transition:all .15s;white-space:nowrap}
.filter-chip.on{background:var(--p);color:#fff;border-color:var(--p)}
.sort-sel{font-size:11px;color:var(--soft);border:1px solid var(--border);border-radius:8px;padding:3px 8px;background:var(--surface);cursor:pointer;outline:none;font-family:'DM Sans',sans-serif;margin-left:auto}
.view-tog{display:flex;gap:2px;background:rgba(10,36,114,0.06);border-radius:7px;padding:3px}
.vbtn{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:5px;border:none;background:transparent;cursor:pointer;font-size:11px;color:var(--soft)}
.vbtn.on{background:var(--surface);color:var(--p);box-shadow:0 1px 3px rgba(10,36,114,0.12)}

/* ── CITATIONS ── */
.cite-list .cite-row{border-top:1px solid var(--border)}
.cite-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px}
@media(max-width:520px){.cite-grid{grid-template-columns:1fr}}
.cite-row{display:flex;align-items:flex-start;gap:11px;padding:13px 14px;transition:background .12s;position:relative}
.cite-row:hover{background:rgba(255,217,114,0.04)}
.cite-grid .cite-row{border:1px solid var(--border);border-radius:10px;padding:13px;flex-direction:column;gap:7px}
.cite-grid .cite-dot{display:none}
.cite-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:8px}
.cite-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:5px}
.cite-html{font-family:'Playfair Display',serif;font-size:13px;line-height:1.7;word-break:break-word}
.cite-html a{color:var(--s);text-decoration:underline;text-underline-offset:2px;word-break:break-all}
.cite-html em{font-style:italic}
.cite-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.type-badge{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:2px 7px;border-radius:20px}
.cite-date{font-size:10px;color:var(--soft)}
.pinned-tag{font-size:9px;color:#9a6f00;font-weight:700}
.cite-actions{display:flex;align-items:center;gap:4px;opacity:0;transition:opacity .15s;flex-shrink:0}
.cite-row:hover .cite-actions,.cite-grid .cite-actions{opacity:1}
@media(max-width:600px){.cite-actions{opacity:1}}
.act-btn{border:none;cursor:pointer;width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .15s}
.act-copy{background:rgba(10,36,114,0.07);color:var(--p)}
.act-pin{background:rgba(255,217,114,0.2);color:#9a6f00}
.act-del{background:rgba(244,96,96,0.08);color:var(--a)}
.act-btn:hover{filter:brightness(1.15);transform:scale(1.05)}

/* ── OCR ── */
.ocr-doc{padding:13px 14px;border-top:1px solid var(--border)}
.ocr-header{display:flex;align-items:flex-start;gap:8px;margin-bottom:9px;flex-wrap:wrap}
.ocr-stamp{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--a);border:1.5px solid var(--a);padding:2px 6px;border-radius:3px;transform:rotate(-1.5deg);display:inline-block;flex-shrink:0}
.ocr-chip{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;background:rgba(10,36,114,0.06);color:var(--soft);font-family:'JetBrains Mono',monospace}
.ocr-date{font-size:10px;color:var(--soft);margin-left:auto;white-space:nowrap}
.ocr-lines{font-family:'JetBrains Mono',monospace;font-size:11.5px;line-height:1.8;background:rgba(255,217,114,0.05);border-radius:7px;padding:10px 12px;border:1px solid rgba(255,217,114,0.22);margin-bottom:8px}
.ocr-line{padding:1px 0;border-bottom:1px dashed rgba(10,36,114,0.08)}
.ocr-line:last-child{border-bottom:none}
.ocr-copy-bar{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.copy-opt-btn{font-size:11px;font-weight:600;padding:4px 11px;border-radius:20px;border:1.5px solid var(--border);background:transparent;cursor:pointer;color:var(--soft);transition:all .15s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.copy-opt-btn:hover{border-color:var(--p);color:var(--p);background:rgba(10,36,114,0.04)}
.copy-opt-btn.copied{border-color:var(--s);color:var(--s);background:rgba(0,100,102,0.06)}

/* ── CHECKLIST ── */
.check-summary{display:flex;align-items:center;justify-content:space-between;padding:9px 14px 6px;flex-wrap:wrap;gap:4px;border-bottom:1px solid var(--border)}
.check-sum-text{font-size:13px;font-weight:600;color:var(--p)}
.check-sum-cost{font-size:12px;color:var(--s);font-family:'JetBrains Mono',monospace;font-weight:600}
.progress-track{height:2px;background:rgba(10,36,114,0.07)}
.progress-fill{height:100%;background:var(--mondrian);background-size:280px;transition:width .4s}
.check-cat{padding:7px 14px 2px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--soft)}
.check-item{display:flex;align-items:center;gap:9px;padding:8px 14px;border-top:1px solid var(--border);cursor:pointer;transition:background .12s;-webkit-user-select:none;user-select:none}
.check-item:hover{background:rgba(10,36,114,0.02)}
.check-item.done{background:rgba(0,100,102,0.025)}
.check-item.done .check-label{text-decoration:line-through;opacity:.35}
.checkbox{width:17px;height:17px;border:1.5px solid rgba(10,36,114,0.2);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.check-item.done .checkbox{background:var(--s);border-color:var(--s)}
.check-label{font-size:13px;flex:1;min-width:0}
.check-qty{font-size:11px;color:var(--soft);font-family:'JetBrains Mono',monospace;white-space:nowrap}
.check-price{font-size:11px;color:var(--s);font-family:'JetBrains Mono',monospace;font-weight:600;min-width:42px;text-align:right;white-space:nowrap}
.check-del{opacity:0;border:none;background:transparent;color:var(--a);cursor:pointer;font-size:12px;padding:3px 5px;border-radius:4px;transition:opacity .15s;flex-shrink:0}
.check-item:hover .check-del{opacity:1}
@media(max-width:600px){.check-del{opacity:0.4}}
.add-row{display:flex;align-items:center;gap:8px;padding:9px 14px;border-top:1px solid var(--border);background:rgba(10,36,114,0.01)}
.add-input{flex:1;border:none;outline:none;font-size:13px;background:transparent;color:var(--text);font-family:'DM Sans',sans-serif;min-width:0}
.add-input::placeholder{color:var(--soft)}

/* ── MISC ── */
.misc-row{padding:11px 14px;border-top:1px solid var(--border)}
.misc-key{font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--s);margin-bottom:4px}
.misc-val{font-family:'JetBrains Mono',monospace;font-size:11px;white-space:pre-wrap;word-break:break-all;color:var(--soft);max-height:72px;overflow:hidden}
.misc-val.exp{max-height:none}
.misc-more{font-size:10px;color:var(--a);cursor:pointer;font-weight:600;border:none;background:none;padding:0;margin-top:3px;display:block}

/* ── EXPORT MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(10,36,114,0.18);backdrop-filter:blur(5px);z-index:200;display:none;align-items:flex-end;justify-content:center;padding:0}
.overlay.open{display:flex}
.export-sheet{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:580px;box-shadow:0 -6px 40px rgba(10,36,114,0.15);padding-bottom:env(safe-area-inset-bottom,16px);animation:slideUp .22s ease}
@keyframes slideUp{from{transform:translateY(30px);opacity:.5}to{transform:none;opacity:1}}
.export-handle{width:36px;height:4px;background:var(--border);border-radius:99px;margin:10px auto 0}
.export-head{padding:14px 20px 10px;border-bottom:1px solid var(--border)}
.export-title{font-size:15px;font-weight:700;color:var(--p)}
.export-sub{font-size:11px;color:var(--soft);margin-top:2px}
.export-sections{padding:12px 20px;display:flex;flex-direction:column;gap:8px}
.export-section-toggle{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;border:1.5px solid var(--border);cursor:pointer;transition:all .15s;background:transparent;width:100%;text-align:left;font-family:'DM Sans',sans-serif}
.export-section-toggle.on{border-color:var(--p);background:rgba(10,36,114,0.04)}
.export-section-toggle .tog-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.export-section-toggle .tog-check{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--border);margin-left:auto;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.export-section-toggle.on .tog-check{background:var(--p);border-color:var(--p)}
.export-formats{padding:0 20px 14px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fmt-btn{display:flex;align-items:center;gap:9px;padding:11px 13px;border-radius:10px;border:1.5px solid var(--border);background:transparent;cursor:pointer;text-align:left;transition:all .15s;font-family:'DM Sans',sans-serif;width:100%}
.fmt-btn:hover{border-color:var(--p);background:rgba(10,36,114,0.03)}
.fmt-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.fmt-label{font-size:12px;font-weight:600;color:var(--p);display:block}
.fmt-desc{font-size:10px;color:var(--soft);display:block;margin-top:1px}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(90px);background:var(--p);color:#fff;padding:10px 16px;border-radius:12px;font-size:13px;font-weight:500;z-index:400;transition:transform .28s cubic-bezier(.34,1.56,.64,1);display:flex;align-items:center;gap:10px;box-shadow:0 4px 20px rgba(10,36,114,0.28);white-space:nowrap;max-width:calc(100vw - 28px)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast-undo{border:none;background:rgba(255,255,255,0.22);color:#fff;font-size:12px;font-weight:600;padding:3px 10px;border-radius:6px;cursor:pointer;white-space:nowrap}

/* ── NAV DOTS (desktop only) ── */
.nav-dots{position:fixed;right:14px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:8px;z-index:50}
@media(max-width:760px){.nav-dots{display:none}}
.nav-dot{width:7px;height:7px;border-radius:50%;background:var(--border);border:1.5px solid var(--border);cursor:pointer;transition:all .2s}
.nav-dot.on{background:var(--a);border-color:var(--a);transform:scale(1.3)}
.nav-dot:hover{background:var(--p);border-color:var(--p)}

/* ── PDF PRINT ── */
@media print{
  .topbar,.nav-dots,.toast,.overlay,.export-sheet,
  .toolbar,.sec-head .chevron,.cite-actions,.ocr-copy-bar,
  .add-row,.check-del,.icon-btn,.hm-nav-btn{display:none!important}
  body{background:#fff;color:#000;font-size:12pt}
  .section{border:1px solid #ccc;border-radius:4px;box-shadow:none;break-inside:avoid;margin-bottom:16pt}
  .sec-body{display:block!important}
  .cite-html{font-size:11pt;line-height:1.6}
  .ocr-lines{font-size:9pt;background:#f9f9f9;border:1px solid #eee}
  .check-item.done .check-label{opacity:.5}
  h1.print-title{font-size:18pt;font-weight:700;margin-bottom:8pt;color:#0A2472}
  .print-date{font-size:9pt;color:#666;margin-bottom:20pt}
}

/* ── UTILS ── */
.hidden{display:none!important}
mark{background:rgba(244,96,96,0.14);color:var(--p);border-radius:2px;padding:0 1px}
.sortable-ghost{opacity:.2}
.sortable-chosen{box-shadow:0 6px 24px rgba(10,36,114,0.13)!important}
@keyframes spin{to{transform:rotate(360deg)}}
.spinning{animation:spin .5s linear}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.section{animation:fadeIn .28s ease both}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:rgba(10,36,114,0.12);border-radius:99px}
</style>
</head>
<body>

<!-- NAV DOTS -->
<div class="nav-dots" id="navDots"></div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="mondrian-bar"></div>
  <div class="topbar-inner">
    <span class="logo">Local<span>Lines</span></span>
    <div class="search-wrap">
      <i class="fas fa-search" style="color:var(--soft);font-size:11px;flex-shrink:0"></i>
      <input id="searchInput" class="search-input" placeholder="Rechercher… (/)">
    </div>
    <button class="icon-btn" onclick="syncData()" title="Rafraîchir"><i id="syncIcon" class="fas fa-rotate-right"></i></button>
    <button class="icon-btn accent" onclick="openExport()" title="Exporter / PDF"><i class="fas fa-arrow-up-from-bracket"></i></button>
  </div>
  <div class="search-count" id="searchCount"></div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- Stats -->
  <div class="stat-row" id="statRow"></div>

  <!-- Heatmap compact -->
  <div class="heatmap-compact" id="heatmapCard">
    <div class="heatmap-header">
      <div class="hm-month-nav">
        <button class="hm-nav-btn" onclick="hmNav(-1)"><i class="fas fa-chevron-left"></i></button>
        <span class="hm-month-label" id="hmMonthLabel">—</span>
        <button class="hm-nav-btn" onclick="hmNav(1)"><i class="fas fa-chevron-right"></i></button>
      </div>
      <div class="hm-legend">
        <span>Moins</span>
        <div style="width:8px;height:8px;border-radius:2px;background:rgba(10,36,114,0.07)"></div>
        <div style="width:8px;height:8px;border-radius:2px;background:rgba(0,100,102,0.3)"></div>
        <div style="width:8px;height:8px;border-radius:2px;background:#006466"></div>
        <div style="width:8px;height:8px;border-radius:2px;background:#0A2472"></div>
        <span>Plus</span>
      </div>
    </div>
    <div class="hm-grid" id="hmGrid"></div>
    <div class="hm-tip" id="hmTip"></div>
  </div>

  <!-- Sections -->
  <div class="sections" id="sectionsEl"></div>
</div>

<!-- EXPORT SHEET -->
<div class="overlay" id="exportOverlay" onclick="overlayBgClick(event)">
  <div class="export-sheet" id="exportSheet">
    <div class="export-handle"></div>
    <div class="export-head">
      <div class="export-title">Exporter</div>
      <div class="export-sub">Choisissez les sections à inclure, puis le format</div>
    </div>
    <div class="export-sections" id="exportSections"></div>
    <div style="padding:0 20px 6px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--soft)">Format</div>
    <div class="export-formats">
      <button class="fmt-btn" onclick="doExport('pdf')">

const sj=(s,fb=null)=>{if(!s||typeof s!=='string')return fb;try{return JSON.parse(s)}catch{return fb}};
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const stripHtml=h=>h.replace(/<[^>]+>/g,'');
const fmtDateStr=s=>{try{const[dt,tm]=s.split(' ');const[d,m,y]=dt.split('/');const date=new Date(+y,+m-1,+d);const[h,mn]=tm.split(':');return date.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})+' · '+h+'h'+mn}catch{return s}};
const fmtISO=s=>{try{const d=new Date(s);return d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})+' · '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}catch{return s}};

// ═══════════════════════════════
//  HEATMAP — compact, 1 month, navigable
// ═══════════════════════════════
let hmOffset=0; // 0=current month, -1=previous, etc.
const HM_DAYS=['L','M','M','J','V','S','D'];

function buildDayData(){
  const citations=sj(D.citatio_history,[]);
  const ocr=sj(D.ocr_history_v1,[]);
  const dd={};
  citations.forEach(c=>{
    if(!c.date)return;
    const[d,m,y]=c.date.split(' ')[0].split('/');
    const k=y+'-'+m+'-'+d;
    if(!dd[k])dd[k]={n:0,titles:[]};
    dd[k].n++;
    dd[k].titles.push(stripHtml(c.html||c.text||'').slice(0,45));
  });
  ocr.forEach(o=>{
    if(!o.savedAt)return;
    const k=o.savedAt.split('T')[0];
    if(!dd[k])dd[k]={n:0,titles:[]};
    dd[k].n++;
    dd[k].titles.push((o.meta?.prenom||'Scan')+' — '+(o.meta?.titre||'').slice(0,30));
  });
  return dd;
}

function renderHeatmap(){
  const dd=buildDayData();
  const today=new Date();
  const ref=new Date(today.getFullYear(),today.getMonth()+hmOffset,1);
  const year=ref.getFullYear(), month=ref.getMonth();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const firstDow=(new Date(year,month,1).getDay()+6)%7; // Mon=0

  document.getElementById('hmMonthLabel').textContent=
    ref.toLocaleDateString('fr-FR',{month:'long',year:'numeric'});

  // Disable next button if we're at current month
  const nextBtn=document.querySelector('.hm-nav-btn:last-of-type');
  if(nextBtn)nextBtn.style.opacity=hmOffset>=0?'0.3':'1';

  const grid=document.getElementById('hmGrid');
  grid.innerHTML='';
  const tip=document.getElementById('hmTip');

  // 7 columns (Mon→Sun) × rows
  const totalCells=firstDow+daysInMonth;
  const cols=Math.ceil(totalCells/7);

  // Day-of-week labels column
  const lblCol=document.createElement('div');
  lblCol.style.cssText='display:flex;flex-direction:column;gap:3px;margin-top:13px';
  HM_DAYS.forEach(dl=>{
    const s=document.createElement('div');
    s.className='hm-day-label';
    s.style.cssText='width:11px;text-align:center;font-size:8px;color:var(--soft);height:11px;line-height:11px';
    s.textContent=dl;
    lblCol.appendChild(s);
  });
  grid.appendChild(lblCol);

  for(let col=0;col<cols;col++){
    const colDiv=document.createElement('div');
    colDiv.className='hm-day-col';
    // Column date label (day number of Monday of this week)
    const dayOfFirst=col*7-firstDow+1;
    const lbl=document.createElement('div');
    lbl.className='hm-day-label';
    // Show day number if valid
    if(dayOfFirst>=1&&dayOfFirst<=daysInMonth){
      lbl.textContent=dayOfFirst;
    }
    colDiv.appendChild(lbl);

    for(let row=0;row<7;row++){
      const dayNum=col*7+row-firstDow+1;
      const cell=document.createElement('div');
      cell.className='hm-cell';
      if(dayNum<1||dayNum>daysInMonth){
        cell.style.background='transparent';
        cell.style.pointerEvents='none';
      } else {
        const mm=String(month+1).padStart(2,'0');
        const dd2=String(dayNum).padStart(2,'0');
        const k=year+'-'+mm+'-'+dd2;
        const info=dd[k];
        const n=info?info.n:0;
        if(n>0){cell.dataset.n=Math.min(n,4);}
        // Today highlight
        if(year===today.getFullYear()&&month===today.getMonth()&&dayNum===today.getDate()){
          cell.style.outline='2px solid var(--a)';cell.style.outlineOffset='1px';
        }
        cell.addEventListener('mouseenter',()=>{
          const lbl2=dayNum+' '+ref.toLocaleDateString('fr-FR',{month:'short'});
          if(info&&info.n>0){
            tip.innerHTML='<strong>'+lbl2+'</strong> — '+info.titles.join(' · ');
          } else {
            tip.textContent=lbl2+' — aucune activité';
          }
        });
        cell.addEventListener('mouseleave',()=>{tip.textContent=''});
        // Touch support
        cell.addEventListener('touchstart',()=>{
          const lbl2=dayNum+' '+ref.toLocaleDateString('fr-FR',{month:'short'});
          tip.innerHTML=info&&info.n>0?'<strong>'+lbl2+'</strong> — '+info.titles.join(' · '):lbl2;
        },{passive:true});
      }
      colDiv.appendChild(cell);
    }
    grid.appendChild(colDiv);
  }
}

function hmNav(dir){

  if(newOffset>0)return;

function makeSection(id,icon,iconColor,title,count,peek,renderBody){
  const sec=document.createElement('div');
  sec.className='section';sec.id='sec-'+id;sec.dataset.widgetId=id;
  const head=document.createElement('div');head.className='sec-head';
  head.innerHTML=
    '<div class="sec-icon" style="background:'+iconColor+'1a;color:'+iconColor+'"><i class="'+icon+'"></i></div>'+
    '<span class="sec-title">'+title+'</span>'+
    (peek?'<span class="sec-peek">'+esc(peek)+'</span>':'')+
    '<span class="sec-count">'+count+'</span>'+
    '<i class="fas fa-chevron-right chevron"></i>';
  head.addEventListener('click',()=>{
    const wasOpen=sec.classList.contains('open');
    sec.classList.toggle('open');
    const body=sec.querySelector('.sec-body');
    if(!wasOpen&&!body.dataset.built){body.innerHTML=renderBody();body.dataset.built='1';}
    updateNavDots();
  });
  const body=document.createElement('div');body.className='sec-body';
  sec.appendChild(head);sec.appendChild(body);
  return sec;
}

function rebuildBody(id,renderFn){
  const body=document.querySelector('#sec-'+id+' .sec-body');
  if(body&&body.dataset.built)body.innerHTML=renderFn();
}

// ═══════════════════════════════
//  CITATIONS
// ═══════════════════════════════
let cView='list',cFilter='all',cSort='date-desc';
let pinned=new Set();
try{const p=localStorage.getItem('ll_pinned');if(p)pinned=new Set(JSON.parse(p))}catch{}

function buildCitations(){
  const list=sj(D.citatio_history,[]);
  const peek=list.length?stripHtml(list[0].html||list[0].text||'').slice(0,50):'';
  return makeSection('citations','fas fa-book-open','#FFD972','Citations',list.length+' réf.',peek,renderCitations);
}

function renderCitations(){
  let list=sj(D.citatio_history,[]);
  // Sort
  list=[...list].sort((a,b)=>{
    if(cSort==='date-asc')return a.id-b.id;
    if(cSort==='type')return(a.type||'').localeCompare(b.type||'');
    if(cSort==='author')return stripHtml(a.html||'').split(',')[0].localeCompare(stripHtml(b.html||'').split(',')[0]);
    return b.id-a.id;
  });
  const pArr=list.filter(c=>pinned.has(String(c.id)));
  const uArr=list.filter(c=>!pinned.has(String(c.id)));
  list=[...pArr,...uArr];
  if(cFilter!=='all')list=list.filter(c=>c.type===cFilter);

  const toolbar='<div class="toolbar">'+
    '<div class="view-tog">'+
      '<button class="vbtn'+(cView==='list'?' on':'')+'" onclick="setCView(\'list\')" title="Liste"><i class="fas fa-list"></i></button>'+
      '<button class="vbtn'+(cView==='grid'?' on':'')+'" onclick="setCView(\'grid\')" title="Grille"><i class="fas fa-grip"></i></button>'+
    '</div>'+
    '<button class="filter-chip'+(cFilter==='all'?' on':'')+'" onclick="setCFilter(\'all\')">Tout</button>'+
    '<button class="filter-chip'+(cFilter==='ouvrage'?' on':'')+'" onclick="setCFilter(\'ouvrage\')">Ouvrages</button>'+
    '<button class="filter-chip'+(cFilter==='periodique'?' on':'')+'" onclick="setCFilter(\'periodique\')">Périodiques</button>'+
    '<select class="sort-sel" onchange="setCS(this.value)">'+
      '<option value="date-desc"'+(cSort==='date-desc'?' selected':'')+'>+ récent</option>'+
      '<option value="date-asc"'+(cSort==='date-asc'?' selected':'')+'>+ ancien</option>'+
      '<option value="type"'+(cSort==='type'?' selected':'')+'>Type</option>'+
      '<option value="author"'+(cSort==='author'?' selected':'')+'>Auteur</option>'+
    '</select></div>';

  const rows=list.map(c=>{
    const isP=c.type==='periodique';
    const dot=isP?'#F46060':'#006466';
    const bg=isP?'rgba(244,96,96,0.1)':'rgba(0,100,102,0.1)';
    const isPinned=pinned.has(String(c.id));
    return '<div class="cite-row" data-id="'+c.id+'" data-searchable="'+esc(stripHtml(c.html||c.text||'').toLowerCase())+'">'+
      '<div class="cite-dot" style="background:'+dot+'"></div>'+
      '<div class="cite-body">'+
        '<div class="cite-meta">'+
          '<span class="type-badge" style="background:'+bg+';color:'+dot+'"><i class="'+(c.icon||'fas fa-file')+'"></i> '+esc(c.typeLabel||c.type)+'</span>'+
          (isPinned?'<span class="pinned-tag"><i class="fas fa-thumbtack"></i> Épinglé</span>':'')+
          '<span class="cite-date">'+( c.date?fmtDateStr(c.date):'' )+'</span>'+
        '</div>'+
        '<div class="cite-html">'+( c.html||c.text||'' )+'</div>'+
      '</div>'+
      '<div class="cite-actions">'+
        '<button class="act-btn act-pin" onclick="togglePin('+c.id+')" title="'+(isPinned?'Désépingler':'Épingler')+'"><i class="fas fa-thumbtack"></i></button>'+
        '<button class="act-btn act-copy" onclick="copyCitation(this,'+c.id+')" title="Copier"><i class="fas fa-copy"></i></button>'+
        '<button class="act-btn act-del" onclick="delCitation('+c.id+')" title="Supprimer"><i class="fas fa-trash"></i></button>'+
      '</div>'+
    '</div>';
  }).join('');

  const wrapClass=cView==='grid'?'cite-grid':'cite-list';
  return toolbar+'<div class="'+wrapClass+'">'+( rows||'<div style="padding:20px 14px;color:var(--soft);font-size:13px">Aucune citation.</div>' )+'</div>';
}

function setCView(v){cView=v;rebuildBody('citations',renderCitations)}
function setCFilter(f){cFilter=f;rebuildBody('citations',renderCitations)}
function setCS(s){cSort=s;rebuildBody('citations',renderCitations)}

function togglePin(id){
  const k=String(id);
  pinned.has(k)?pinned.delete(k):pinned.add(k);
  saveLS('ll_pinned',JSON.stringify([...pinned]));
  rebuildBody('citations',renderCitations);
}

function copyCitation(btn,id){
  const list=sj(D.citatio_history,[]);
  const c=list.find(x=>x.id===id);
  if(!c)return;
  navigator.clipboard.writeText(c.text||stripHtml(c.html||'')).then(()=>{
    btn.innerHTML='<i class="fas fa-check"></i>';
    setTimeout(()=>{btn.innerHTML='<i class="fas fa-copy"></i>'},1400);
  });
}

function delCitation(id){
  let list=sj(D.citatio_history,[]);
  const snapshot=[...list];
  list=list.filter(x=>x.id!==id);
  saveLS('citatio_history',JSON.stringify(list));
  D.citatio_history=JSON.stringify(list);
  rebuildBody('citations',renderCitations);
  toast('Citation supprimée',()=>{
    saveLS('citatio_history',JSON.stringify(snapshot));
    D.citatio_history=JSON.stringify(snapshot);
    rebuildBody('citations',renderCitations);
  });
}

//  OCR
// ═══════════════════════════════
function buildOCR(){
  const list=sj(D.ocr_history_v1,[]);
  const peek=list.length?(list[0].meta?.prenom||'Scan')+' · '+(list[0].entries?.[0]||'').slice(0,35):'';
  return makeSection('ocr','fas fa-file-lines','#F46060','Archives OCR',list.length+' doc.',peek,renderOCR);
}

function fmtOCRCitation(o){
  const m=o.meta||{};
  const parts=[];
  if(m.prenom)parts.push(m.prenom);
  if(m.titre)parts.push(m.titre);
  if(m.ville)parts.push(m.ville);
  if(m.editeur)parts.push(m.editeur);
  if(m.annee)parts.push(m.annee);
  const ref=parts.join(', ');
  const lines=(o.entries||[]).join(' / ');
  return ref+(lines?'. Extrait : «'+lines+'»':'');
}

function renderOCR(){
  const list=sj(D.ocr_history_v1,[]);
  return list.map((o,i)=>{
    const m=o.meta||{};
    const chipArr=[m.prenom,m.titre,m.ville,m.editeur,m.annee].filter(Boolean);
    const chips=chipArr.map(x=>'<span class="ocr-chip">'+esc(x)+'</span>').join('');
    const lineHtml=(o.entries||[]).map(e=>'<div class="ocr-line">'+esc(e)+'</div>').join('');
    const allText=(o.entries||[]).join(' ').toLowerCase();
    const citRef=esc(fmtOCRCitation(o));
    return '<div class="ocr-doc" data-searchable="'+esc(allText)+'">'+
      '<div class="ocr-header">'+
        '<span class="ocr-stamp">#'+( i+1 )+'</span>'+
        chips+
        '<span class="ocr-date">'+( o.savedAt?fmtISO(o.savedAt):'' )+'</span>'+
      '</div>'+
      '<div class="ocr-lines">'+lineHtml+'</div>'+
      '<div class="ocr-copy-bar">'+
        '<button class="copy-opt-btn" onclick="copyOCR(this,\'text\','+i+')" title="Copier le texte brut">'+
          '<i class="fas fa-align-left"></i> Texte seul</button>'+
        '<button class="copy-opt-btn" onclick="copyOCR(this,\'cite\','+i+')" title="Copier comme citation">'+
          '<i class="fas fa-quote-right"></i> Copier comme citation</button>'+
      '</div>'+
    '</div>';
  }).join('')||'<div style="padding:20px 14px;color:var(--soft);font-size:13px">Aucun scan.</div>';
}

function copyOCR(btn,mode,idx){
  const list=sj(D.ocr_history_v1,[]);
  const o=list[idx];if(!o)return;
  let txt='';
  if(mode==='text'){txt=(o.entries||[]).join('\n');}
  else{txt=fmtOCRCitation(o);}
  navigator.clipboard.writeText(txt).then(()=>{
    btn.classList.add('copied');
    const orig=btn.innerHTML;
    btn.innerHTML='<i class="fas fa-check"></i> Copié !';
    setTimeout(()=>{btn.innerHTML=orig;btn.classList.remove('copied')},1600);
  });
}

let chkFilter='all', chkSort='default';

function buildLogistique(){
  const ovni=sj(D.ovni_v9,null);if(!ovni)return null;
  const cur=(ovni.sessions||{})[ovni.currentSessionId];
  const list=(cur&&cur.list)||[];
  const doneN=list.filter(i=>i.done).length;
  const peek=doneN+'/'+list.length+' cochés · '+(list.filter(i=>!i.done).reduce((s,i)=>s+(i.price||0),0).toFixed(2))+'€ restants';
  return makeSection('logistique','fas fa-basket-shopping','#006466',cur?.name||'Courses',list.length+' art.',peek,renderCourses);
}

function renderCourses(){
  const ovni=sj(D.ovni_v9,null);if(!ovni)return '';
  const sid=ovni.currentSessionId;
  const cur=(ovni.sessions||{})[sid];
  let list=(cur&&cur.list)||[];
  const allList=[...list];

  // Apply filter
  let filtered=chkFilter==='todo'?list.filter(i=>!i.done):
    chkFilter==='done'?list.filter(i=>i.done):
    list.filter(i=>!i.cat||i.cat===chkFilter||chkFilter==='all');

  // Sort
  if(chkSort==='price-desc')filtered=[...filtered].sort((a,b)=>(b.price||0)-(a.price||0));
  else if(chkSort==='price-asc')filtered=[...filtered].sort((a,b)=>(a.price||0)-(b.price||0));

  const doneN=allList.filter(i=>i.done).length;
  const pct=allList.length?Math.round(doneN/allList.length*100):0;
  const remaining=allList.filter(i=>!i.done);
  const remainCost=remaining.reduce((s,i)=>s+(i.price||0),0);
  const totalCost=allList.reduce((s,i)=>s+(i.price||0),0);

  const cats=[...new Set(allList.map(i=>i.cat||'Autre'))];
  const catChips=cats.map(c=>'<button class="filter-chip'+(chkFilter===c?' on':'')+'" onclick="setChkFilter(\''+esc(c)+'\')">'+esc(c)+'</button>').join('');

  const toolbar='<div class="toolbar">'+
    '<button class="filter-chip'+(chkFilter==='all'?' on':'')+'" onclick="setChkFilter(\'all\')">Tout</button>'+
    '<button class="filter-chip'+(chkFilter==='todo'?' on':'')+'" onclick="setChkFilter(\'todo\')">Restants</button>'+
    catChips+
    '<select class="sort-sel" onchange="setChkSort(this.value)">'+
      '<option value="default">Ordre</option>'+
      '<option value="price-desc">Prix ↓</option>'+
      '<option value="price-asc">Prix ↑</option>'+
    '</select></div>';

  const summary='<div class="check-summary">'+
    '<span class="check-sum-text">'+remaining.length+' restant'+(remaining.length>1?'s':'')+'</span>'+
    '<span class="check-sum-cost">'+remainCost.toFixed(2)+'€ / '+totalCost.toFixed(2)+'€</span>'+
  '</div>'+
  '<div class="progress-track"><div class="progress-fill" id="pFill" style="width:'+pct+'%"></div></div>';

  // Group by cat
  const bycat={};
  filtered.forEach(item=>{const c=item.cat||'Autre';if(!bycat[c])bycat[c]=[];bycat[c].push(item);});
  let rows='';
  for(const[cat,items] of Object.entries(bycat)){
    rows+='<div class="check-cat">'+esc(cat)+'</div>';
    rows+=items.map(item=>
      '<div class="check-item'+(item.done?' done':'')+'" data-name="'+esc(item.name)+'" data-sid="'+esc(sid)+'" onclick="toggleItem(this)" data-searchable="'+esc(item.name.toLowerCase())+'">'+
        '<div class="checkbox">'+(item.done?'<i class="fas fa-check" style="font-size:8px;color:white"></i>':'')+' </div>'+
        '<span class="check-label">'+esc(item.name)+'</span>'+
        '<span class="check-qty">'+item.qty+item.unit+'</span>'+
        '<span class="check-price">'+(item.price!==undefined?item.price.toFixed(2)+'€':'')+'</span>'+
        '<button class="check-del" onclick="delCheckItem(event,\''+esc(item.name)+'\',\''+esc(sid)+'\')" title="Supprimer"><i class="fas fa-xmark"></i></button>'+
      '</div>'
    ).join('');
  }

  const addRow='<div class="add-row">'+
    '<i class="fas fa-plus" style="color:var(--soft);font-size:11px;flex-shrink:0"></i>'+
    '<input class="add-input" id="addInput" placeholder="Ajouter : nom, quantité, unité" onkeydown="addItem(event,\''+esc(sid)+'\')">'+
  '</div>';

  return toolbar+summary+rows+addRow;
}

function setChkFilter(f){chkFilter=f;rebuildBody('logistique',renderCourses)}
function setChkSort(s){chkSort=s;rebuildBody('logistique',renderCourses)}

function toggleItem(el){
  const sid=el.dataset.sid,name=el.dataset.name;
  const isDone=el.classList.toggle('done');
  el.querySelector('.checkbox').innerHTML=isDone?'<i class="fas fa-check" style="font-size:8px;color:white"></i>':' ';
  try{
    const ovni=sj(localStorage.getItem('ovni_v9')||D.ovni_v9,null);
    if(ovni?.sessions?.[sid]){
      const item=ovni.sessions[sid].list.find(i=>i.name===name);
      if(item)item.done=isDone;
      saveLS('ovni_v9',JSON.stringify(ovni));D.ovni_v9=JSON.stringify(ovni);
    }
  }catch{}
  // Update progress
  const all=document.querySelectorAll('.check-item');
  const dn=document.querySelectorAll('.check-item.done').length;
  const pct=all.length?Math.round(dn/all.length*100):0;
  const f=document.getElementById('pFill');if(f)f.style.width=pct+'%';
  // Update summary
  const ovni2=sj(D.ovni_v9,null);
  const cur=(ovni2?.sessions||{})[sid];
  if(cur){
    const rem=cur.list.filter(i=>!i.done);
    const rc=rem.reduce((s,i)=>s+(i.price||0),0);
    const tc=cur.list.reduce((s,i)=>s+(i.price||0),0);
    const st=document.querySelector('.check-sum-text');
    const sc=document.querySelector('.check-sum-cost');
    if(st)st.textContent=rem.length+' restant'+(rem.length>1?'s':'');
    if(sc)sc.textContent=rc.toFixed(2)+'€ / '+tc.toFixed(2)+'€';
  }
}

function delCheckItem(e,name,sid){
  e.stopPropagation();
  const ovni=sj(D.ovni_v9,null);if(!ovni?.sessions?.[sid])return;
  const snapshot=JSON.stringify(ovni);
  ovni.sessions[sid].list=ovni.sessions[sid].list.filter(i=>i.name!==name);
  saveLS('ovni_v9',JSON.stringify(ovni));D.ovni_v9=JSON.stringify(ovni);
  rebuildBody('logistique',renderCourses);
  toast('"'+name+'" supprimé',()=>{
    const o=sj(snapshot,null);if(!o)return;
    saveLS('ovni_v9',JSON.stringify(o));D.ovni_v9=JSON.stringify(o);
    rebuildBody('logistique',renderCourses);
  });
}

function addItem(e,sid){
  if(e.key!=='Enter')return;
  const input=document.getElementById('addInput');
  const val=input.value.trim();if(!val)return;
  const parts=val.split(',').map(s=>s.trim());
  const name=parts[0]||val,qty=parseFloat(parts[1])||1,unit=parts[2]||'pièce';
  const ovni=sj(D.ovni_v9,null);if(!ovni?.sessions?.[sid])return;
  ovni.sessions[sid].list.push({name,qty,unit,cat:'Autre',price:0,done:false});
  saveLS('ovni_v9',JSON.stringify(ovni));D.ovni_v9=JSON.stringify(ovni);
  input.value='';
  rebuildBody('logistique',renderCourses);
}

function buildMisc(){

function renderMisc(){
  const keys=Object.keys(D).filter(k=>!MISC_SKIP.includes(k));
  return keys.map(k=>{
    const parsed=sj(D[k],null);
    const disp=parsed!==null?JSON.stringify(parsed,null,2):String(D[k]);
    return '<div class="misc-row" data-searchable="'+esc(disp.toLowerCase())+'">'+
      '<div class="misc-key">'+esc(k)+'</div>'+

document.getElementById('searchInput').addEventListener('input',function(){
  const q=this.value.toLowerCase().trim();
  let total=0;const bySec={};
  document.querySelectorAll('[data-searchable]').forEach(el=>{
    const card=el.closest('.cite-row,.ocr-doc,.check-item,.misc-row')||el;
    const match=!q||el.dataset.searchable.includes(q);
    card.classList.toggle('hidden',!match);
    if(match&&q){total++;const s=el.closest('[data-widget-id]');if(s){const id=s.dataset.widgetId;bySec[id]=(bySec[id]||0)+1;}}
  });
  const cnt=document.getElementById('searchCount');
  cnt.textContent=q?(total?Object.entries(bySec).map(([id,n])=>n+' dans '+id).join(' · '):'Aucun résultat'):'';
});

function buildNavDots(){
  const c=document.getElementById('navDots');c.innerHTML='';
  ['citations','ocr','logistique','misc'].forEach(id=>{
    if(!document.getElementById('sec-'+id))return;
    const d=document.createElement('div');d.className='nav-dot';d.dataset.target=id;
    d.title=id;
    d.onclick=()=>document.getElementById('sec-'+id)?.scrollIntoView({behavior:'smooth',block:'start'});
    c.appendChild(d);
  });
  updateNavDots();
}
function updateNavDots(){
  document.querySelectorAll('.nav-dot').forEach(d=>{
    const sec=document.getElementById('sec-'+d.dataset.target);
    d.classList.toggle('on',!!sec?.classList.contains('open'));
  });
}

}

      'if(d.citations&&d.citations.length){document.write(\'<div class="section"><div class="sec-h">Citations ('+( data.citations?.length||0 )+')</div>\');d.citations.forEach(c=>{document.write(\'<div class="cite">\'+(c.html||c.text||\'\')+\'</div>\');});document.write(\'</div>\');}'+
      'if(d.ocr&&d.ocr.length){document.write(\'<div class="section"><div class="sec-h">Archives OCR ('+( data.ocr?.length||0 )+')</div>\');d.ocr.forEach((o,i)=>{const m=o.meta||{};const ref=[m.prenom,m.titre,m.ville,m.editeur,m.annee].filter(Boolean).join(\', \');document.write(\'<div class="ocr-doc"><div class="ocr-ref">Scan #\'+(i+1)+\' — \'+ref+\'</div><div class="ocr-block">\'+(o.entries||[]).join(\'<br>\')+\'</div></div>\');});document.write(\'</div>\');}'+
      'if(d.courses&&d.courses.length){document.write(\'<div class="section"><div class="sec-h">\'+( d.coursesName||\'Courses\' )+\' ('+( data.courses?.length||0 )+')</div>\');d.courses.forEach(i=>{document.write(\'<div class="check"><span style="flex-shrink:0">\'+(i.done?\'☑\':\'☐\')+\'</span><span class="\'+(i.done?\'done\':\'\')+\'">\'+(i.name)+\'</span><span style="margin-left:auto;font-size:11px;color:#8892b8\">\'+(i.qty+i.unit)+\'</span></div>\');});document.write(\'</div>\');}'+
      '<\/script></body></html>';
    dl('locallines-partage.html',mini,'text/html');
    closeExport();toast('Fichier HTML autonome téléchargé');return;
  }
}

// ═══════════════════════════════
//  SORTABLE + LAYOUT
// ═══════════════════════════════
const DEF=['citations','ocr','logistique','misc'];
function getLayout(){try{const s=localStorage.getItem('local_lines_layout');if(s)return JSON.parse(s)}catch{}return DEF}
function saveLayout(){
  const o=[...document.querySelectorAll('[data-widget-id]')].map(e=>e.dataset.widgetId);
  try{localStorage.setItem('local_lines_layout',JSON.stringify(o))}catch{}
}
function initSortable(){
  Sortable.create(document.getElementById('sectionsEl'),{
    animation:160,ghostClass:'sortable-ghost',chosenClass:'sortable-chosen',
    handle:'.sec-head',onEnd:()=>{saveLayout();buildNavDots();}
  });
}

// ═══════════════════════════════
//  RENDER
// ═══════════════════════════════
function render(){
  D=loadData();
  renderStats();
  renderHeatmap();
  const c=document.getElementById('sectionsEl');c.innerHTML='';
  const builders={citations:buildCitations,ocr:buildOCR,logistique:buildLogistique,misc:buildMisc};
  const layout=[...new Set([...getLayout(),...DEF])];
  layout.forEach(id=>{if(builders[id]){const w=builders[id]();if(w)c.appendChild(w);}});
  initSortable();buildNavDots();
}

function syncData(){
  const i=document.getElementById('syncIcon');
  i.style.animation='spin .5s linear';
  setTimeout(()=>{i.style.animation='';render();},520);
}

// Keyboard shortcuts
document.addEventListener('keydown',e=>{
  const focused=document.activeElement;
  const inInput=focused&&(focused.tagName==='INPUT'||focused.tagName==='SELECT');
  if(e.key==='/'&&!inInput){e.preventDefault();document.getElementById('searchInput').focus();}
  if(e.key==='Escape'){document.getElementById('searchInput').blur();closeExport();}
});

render();
</script>
</body>
</html>
