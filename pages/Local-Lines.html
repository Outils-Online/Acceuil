<style>
  :root {
    --bg-main:         #FDFCF0;
    --surface:         #FFFFFF;
    --text-main:       #0A2472;
    --text-soft:       #6b7a9e;
    --color-primary:   #0A2472;
    --color-secondary: #006466;
    --color-accent:    #F46060;
    --color-highlight: #FFD972;
    --border:          rgba(10,36,114,0.09);
    --shadow:          0 2px 12px rgba(10,36,114,0.07);
    --mondrian: linear-gradient(to right,#0A2472 0% 60%,#006466 60% 75%,#F46060 75% 90%,#FFD972 90%);
  }
  .dark {
    --bg-main:   #06091a;
    --surface:   #0d1230;
    --text-main: #d8e4ff;
    --text-soft: #6b7a9e;
    --border:    rgba(255,255,255,0.08);
    --shadow:    0 2px 12px rgba(0,0,0,0.3);
  }
  * { box-sizing: border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg-main); color:var(--text-main); min-height:100vh; transition:background .3s,color .3s; }

  .topbar { position:sticky; top:0; z-index:50; background:rgba(253,252,240,0.9); backdrop-filter:blur(18px); border-bottom:1px solid var(--border); }
  .dark .topbar { background:rgba(6,9,26,0.9); }
  .topbar-mondrian { height:2px; background:var(--mondrian); }

  .search-input { background:transparent; outline:none; width:100%; font-size:13px; color:var(--text-main); }
  .search-input::placeholder { color:var(--text-soft); }

  /* HEATMAP */
  .heatmap-cell { width:10px; height:10px; border-radius:2px; background:rgba(10,36,114,0.07); flex-shrink:0; cursor:default; transition:transform .1s; }
  .dark .heatmap-cell { background:rgba(255,255,255,0.06); }
  .heatmap-cell:hover { transform:scale(1.5); }
  .heatmap-cell[data-count="1"] { background:rgba(0,100,102,0.28); }
  .heatmap-cell[data-count="2"] { background:rgba(0,100,102,0.58); }
  .heatmap-cell[data-count="3"] { background:#006466; }
  .heatmap-cell[data-count="4"] { background:#0A2472; }
  .dark .heatmap-cell[data-count="4"] { background:#FFD972; }

  /* ACCORDION SECTIONS */
  .section { border-bottom:1px solid var(--border); }
  .section:last-child { border-bottom:none; }
  .section-head { display:flex; align-items:center; gap:12px; padding:13px 18px; cursor:pointer; user-select:none; transition:background .15s; }
  .section-head:hover { background:rgba(10,36,114,0.025); }
  .dark .section-head:hover { background:rgba(255,255,255,0.02); }
  .section-icon { width:26px; height:26px; border-radius:7px; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:11px; }
  .section-title { font-size:13px; font-weight:600; }
  .section-meta { margin-left:auto; font-size:11px; color:var(--text-soft); font-family:'JetBrains Mono',monospace; }
  .chevron { font-size:9px; color:var(--text-soft); transition:transform .2s; margin-left:6px; }
  .section.open .chevron { transform:rotate(90deg); }
  .section-body { display:none; }
  .section.open .section-body { display:block; }

  /* CITATIONS */
  .cite-row { display:flex; align-items:flex-start; gap:12px; padding:12px 18px; border-top:1px solid var(--border); transition:background .12s; }
  .cite-row:hover { background:rgba(255,217,114,0.04); }
  .cite-dot { width:5px; height:5px; border-radius:50%; flex-shrink:0; margin-top:7px; }
  .cite-body { flex:1; min-width:0; }
  .cite-html { font-family:'Playfair Display',serif; font-size:13px; line-height:1.65; }
  .cite-html a { color:var(--color-secondary); text-decoration:underline; text-underline-offset:2px; word-break:break-all; }
  .cite-date { font-size:10px; color:var(--text-soft); font-family:'JetBrains Mono',monospace; margin-top:3px; }
  .type-badge { display:inline-flex; align-items:center; gap:3px; font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; padding:1px 6px; border-radius:20px; margin-bottom:3px; }
  .copy-btn { flex-shrink:0; opacity:0; border:none; cursor:pointer; background:rgba(10,36,114,0.06); color:var(--color-accent); font-size:10px; padding:4px 7px; border-radius:5px; transition:opacity .15s; margin-top:1px; }
  .cite-row:hover .copy-btn { opacity:1; }
  .dark .copy-btn { background:rgba(255,255,255,0.07); }

  /* OCR */
  .ocr-doc { padding:13px 18px; border-top:1px solid var(--border); }
  .ocr-meta { display:flex; align-items:center; gap:6px; margin-bottom:8px; flex-wrap:wrap; }
  .ocr-chip { font-size:10px; font-weight:600; padding:2px 7px; border-radius:4px; background:rgba(10,36,114,0.06); color:var(--text-soft); font-family:'JetBrains Mono',monospace; }
  .dark .ocr-chip { background:rgba(255,255,255,0.06); }
  .ocr-stamp { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--color-accent); border:1.5px solid var(--color-accent); padding:1px 5px; border-radius:2px; transform:rotate(-1deg); display:inline-block; }
  .ocr-lines { font-family:'JetBrains Mono',monospace; font-size:11.5px; line-height:1.8; background:rgba(255,217,114,0.05); border-radius:6px; padding:10px 12px; border:1px solid rgba(255,217,114,0.2); }
  .dark .ocr-lines { background:rgba(255,217,114,0.03); border-color:rgba(255,217,114,0.1); }
  .ocr-line { padding:1px 0; border-bottom:1px dashed rgba(10,36,114,0.08); }
  .dark .ocr-line { border-color:rgba(255,255,255,0.06); }
  .ocr-line:last-child { border-bottom:none; }

  /* CHECKLIST */
  .check-cat { padding:7px 18px 2px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--text-soft); }
  .check-item { display:flex; align-items:center; gap:10px; padding:8px 18px; border-top:1px solid var(--border); cursor:pointer; transition:background .12s; }
  .check-item:hover { background:rgba(10,36,114,0.025); }
  .dark .check-item:hover { background:rgba(255,255,255,0.02); }
  .check-item.done .check-label { text-decoration:line-through; opacity:.35; }
  .checkbox { width:15px; height:15px; border:1.5px solid rgba(10,36,114,0.2); border-radius:4px; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all .15s; }
  .check-item.done .checkbox { background:var(--color-secondary); border-color:var(--color-secondary); }
  .check-label { font-size:13px; flex:1; }
  .check-qty { font-size:11px; color:var(--text-soft); font-family:'JetBrains Mono',monospace; }
  .check-cost { font-size:11px; color:var(--color-secondary); font-family:'JetBrains Mono',monospace; font-weight:500; min-width:42px; text-align:right; }
  .progress-strip { height:2px; background:var(--mondrian); background-size:300px; transition:width .4s ease; }
  .progress-track { height:2px; background:rgba(10,36,114,0.07); }
  .dark .progress-track { background:rgba(255,255,255,0.06); }

  /* MISC */
  .misc-row { padding:11px 18px; border-top:1px solid var(--border); }
  .misc-key { font-size:10px; font-weight:700; font-family:'JetBrains Mono',monospace; color:var(--color-secondary); margin-bottom:4px; }
  .misc-val { font-family:'JetBrains Mono',monospace; font-size:11px; white-space:pre-wrap; word-break:break-all; color:var(--text-soft); max-height:80px; overflow:hidden; }
  .misc-val.expanded { max-height:none; }
  .misc-expand { font-size:10px; color:var(--color-accent); cursor:pointer; font-weight:600; border:none; background:none; padding:0; margin-top:3px; display:block; }

  /* STATS */
  .stat-pill { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:20px; background:var(--surface); border:1px solid var(--border); font-size:11px; font-weight:500; box-shadow:var(--shadow); }
  .stat-pill strong { color:var(--color-primary); font-weight:700; }

  .sortable-ghost { opacity:.2; }
  .sortable-chosen { box-shadow:0 8px 30px rgba(10,36,114,0.13) !important; }

  mark { background:rgba(244,96,96,0.14); color:var(--color-primary); border-radius:2px; padding:0 1px; }
  .hidden-search { display:none !important; }

  @keyframes fadeIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }
  .section { animation:fadeIn .3s ease both; }
  .section:nth-child(1){animation-delay:.03s} .section:nth-child(2){animation-delay:.07s}
  .section:nth-child(3){animation-delay:.11s} .section:nth-child(4){animation-delay:.15s}

  @keyframes spin { to{transform:rotate(360deg)} }
  .spinning { animation:spin .55s linear; }

  ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-thumb{background:rgba(10,36,114,0.12);border-radius:99px}
  .dark ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1)}
</style>
</head>

</div>

const KNOWN_KEYS = ['citatio_history','ocr_history_v1','ovni_v9','clics'];
const MISC_SKIP  = [...KNOWN_KEYS,'__drift_last_shown__','__drift_elem_snap__','__op_count__','local_lines_layout','local_lines_dark'];

function safeJSON(s,fb=null){ if(!s||typeof s!=='string') return fb; try{return JSON.parse(s)}catch{return fb} }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }

function loadData(){
  const d={};
  for(const[k,v] of Object.entries(FIXTURE)){ try{d[k]=localStorage.getItem(k)??v}catch{d[k]=v} }
  try{ for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(!(k in d)) d[k]=localStorage.getItem(k); } }catch{}
  return d;
}

/* DARK MODE */
function toggleDark(){
  const on=document.documentElement.classList.toggle('dark');
  document.getElementById('darkIcon').className=on?'fas fa-sun text-xs text-yellow-400':'fas fa-moon text-xs';
  try{localStorage.setItem('local_lines_dark',on?'1':'0')}catch{}
}
function initDark(){
  let on=false;
  try{on=localStorage.getItem('local_lines_dark')==='1'}catch{}
  if(!on) on=matchMedia('(prefers-color-scheme:dark)').matches;
  if(on){ document.documentElement.classList.add('dark'); document.getElementById('darkIcon').className='fas fa-sun text-xs text-yellow-400'; }
}

/* HEATMAP */
function buildHeatmap(data){
  const citations=safeJSON(data.citatio_history,[]);
  const ocr=safeJSON(data.ocr_history_v1,[]);
  const counts={};
  citations.forEach(c=>{ if(c.date){ const[d,m,y]=c.date.split(' ')[0].split('/'); const k=`${y}-${m}-${d}`; counts[k]=(counts[k]||0)+1; } });
  ocr.forEach(o=>{ if(o.savedAt){ const k=o.savedAt.split('T')[0]; counts[k]=(counts[k]||0)+1; } });
  const grid=document.getElementById('heatmapGrid');
  const tip=document.getElementById('heatmapTip');
  grid.innerHTML='';
  const today=new Date();
  for(let i=89;i>=0;i--){
    const d=new Date(today); d.setDate(d.getDate()-i);
    const k=d.toISOString().split('T')[0];
    const n=counts[k]||0;
    const cell=document.createElement('div');
    cell.className='heatmap-cell';
    if(n>0) cell.dataset.count=Math.min(n,4);
    cell.addEventListener('mouseenter',()=>{ const lbl=d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'}); tip.textContent=n>0?`${lbl} — ${n} élément${n>1?'s':''}`:`${lbl}`; });
    cell.addEventListener('mouseleave',()=>{ tip.textContent=''; });
    grid.appendChild(cell);
  }
}

  'local-lines': {icon:'fas fa-database',          label:'LocalLines',color:'#006466'},
};
function buildStats(data){
  const clics=safeJSON(data.clics,{});
  const row=document.getElementById('statRow');
  row.innerHTML='';
  for(const[k,v] of Object.entries(clics)){
    const m=CLICS_META[k]||{icon:'fas fa-circle',label:k,color:'#999'};
    const p=document.createElement('div');
    p.className='stat-pill';
    p.innerHTML=`<i class="${m.icon}" style="color:${m.color};font-size:10px"></i><strong>${v}</strong><span style="color:var(--text-soft)">${m.label}</span>`;
    row.appendChild(p);
  }
}

/* SECTION FACTORY */
function makeSection(id,icon,iconColor,label,meta,bodyHtml,open=true){
  const sec=document.createElement('div');
  sec.className='section'+(open?' open':'');
  sec.dataset.widgetId=id;
  sec.innerHTML=`
    <div class="section-head" onclick="toggleSec(this)">
      <div class="section-icon" style="background:${iconColor}18;color:${iconColor}"><i class="${icon}"></i></div>
      <span class="section-title">${label}</span>
      <span class="section-meta">${meta}</span>
      <i class="fas fa-chevron-right chevron"></i>
    </div>
    <div class="section-body">${bodyHtml}</div>`;
  return sec;
}
function toggleSec(head){ head.closest('.section').classList.toggle('open'); }

/* CITATIONS */
function buildCitations(data){
  const list=safeJSON(data.citatio_history,[]);
  const rows=list.map(c=>{
    const isP=c.type==='periodique';
    const dotColor=isP?'#F46060':'#006466';
    const bgBadge=isP?'rgba(244,96,96,0.1)':'rgba(0,100,102,0.1)';
    return `<div class="cite-row" data-searchable="${esc((c.text||'').toLowerCase())}">
      <div class="cite-dot" style="background:${dotColor}"></div>
      <div class="cite-body">
        <div><span class="type-badge" style="background:${bgBadge};color:${dotColor}"><i class="${c.icon||'fas fa-file'}"></i> ${esc(c.typeLabel||c.type)}</span></div>
        <div class="cite-html">${c.html||c.text||''}</div>
        <div class="cite-date">${c.date||''}</div>
      </div>
      <button class="copy-btn" onclick="copyText(this,${JSON.stringify(c.text||'')})" title="Copier"><i class="fas fa-copy"></i></button>
    </div>`;
  }).join('');
  return makeSection('citations','fas fa-book-open','#FFD972','Citations',`${list.length} réf.`,rows,true);
}

/* OCR */
function buildOCR(data){
  const list=safeJSON(data.ocr_history_v1,[]);
  const docs=list.map((o,i)=>{
    const m=o.meta||{};
    const date=o.savedAt?new Date(o.savedAt).toLocaleDateString('fr-FR',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}):'—';
    const chips=[m.prenom,m.titre,m.ville,m.editeur,m.annee].filter(Boolean).map(x=>`<span class="ocr-chip">${esc(x)}</span>`).join('');
    const lines=(o.entries||[]).map(e=>`<div class="ocr-line">${esc(e)}</div>`).join('');
    return `<div class="ocr-doc" data-searchable="${esc((o.entries||[]).join(' ').toLowerCase())}">
      <div class="ocr-meta">
        <span class="ocr-stamp">#${i+1}</span>${chips}
        <span style="margin-left:auto;font-size:10px;color:var(--text-soft);font-family:monospace">${date}</span>
      </div>
      <div class="ocr-lines">${lines}</div>
    </div>`;
  }).join('');
  return makeSection('ocr','fas fa-file-lines','#F46060','Archives OCR',`${list.length} doc.`,docs,true);
}

/* COURSES */
function buildLogistique(data){
  const ovni=safeJSON(data.ovni_v9,null);
  if(!ovni) return null;
  const sid=ovni.currentSessionId;
  const cur=(ovni.sessions||{})[sid];
  const list=(cur&&cur.list)||[];
  const doneN=list.filter(i=>i.done).length;
  const pct=list.length?Math.round(doneN/list.length*100):0;
  const total=list.reduce((s,i)=>s+(i.price||0),0);
  const recipeInfo=Object.entries(cur?.recipes||{}).map(([n,q])=>`${n} ×${q}`).join(', ');

  const bycat={};
  list.forEach(item=>{ const c=item.cat||'Autre'; if(!bycat[c])bycat[c]=[]; bycat[c].push(item); });

  let html=`<div class="progress-track"><div class="progress-strip" id="progressFill" style="width:${pct}%"></div></div>`;
  for(const[cat,items] of Object.entries(bycat)){
    html+=`<div class="check-cat">${esc(cat)}</div>`;
    html+=items.map(item=>`<div class="check-item ${item.done?'done':''}" data-name="${esc(item.name)}" data-session="${esc(sid)}" onclick="toggleItem(this)" data-searchable="${item.name.toLowerCase()}">
      <div class="checkbox">${item.done?'<i class="fas fa-check" style="font-size:8px;color:white"></i>':''}</div>
      <span class="check-label">${esc(item.name)}</span>
      <span class="check-qty">${item.qty}${item.unit}</span>
      <span class="check-cost">${item.price!==undefined?item.price.toFixed(2)+'€':''}</span>
    </div>`).join('');
  }
  const meta=`${doneN}/${list.length} · ${total.toFixed(2)}€${recipeInfo?' · '+recipeInfo:''}`;
  return makeSection('logistique','fas fa-basket-shopping','#006466',cur?.name||'Courses',meta,html,true);
}

/* MISC */
function buildMisc(data){
  const keys=Object.keys(data).filter(k=>!MISC_SKIP.includes(k));
  if(!keys.length) return null;
  const rows=keys.map(k=>{
    const parsed=safeJSON(data[k],null);
    const disp=parsed!==null?JSON.stringify(parsed,null,2):String(data[k]);
    const needsExpand=disp.length>120;
    return `<div class="misc-row" data-searchable="${esc(disp.toLowerCase())}">
      <div class="misc-key">${esc(k)}</div>
      <div class="misc-val" id="misc_${esc(k)}">${esc(disp)}</div>
      ${needsExpand?`<button class="misc-expand" onclick="expandMisc('${esc(k)}',this)">Voir plus</button>`:''}
    </div>`;
  }).join('');
  return makeSection('misc','fas fa-database','#0A2472','Données diverses',`${keys.length} clé${keys.length>1?'s':''}`,rows,false);
}
function expandMisc(k,btn){
  const el=document.getElementById('misc_'+k);
  el.classList.toggle('expanded');
  btn.textContent=el.classList.contains('expanded')?'Voir moins':'Voir plus';
}

/* TOGGLE ITEM */
function toggleItem(el){
  const sid=el.dataset.session, name=el.dataset.name;
  const isDone=el.classList.toggle('done');
  el.querySelector('.checkbox').innerHTML=isDone?'<i class="fas fa-check" style="font-size:8px;color:white"></i>':'';
  try{
    const raw=localStorage.getItem('ovni_v9')||FIXTURE.ovni_v9;
    const ovni=safeJSON(raw,null);
    if(ovni?.sessions?.[sid]){ const item=ovni.sessions[sid].list.find(i=>i.name===name); if(item) item.done=isDone; localStorage.setItem('ovni_v9',JSON.stringify(ovni)); }
  }catch{}
  const all=document.querySelectorAll('.check-item');
  const dn=document.querySelectorAll('.check-item.done').length;
  const pct=all.length?Math.round(dn/all.length*100):0;
  const fill=document.getElementById('progressFill');
  if(fill) fill.style.width=pct+'%';
}

/* COPY */
function copyText(btn,text){
  navigator.clipboard.writeText(text).then(()=>{
    btn.innerHTML='<i class="fas fa-check"></i>';
    setTimeout(()=>{ btn.innerHTML='<i class="fas fa-copy"></i>'; },1400);
  }).catch(()=>{});
}

/* SEARCH */
document.getElementById('searchInput').addEventListener('input',function(){
  const q=this.value.toLowerCase().trim();
  document.querySelectorAll('[data-searchable]').forEach(el=>{
    const card=el.closest('.cite-row,.ocr-doc,.check-item,.misc-row')||el;
    card.classList.toggle('hidden-search', q && !el.dataset.searchable.includes(q));
  });
});

/* LAYOUT */
const DEFAULT_ORDER=['citations','ocr','logistique','misc'];
function getLayout(){ try{ const s=localStorage.getItem('local_lines_layout'); if(s) return JSON.parse(s); }catch{} return DEFAULT_ORDER; }
function saveLayout(){ const o=[...document.querySelectorAll('[data-widget-id]')].map(e=>e.dataset.widgetId); try{localStorage.setItem('local_lines_layout',JSON.stringify(o))}catch{} }
function initSortable(){
  Sortable.create(document.getElementById('sectionsContainer'),{
    animation:180, ghostClass:'sortable-ghost', chosenClass:'sortable-chosen',
    handle:'.section-head', onEnd:saveLayout
  });
}

/* RENDER */
let currentData={};
function render(){
  currentData=loadData();
  buildHeatmap(currentData);
  buildStats(currentData);
  const c=document.getElementById('sectionsContainer');
  c.innerHTML='';
  const builders={citations:()=>buildCitations(currentData),ocr:()=>buildOCR(currentData),logistique:()=>buildLogistique(currentData),misc:()=>buildMisc(currentData)};
  const layout=[...new Set([...getLayout(),...DEFAULT_ORDER])];
  layout.forEach(id=>{ if(builders[id]){ const w=builders[id](); if(w) c.appendChild(w); } });
  initSortable();
}
function syncData(){
  const icon=document.getElementById('syncIcon');
  icon.classList.add('spinning');
  setTimeout(()=>{ icon.classList.remove('spinning'); render(); },500);
}

initDark();
render();
</script>
</body>
</html>
