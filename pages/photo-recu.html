<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Pro Camera - Reçus & Scan</title>
    <!-- Typographie : Space Grotesk pour les titres, Inter pour le corps -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Icône (favicon) remplacée par un SVG d’appareil photo -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><path d='M149.1 64.8L138.7 96H64C28.7 96 0 124.7 0 160V416c0 35.3 28.7 64 64 64H448c35.3 0 64-28.7 64-64V160c0-35.3-28.7-64-64-64H373.3L362.9 64.8C356.4 45.2 338.1 32 317.4 32H194.6c-20.7 0-39 13.2-45.5 32.8zM256 384a96 96 0 1 0 0-192 96 96 0 1 0 0 192z' fill='%230A2472'/></svg>">
    <meta name="theme-color" content="#0A2472">
    <style>
        :root {
            /* Nouvelle charte Quartz Ink & Coral */
            --bg-main: #FDFCF0;
            --surface: #FFFFFF;
            --text-main: #0A2472;
            --color-primary: #0A2472;
            --color-secondary: #006466;
            --color-accent: #F46060;
            --color-highlight: #FFD972;
        }

        body, html {
            margin: 0; padding: 0; height: 100dvh;
            background: var(--bg-main);
            font-family: 'Inter', sans-serif;   /* corps du texte */
            overflow: hidden;
            color: var(--text-main);
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100dvh;
        }

        /* --- NOUVEAU LOGO (remplace l'ancien header-logo) --- */
        .header-logo {
            position: absolute;
            top: 15px; left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 5px 15px;
            border-radius: 40px;
            background: transparent;          /* plus de dégradé */
            border: none;
            box-shadow: none;
            white-space: nowrap;
            cursor: pointer;
            /* Le texte du logo reste en Space Grotesk */
            font-family: 'Space Grotesk', sans-serif;
        }

        /* Bloc mosaïque (plus petit que la page standalone) */
        .mosaic-core {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            overflow: hidden;
            background: var(--color-primary);
            transition: transform 0.2s ease;
            box-shadow: 0 4px 12px rgba(10,36,114,0.15);
        }
        .header-logo:active .mosaic-core {
            transform: scale(0.92);
        }
        #mosaic-svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .text-wrap {
            display: flex;
            flex-direction: column;
            line-height: 1;
        }
        .outils {
            font-size: 14px;                 /* taille adaptée au header */
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            color: var(--color-primary);
        }
        .online {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #8E9AAF;                  /* gris bleuté pour le second mot */
        }
        .letter {
            color: var(--color-primary);
            transition: color 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .top-bar {
            position: absolute; top: 12px; left: 12px; right: 12px; z-index: 20;
            display: flex; align-items: center; justify-content: space-between;
            pointer-events: none;
        }
        .top-bar > * { pointer-events: auto; }
        .top-bar-right { display: flex; align-items: center; gap: 8px; }

        .icon-btn {
            background: var(--surface);
            color: var(--text-main);
            border: 1px solid var(--color-secondary);
            padding: 0; border-radius: 13px;
            font-size: 15px;
            width: 42px; height: 42px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; cursor: pointer;
            transition: 0.2s;
        }
        .icon-btn-wrap { position: relative; display: inline-flex; flex-shrink: 0; }

        .viewport {
            position: relative; flex: 1;
            background: var(--bg-main);
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        #video-preview { width: 100%; height: 100%; object-fit: cover; }
        #photo-canvas {
            position: absolute; inset: 0; width: 100%; height: 100%;
            object-fit: contain; display: none; z-index: 5; background: #000;
        }

        .scan-overlay {
            position: absolute; inset: 0; z-index: 2; pointer-events: none;
            display: flex; align-items: center; justify-content: center;
        }
        .scan-region {
            width: 85%; height: 70%;
            border: 1px solid var(--color-highlight);
            border-radius: 15px; position: relative;
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.3);
        }
        .scan-region::before, .scan-region::after {
            content: ''; position: absolute; width: 40px; height: 40px;
            border: 3px solid var(--color-accent);
        }
        .scan-region::before {
            top: -2px; left: -2px;
            border-right: 0; border-bottom: 0; border-radius: 12px 0 0 0;
        }
        .scan-region::after {
            bottom: -2px; right: -2px;
            border-left: 0; border-top: 0; border-radius: 0 0 12px 0;
        }

        .controls {
            background: var(--surface);
            padding: 20px;
            border-radius: 25px 25px 0 0;
            z-index: 10;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.1);
        }

        .btn {
            width: 100%; padding: 18px; border-radius: 15px;
            border: none; font-weight: 700; font-size: 16px;
            cursor: pointer; transition: 0.2s;
            font-family: 'Inter', sans-serif;   /* boutons = corps de texte */
        }
        .btn-main {
            background: var(--color-accent);
            color: white;
        }

        .form-group { display: none; margin-bottom: 15px; }

        .date-row { display: flex; gap: 6px; margin-bottom: 10px; }
        .date-chip {
            flex: 1; padding: 9px 4px;
            background: var(--surface);
            border: 1px solid var(--color-secondary);
            color: var(--text-main);
            border-radius: 10px; font-size: 11px; font-weight: 700;
            text-align: center; cursor: pointer; transition: 0.2s;
            font-family: 'Inter', sans-serif;   /* même si c'est un petit titre, on garde Inter pour l'UI */
        }
        .date-chip.active {
            background: var(--color-accent);
            border-color: var(--color-accent);
            color: white;
        }

        .input-pro {
            width: 100%; padding: 14px;
            background: var(--surface);
            border: 1px solid var(--color-secondary);
            color: var(--text-main);
            border-radius: 12px; box-sizing: border-box; font-size: 15px;
            font-family: 'Inter', sans-serif;
        }
        .input-pro::placeholder { color: rgba(10,36,114,0.4); }

        .shop-wrap { position: relative; margin-bottom: 10px; }
        #capture-shop {
            width: 100%; padding: 14px;
            background: var(--surface);
            border: 1px solid var(--color-secondary);
            color: var(--text-main);
            border-radius: 12px; box-sizing: border-box; font-size: 15px;
            font-family: 'Inter', sans-serif;
        }
        #capture-shop::placeholder { color: rgba(10,36,114,0.4); }

        .autocomplete-list {
            position: absolute; bottom: 100%; left: 0; right: 0;
            background: var(--surface);
            border: 1px solid var(--color-secondary);
            border-radius: 12px; margin-bottom: 4px;
            overflow: hidden; z-index: 50; display: none;
        }
        .autocomplete-item {
            padding: 12px 14px; font-size: 14px; cursor: pointer;
            border-bottom: 1px solid var(--color-highlight);
            display: flex; align-items: center; gap: 8px;
            color: var(--text-main);
        }
        .autocomplete-item:last-child { border-bottom: none; }
        .autocomplete-item:hover,
        .autocomplete-item.selected {
            background: rgba(10,36,114,0.08);
        }
        .ac-freq {
            font-size: 11px; color: var(--color-secondary);
            margin-left: auto;
        }

        .date-display {
            display: flex; align-items: center; gap: 8px;
            background: rgba(255,217,114,0.25);
            border: 1px solid var(--color-highlight);
            border-radius: 10px; padding: 9px 14px; margin-bottom: 10px;
        }
        .date-display-label {
            font-size: 11px; color: var(--text-main); font-weight: 600;
            text-transform: uppercase; opacity: 0.8;
            font-family: 'Space Grotesk', sans-serif;   /* titre */
        }
        .date-display-value {
            font-size: 15px; font-weight: 700;
            color: var(--color-primary); margin-left: auto;
            letter-spacing: 0.5px;
        }

        .amount-row { display: grid; grid-template-columns: 1fr; margin-bottom: 10px; }

        .alert-badge {
            position: absolute; top: -6px; right: -6px;
            background: var(--color-accent); color: white;
            border-radius: 50%; width: 18px; height: 18px;
            font-size: 10px; font-weight: 900;
            display: flex; align-items: center; justify-content: center;
        }

        .file-counter-widget {
            position: absolute; bottom: 18px; left: 15px; z-index: 10;
            display: none; align-items: center; gap: 8px;
            background: var(--color-accent);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 14px; padding: 8px 14px;
            backdrop-filter: blur(6px);
            cursor: pointer;
            animation: pulseWidget 2.5s ease-in-out infinite;
        }
        .file-counter-widget.ok {
            background: var(--surface);
            animation: none;
            border-color: var(--color-secondary);
        }
        @keyframes pulseWidget {
            0%, 100% { box-shadow: 0 0 0 0 rgba(244,96,96,0.5); }
            50% { box-shadow: 0 0 0 7px rgba(244,96,96,0); }
        }
        .file-counter-icon { font-size: 16px; }
        .file-counter-text { display: flex; flex-direction: column; line-height: 1.2; }
        .file-counter-num { font-size: 15px; font-weight: 900; color: white; }
        .file-counter-label {
            font-size: 9px; font-weight: 700;
            color: rgba(255,255,255,0.9);
            text-transform: uppercase; letter-spacing: 0.5px;
            font-family: 'Space Grotesk', sans-serif;   /* titre */
        }
        .file-counter-widget.ok .file-counter-num,
        .file-counter-widget.ok .file-counter-label {
            color: var(--text-main);
        }

        .alert-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 300;
            display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .alert-box {
            background: var(--surface); border-radius: 20px;
            padding: 30px; text-align: center;
            border: 1px solid var(--color-accent);
            max-width: 320px; width: 100%;
        }
        .alert-box h3 {
            margin: 0 0 10px; font-size: 22px; color: var(--color-primary);
            font-family: 'Space Grotesk', sans-serif; font-weight: 700;
        }
        .alert-box p { color: var(--text-main); font-size: 14px; margin: 0 0 20px; opacity: 0.8; }
        .alert-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .history-panel {
            position: fixed; inset: 0; background: var(--bg-main);
            z-index: 200; display: none; flex-direction: column; padding: 20px;
        }
        .history-panel h2 {
            margin: 0; color: var(--color-primary);
            font-family: 'Space Grotesk', sans-serif; font-weight: 700;
        }
        .history-list { flex: 1; overflow-y: auto; margin: 15px 0; }
        .item {
            background: var(--surface); padding: 15px; border-radius: 15px;
            margin-bottom: 10px; display: flex; align-items: center;
            border: 1px solid var(--color-secondary);
            color: var(--text-main);
        }
        .item.selected {
            border-color: var(--color-accent);
            background: rgba(244,96,96,0.08);
        }
        .check {
            width: 20px; height: 20px;
            border: 2px solid var(--color-secondary);
            border-radius: 6px; margin-right: 15px; flex-shrink: 0;
        }
        .selected .check {
            background: var(--color-accent);
            border-color: var(--color-accent);
            position: relative;
        }
        .selected .check::after {
            content: '✓'; color: white; font-size: 14px;
            position: absolute; top: -2px; left: 3px;
        }

        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--color-accent); color: white;
            padding: 10px 20px; border-radius: 20px; z-index: 400;
            display: none; white-space: nowrap; font-weight: 600;
            font-family: 'Inter', sans-serif;
        }

        /* ── EXPORT MODAL REDESIGN ─────────────────────────── */
        .export-overlay {
            position: fixed; inset: 0; z-index: 300; display: none;
            align-items: flex-end; justify-content: center;
            background: rgba(0,0,0,0.7);
            padding: 0 12px 12px;
        }
        .export-sheet {
            width: 100%; max-width: 480px;
            background: var(--surface);
            border-radius: 22px; overflow: hidden;
            border: 1px solid var(--color-secondary);
        }
        .export-handle {
            width: 36px; height: 4px;
            background: rgba(10,36,114,0.2);
            border-radius: 2px; margin: 12px auto 0;
        }
        .export-header { padding: 14px 20px 0; text-align: center; }
        .export-header h3 {
            margin: 8px 0 4px; font-size: 17px; font-weight: 800;
            color: var(--color-primary);
            font-family: 'Space Grotesk', sans-serif;
        }
        .export-header p {
            margin: 0 0 14px; font-size: 12px;
            color: var(--text-main); opacity: 0.6;
        }

        /* PDF format selector */
        .pdf-format-row {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 8px; padding: 0 16px 14px;
        }
        .pdf-format-label {
            font-size: 10px; font-weight: 800; letter-spacing: 0.6px;
            text-transform: uppercase; color: var(--text-main);
            padding: 0 16px; margin-bottom: 8px; opacity: 0.6;
            font-family: 'Space Grotesk', sans-serif;
        }
        .pdf-opt { position: relative; cursor: pointer; }
        .pdf-opt input[type="radio"] { position: absolute; opacity: 0; width: 0; height: 0; }
        .pdf-opt-card {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 4px; padding: 12px 8px;
            border: 1.5px solid var(--color-secondary);
            border-radius: 14px;
            background: var(--surface);
            transition: 0.15s; text-align: center;
        }
        .pdf-opt input:checked + .pdf-opt-card {
            border-color: var(--color-accent);
            background: rgba(244,96,96,0.08);
        }
        .pdf-opt-icon { font-size: 18px; }
        .pdf-opt-title {
            font-size: 12px; font-weight: 800; color: var(--color-primary);
            font-family: 'Space Grotesk', sans-serif;
        }
        .pdf-opt-sub { font-size: 10px; color: var(--text-main); opacity: 0.6; }

        /* Divider */
        .export-divider {
            height: 1px; background: var(--color-highlight);
            margin: 0 16px 14px;
        }

        /* Send method buttons */
        .send-methods { padding: 0 12px 12px; display: flex; flex-direction: column; gap: 8px; }
        .send-btn {
            display: flex; align-items: center;
            background: var(--surface);
            border: 1px solid var(--color-secondary);
            border-radius: 16px; padding: 14px 16px;
            cursor: pointer; transition: background 0.15s;
            text-align: left; width: 100%;
            color: var(--text-main); gap: 14px;
            font-family: 'Inter', sans-serif;
        }
        .send-btn:active { background: rgba(244,96,96,0.1); }
        .send-btn-icon {
            font-size: 22px; width: 40px; height: 40px;
            background: rgba(255,217,114,0.25);
            border-radius: 11px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .send-btn-text { flex: 1; }
        .send-btn-title {
            font-size: 15px; font-weight: 800; display: block; color: var(--color-primary);
            font-family: 'Space Grotesk', sans-serif;
        }
        .send-btn-sub { font-size: 11px; color: var(--text-main); opacity: 0.6; margin-top: 2px; display: block; }
        .send-btn-arrow { font-size: 14px; color: var(--color-secondary); }

        .export-cancel {
            display: block; width: 100%; padding: 14px;
            background: none; border: none;
            border-top: 1px solid var(--color-highlight);
            color: var(--text-main); opacity: 0.7;
            font-size: 14px; font-weight: 700;
            cursor: pointer; font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body>

<div id="toast" class="toast">Enregistré !</div>

<!-- MODAL ALERTE 10 REÇUS -->
<div id="alert-modal" class="alert-modal">
    <div class="alert-box">
        <div style="font-size:40px; margin-bottom:10px;"><i class="fas fa-bell"></i></div>
        <h3><span id="alert-count">10</span> reçus dans vos archives !</h3>
        <p>Pensez à envoyer vos fichiers pour ne pas les perdre.</p>
        <div class="alert-actions">
            <button class="btn" style="background:var(--surface);color:var(--text-main);border:1px solid var(--color-secondary);padding:12px;" onclick="dismissAlert()">Plus tard</button>
            <button class="btn btn-main" style="padding:12px;" onclick="goToHistory()"><i class="fas fa-paper-plane"></i> Envoyer</button>
        </div>
    </div>
</div>

<div class="app-container">
    <div class="viewport" onclick="applyFocus()">

        <!-- NOUVEAU LOGO (remplace l'ancien lien avec emoji) -->
        <div class="header-logo" onclick="refreshLogo()">
            <div class="mosaic-core">
                <svg id="mosaic-svg" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
            </div>
            <div class="text-wrap">
                <div class="outils" id="word-outils"></div>
                <div class="online">ONLINE</div>
            </div>
        </div>

        <div class="top-bar">
            <button class="icon-btn" onclick="window.parent.closeIframe('iframe_photo_recu')"><i class="fas fa-times"></i></button>
            <div class="top-bar-right">
                <button class="icon-btn" id="torch-btn" onclick="toggleTorch(event)"><i class="fas fa-lightbulb"></i></button>
                <div class="icon-btn-wrap">
                    <button class="icon-btn" onclick="openHistory(event)"><i class="fas fa-scroll"></i></button>
                    <div id="alert-dot" class="alert-badge" style="display:none">!</div>
                </div>
            </div>
        </div>

        <div class="scan-overlay" id="scan-overlay">
            <div class="scan-region"></div>
        </div>

        <div id="file-counter-widget" class="file-counter-widget" onclick="openHistory(event)">
            <span class="file-counter-icon"><i class="fas fa-folder"></i></span>
            <div class="file-counter-text">
                <span class="file-counter-num" id="file-counter-num">0</span>
                <span class="file-counter-label" id="file-counter-label">fichiers</span>
            </div>
        </div>

        <video id="video-preview" autoplay playsinline></video>
        <canvas id="photo-canvas"></canvas>
    </div>

    <div class="controls">
        <div id="form-ui" class="form-group">
            <div class="date-row">
                <div class="date-chip active" id="chip-today" onclick="selectDateChip('today')"><i class="fas fa-calendar-day"></i> Aujourd'hui</div>
                <div class="date-chip" id="chip-prev" onclick="selectDateChip('prev')"><i class="fas fa-backward"></i> Précédent</div>
                <div class="date-chip" id="chip-manual" onclick="selectDateChip('manual')"><i class="fas fa-pen"></i> Manuelle</div>
            </div>
            <div id="manual-date-wrap" style="position:absolute; width:0; height:0; overflow:hidden;">
                <input type="date" id="capture-date" style="opacity:0; width:1px; height:1px;" oninput="refreshDateDisplay()" onchange="refreshDateDisplay()">
            </div>
            <div class="date-display">
                <span><i class="fas fa-calendar"></i></span>
                <span class="date-display-label">Date du reçu</span>
                <span class="date-display-value" id="date-display-value">—</span>
            </div>
            <div class="amount-row">
                <input type="number" id="capture-amount" placeholder="Montant €" class="input-pro">
            </div>
            <div class="shop-wrap">
                <div id="autocomplete-list" class="autocomplete-list"></div>
                <input type="text" id="capture-shop" placeholder="Nom du magasin" class="input-pro" autocomplete="off"
                    oninput="onShopInput()" onkeydown="onShopKey(event)" onfocus="onShopInput()">
            </div>
        </div>
        <button id="snap-btn" class="btn btn-main" onclick="processCapture()"><i class="fas fa-camera"></i> CAPTURER LE REÇU</button>
        <div id="post-snap-ui" style="display:none; gap:10px;">
            <button class="btn" style="background:var(--surface);color:var(--text-main);border:1px solid var(--color-secondary);flex:1;" onclick="resetUI()">ANNULER</button>
            <button id="save-btn" class="btn" style="background:var(--color-accent);color:white;flex:2;opacity:0.4;pointer-events:none;" onclick="confirmSave()"><i class="fas fa-save"></i> SAUVEGARDER</button>
        </div>
    </div>
</div>

<!-- HISTORIQUE -->
<div id="history-panel" class="history-panel">
    <div style="display:flex;justify-content:space-between;align-items:center;">
        <h2>Mes Archives</h2>
        <button onclick="closeHistory()" style="background:none;border:none;color:var(--text-main);font-size:28px;cursor:pointer;"><i class="fas fa-times"></i></button>
    </div>
    <button id="select-all-btn" class="btn" style="background:var(--surface);color:var(--text-main);margin:15px 0 5px;border:1px solid var(--color-secondary);padding:10px;" onclick="toggleSelectAll()"><i class="fas fa-check-double"></i> TOUT SÉLECTIONNER</button>
    <div id="history-list" class="history-list"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px;">
        <button class="btn btn-main" onclick="shareSelected()"><i class="fas fa-paper-plane"></i> ENVOYER</button>
        <button class="btn" style="background:var(--surface);color:var(--text-main);border:1px solid var(--color-secondary);" onclick="deleteSelected()"><i class="fas fa-trash"></i> TOUT SUP.</button>
    </div>
</div>

<!-- ── EXPORT MODAL REDESIGNÉ ────────────────────────────────────────────── -->
<div id="export-modal" class="export-overlay" onclick="handleOverlayClick(event)">
    <div class="export-sheet" id="export-sheet">
        <div class="export-handle"></div>
        <div class="export-header">
            <h3>Exporter les reçus</h3>
            <p>Choisissez le format et le mode d'envoi</p>
        </div>

        <div class="pdf-format-label">Format PDF</div>
        <div class="pdf-format-row">
            <label class="pdf-opt">

<script>
let stream, track, db, torch = false, selectedIds = new Set();
let dateMode = 'today', prevScanDate = null, acIndex = -1;

const request = indexedDB.open("ReceiptsDB", 2);
request.onupgradeneeded = e => e.target.result.createObjectStore("receipts", { keyPath: "id", autoIncrement: true });
request.onsuccess = e => { db = e.target.result; initCamera(); checkAlertDot(); };

async function initCamera() {
    document.getElementById('capture-date').value = new Date().toISOString().split('T')[0];
    refreshDateDisplay();
    try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 4096 }, height: { ideal: 2160 } } });
        const video = document.getElementById('video-preview');
        video.srcObject = stream;
        video.onloadedmetadata = () => { track = stream.getVideoTracks()[0]; };
    } catch(e) { alert("Accès caméra impossible"); }
}

function formatDateDisplay(val) {
    if (!val) return '—';
    const [y, m, d] = val.split('-');
    return `${d}/${m}/${y}`;
}
function refreshDateDisplay() {
    const val = document.getElementById('capture-date').value;
    const disp = document.getElementById('date-display-value');
    if (val) { disp.textContent = formatDateDisplay(val); disp.style.color = 'var(--color-primary)'; }
    else { disp.textContent = '— choisir une date'; disp.style.color = 'var(--color-accent)'; }
    updateSaveBtn();
}
function updateSaveBtn() {
    const hasDate = !!document.getElementById('capture-date').value;
    const btn = document.getElementById('save-btn');
    if (!btn) return;
    btn.style.opacity = hasDate ? '1' : '0.4';
    btn.style.pointerEvents = hasDate ? 'auto' : 'none';
}

function selectDateChip(mode) {
    dateMode = mode;
    ['today','prev','manual'].forEach(m => document.getElementById('chip-'+m).classList.toggle('active', m === mode));
    if (mode === 'today') {
        document.getElementById('capture-date').value = new Date().toISOString().split('T')[0];
        refreshDateDisplay();
    } else if (mode === 'prev') {
        if (prevScanDate) { document.getElementById('capture-date').value = prevScanDate; refreshDateDisplay(); }
        else getLastSavedDate(d => { document.getElementById('capture-date').value = d || new Date().toISOString().split('T')[0]; refreshDateDisplay(); });
    } else {
        const inp = document.getElementById('capture-date');
        if (!inp.value) inp.value = new Date().toISOString().split('T')[0];
        refreshDateDisplay();
        setTimeout(() => { try { inp.showPicker(); } catch(e) { inp.click(); } }, 50);
    }
}
function getLastSavedDate(cb) {
    if (!db) { cb(null); return; }
    db.transaction("receipts").objectStore("receipts").getAll().onsuccess = e => {
        const results = e.target.result;
        if (!results.length) { cb(null); return; }
        const parts = results[results.length-1].name.split('_')[0];
        cb(parts && parts.length === 10 ? parts.replace(/\./g, '-') : null);
    };
}
function getSelectedDate() { return document.getElementById('capture-date').value; }

function getShopHistory() { try { return JSON.parse(localStorage.getItem('shopHistory') || '{}'); } catch(e) { return {}; } }
function saveShopUsage(name) {
    if (!name) return;
    const h = getShopHistory();
    h[name.toUpperCase()] = (h[name.toUpperCase()] || 0) + 1;
    localStorage.setItem('shopHistory', JSON.stringify(h));
}
function onShopInput() {
    const val = document.getElementById('capture-shop').value.toUpperCase();
    const h = getShopHistory();
    const list = document.getElementById('autocomplete-list');
    acIndex = -1;
    const matches = Object.entries(h).filter(([k]) => k.startsWith(val) && k !== val).sort((a,b) => b[1]-a[1]).slice(0,5);
    if (!matches.length && (!val.length && !Object.keys(h).length)) { list.style.display = 'none'; return; }
    list.innerHTML = matches.map(([name, freq]) =>
        `<div class="autocomplete-item" data-name="${name}" onmousedown="pickShop('${name}')"><span>🏪</span> ${name} <span class="ac-freq">${freq}x</span></div>`
    ).join('');
    list.style.display = 'block';
}
function pickShop(name) { document.getElementById('capture-shop').value = name; document.getElementById('autocomplete-list').style.display = 'none'; }
function onShopKey(e) {
    const items = document.querySelectorAll('.autocomplete-item');
    if (e.key === 'ArrowDown') { acIndex = Math.min(acIndex+1, items.length-1); highlightAc(items); }
    else if (e.key === 'ArrowUp') { acIndex = Math.max(acIndex-1, 0); highlightAc(items); }
    else if (e.key === 'Enter' && acIndex >= 0) { pickShop(items[acIndex].dataset.name); e.preventDefault(); }
    else if (e.key === 'Escape') { document.getElementById('autocomplete-list').style.display = 'none'; }
}
function highlightAc(items) {
    items.forEach((el, i) => el.classList.toggle('selected', i === acIndex));
    if (acIndex >= 0) document.getElementById('capture-shop').value = items[acIndex].dataset.name;
}

function updateWidgetCount(n) {
    const dot = document.getElementById('alert-dot');
    dot.style.display = n >= 10 ? 'flex' : 'none';
    dot.textContent = n;
    const widget = document.getElementById('file-counter-widget');
    document.getElementById('file-counter-num').textContent = n;
    if (n === 0) { widget.style.display = 'none'; return; }
    widget.style.display = 'flex';
    if (n >= 10) { widget.classList.remove('ok'); document.getElementById('file-counter-label').textContent = 'a envoyer'; }
    else { widget.classList.add('ok'); document.getElementById('file-counter-label').textContent = 'fichier' + (n > 1 ? 's' : ''); }
}
function checkAlertDot() {
    if (!db) return;
    const req = db.transaction("receipts").objectStore("receipts").count();
    req.onsuccess = () => updateWidgetCount(req.result);
}

async function toggleTorch(e) {
    e.stopPropagation();
    if (!track) return;
    torch = !torch;
    try {
        await track.applyConstraints({ advanced: [{ torch }] });
        document.getElementById('torch-btn').style.background = torch ? 'var(--color-accent)' : 'var(--surface)';
        document.getElementById('torch-btn').style.color = torch ? 'white' : 'var(--text-main)';
    } catch(e) {}
}
function applyFocus() { if (track) track.applyConstraints({ advanced: [{ focusMode: 'continuous' }] }).catch(()=>{}); }

function processCapture() {
    const video = document.getElementById('video-preview');
    const canvas = document.getElementById('photo-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    if (torch) {
        ctx.filter = 'brightness(0.85) contrast(1.1) grayscale(1)'; ctx.drawImage(video, 0, 0);
        ctx.globalCompositeOperation = 'multiply'; ctx.filter = 'contrast(1.4) brightness(1.1)'; ctx.drawImage(canvas, 0, 0);
        ctx.globalCompositeOperation = 'source-over';
    } else {
        ctx.filter = 'contrast(1.15) brightness(1.02) saturate(0)'; ctx.drawImage(video, 0, 0);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        for (let i = 0; i < data.length; i += 4) {
            let lum = data[i]*0.3 + data[i+1]*0.59 + data[i+2]*0.11;
            data[i] = data[i+1] = data[i+2] = lum < 130 ? lum*0.92 : Math.min(255, lum*1.03);
        }
        ctx.putImageData(imageData, 0, 0);
    }
    canvas.style.display = 'block';
    document.getElementById('scan-overlay').style.display = 'none';
    document.getElementById('form-ui').style.display = 'block';
    document.getElementById('post-snap-ui').style.display = 'flex';
    document.getElementById('snap-btn').style.display = 'none';
    dateMode = null;
    ['today','prev','manual'].forEach(m => document.getElementById('chip-'+m).classList.remove('active'));
    document.getElementById('capture-date').value = '';
    document.getElementById('capture-amount').value = '';
    document.getElementById('capture-shop').value = '';
    document.getElementById('date-display-value').textContent = '— choisir une date';
    document.getElementById('date-display-value').style.color = 'var(--color-accent)';
    updateSaveBtn();
    ocrReceipt();
}

function resetUI() {
    document.getElementById('photo-canvas').style.display = 'none';
    document.getElementById('scan-overlay').style.display = 'flex';
    document.getElementById('form-ui').style.display = 'none';
    document.getElementById('post-snap-ui').style.display = 'none';
    document.getElementById('snap-btn').style.display = 'block';
    document.getElementById('capture-shop').value = '';
    document.getElementById('capture-amount').value = '';
    document.getElementById('autocomplete-list').style.display = 'none';
}

async function confirmSave() {
    const dateVal = getSelectedDate();
    if (!dateVal) { showToast("Choisissez une date !"); return; }
    if (!window.jsPDF) { showToast("Erreur : jsPDF non chargé"); return; }
    const canvas = document.getElementById('photo-canvas');
    const shopVal = document.getElementById('capture-shop').value.toUpperCase() || 'RECU';
    const priceVal = document.getElementById('capture-amount').value || '0';
    const fileNameBase = `${dateVal.replace(/-/g,'.')}_${shopVal}_${priceVal}EUR`;
    saveShopUsage(shopVal);
    prevScanDate = dateVal;
    showToast("Enregistrement...");
    try {
        const imgData = canvas.toDataURL('image/jpeg', 0.92);
        const tx = db.transaction("receipts", "readwrite");
        tx.objectStore("receipts").add({ name: fileNameBase, imgData: imgData, date: Date.now() });
        tx.oncomplete = () => {
            showToast("Enregistré !");
            resetUI();
            const countReq = db.transaction("receipts").objectStore("receipts").count();
            countReq.onsuccess = () => {
                const n = countReq.result;
                updateWidgetCount(n);
                if (n >= 10) setTimeout(() => {
                    document.getElementById('alert-count').textContent = n;
                    document.getElementById('alert-modal').style.display = 'flex';
                }, 500);
            };
        };
    } catch(err) { showToast("Erreur : " + err.message); console.error(err); }
}

function dismissAlert() { document.getElementById('alert-modal').style.display = 'none'; }
function goToHistory() { document.getElementById('alert-modal').style.display = 'none'; openHistory({ stopPropagation: ()=>{} }); }

function openHistory(e) {
    e.stopPropagation();
    document.getElementById('history-panel').style.display = 'flex';
    document.querySelector('.top-bar').style.visibility = 'hidden';
    document.querySelector('.header-logo').style.visibility = 'hidden';
    renderHistory();
}
function closeHistory() {
    document.getElementById('history-panel').style.display = 'none';
    document.querySelector('.top-bar').style.visibility = 'visible';
    document.querySelector('.header-logo').style.visibility = 'visible';
}

function parseFileName(fileName) {
    const parts = fileName.split('_');
    if (parts.length < 3) return null;
    const [y, m, d] = parts[0].split('.');
    const price = parts[2].replace('EUR', '');
    return { date: `${d}/${m}/${y}`, shop: parts[1], price };
}

function renderHistory() {
    const list = document.getElementById('history-list');
    list.innerHTML = ''; selectedIds.clear();
    document.getElementById('select-all-btn').innerHTML = '<i class="fas fa-check-double"></i> TOUT SELECTIONNER';
    updateDeleteBtn();
    db.transaction("receipts").objectStore("receipts").getAll().onsuccess = e => {
        const results = e.target.result;
        results.reverse();
        results.forEach(item => {
            const div = document.createElement('div');
            div.className = 'item';
            div.onclick = () => {
                div.classList.toggle('selected');
                selectedIds.has(item.id) ? selectedIds.delete(item.id) : selectedIds.add(item.id);
                document.getElementById('select-all-btn').innerHTML = selectedIds.size === results.length
                    ? '<i class="fas fa-check-double"></i> TOUT DESELECTIONNER'
                    : '<i class="fas fa-check-double"></i> TOUT SELECTIONNER';
                updateDeleteBtn();
            };
            div.innerHTML = `<div class="check"></div><div style="font-size:12px;">${item.name}</div>`;
            list.appendChild(div);
        });
    };
}

function updateDeleteBtn() {
    const btn = document.querySelector('button[onclick="deleteSelected()"]');
    if (btn) btn.innerHTML = selectedIds.size > 0
        ? '<i class="fas fa-trash"></i> SUPPRIMER'
        : '<i class="fas fa-trash"></i> TOUT SUP.';
}

function toggleSelectAll() {
    const items = document.querySelectorAll('.history-list .item');
    const btn = document.getElementById('select-all-btn');
    db.transaction("receipts").objectStore("receipts").getAll().onsuccess = e => {
        const all = e.target.result;
        if (selectedIds.size === all.length && all.length > 0) {
            selectedIds.clear(); items.forEach(div => div.classList.remove('selected'));
            btn.innerHTML = '<i class="fas fa-check-double"></i> TOUT SELECTIONNER';
        } else {
            selectedIds.clear(); all.forEach(item => selectedIds.add(item.id)); items.forEach(div => div.classList.add('selected'));
            btn.innerHTML = '<i class="fas fa-check-double"></i> TOUT DESELECTIONNER';
        }
        updateDeleteBtn();
    };
}

function deleteSelected() {
    if (!selectedIds.size) {
        if (confirm("Effacer TOUT l'historique ?")) {
            const tx = db.transaction("receipts", "readwrite");
            tx.objectStore("receipts").clear().onsuccess = () => { renderHistory(); checkAlertDot(); showToast("Historique vide !"); };
        }
    } else {
        if (confirm("Supprimer la sélection ?")) {
            const tx = db.transaction("receipts", "readwrite");
            selectedIds.forEach(id => tx.objectStore("receipts").delete(id));
            tx.oncomplete = () => { renderHistory(); checkAlertDot(); };
        }
    }
}

function shareSelected() {
    if (!selectedIds.size) { showToast("Veuillez sélectionner des fichiers !"); return; }
    document.getElementById('export-modal').style.display = 'flex';
}

function closeExportModal() { document.getElementById('export-modal').style.display = 'none'; }

function handleOverlayClick(e) {
    if (e.target === document.getElementById('export-modal')) closeExportModal();
}

function getExactTimeStr() {
    const d = new Date();
    const pad = (n) => String(n).padStart(2, '0');
    return d.getFullYear() + pad(d.getMonth()+1) + pad(d.getDate()) + "_" + pad(d.getHours()) + pad(d.getMinutes()) + pad(d.getSeconds());
}

async function getSelectedItems() {
    const store = db.transaction("receipts").objectStore("receipts");
    const items = [];
    for (let id of selectedIds) {
        const item = await new Promise(r => store.get(id).onsuccess = e => r(e.target.result));
        if (item && item.imgData) items.push(item);
    }
    return items;
}

async function generateCSV(items) {
    let csv = 'Date,Magasin,Prix\n';
    items.forEach(item => {
        const p = parseFileName(item.name);
        if (p) csv += `"${p.date}","${p.shop}","${p.price}"\n`;
    });
    return csv;
}

async function actionSendMail() {
    const pdfFormat = document.querySelector('input[name="pdf-format"]:checked').value;
    closeExportModal();
    showToast("Préparation du fichier...");
    try {
        const items = await getSelectedItems();
        if (!items.length) { showToast("Aucun fichier sélectionné"); return; }
        const timeStr = getExactTimeStr();
        let filesToShare = [];
        const csv = await generateCSV(items);
        filesToShare.push(new File([csv], `Recapitulatif_${timeStr}.csv`, { type: 'text/csv' }));
        if (pdfFormat === 'separate') {
            for (let item of items) {
                const pdfBlob = await buildSinglePDF(item.imgData);
                filesToShare.push(new File([pdfBlob], `${item.name}.pdf`, { type: 'application/pdf' }));
            }
        } else {
            const pdfBlob = await buildCompiledPDF(items);
            filesToShare.push(new File([pdfBlob], `Recus_${timeStr}.pdf`, { type: 'application/pdf' }));
        }
        if (navigator.canShare && navigator.canShare({ files: filesToShare })) {
            await navigator.share({ files: filesToShare, title: 'Mes Reçus', text: 'Voici mes reçus en PDF et le récapitulatif CSV.' });
            showToast("Mail ouvert !");
        } else {
            showToast("Création d'un ZIP...");
            const zip = new JSZip();
            for (let file of filesToShare) { const blob = await file.arrayBuffer(); zip.file(file.name, blob); }
            const zipBlob = await zip.generateAsync({ type: 'blob' });
            fallbackDownloadZip(zipBlob, `Export_${timeStr}.zip`);
        }
    } catch(err) { if (err.name !== 'AbortError') { showToast("Erreur: " + err.message); console.error(err); } }
}

async function actionSendMessage() {
    const pdfFormat = document.querySelector('input[name="pdf-format"]:checked').value;
    closeExportModal();
    showToast("Préparation des fichiers...");
    try {
        const items = await getSelectedItems();
        if (!items.length) { showToast("Aucun fichier sélectionné"); return; }
        const timeStr = getExactTimeStr();
        let filesToShare = [];
        if (pdfFormat === 'separate') {
            for (let item of items) {
                const pdfBlob = await buildSinglePDF(item.imgData);
                filesToShare.push(new File([pdfBlob], `${item.name}.pdf`, { type: 'application/pdf' }));
            }
        } else {
            const pdfBlob = await buildCompiledPDF(items);
            filesToShare.push(new File([pdfBlob], `Recus_${timeStr}.pdf`, { type: 'application/pdf' }));
        }
        if (navigator.canShare && navigator.canShare({ files: filesToShare })) {
            await navigator.share({ files: filesToShare, title: 'Mes Reçus', text: 'Voici mes reçus en PDF.' });
            showToast("Message ouvert !");
        } else {
            showToast("Partage direct impossible, création d'un ZIP...");
            const zip = new JSZip();
            for (let file of filesToShare) { const blob = await file.arrayBuffer(); zip.file(file.name, blob); }
            const zipBlob = await zip.generateAsync({ type: 'blob' });
            fallbackDownloadZip(zipBlob, `Export_${timeStr}.zip`);
        }
    } catch(err) { if (err.name !== 'AbortError') { showToast("Erreur: " + err.message); console.error(err); } }
}

async function actionDownloadZip() {
    closeExportModal();
    showToast("Préparation du ZIP...");
    try {
        const items = await getSelectedItems();
        if (!items.length) { showToast("Aucun fichier sélectionné"); return; }
        if (typeof JSZip === 'undefined') { showToast("JSZip non chargé"); return; }
        const zip = new JSZip();
        const timeStr = getExactTimeStr();
        const pdfBlob = await buildCompiledPDF(items);
        zip.file(`Recus_Compiles_${timeStr}.pdf`, pdfBlob);
        const csv = await generateCSV(items);
        zip.file(`Recapitulatif_${timeStr}.csv`, csv);
        const zipBlob = await zip.generateAsync({ type: 'blob' });
        fallbackDownloadZip(zipBlob, `Export_${timeStr}.zip`);
    } catch(err) { showToast("Erreur ZIP: " + err.message); }
}

function fallbackDownloadZip(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    showToast("Fichier téléchargé !");
}

async function buildSinglePDF(imgDataUrl) {
    const pdf = new window.jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => { const { x, y, w, h } = fitA4(img.width, img.height); pdf.addImage(imgDataUrl, 'JPEG', x, y, w, h); resolve(pdf.output('blob')); };
        img.src = imgDataUrl;
    });
}

async function buildCompiledPDF(items) {
    const pdf = new window.jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    for (let i = 0; i < items.length; i++) {
        const item = items[i];
        await new Promise((resolve) => {
            const img = new Image();
            img.onload = () => { const { x, y, w, h } = fitA4(img.width, img.height); if (i > 0) pdf.addPage('a4', 'portrait'); pdf.addImage(item.imgData, 'JPEG', x, y, w, h); resolve(); };
            img.src = item.imgData;
        });
    }
    return pdf.output('blob');
}

function fitA4(iw, ih) {
    const pw = 210, ph = 297;
    const ratio = Math.min(pw / iw, ph / ih);
    const w = iw * ratio, h = ih * ratio;
    return { x: (pw - w) / 2, y: (ph - h) / 2, w, h };
}

function showToast(m) {
    const t = document.getElementById('toast');
    t.innerText = m; t.style.display = 'block';
    clearTimeout(t._to);
    t._to = setTimeout(() => t.style.display = 'none', 2500);
}
</script>

<!-- ── OCR Tesseract — 100% local, aucune donnée envoyée ── -->
<script>

// ── 1. Prétraitement image pour Tesseract ─────────────────
// Tesseract performe bien mieux sur une image :
//   • agrandie x2 (résolution suffisante pour police condensée)
//   • binarisée (noir pur / blanc pur, pas de gris)
//   • avec un léger dé-bruit
function preprocessForOCR(sourceCanvas) {
    const scale = 2;
    const out = document.createElement('canvas');
    out.width  = sourceCanvas.width  * scale;
    out.height = sourceCanvas.height * scale;
    const ctx = out.getContext('2d');

    // Agrandissement avec lissage désactivé (netteté maximale)
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(sourceCanvas, 0, 0, out.width, out.height);

    // Binarisation adaptative : on calcule le seuil sur la luminosité moyenne
    const imgData = ctx.getImageData(0, 0, out.width, out.height);
    const d = imgData.data;
    let sum = 0;
    for (let i = 0; i < d.length; i += 4) {
        sum += d[i] * 0.299 + d[i+1] * 0.587 + d[i+2] * 0.114;
    }
    const avg = sum / (d.length / 4);
    // Seuil légèrement en-dessous de la moyenne pour ne pas perdre le texte clair
    const threshold = avg * 0.85;

    for (let i = 0; i < d.length; i += 4) {
        const lum = d[i] * 0.299 + d[i+1] * 0.587 + d[i+2] * 0.114;
        const v = lum < threshold ? 0 : 255;
        d[i] = d[i+1] = d[i+2] = v;
        d[i+3] = 255;
    }
    ctx.putImageData(imgData, 0, 0);
    return out;
}

// ── 2. Extraction fiable : date ───────────────────────────
function extractDate(text) {
    // Patterns français : JJ/MM/AA, JJ-MM-AAAA, JJ.MM.AAAA
    // On cherche toutes les occurrences et on prend la plus récente valide
    const re = /\b(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})\b/g;
    let match, best = null;
    while ((match = re.exec(text)) !== null) {
        let [_, d, m, y] = match;
        if (y.length === 2) y = '20' + y;
        const day = parseInt(d), month = parseInt(m), year = parseInt(y);
        if (month < 1 || month > 12) continue;
        if (day  < 1 || day  > 31)  continue;
        if (year < 2015 || year > 2035) continue;
        // On garde la date la plus récente (= la date du ticket, pas d'expiration DLC)
        const iso = `${y}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        if (!best || iso > best) best = iso;
    }
    return best;
}

// ── 3. Extraction fiable : montant ────────────────────────
function extractMontant(text) {
    // Priorité décroissante : label explicite → montant isolé en fin de ligne
    const patterns = [
        /net\s*[aà]\s*payer\s*[:\*=]?\s*(\d+[.,]\d{2})/i,
        /total\s*ttc\s*[:\*=]?\s*(\d+[.,]\d{2})/i,
        /[aà]\s*payer\s*[:\*=]?\s*(\d+[.,]\d{2})/i,
        /total\s*[:\*=]?\s*(\d+[.,]\d{2})/i,
        /montant\s*[:\*=]?\s*(\d+[.,]\d{2})/i,
        /regl[eé]\s*[:\*=]?\s*(\d+[.,]\d{2})/i,
        /esp[eè]ces?\s*[:\*=]?\s*(\d+[.,]\d{2})/i,
        /carte\s*[:\*=]?\s*(\d+[.,]\d{2})/i,
    ];
    for (const p of patterns) {
        const match = text.match(p);
        if (match) {
            const val = parseFloat(match[1].replace(',', '.'));
            if (val >= 0.10 && val <= 9999) return val.toFixed(2);
        }
    }
    return null;
}

// ── 4. Extraction fiable : magasin (scoring) ──────────────
function extractMagasin(text) {
    // Liste d'enseignes connues — détection certaine, prioritaire
    const enseignes = [
        'CARREFOUR','LECLERC','LIDL','ALDI','INTERMARCHE','SUPER U','CASINO',
        'MONOPRIX','FRANPRIX','FNAC','DARTY','DECATHLON','IKEA','ZARA','H&M',
        'MCDONALDS','MCDONALD','KFC','BURGER KING','SEPHORA','MARIONNAUD',
        'BOULANGER','LEROY MERLIN','BRICOMARCHE','BRICODEPOT','PICARD','BIOCOOP',
        'AUCHAN','SIMPLY MARKET','NETTO','PENNY','CORA','MATCH','GEANT CASINO',
        'GRAND FRAIS','NATURALIA','LA VIE CLAIRE','BOTANIC','ACTION','NORMAL',
        'PRIMARK','KIABI','JULES','CELIO','PROMOD','CAMAIEU','JENNYFER',
        'OPTICAL CENTER','ALAIN AFFLELOU','KRYS','ATOL',
        'CULTURA','MAISONS DU MONDE','BUT','CONFORAMA','CASA','GIFI',
        'NORAUTO','FEU VERT','SPEEDY','MIDAS','EUROMASTER',
        'PAUL','ERIC KAYSER','BRIOCHE DOREE','SUBWAY','QUICK','FIVE GUYS',
        'RELAY','TABAC','PMU','FDJ','PHARMACIE','PARAPHARMACIE',
        'SNCF','RATP','VINCI','TOTAL ENERGIES','BP','SHELL','ESSO',
        'LA POSTE','CHRONOPOST','COLISSIMO'
    ];

    const upper = text.toUpperCase();
    // Cherche l'enseigne la plus longue qui apparait (évite "U" de SUPER U qui matche en premier)
    let found = null;
    enseignes.forEach(e => {
        if (upper.includes(e)) {
            if (!found || e.length > found.length) found = e;
        }
    });
    if (found) return found;

    // Fallback : scoring des lignes du haut du ticket
    // Un bon nom de magasin est : court, que des lettres/espaces, pas une adresse ni un tel
    const BLACKLIST = /^\d|tva|siret|siren|tel|fax|code|caisse|ticket|article|qte|ref|tpe|cb|visa|master/i;
    const lines = text.split('\n')
        .map(l => l.trim())
        .filter(l => l.length >= 3 && l.length <= 35)
        .filter(l => /[a-zA-Z]{3,}/.test(l))     // au moins 3 lettres consécutives
        .filter(l => !/^\d+$/.test(l))             // pas que des chiffres
        .filter(l => !BLACKLIST.test(l))            // pas un mot-clé technique
        .filter(l => (l.match(/\d/g) || []).length <= 2); // max 2 chiffres (évite les adresses)

    // On prend la ligne du haut qui passe tous les filtres — c'est presque toujours le nom
    // mais seulement si elle apparait dans les 8 premières lignes non vides du ticket
    const topLines = text.split('\n').filter(l => l.trim()).slice(0, 8).map(l => l.trim().toUpperCase());
    const candidate = lines.find(l => topLines.includes(l.toUpperCase()));

    return candidate ? candidate.toUpperCase() : null;
}

// ── 5. OCR principal ──────────────────────────────────────
async function ocrReceipt() {
    const canvas = document.getElementById('photo-canvas');
    showToast("🔍 Lecture du reçu...");

    try {
        // Prétraitement : image optimisée pour Tesseract
        const processedCanvas = preprocessForOCR(canvas);

        const worker = await Tesseract.createWorker('fra', 1, {
            logger: () => {}
        });

        // Paramètres Tesseract optimisés pour les tickets de caisse
        await worker.setParameters({
            tessedit_pageseg_mode: '6',   // bloc de texte uniforme (pas de colonnes)
            preserve_interword_spaces: '1',
        });

        const { data: { text } } = await worker.recognize(processedCanvas);
        await worker.terminate();

        const date    = extractDate(text);
        const montant = extractMontant(text);
        const magasin = extractMagasin(text);

        // Remplissage uniquement si fiable
        if (date) {
            document.getElementById('capture-date').value = date;
            ['today','prev','manual'].forEach(m =>
                document.getElementById('chip-'+m).classList.toggle('active', m === 'manual')
            );
            dateMode = 'manual';
            refreshDateDisplay();
        }

        if (montant !== null) {
            document.getElementById('capture-amount').value = montant;
        }

        if (magasin) {
            document.getElementById('capture-shop').value = magasin;
        }

        // Toast adapté au résultat
        const found = [date ? 'date' : null, montant ? 'montant' : null, magasin ? 'magasin' : null].filter(Boolean);
        if (found.length === 0) {
            showToast("Remplissage manuel requis");
        } else if (found.length === 3) {
            showToast("✅ Reçu lu entièrement");
        } else {
            showToast(`✅ ${found.join(', ')} détecté${found.length > 1 ? 's' : ''}`);
        }

    } catch(e) {
        console.error('OCR error:', e);
        showToast("Remplissage manuel requis");
    }
}
</script>

<!-- Script du logo mosaïque -->
<script>
    // Palette vibrante pour l'infusion
    const vibrantColors = ['#006466', '#F46060', '#FFD972'];
    const darkBlue = '#0A2472';
    
    const wordContainer = document.getElementById('word-outils');
    const word = "OUTILS";

    word.split('').forEach(char => {
        const span = document.createElement('span');
        span.textContent = char;
        span.className = 'letter';
        wordContainer.appendChild(span);
    });

    function refreshLogo() {
        const svg = document.getElementById('mosaic-svg');
        const letters = document.querySelectorAll('.letter');
        svg.innerHTML = ''; 
        
        const gridSize = 4; 
        const step = 100 / (gridSize - 1);
        let points = [];
        let columnVibrantColors = [[], [], []]; 

        for (let y = 0; y < gridSize; y++) {
            for (let x = 0; x < gridSize; x++) {
                let px = x * step;
                let py = y * step;
                if (x > 0 && x < gridSize - 1 && y > 0 && y < gridSize - 1) {
                    px += (Math.random() - 0.5) * step * 0.8;
                    py += (Math.random() - 0.5) * step * 0.8;
                }
                points.push({x: px, y: py});
            }
        }

        for (let y = 0; y < gridSize - 1; y++) {
            for (let x = 0; x < gridSize - 1; x++) {
                const p1 = points[y * gridSize + x];
                const p2 = points[y * gridSize + (x + 1)];
                const p3 = points[(y + 1) * gridSize + (x + 1)];
                const p4 = points[(y + 1) * gridSize + x];
                
                const poly = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
                
                // PROBABILITÉ : On limite l'apparition du bleu foncé à 12.5% (1/8)
                const isDark = Math.random() < 0.125;
                const color = isDark ? darkBlue : vibrantColors[Math.floor(Math.random() * vibrantColors.length)];
                
                if (!isDark) {
                    columnVibrantColors[x].push(color);
                }

                poly.setAttribute("points", `${p1.x},${p1.y} ${p2.x},${p2.y} ${p3.x},${p3.y} ${p4.x},${p4.y}`);
                poly.setAttribute("fill", color);
                poly.setAttribute("stroke", color);
                poly.setAttribute("stroke-width", "0.5");
                svg.appendChild(poly);
            }
        }

        letters.forEach((letter, index) => {
            let columnIndex = index < 2 ? 0 : (index < 4 ? 1 : 2);
            const possibleColors = columnVibrantColors[columnIndex];
            
            const finalColor = (possibleColors.length > 0) 
                ? possibleColors[Math.floor(Math.random() * possibleColors.length)]
                : vibrantColors[Math.floor(Math.random() * vibrantColors.length)];
            
            letter.style.color = finalColor;
        });
    }

    refreshLogo();
</script>
