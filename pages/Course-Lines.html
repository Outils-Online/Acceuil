<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OVNI CONTROL V9 • Mondrian Modern</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
/* ========== DESIGN SYSTEM • MONDRIAN MODERN ========== */
:root {
  --m-bg: #F7F7F5;
  --m-surface: #FFFFFF;
  --m-blue: #4A78E2;
  --m-red: #E24A4A;
  --m-gold: #E2B800;
  --m-black: #111111;
  --m-text: #1e1e1e;
  --m-soft: #5a5a5a;
  --m-muted: #9b9b9b;
  --m-border: rgba(0,0,0,0.08);
  --m-glass: rgba(255,255,255,0.7);
  --m-shadow: 0 8px 32px rgba(0,0,0,0.08);
  --m-shadow-hover: 0 16px 40px rgba(0,0,0,0.15);
  --m-radius: 20px;
  --m-radius-sm: 14px;
  --nav-h: 80px;
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --font-display: 'Space Grotesk', sans-serif;
  --font-body: 'Inter', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: #e8e7e2;
  color: var(--m-text);
  min-height: 100vh;
  padding: 20px 12px calc(var(--nav-h) + 20px);
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

/* ---------- APP SHELL ---------- */
.app-shell {
  width: 100%;
  max-width: 680px;
  background: var(--m-bg);
  border-radius: 28px;
  padding: 0;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.app-shell::before {
  content: '';
  display: block;
  height: 5px;
  background: linear-gradient(90deg, var(--m-blue) 33%, var(--m-red) 33% 66%, var(--m-gold) 66%);
  flex-shrink: 0;
  border-radius: 5px 5px 0 0;
}

/* ---------- HEADER ---------- */
header {
  background: transparent;
  border-bottom: 1px solid var(--m-border);
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.header-inner { display: flex; align-items: center; justify-content: space-between; }
.icon-btn {
  background: var(--m-glass);
  backdrop-filter: blur(8px);
  color: var(--m-black);
  border: 1px solid var(--m-border);
  width: 44px; height: 44px; border-radius: 14px; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.3s var(--ease);
}
.icon-btn:hover { background: var(--m-blue); color: white; transform: translateY(-2px); }
.header-actions { display: flex; gap: 8px; align-items: center; }
.btn-ghost {
  background: var(--m-glass); backdrop-filter: blur(8px);
  border: 1px solid rgba(0,0,0,0.08); color: var(--m-black);
  padding: 8px 16px; border-radius: 30px; font-size: 0.75rem; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; gap: 6px;
  transition: all 0.25s var(--ease); font-family: var(--font-body); letter-spacing: 0.5px;
}
.btn-ghost:hover { border-color: var(--m-blue); color: var(--m-blue); background: rgba(74,120,226,0.08); transform: translateY(-2px); }
.btn-ghost:active { transform: scale(0.96); }
.btn-ghost.accent-ghost {
  border-color: var(--m-gold); color: var(--m-gold); background: rgba(226,184,0,0.1);
  position: relative; overflow: hidden;
}
.btn-ghost.accent-ghost::before {
  content: ''; position: absolute; inset: -2px; border-radius: 32px;
  background: conic-gradient(from 0deg, var(--m-gold), var(--m-blue), var(--m-red), var(--m-gold));
  z-index: -1; animation: spin 4s linear infinite; opacity: 0;
  transition: opacity 0.3s;
}
.btn-ghost.accent-ghost:hover::before { opacity: 0.3; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ---------- TAB STRIP ---------- */
.tab-strip {
  display: flex; gap: 4px;
  background: var(--m-glass); backdrop-filter: blur(8px);
  border: 1px solid var(--m-border); border-radius: 14px; padding: 4px;
}
.tab {
  flex: 1; text-align: center; padding: 10px 6px;
  font-size: 0.7rem; font-weight: 600; letter-spacing: 0.8px;
  border-radius: 10px; cursor: pointer; color: var(--m-soft);
  transition: all 0.2s var(--ease); user-select: none;
  font-family: var(--font-body); text-transform: uppercase;
}
.tab:active { transform: scale(0.96); }
.tab.active {
  background: linear-gradient(145deg, var(--m-blue), #3b6ad4);
  color: white; box-shadow: 0 6px 18px rgba(74,120,226,0.3);
}
.tab .badge {
  display: inline-block; background: rgba(255,255,255,0.25);
  border-radius: 99px; padding: 2px 8px; margin-left: 5px; font-size: 0.65rem;
}

/* ---------- SECTIONS ---------- */
#section-viewport { flex: 1; position: relative; overflow: hidden; }
.section { display: none; padding: 20px; position: relative; z-index: 1; }
.section.active { display: block; }

/* ---------- CARDS ---------- */
.card, .catalog-card {
  background: var(--m-surface);
  border: 1px solid var(--m-border);
  border-radius: var(--m-radius);
  padding: 20px; margin-bottom: 18px;
  position: relative; overflow: hidden;
  backdrop-filter: blur(8px);
  transition: transform 0.3s var(--ease), box-shadow 0.3s var(--ease);
  box-shadow: var(--m-shadow);
}
.card::before, .catalog-card::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(145deg, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0.2) 100%);
  z-index: -1;
}
.card:hover, .catalog-card:hover {
  transform: translateY(-8px);
  box-shadow: var(--m-shadow-hover);
}
.card-title {
  font-family: var(--font-display); font-size: 0.75rem; font-weight: 700;
  letter-spacing: 1.2px; text-transform: uppercase;
  color: var(--m-black); display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 18px; cursor: pointer; user-select: none;
}
.card-title .title-left { display: flex; align-items: center; gap: 10px; }
.card-title i:first-child { font-size: 0.9rem; color: var(--m-blue); }
.card-title .toggle-icon { transition: transform 0.28s var(--ease); font-size: 0.8rem; color: var(--m-muted); }
.card.collapsed .card-body { display: none; }
.card.collapsed .toggle-icon { transform: rotate(-90deg); }

/* ---------- FORM ELEMENTS ---------- */
.field-group { margin-bottom: 12px; }
.field-label {
  font-family: var(--font-display); font-size: 0.6rem; font-weight: 700;
  letter-spacing: 1.5px; color: var(--m-soft); margin-bottom: 6px; text-transform: uppercase;
}
input, select, textarea {
  width: 100%; background: var(--m-bg); border: 1px solid var(--m-border);
  border-radius: var(--m-radius-sm); color: var(--m-text);
  padding: 12px 14px; font-size: 0.9rem; font-family: var(--font-body); outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
input:focus, select:focus, textarea:focus {
  border-color: var(--m-blue); box-shadow: 0 0 0 3px rgba(74,120,226,0.1);
}
input.error { border-color: var(--m-red); box-shadow: 0 0 0 3px rgba(226,74,74,0.1); }
select { cursor: pointer; }
select option { background: white; }
.row { display: flex; gap: 10px; }
.row > * { flex: 1; }

/* ---------- BUTTONS ---------- */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 8px; padding: 14px 20px; border: none; border-radius: var(--m-radius-sm);
  font-family: var(--font-display); font-size: 0.75rem; font-weight: 700;
  letter-spacing: 0.8px; cursor: pointer;
  transition: all 0.25s var(--ease); position: relative; overflow: hidden;
  text-transform: uppercase;
}
.btn::after {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle at center, rgba(255,255,255,0.3) 0%, transparent 70%);
  opacity: 0; transition: opacity 0.3s;
}
.btn:active::after { opacity: 1; }
.btn:active { transform: scale(0.96); }
.btn-primary { background: linear-gradient(145deg, var(--m-blue), #3461c5); color: white; width: 100%; box-shadow: 0 6px 20px rgba(74,120,226,0.25); }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(74,120,226,0.4); }
.btn-success { background: linear-gradient(145deg, #3ddfa0, #2cc48b); color: #0a1a13; box-shadow: 0 6px 20px rgba(61,223,160,0.25); }
.btn-success:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(61,223,160,0.4); }
.btn-danger { background: linear-gradient(145deg, var(--m-red), #c93d3d); color: white; box-shadow: 0 6px 20px rgba(226,74,74,0.25); }
.btn-danger:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(226,74,74,0.4); }
.btn-neutral { background: var(--m-glass); backdrop-filter: blur(8px); border: 1px solid var(--m-border); color: var(--m-black); width: 100%; }
.btn-neutral:hover { border-color: var(--m-gold); background: rgba(226,184,0,0.08); transform: translateY(-2px); }

.btn-icon {
  width: 40px; height: 40px; min-width: 40px; min-height: 40px;
  border-radius: 50%; border: none; cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 0.9rem; transition: all 0.25s var(--ease);
  will-change: transform; flex-shrink: 0;
  backdrop-filter: blur(8px);
}
.btn-icon:active { transform: scale(0.88); }
.btn-icon-check { background: rgba(61,223,160,0.15); color: #2cc48b; border: 1px solid rgba(61,223,160,0.3); }
.btn-icon-check:hover { background: #3ddfa0; color: #0a1a13; transform: translateY(-3px); }
.btn-icon-trash { background: rgba(226,74,74,0.15); color: var(--m-red); border: 1px solid rgba(226,74,74,0.3); }
.btn-icon-trash:hover { background: var(--m-red); color: white; transform: translateY(-3px); }
.btn-icon-edit { background: rgba(74,120,226,0.15); color: var(--m-blue); border: 1px solid rgba(74,120,226,0.3); }
.btn-icon-edit:hover { background: var(--m-blue); color: white; transform: translateY(-3px); }
.btn-icon-export { background: rgba(226,184,0,0.15); color: var(--m-gold); border: 1px solid rgba(226,184,0,0.3); }
.btn-icon-export:hover { background: var(--m-gold); color: black; transform: translateY(-3px); }
/* New icon for add production */
.btn-icon-add {
  background: linear-gradient(145deg, var(--m-blue), #3461c5);
  color: white;
  border: 1px solid rgba(74,120,226,0.3);
}
.btn-icon-add:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(74,120,226,0.4); }

/* ---------- SESSION BANNER ---------- */
.session-banner {
  background: linear-gradient(145deg, rgba(255,255,255,0.9), rgba(255,255,255,0.4));
  backdrop-filter: blur(12px);
  border: 1px solid var(--m-border);
  border-radius: var(--m-radius);
  padding: 18px 20px; margin-bottom: 18px;
  position: relative; overflow: hidden;
  box-shadow: var(--m-shadow);
}
.session-banner::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
  background: linear-gradient(180deg, var(--m-blue), var(--m-gold));
  border-radius: 4px;
}
.session-label { font-family: var(--font-display); font-size: 0.65rem; font-weight: 700; letter-spacing: 1.5px; color: var(--m-soft); text-transform: uppercase; margin-bottom: 8px; }
.session-text { font-size: 0.95rem; font-weight: 600; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.session-text .tag {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(74,120,226,0.1); border: 1px solid rgba(74,120,226,0.2);
  color: var(--m-blue); border-radius: 30px; padding: 5px 14px; font-size: 0.8rem;
  backdrop-filter: blur(8px);
}
.session-tag-qty { font-weight: 800; color: var(--m-gold); }
.session-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 14px; }
.session-cost { font-size: 0.8rem; color: var(--m-gold); font-weight: 700; display: flex; align-items: center; gap: 6px; }
.btn-reset {
  background: none; border: 1px solid rgba(226,74,74,0.3); color: var(--m-red);
  font-size: 0.7rem; font-weight: 700; cursor: pointer; padding: 6px 12px;
  border-radius: 8px; opacity: 0.8; transition: all 0.2s; font-family: var(--font-body);
}
.btn-reset:hover { opacity: 1; background: rgba(226,74,74,0.1); }
.btn-export-list {
  background: var(--m-glass); border: 1px solid var(--m-border);
  color: var(--m-soft); width: 32px; height: 32px; border-radius: 10px;
  cursor: pointer; font-size: 0.85rem; display: inline-flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.btn-export-list:hover { border-color: var(--m-blue); color: var(--m-blue); background: rgba(74,120,226,0.1); }

/* ---------- SESSION BAR ---------- */
.session-bar {
  background: var(--m-glass); backdrop-filter: blur(8px);
  border: 1px solid var(--m-border); border-radius: var(--m-radius-sm);
  padding: 10px 14px; margin-bottom: 18px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px;
}
.session-bar-left { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
.session-bar-left select {
  flex: 1; min-width: 0; background: rgba(247,247,245,0.8);
  border: 1px solid var(--m-border); border-radius: 20px;
  padding: 8px 24px 8px 12px; font-size: 0.8rem; font-weight: 600;
  color: var(--m-text); cursor: pointer;
}
.session-bar-actions button {
  background: none; border: none; color: var(--m-soft); cursor: pointer;
  font-size: 0.85rem; width: 34px; height: 34px; border-radius: 10px;
  transition: all 0.2s;
}
.session-bar-actions button:hover { background: rgba(0,0,0,0.05); color: var(--m-black); }

/* ---------- CATEGORY HEADER ---------- */
.category-header {
  font-family: var(--font-display); font-size: 0.65rem; font-weight: 800;
  letter-spacing: 2.2px; text-transform: uppercase;
  color: var(--m-gold); padding: 16px 4px 8px;
  display: flex; align-items: center; gap: 10px;
}
.category-header::after { content: ''; flex: 1; height: 2px; background: linear-gradient(90deg, rgba(226,184,0,0.3), transparent); }

/* ---------- LIST ITEMS (new layout) ---------- */
.list-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  background: var(--m-surface);
  border: 1px solid var(--m-border);
  border-radius: var(--m-radius-sm);
  padding: 14px 16px; margin-bottom: 8px;
  transition: transform 0.2s var(--ease), box-shadow 0.2s var(--ease);
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.list-item:hover { transform: translateY(-4px); box-shadow: var(--m-shadow); }
.list-item.done { opacity: 0.45; }
.list-item.done .item-name { text-decoration: line-through; }
.list-left { flex: 1; min-width: 0; }
.list-name-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}
.item-name { font-weight: 600; font-size: 0.92rem; }
.recipe-dots { display: inline-flex; gap: 5px; align-items: center; }
.recipe-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; box-shadow: 0 0 0 1.5px rgba(0,0,0,0.1); flex-shrink: 0; }
.list-qty { text-align: center; }
.qty-big { font-family: var(--font-display); font-size: 1.6rem; color: var(--m-gold); }
.qty-unit { font-size: 0.6rem; color: var(--m-muted); display: block; margin-top: 2px; }
.list-actions { flex-shrink: 0; display: flex; align-items: center; }

/* ---------- SORTABLE ---------- */
.sortable-category {
  display: flex; align-items: center; gap: 12px;
  background: var(--m-surface); border: 1px solid var(--m-border);
  border-radius: var(--m-radius-sm); padding: 14px 16px; margin-bottom: 8px;
  transition: all 0.2s; user-select: none; cursor: grab;
}
.sortable-category:hover { border-color: var(--m-blue); transform: translateY(-2px); }
.sortable-category.drag-over { border-color: var(--m-blue); background: rgba(74,120,226,0.05); }
.drag-handle { color: var(--m-muted); font-size: 1rem; }

/* ---------- RECIPE CARD ---------- */
.recipe-card {
  background: var(--m-bg); border: 1px solid var(--m-border);
  border-radius: var(--m-radius-sm); padding: 14px; margin-bottom: 10px;
  transition: all 0.25s var(--ease);
}
.recipe-card.collapsed .recipe-card-grid,
.recipe-card.collapsed .ing-cost-line { display: none; }
.recipe-card.collapsed { padding: 10px 14px; background: rgba(247,247,245,0.6); }
.recipe-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; cursor: pointer; }
.recipe-card.collapsed .recipe-card-header { margin-bottom: 0; }
.toggle-icon { width: 24px; font-size: 0.75rem; color: var(--m-muted); transition: transform 0.28s var(--ease); text-align: center; }
.recipe-card.collapsed .toggle-icon { transform: rotate(-90deg); }
.recipe-card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.ing-cost-line { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--m-border); display: flex; align-items: center; justify-content: space-between; }
.ing-cost-preview { font-size: 0.75rem; color: var(--m-gold); font-weight: 700; }
.btn-del-row {
  width: 32px; height: 32px; flex-shrink: 0;
  background: rgba(226,74,74,0.15); border: 1px solid rgba(226,74,74,0.3);
  color: var(--m-red); border-radius: 10px;
  cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.btn-del-row:hover { background: var(--m-red); color: white; }

/* ---------- AUTOCOMPLETE ---------- */
.ac-wrapper { position: relative; }
.ac-box {
  position: absolute; top: calc(100% + 5px); left: 0; right: 0;
  background: white; border: 1px solid var(--m-border);
  border-radius: var(--m-radius-sm); z-index: 500; display: none; overflow: hidden;
  box-shadow: var(--m-shadow);
}
.ac-item { padding: 12px 15px; font-size: 0.85rem; cursor: pointer; transition: background 0.15s; }
.ac-item:hover { background: rgba(74,120,226,0.1); }
.ac-item span { color: var(--m-muted); font-size: 0.7rem; margin-left: 8px; }

/* ---------- CATALOG CARD (always inline) ---------- */
.catalog-card {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: nowrap;
  gap: 12px;
  padding: 15px 20px;
}
.catalog-name { font-family: var(--font-display); font-weight: 700; font-size: 1rem; }
.catalog-meta { font-size: 0.72rem; color: var(--m-soft); margin-top: 4px; }
.catalog-cost { font-size: 0.78rem; color: var(--m-gold); font-weight: 700; margin-top: 6px; display: inline-flex; align-items: center; gap: 5px; }
.catalog-actions { display: flex; gap: 8px; flex-shrink: 0; align-items: center; }

/* ---------- SEARCH ---------- */
.search-field { position: relative; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.search-field i:first-child { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--m-muted); font-size: 0.9rem; pointer-events: none; }
.search-field input { padding-left: 40px; flex: 1; }
.import-icon-btn {
  background: var(--m-glass); backdrop-filter: blur(8px);
  border: 1px solid var(--m-border); border-radius: 40px;
  width: 46px; height: 42px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s; color: var(--m-soft);
}
.import-icon-btn:hover { border-color: var(--m-blue); color: var(--m-blue); background: rgba(74,120,226,0.1); }

/* ---------- COST PILL ---------- */
.cost-pill {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(226,184,0,0.12); border: 1px solid rgba(226,184,0,0.3);
  border-radius: 99px; padding: 5px 14px; font-size: 0.75rem; font-weight: 700; color: var(--m-gold);
  backdrop-filter: blur(4px);
}

/* ---------- TOAST ---------- */
#toast-container {
  position: fixed; bottom: calc(var(--nav-h) + 20px); left: 50%; transform: translateX(-50%);
  z-index: 9999; display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.toast {
  background: rgba(17,17,17,0.95); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 99px; padding: 12px 22px; font-size: 0.82rem; font-weight: 600;
  color: white; display: flex; align-items: center; gap: 8px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.2); backdrop-filter: blur(12px);
  animation: toastIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.toast.hide { opacity: 0; transition: opacity 0.3s; }
@keyframes toastIn { from { opacity:0; transform:translateY(10px) scale(0.95); } to { opacity:1; transform:none; } }
.toast.success { border-color: #3ddfa0; color: #3ddfa0; }
.toast.error   { border-color: var(--m-red); color: var(--m-red); }
.toast.info    { border-color: var(--m-blue); color: var(--m-blue); }

/* ---------- BOTTOM NAV ---------- */
.bottom-nav {
  width: 100%;
  background: rgba(247,247,245,0.95);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--m-border);
  display: flex;
  padding-bottom: env(safe-area-inset-bottom, 8px);
  margin-top: auto;
}
.nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: var(--m-muted); cursor: pointer;
  font-size: 0.62rem; font-weight: 700; letter-spacing: 0.7px; gap: 6px;
  transition: color 0.2s var(--ease); position: relative; user-select: none;
  padding: 12px 0;
}
.nav-item i { font-size: 1.3rem; transition: transform 0.25s var(--ease), color 0.2s; }
.nav-item:active i { transform: scale(0.88); }
.nav-item.active { color: var(--m-black); }
.nav-item.active i { transform: translateY(-3px) scale(1.1); }
.nav-item::before {
  content: ''; position: absolute; top: 0; left: 25%; right: 25%; height: 3px;
  border-radius: 0 0 4px 4px; background: var(--m-gold);
  transform: scaleX(0); transition: transform 0.3s var(--ease);
}
.nav-item.active::before { transform: scaleX(1); }
.nav-badge {
  position: absolute; top: 6px; right: calc(25% - 8px);
  background: var(--m-blue); color: white; font-size: 0.55rem; font-weight: 900;
  border-radius: 99px; padding: 2px 6px; min-width: 18px; text-align: center;
  box-shadow: 0 2px 8px rgba(74,120,226,0.4);
}

/* ---------- EMPTY STATES ---------- */
.empty { text-align: center; padding: 60px 20px; color: var(--m-muted); }
.empty i { font-size: 2.8rem; opacity: 0.15; margin-bottom: 16px; display: block; }
.empty p { font-size: 0.9rem; }

/* ---------- MODAL ---------- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 2000;
  background: rgba(0,0,0,0.5); backdrop-filter: blur(6px);
  display: flex; align-items: flex-end;
}
.modal-sheet {
  background: var(--m-bg); border: 1px solid var(--m-border);
  border-radius: 26px 26px 0 0; padding: 16px 20px 40px;
  width: 100%; max-height: 85vh; overflow-y: auto;
  box-shadow: 0 -8px 30px rgba(0,0,0,0.1);
}
.modal-handle { width: 40px; height: 5px; background: var(--m-border); border-radius: 3px; margin: 0 auto 18px; }
.modal-title { font-family: var(--font-display); font-size: 1.3rem; margin-bottom: 8px; }
.modal-sub { font-size: 0.8rem; color: var(--m-soft); margin-bottom: 20px; }
.import-recipe-item {
  display: flex; align-items: center; gap: 14px;
  background: var(--m-surface); border: 1px solid var(--m-border);
  border-radius: 14px; padding: 14px 16px; margin-bottom: 10px;
  transition: border-color 0.15s;
}
.import-recipe-item:has(.import-check:checked) { border-color: var(--m-blue); background: rgba(74,120,226,0.05); }
.import-recipe-item .info { flex: 1; }
.import-recipe-item .name { font-weight: 700; font-size: 0.95rem; }
.import-recipe-item .meta { font-size: 0.72rem; color: var(--m-muted); margin-top: 4px; }
.badge-exists, .badge-new { font-size: 0.65rem; font-weight: 700; padding: 3px 9px; border-radius: 6px; display: inline-flex; align-items: center; gap: 4px; margin-top: 6px; }
.badge-exists { background: rgba(226,74,74,0.1); color: var(--m-red); border: 1px solid rgba(226,74,74,0.3); }
.badge-new { background: rgba(61,223,160,0.1); color: #2cc48b; border: 1px solid rgba(61,223,160,0.3); }
.import-check { width: 22px; height: 22px; accent-color: var(--m-blue); }
.modal-actions { display: flex; gap: 10px; margin-top: 20px; }

/* ---------- RESPONSIVE ---------- */
@media (max-width: 640px) {
  :root { --nav-h: 64px; }
  body { padding: 12px 8px calc(var(--nav-h) + 16px); }
  .section { padding: 16px; }
  .card { padding: 16px; }
  .btn { min-height: 50px; padding: 14px 16px; font-size: 0.9rem; }
  .btn-icon { width: 44px; height: 44px; min-width: 44px; min-height: 44px; }
  input, select, textarea { font-size: 16px; padding: 13px 14px; }
  .list-item { padding: 12px; }
  .qty-big { font-size: 1.5rem; }
  .catalog-card { padding: 12px 14px; }
  .catalog-name { font-size: 0.9rem; }
}
@media (max-width: 480px) {
  .list-item { padding: 10px; }
  .qty-big { font-size: 1.3rem; }
  .item-name { font-size: 0.85rem; }
  .btn-icon { width: 40px; height: 40px; min-width: 40px; min-height: 40px; }
}
@media (max-width: 360px) {
  .list-item { padding: 8px; }
  .qty-big { font-size: 1.1rem; }
}
</style>

<div id="toast-container"></div>
<div class="app-shell">
  <header>
    <div class="header-inner">
      <button class="icon-btn" onclick="window.parent.closeIframe('iframe_course_lines')">✕</button>
      <div class="header-actions">
        <button class="btn-ghost accent-ghost" onclick="exportTXT()"><i class="fa-solid fa-copy"></i> <span>COPIER</span></button>

    </div>
    <div id="shopping-tabs" class="tab-strip" style="display:none;">

      <div class="tab" id="tab-done" onclick="setMode('done')">PANIER <span class="badge" id="cnt-done">0</span></div>

  <div id="section-viewport">

        </div>
        <div class="card-body">
          <div class="row" style="margin-bottom:12px;">
            <div class="field-group" style="flex:2; margin:0">
              <div class="field-label">Fiche technique</div>
              <select id="prod-select"></select>
            </div>
            <div class="field-group" style="flex:1; margin:0">
              <div class="field-label">Quantité</div>
              <input type="number" id="prod-qty" value="1" min="1">

          </div>
          <div style="display:flex; align-items:center; gap:10px; margin-bottom:12px;">
            <div id="prod-cost-preview" style="display:none; flex:1;">
              <span class="cost-pill"><i class="fa-solid fa-euro-sign"></i> Coût estimé : <strong id="prod-cost-val">0.00 €</strong></span>

        <div class="card-body">
          <div class="field-group">
            <div class="field-label">Nom de l'article</div>
            <input type="text" id="s-name" placeholder="ex: Sel fin">
          </div>
          <div class="row wrap-mobile" style="margin-bottom:12px;">
            <div>
              <div class="field-label">Quantité</div>
              <input type="number" id="s-qty" placeholder="0" min="0" step="0.001">

            <div>
              <div class="field-label">Unité</div>

            <div>
              <div class="field-label">Rayon</div>
              <select id="s-cat">
                <option>Fruits &amp; Légumes</option><option>Viandes</option><option>Poissons</option>
                <option>Épicerie salée</option><option>Épicerie sucrée</option><option>Liquides</option>

    <div id="sec-list" class="section">

            <button class="btn-export-list" onclick="document.getElementById('import-list-file').click()" title="Importer une liste"><i class="fa-solid fa-download"></i></button>
            <input type="file" id="import-list-file" accept=".json" style="display:none" onchange="importListJSON(this)">

    <div id="sec-labo" class="section">
      <div class="card collapsed" id="card-create-recipe">
        <div class="card-title" onclick="toggleCard(this)">
          <div class="title-left"><i class="fa-solid fa-flask"></i> <span id="labo-title">Créer une Fiche</span></div>
          <i class="fa-solid fa-chevron-down toggle-icon"></i>

          <div class="field-group">
            <div class="field-label">Nom de la recette</div>
            <input type="text" id="recipe-name" placeholder="ex: Burger Signature">
          </div>
          <div id="recipe-rows"></div>
          <div id="recipe-total-cost" class="cost-pill" style="display:none; margin-bottom:14px;"><i class="fa-solid fa-coins"></i> </div>
          <div class="row" style="margin-bottom:14px;">
            <button class="btn btn-neutral" onclick="addRow()"><i class="fa-solid fa-plus"></i> Ajouter un ingrédient</button>
          </div>

            <button class="btn btn-success" onclick="saveRecipe()"><i class="fa-solid fa-floppy-disk"></i> ENREGISTRER</button>
            <button class="btn btn-danger" id="btn-cancel" style="display:none;" onclick="cancelEdit()">ANNULER</button>
          </div>
        </div>

  <nav class="bottom-nav">

<script>
const DEFAULT_CATEGORIES = [
  'Fruits & Légumes','Viandes','Poissons','Produits frais',
  'Épicerie salée','Épicerie sucrée','Liquides','Surgelés','Autre'
];

let state = {
  view: 'prod',
  listMode: 'todo',
  editingId: null,
  sessions: {},
  currentSessionId: null,
  recipes: [
    {
      id: 1, name: 'OVNI Burger',
      ingredients: [
        { name: 'Pain brioche', qty: 1, unit: 'pièce', cat: 'Épicerie salée', price: 0.35 },
        { name: 'Steak haché', qty: 180, unit: 'g', cat: 'Viandes', price: 1.20 },
        { name: 'Cheddar', qty: 30, unit: 'g', cat: 'Produits frais', price: 0.40 },
        { name: 'Laitue', qty: 20, unit: 'g', cat: 'Fruits & Légumes', price: 0.08 },
        { name: 'Tomate', qty: 50, unit: 'g', cat: 'Fruits & Légumes', price: 0.15 },
      ]
    }
  ],
  categoryOrder: [...DEFAULT_CATEGORIES]
};

/* ---------- helper functions ---------- */
function toggleCard(titleElement) {
  const card = titleElement.closest('.card');
  if (card) card.classList.toggle('collapsed');
}

function currentSession() {
  if (!state.currentSessionId || !state.sessions[state.currentSessionId]) {
    const id = 'default_' + Date.now();
    state.sessions[id] = { id, name: 'Liste principale', recipes: {}, singles: 0, totalCost: 0, list: [] };
    state.currentSessionId = id;
  }
  return state.sessions[state.currentSessionId];
}

function createNewSession() {
  let name = prompt('Nom de la nouvelle liste :', 'Courses ' + (Object.keys(state.sessions).length+1));
  if (!name) return;
  const id = 'sess_' + Date.now();
  state.sessions[id] = { id, name, recipes: {}, singles: 0, totalCost: 0, list: [] };
  state.currentSessionId = id;
  saveState(); renderSessionSelector(); render();
  toast(`Liste "${name}" créée`);
}

function renameCurrentSession() {
  const sess = currentSession();
  const newName = prompt('Nouveau nom :', sess.name);
  if (newName && newName.trim()) {
    sess.name = newName.trim();
    saveState(); renderSessionSelector(); render();
    toast('Liste renommée');
  }
}

function deleteCurrentSession() {
  if (Object.keys(state.sessions).length <= 1) { toast('Impossible de supprimer la seule liste restante', 'error'); return; }
  const sess = currentSession();
  if (confirm(`Supprimer définitivement la liste "${sess.name}" ?`)) {
    delete state.sessions[state.currentSessionId];
    state.currentSessionId = Object.keys(state.sessions)[0];
    saveState(); renderSessionSelector(); render();
    toast(`Liste supprimée`);
  }
}

function selectSession(id) {
  if (state.sessions[id]) { state.currentSessionId = id; saveState(); render(); }
}

function renderSessionSelector() {
  const selProd = document.getElementById('session-select-prod');
  const activeNameSpan = document.getElementById('active-session-name');
  if (selProd) {
    const curId = state.currentSessionId;
    selProd.innerHTML = Object.values(state.sessions).map(s => `<option value="${s.id}" ${s.id === curId ? 'selected' : ''}>${escapeHtml(s.name)}</option>`).join('');
    selProd.onchange = (e) => selectSession(e.target.value);
  }
  if (activeNameSpan && currentSession()) activeNameSpan.innerText = currentSession().name;
}

function loadState() {
  try {
    const saved = localStorage.getItem('ovni_v9');
    if (saved) {
      const parsed = JSON.parse(saved);
      state = { ...state, ...parsed };
      if (!state.categoryOrder || !state.categoryOrder.length) state.categoryOrder = [...DEFAULT_CATEGORIES];
      if (!state.sessions || Object.keys(state.sessions).length === 0) {
        const oldList = state.list || [];
        const oldSession = state.session || { recipes: {}, singles: 0, totalCost: 0 };
        const newId = 'sess_' + Date.now();
        state.sessions = { [newId]: { id: newId, name: 'Liste principale', recipes: oldSession.recipes, singles: oldSession.singles, totalCost: oldSession.totalCost, list: oldList } };
        state.currentSessionId = newId;
        delete state.list; delete state.session;
      }
      if (!state.currentSessionId || !state.sessions[state.currentSessionId]) state.currentSessionId = Object.keys(state.sessions)[0];
    } else {
      const defaultId = 'sess_default';
      state.sessions = { [defaultId]: { id: defaultId, name: 'Liste principale', recipes: {}, singles: 0, totalCost: 0, list: [] } };
      state.currentSessionId = defaultId;
    }
  } catch(e) { console.warn('Load error', e); }
}

function saveState() {
  const toStore = { view: state.view, listMode: state.listMode, editingId: state.editingId, sessions: state.sessions, currentSessionId: state.currentSessionId, recipes: state.recipes, categoryOrder: state.categoryOrder };
  try { localStorage.setItem('ovni_v9', JSON.stringify(toStore)); } catch(e) {}
  render();
}

function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  const icons = { success: 'fa-check-circle', error: 'fa-triangle-exclamation', info: 'fa-info-circle' };
  el.innerHTML = `<i class="fa-solid ${icons[type] || icons.success}"></i>${msg}`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => { el.classList.add('hide'); setTimeout(() => el.remove(), 400); }, 2200);
}

function switchView(v) {
  if (v === state.view) return;
  const oldSec = document.getElementById('sec-' + state.view);
  const newSec = document.getElementById('sec-' + v);
  oldSec.classList.remove('active');
  oldSec.style.opacity = ''; oldSec.style.transition = '';
  newSec.classList.add('active');
  newSec.style.opacity = '0'; newSec.style.transition = 'opacity 0.15s ease';
  requestAnimationFrame(() => {
    newSec.style.opacity = '1';
    setTimeout(() => { newSec.style.opacity = ''; newSec.style.transition = ''; }, 160);
  });
  state.view = v;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('nav-' + v).classList.add('active');
  document.getElementById('shopping-tabs').style.display = v === 'list' ? 'flex' : 'none';
  render();
}

function setMode(m) {
  state.listMode = m;
  ['todo','done','sort'].forEach(id => { const el = document.getElementById('tab-' + id); if (el) el.classList.toggle('active', id === m); });
  render();
}

function addProduction() {
  const name = document.getElementById('prod-select').value;
  const qty = parseInt(document.getElementById('prod-qty').value);
  if (!name) return toast('Sélectionne une fiche', 'error');
  if (!qty || qty <= 0) return toast('Quantité invalide', 'error');
  const recipe = state.recipes.find(r => r.name === name);
  if (!recipe) return;
  const sess = currentSession();
  sess.recipes[name] = (sess.recipes[name] || 0) + qty;
  const batchCost = recipeUnitCost(recipe) * qty;
  recipe.ingredients.forEach(ing => {
    const exist = sess.list.find(i => i.name === ing.name && i.unit === ing.unit);
    if (exist) { exist.qty = parseFloat((exist.qty + ing.qty * qty).toFixed(4)); exist.done = false; }
    else sess.list.push({ ...ing, qty: parseFloat((ing.qty * qty).toFixed(4)), done: false });
  });
  sess.totalCost = (sess.totalCost || 0) + batchCost;
  saveState();
  toast(`${qty}× ${name} ajouté à "${sess.name}" ✓`);
}

function addSingle() {
  const name = document.getElementById('s-name').value.trim();
  const qty = parseFloat(document.getElementById('s-qty').value);
  const unit = document.getElementById('s-unit').value;
  const cat = document.getElementById('s-cat').value;
  if (!name) return toast('Nom requis', 'error');
  if (isNaN(qty) || qty <= 0) return toast('Quantité invalide', 'error');
  const sess = currentSession();
  sess.singles = (sess.singles || 0) + 1;
  const exist = sess.list.find(i => i.name.toLowerCase() === name.toLowerCase() && i.unit === unit);
  if (exist) { exist.qty = parseFloat((exist.qty + qty).toFixed(4)); exist.done = false; }
  else sess.list.push({ name, qty, unit, cat, done: false });
  document.getElementById('s-name').value = '';
  document.getElementById('s-qty').value = '';
  saveState();
  toast(`${name} ajouté à "${sess.name}"`);
}

function resetSession() {
  const sess = currentSession();
  if (!confirm(`Vider toute la liste "${sess.name}" ?`)) return;
  sess.list = []; sess.recipes = {}; sess.singles = 0; sess.totalCost = 0;
  saveState(); toast('Liste réinitialisée', 'info');
}

function toggleItem(name, unit) {
  const sess = currentSession();
  const item = sess.list.find(i => i.name === name && i.unit === unit);
  if (item) { item.done = !item.done; saveState(); }
}

function delItem(name, unit) {
  const sess = currentSession();
  sess.list = sess.list.filter(i => !(i.name === name && i.unit === unit));
  saveState(); toast('Article supprimé', 'info');
}

function toggleRow(header) { header.closest('.recipe-card').classList.toggle('collapsed'); }

function addRow(data = {}) {
  document.querySelectorAll('.recipe-card').forEach(c => c.classList.add('collapsed'));
  const cats = DEFAULT_CATEGORIES;
  const units = ['kg','g','L','cl','ml','pièce','boîte','sachet','botte','tranche','portion','dose'];
  const catOpts = cats.map(c => `<option value="${c}" ${data.cat === c ? 'selected' : ''}>${c}</option>`).join('');
  const unitOpts = units.map(u => `<option value="${u}" ${data.unit === u ? 'selected' : ''}>${u}</option>`).join('');
  const div = document.createElement('div');
  div.className = 'recipe-card';
  div.innerHTML = `<div class="recipe-card-header" onclick="toggleRow(this)"><i class="fa-solid fa-chevron-down toggle-icon"></i><div class="ac-wrapper" style="flex:1" onclick="event.stopPropagation()"><input type="text" class="in-n" placeholder="Nom de l'ingrédient" value="${escapeHtml(data.name||'')}" oninput="handleAC(this); updateRowCost(this)"><div class="ac-box"></div></div><button class="btn-del-row" onclick="event.stopPropagation(); this.closest('.recipe-card').remove(); updateRecipeTotalCost()">×</button></div><div class="recipe-card-grid"><div class="field-sub"><label>Quantité</label><input type="number" class="in-q" placeholder="0" step="0.001" min="0" value="${data.qty||''}" oninput="updateRowCost(this)"></div><div class="field-sub"><label>Unité</label><select class="in-u">${unitOpts}</select></div><div class="field-sub"><label>Rayon</label><select class="in-c">${catOpts}</select></div><div class="field-sub"><label>Prix (€)</label><input type="number" class="in-p" placeholder="0.00" step="0.001" min="0" value="${data.price != null && data.price > 0 ? data.price : ''}" oninput="updateRowCost(this)"></div></div><div class="ing-cost-line"><span style="font-size:0.64rem;color:var(--m-muted)">Coût de cet ingrédient</span><span class="ing-cost-preview">—</span></div>`;
  document.getElementById('recipe-rows').prepend(div);
  updateRowCost(div.querySelector('.in-q'));
}

function handleAC(input) {
  const val = input.value.toLowerCase().trim();
  const box = input.nextElementSibling;
  if (val.length < 1) { box.style.display = 'none'; return; }
  const known = [];
  state.recipes.forEach(r => r.ingredients.forEach(i => { if (!known.find(k => k.name.toLowerCase() === i.name.toLowerCase())) known.push(i); }));
  const matches = known.filter(i => i.name.toLowerCase().includes(val)).slice(0, 5);
  if (matches.length) {
    box.innerHTML = matches.map(m => `<div class="ac-item" onclick="selectAC(this,'${escapeAttr(m.name)}','${escapeAttr(m.unit)}','${escapeAttr(m.cat)}')">${escapeHtml(m.name)}<span>${m.unit} · ${m.cat}</span></div>`).join('');
    box.style.display = 'block';
  } else { box.style.display = 'none'; }
}

function updateRowCost(input) {
  const card = input.closest('.recipe-card');
  if (!card) return;
  const price = parseFloat(card.querySelector('.in-p').value) || 0;
  const preview = card.querySelector('.ing-cost-preview');
  if (price > 0) { preview.textContent = `${price.toFixed(2)} €`; preview.style.color = 'var(--m-gold)'; }
  else { preview.textContent = '—'; preview.style.color = 'var(--m-muted)'; }
  updateRecipeTotalCost();
}

function updateRecipeTotalCost() {
  let total = 0;
  document.querySelectorAll('.recipe-card').forEach(card => { total += parseFloat(card.querySelector('.in-p').value) || 0; });
  const el = document.getElementById('recipe-total-cost');
  if (el) { if (total > 0) { el.innerHTML = `<i class="fa-solid fa-coins"></i> Coût total fiche : ${total.toFixed(2)} €`; el.style.display = 'inline-flex'; } else { el.style.display = 'none'; } }
}

function selectAC(el, n, u, c) {
  const card = el.closest('.recipe-card');
  card.querySelector('.in-n').value = n;
  const unitSel = card.querySelector('.in-u');
  const opt = [...unitSel.options].find(o => o.value === u);
  if (opt) unitSel.value = u;
  card.querySelector('.in-c').value = c;
  el.closest('.ac-box').style.display = 'none';
  updateRowCost(card.querySelector('.in-q'));
}
document.addEventListener('click', e => { if (!e.target.closest('.ac-wrapper')) document.querySelectorAll('.ac-box').forEach(b => b.style.display = 'none'); });

function saveRecipe() {
  const name = document.getElementById('recipe-name').value.trim();
  if (!name) return toast('Nom de fiche requis', 'error');
  const dupCheck = state.recipes.find(r => r.name.toLowerCase() === name.toLowerCase() && r.id !== state.editingId);
  if (dupCheck) return toast('Ce nom existe déjà', 'error');
  const ings = []; let valid = true;
  document.querySelectorAll('.recipe-card').forEach(row => {
    const n = row.querySelector('.in-n').value.trim();
    const q = parseFloat(row.querySelector('.in-q').value);
    const p = parseFloat(row.querySelector('.in-p').value) || 0;
    if (!n || isNaN(q) || q <= 0) { valid = false; return; }
    ings.push({ name: n, qty: q, unit: row.querySelector('.in-u').value, cat: row.querySelector('.in-c').value, price: p });
  });
  if (!valid) return toast('Vérifie les ingrédients (nom & quantité)', 'error');
  if (!ings.length) return toast('Ajoute au moins un ingrédient', 'error');
  if (state.editingId) {
    const idx = state.recipes.findIndex(r => r.id === state.editingId);
    state.recipes[idx] = { id: state.editingId, name, ingredients: ings };
    toast(`${name} mis à jour`);
  } else {
    state.recipes.push({ id: Date.now(), name, ingredients: ings });
    toast(`${name} créé ✓`);
  }
  cancelEdit(); saveState();
}

function editRecipe(id) {
  const r = state.recipes.find(x => x.id === id);
  if (!r) return;
  state.editingId = id;
  document.getElementById('recipe-name').value = r.name;
  document.getElementById('recipe-rows').innerHTML = '';
  r.ingredients.slice().reverse().forEach(i => addRow(i));
  document.getElementById('labo-title').textContent = `Modifier : ${r.name}`;
  document.getElementById('btn-cancel').style.display = '';
  const createCard = document.getElementById('card-create-recipe');
  if (createCard.classList.contains('collapsed')) createCard.classList.remove('collapsed');
  document.getElementById('sec-labo').scrollIntoView({ behavior: 'smooth' });
}

function deleteRecipe(id) {
  if (!confirm('Supprimer cette fiche ?')) return;
  state.recipes = state.recipes.filter(r => r.id !== id);
  toast('Fiche supprimée', 'info'); saveState();
}

function exportRecipe(id) {
  const recipe = state.recipes.find(r => r.id === id);
  if (!recipe) return;
  const exportData = { name: recipe.name, ingredients: recipe.ingredients.map(i => ({ name: i.name, qty: i.qty, unit: i.unit, cat: i.cat, price: i.price })) };

function cancelEdit() {

let dragSrc = null;
function buildSortView() {
  const sess = currentSession();
  const container = document.getElementById('list-display');
  container.innerHTML = '';
  const header = document.createElement('div');
  header.innerHTML = `<div style="font-size:0.75rem;color:var(--m-soft);margin-bottom:14px;padding:0 4px;"><i class="fa-solid fa-info-circle" style="color:var(--m-blue)"></i> Glisse pour réorganiser les rayons</div>`;
  container.appendChild(header);
  const listCats = [...new Set(sess.list.map(i => i.cat))];
  const allCats = [...new Set([...state.categoryOrder, ...listCats, ...DEFAULT_CATEGORIES])];
  allCats.forEach(cat => {
    const div = document.createElement('div'); div.className = 'sortable-category'; div.draggable = true; div.dataset.cat = cat;
    const count = sess.list.filter(i => i.cat === cat).length;
    div.innerHTML = `<span class="drag-handle"><i class="fa-solid fa-grip-lines"></i></span><span style="flex:1; font-weight:700; font-size:0.9rem;">${escapeHtml(cat)}</span>${count ? `<span style="font-size:0.7rem;color:var(--m-muted);">${count} article${count>1?'s':''}</span>` : ''}`;
    div.addEventListener('dragstart', () => { dragSrc = div; div.style.opacity = '0.4'; });
    div.addEventListener('dragend', () => { div.style.opacity = '1'; dragSrc = null; });
    div.addEventListener('dragover', e => { e.preventDefault(); div.classList.add('drag-over'); });
    div.addEventListener('dragleave', () => div.classList.remove('drag-over'));
    div.addEventListener('drop', e => {
      e.preventDefault(); div.classList.remove('drag-over');
      if (dragSrc && dragSrc !== div) {
        const rows = [...container.querySelectorAll('.sortable-category')];
        const dstIdx = rows.indexOf(div);
        const newOrder = allCats.filter(c => c !== dragSrc.dataset.cat);
        newOrder.splice(dstIdx, 0, dragSrc.dataset.cat);
        state.categoryOrder = newOrder; saveState();
      }
    });
    container.appendChild(div);
  });
}

function convertToKgAndCeil(qty, unit) {
  const INTEGER_UNITS = ['pièce','boîte','sachet','portion','botte','tranche','dose'];
  let value = qty, displayUnit = unit;
  if (unit === 'g') { value = qty / 1000; displayUnit = 'kg'; }
  else if (unit === 'kg') { value = qty; displayUnit = 'kg'; }
  else if (unit === 'L' || unit === 'cl' || unit === 'ml') {
    if (unit === 'cl') value = qty / 100; else if (unit === 'ml') value = qty / 1000;
    displayUnit = 'L';
  } else { displayUnit = unit; }
  const ceiled = Math.ceil(value * 100) / 100;
  return { value: ceiled, unit: displayUnit, isInteger: INTEGER_UNITS.includes(unit) };
}

function hashCode(str) { let hash = 0; for (let i = 0; i < str.length; i++) { hash = ((hash << 5) - hash) + str.charCodeAt(i); hash |= 0; } return Math.abs(hash); }
function recipeColor(recipeName) { return `hsl(${hashCode(recipeName) % 360}, 70%, 65%)`; }
function recipeUnitCost(recipe) { return recipe.ingredients.reduce((sum, i) => sum + (i.price || 0), 0); }
function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escapeAttr(s) { return String(s).replace(/'/g, "\\'"); }
function escapeFilename(s) { return String(s).replace(/[^a-zA-Z0-9_\-À-ÿ]/g, '_').substring(0, 40); }
function dateStr() { const d = new Date(); return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`; }

function exportJSON() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `ovni_backup_${dateStr()}.json`; a.click();
  toast('JSON exporté', 'info');
}

function exportTXT() {
  const sess = currentSession();
  if (!sess.list.length) return toast('La liste est vide', 'error');

  let txt = `🛒 Liste de courses : ${sess.name}\n\n`;
  const prodEntries = Object.entries(sess.recipes);
  if (prodEntries.length) {
    txt += `Productions :\n`;
    prodEntries.forEach(([name, qty]) => { txt += `    ${qty}× ${name}\n`; });
    txt += `\n`;
  }
  if (sess.totalCost > 0) {
    const formattedCost = sess.totalCost.toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    txt += `Coût total estimé : ${formattedCost} €\n\n`;
  }

  const grouped = {};
  sess.list.forEach(item => {
    if (!grouped[item.cat]) grouped[item.cat] = [];
    const existing = grouped[item.cat].find(i => i.name === item.name && i.unit === item.unit);
    if (existing) { existing.qty += item.qty; }
    else { grouped[item.cat].push({ name: item.name, qty: item.qty, unit: item.unit }); }
  });
  const ordered = state.categoryOrder.filter(c => grouped[c]).concat(Object.keys(grouped).filter(c => !state.categoryOrder.includes(c)));
  ordered.forEach(cat => {
    if (!grouped[cat]) return;
    txt += `${cat}\n`;
    grouped[cat].forEach(item => {
      const conv = convertToKgAndCeil(item.qty, item.unit);
      let displayQty;
      if (conv.isInteger) { displayQty = Math.ceil(conv.value).toLocaleString('fr-FR'); }
      else { displayQty = conv.value.toLocaleString('fr-FR', { minimumFractionDigits: 1, maximumFractionDigits: 2 }); }
      txt += `    ${item.name} : ${displayQty} ${conv.unit}\n`;
    });
    txt += `\n`;
  });

  navigator.clipboard.writeText(txt).then(() => {
    toast('Liste copiée dans le presse-papier ✓');
  }).catch(() => {
    toast('Erreur lors de la copie', 'error');
  });
}

/* ---------- recipe import ---------- */
function handleImportFile(input) { const file = input.files[0]; if (!file) return; readImportFile(file); input.value = ''; }
function readImportFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      const recipes = parseImportedRecipes(data);
      if (!recipes.length) { toast('Aucune fiche valide trouvée', 'error'); return; }
      showImportModal(recipes);
    } catch(err) { toast('Fichier JSON invalide', 'error'); }
  };
  reader.readAsText(file);
}
function parseImportedRecipes(data) {
  let candidates = [];
  if (data && Array.isArray(data.recipes)) candidates = data.recipes;
  else if (Array.isArray(data)) candidates = data;
  else if (data && typeof data === 'object' && data.name && Array.isArray(data.ingredients)) candidates = [data];
  return candidates.filter(r => r && typeof r.name === 'string' && r.name.trim() && Array.isArray(r.ingredients) && r.ingredients.length > 0).map(r => ({ id: r.id || Date.now() + Math.random(), name: r.name.trim(), ingredients: r.ingredients.map(i => ({ name: i.name || '', qty: parseFloat(i.qty) || 0, unit: i.unit || 'pièce', cat: i.cat || 'Autre', price: parseFloat(i.price) || 0 })).filter(i => i.name && i.qty > 0) })).filter(r => r.ingredients.length > 0);
}
function showImportModal(recipes) {
  const existingNames = new Set(state.recipes.map(r => r.name.toLowerCase()));
  const itemsHtml = recipes.map((r, idx) => {
    const cost = r.ingredients.reduce((s, i) => s + (i.price || 0), 0);
    const costText = cost > 0 ? ` · ${cost.toFixed(2)} €` : '';
    const exists = existingNames.has(r.name.toLowerCase());
    const badge = exists ? `<span class="badge-exists"><i class="fa-solid fa-triangle-exclamation"></i> Existe déjà</span>` : `<span class="badge-new"><i class="fa-solid fa-plus"></i> Nouveau</span>`;
    return `<label class="import-recipe-item"><input type="checkbox" class="import-check" data-idx="${idx}" ${exists ? '' : 'checked'}><div class="info"><div class="name">${escapeHtml(r.name)}</div><div class="meta">${r.ingredients.length} ingrédient${r.ingredients.length>1?'s':''}${costText}</div><div>${badge}</div></div></label>`;
  }).join('');
  const modal = document.createElement('div'); modal.className = 'modal-overlay'; modal.id = 'import-modal';
  modal.innerHTML = `<div class="modal-sheet"><div class="modal-handle"></div><div class="modal-title"><i class="fa-solid fa-file-import" style="color:var(--m-blue);margin-right:8px;"></i>${recipes.length} fiche${recipes.length>1?'s':''} détectée${recipes.length>1?'s':''}</div><div class="modal-sub">Sélectionne les fiches à importer. Les fiches existantes seront <strong style="color:var(--m-red)">écrasées</strong> si cochées.</div><div id="import-list">${itemsHtml}</div><div class="modal-actions"><button class="btn btn-neutral" onclick="closeImportModal()">Annuler</button><button class="btn btn-success" id="confirm-import-btn">Importer la sélection</button></div></div>`;
  modal.addEventListener('click', e => { if (e.target === modal) closeImportModal(); });
  document.body.appendChild(modal);
  document.getElementById('confirm-import-btn').onclick = () => confirmImport(recipes);
}
function confirmImport(recipes) {
  const checks = document.querySelectorAll('#import-modal .import-check');
  const selectedIndices = []; checks.forEach(cb => { if (cb.checked) selectedIndices.push(parseInt(cb.dataset.idx)); });
  if (selectedIndices.length === 0) { toast('Aucune fiche sélectionnée', 'error'); return; }
  let added = 0, replaced = 0;
  selectedIndices.forEach(idx => {
    const r = recipes[idx];
    const existingIdx = state.recipes.findIndex(x => x.name.toLowerCase() === r.name.toLowerCase());
    if (existingIdx >= 0) { state.recipes[existingIdx] = { ...r, id: state.recipes[existingIdx].id }; replaced++; }
    else { state.recipes.push({ ...r, id: Date.now() + Math.random() }); added++; }
  });
  closeImportModal(); saveState();
  const msgParts = []; if (added) msgParts.push(`${added} ajoutée${added>1?'s':''}`); if (replaced) msgParts.push(`${replaced} mise${replaced>1?'s':''} à jour`);
  toast(msgParts.join(', ') + ' ✓', 'success');
}
function closeImportModal() { const modal = document.getElementById('import-modal'); if (modal) modal.remove(); }

/* ---------- list import/export ---------- */
function exportListJSON() {
  const sess = currentSession();
  if (!sess.list.length) return toast('La liste est vide', 'error');
  const exportData = { _type: 'ovni_liste', name: sess.name, exportedAt: new Date().toISOString(), recipes: sess.recipes, singles: sess.singles, totalCost: sess.totalCost, list: sess.list };
  const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `liste_courses_${escapeFilename(sess.name)}_${dateStr()}.json`; a.click();
  toast('Liste exportée ✓', 'info');
}

function importListJSON(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      const list = data.list || (Array.isArray(data) ? data : null);
      if (!list || !Array.isArray(list)) { toast('Format de liste invalide', 'error'); return; }
      showListImportModal(data, list);
    } catch(err) { toast('Fichier JSON invalide', 'error'); }
  };
  reader.readAsText(file);
  input.value = '';
}

function showListImportModal(data, list) {
  const sess = currentSession();
  const hasExisting = sess.list.length > 0;
  const sourceName = data.name ? escapeHtml(data.name) : 'Fichier importé';
  const itemCount = list.length;
  const modal = document.createElement('div'); modal.className = 'modal-overlay'; modal.id = 'list-import-modal';
  modal.innerHTML = `<div class="modal-sheet"><div class="modal-handle"></div><div class="modal-title"><i class="fa-solid fa-arrow-down-to-bracket" style="color:var(--m-blue);margin-right:8px;"></i>Importer une liste</div><div class="modal-sub">Source : <strong>${sourceName}</strong> · ${itemCount} article${itemCount>1?'s':''}<br>Comment fusionner avec la liste actuelle ?</div>${hasExisting ? `<div style="display:flex;flex-direction:column;gap:10px;"><label style="display:flex;align-items:center;gap:12px;background:var(--m-surface);border:1px solid var(--m-border);border-radius:14px;padding:14px 16px;cursor:pointer;"><input type="radio" name="import-mode" value="merge" checked style="width:20px;height:20px;accent-color:var(--m-blue);"><div><div style="font-weight:700;font-size:0.9rem;">Fusionner</div><div style="font-size:0.72rem;color:var(--m-soft);margin-top:4px;">Additionne les quantités identiques, ajoute les nouveaux articles</div></div></label><label style="display:flex;align-items:center;gap:12px;background:var(--m-surface);border:1px solid var(--m-border);border-radius:14px;padding:14px 16px;cursor:pointer;"><input type="radio" name="import-mode" value="replace" style="width:20px;height:20px;accent-color:var(--m-red);"><div><div style="font-weight:700;font-size:0.9rem;">Remplacer</div><div style="font-size:0.72rem;color:var(--m-soft);margin-top:4px;">Vide la liste actuelle et importe uniquement ce fichier</div></div></label></div>` : `<div style="background:rgba(74,120,226,0.08);border:1px solid rgba(74,120,226,0.2);border-radius:14px;padding:14px 16px;font-size:0.85rem;color:var(--m-blue);">La liste est vide — les articles seront simplement ajoutés.</div>`}<div class="modal-actions"><button class="btn btn-neutral" onclick="closeListImportModal()">Annuler</button><button class="btn btn-primary" id="confirm-list-import-btn"><i class="fa-solid fa-check"></i> Importer</button></div></div>`;
  modal.addEventListener('click', e => { if (e.target === modal) closeListImportModal(); });
  document.body.appendChild(modal);
  document.getElementById('confirm-list-import-btn').onclick = () => confirmListImport(data, list);
}

function confirmListImport(data, list) {
  const mode = document.querySelector('input[name="import-mode"]:checked')?.value || 'merge';
  const sess = currentSession();
  if (mode === 'replace') {
    sess.list = list.map(i => ({ ...i, done: false }));
    sess.recipes = data.recipes || {}; sess.singles = data.singles || 0; sess.totalCost = data.totalCost || 0;
    toast(`${list.length} articles importés ✓`);
  } else {
    let added = 0, merged = 0;
    list.forEach(item => {
      const exist = sess.list.find(i => i.name.toLowerCase() === item.name.toLowerCase() && i.unit === item.unit);
      if (exist) { exist.qty = parseFloat((exist.qty + item.qty).toFixed(4)); exist.done = false; merged++; }
      else { sess.list.push({ ...item, done: false }); added++; }
    });
    if (data.recipes) { for (const [n, q] of Object.entries(data.recipes)) sess.recipes[n] = (sess.recipes[n] || 0) + q; }
    sess.totalCost = (sess.totalCost || 0) + (data.totalCost || 0);
    const parts = []; if (added) parts.push(`${added} ajouté${added>1?'s':''}`); if (merged) parts.push(`${merged} fusionné${merged>1?'s':''}`);
    toast(parts.join(', ') + ' ✓');
  }
  closeListImportModal(); saveState();
}
function closeListImportModal() { const m = document.getElementById('list-import-modal'); if (m) m.remove(); }

function init() { loadState(); cancelEdit(); render(); }
init();
</script>
</body>
</html>
