<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OVNI CONTROL V9</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Bebas+Neue&display=swap');

:root {
  --bg: #0a0b0f;
  --bg2: #0f1117;
  --surface: #141620;
  --card: #181b26;
  --card2: #1e2233;
  --glass: rgba(24,27,38,0.78);
  --glass2: rgba(30,34,51,0.65);
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.11);
  --border-accent: rgba(255,210,80,0.22);
  --primary: #4f8ef7;
  --primary-glow: rgba(79,142,247,0.20);
  --primary-dim: rgba(79,142,247,0.10);
  --accent: #ffd250;
  --accent-glow: rgba(255,210,80,0.18);
  --accent-dim: rgba(255,210,80,0.10);
  --danger: #ff5e5e;
  --danger-dim: rgba(255,94,94,0.10);
  --success: #3ddfa0;
  --success-dim: rgba(61,223,160,0.10);
  --amber: #ffb340;
  --amber-dim: rgba(255,179,64,0.10);
  --text: #f0f2f8;
  --text-soft: #9098b5;
  --text-muted: #545c7a;
  --font-display: 'Bebas Neue', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --radius: 18px;
  --radius-sm: 12px;
  --radius-xs: 8px;
  --shadow: 0 8px 32px rgba(0,0,0,0.45);
  --shadow-sm: 0 2px 12px rgba(0,0,0,0.30);
  --nav-h: 80px;
  --ease-snap: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: var(--nav-h);
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 70% 55% at 15% -10%, rgba(79,142,247,0.07) 0%, transparent 55%),
    radial-gradient(ellipse 50% 40% at 85% 100%, rgba(255,210,80,0.06) 0%, transparent 50%),
    radial-gradient(ellipse 40% 30% at 50% 50%, rgba(80,227,194,0.03) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}

/* === HEADER === */
header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,11,15,0.90);
  backdrop-filter: blur(24px) saturate(1.4);
  -webkit-backdrop-filter: blur(24px) saturate(1.4);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
}
.header-inner { display: flex; align-items: center; justify-content: space-between; }
.logo {
  font-family: var(--font-display);
  font-size: 1.7rem; letter-spacing: 3px; color: var(--text);
  line-height: 1; display: flex; align-items: baseline; gap: 5px;
}
.logo-accent { color: var(--accent); }
.logo-version {
  font-family: var(--font-body); font-size: 0.52rem; font-weight: 700;
  color: var(--text-muted); letter-spacing: 1px;
  border: 1px solid var(--border2); border-radius: 4px;
  padding: 1px 5px; vertical-align: middle;
}
.header-actions { display: flex; gap: 7px; align-items: center; }
.btn-ghost {
  background: var(--glass2); border: 1px solid var(--border2);
  color: var(--text-soft); padding: 7px 13px; border-radius: 30px;
  font-size: 0.72rem; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  transition: all 0.2s var(--ease-smooth);
  font-family: var(--font-body); backdrop-filter: blur(8px);
}
.btn-ghost:hover { border-color: var(--primary); color: var(--text); background: var(--primary-dim); }
.btn-ghost:active { transform: scale(0.95); }
.btn-ghost.accent-ghost { border-color: var(--border-accent); color: var(--accent); }
.btn-ghost.accent-ghost:hover { background: var(--accent-dim); box-shadow: 0 0 16px var(--accent-glow); }

/* === TAB STRIP === */
.tab-strip {
  display: flex; gap: 4px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 12px; padding: 4px; margin-top: 10px;
}
.tab {
  flex: 1; text-align: center; padding: 9px 6px;
  font-size: 0.7rem; font-weight: 700; letter-spacing: 0.5px;
  border-radius: 9px; cursor: pointer; color: var(--text-muted);
  transition: all 0.25s var(--ease-smooth); user-select: none;
}
.tab:active { transform: scale(0.96); }
.tab.active {
  background: linear-gradient(135deg, #4f8ef7 0%, #3b74d8 100%);
  color: #fff; box-shadow: 0 3px 16px rgba(79,142,247,0.35);
}
.tab .badge {
  display: inline-block; background: rgba(255,255,255,0.22);
  border-radius: 99px; padding: 1px 7px; margin-left: 4px; font-size: 0.63rem;
}

/* === SECTIONS & SLIDE TRANSITIONS === */
.section { display: none; padding: 16px; position: relative; z-index: 1; }
.section.active { display: block; }

.section.slide-in-right  { animation: slideInRight  0.30s var(--ease-smooth) both; }
.section.slide-in-left   { animation: slideInLeft   0.30s var(--ease-smooth) both; }
.section.slide-out-right { animation: slideOutRight 0.22s var(--ease-smooth) both; }
.section.slide-out-left  { animation: slideOutLeft  0.22s var(--ease-smooth) both; }

@keyframes slideInRight  { from { opacity:0; transform:translateX(24px);  } to { opacity:1; transform:none; } }
@keyframes slideInLeft   { from { opacity:0; transform:translateX(-24px); } to { opacity:1; transform:none; } }
@keyframes slideOutRight { from { opacity:1; transform:none; } to { opacity:0; transform:translateX(24px);  } }
@keyframes slideOutLeft  { from { opacity:1; transform:none; } to { opacity:0; transform:translateX(-24px); } }
@keyframes fadeUp        { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }

/* === CARDS === */
.card {
  background: var(--glass); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px; margin-bottom: 14px;
  position: relative; overflow: hidden;
  transition: border-color 0.25s, box-shadow 0.25s;
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
}
.card::before {
  content: ''; position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.09), transparent);
}
.card:hover { border-color: var(--border2); }
.card-title {
  font-size: 0.68rem; font-weight: 700; letter-spacing: 1.8px; text-transform: uppercase;
  color: var(--accent); display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; cursor: pointer; user-select: none;
}
.card-title .title-left { display: flex; align-items: center; gap: 9px; }
.card-title i:first-child { font-size: 0.8rem; opacity: 0.85; }
.card-title .toggle-icon { transition: transform 0.28s var(--ease-smooth); font-size: 0.72rem; color: var(--text-muted); }
.card.collapsed .card-body { display: none; }
.card.collapsed .toggle-icon { transform: rotate(-90deg); }

/* === FORM ELEMENTS === */
.field-group { margin-bottom: 11px; }
.field-label {
  font-size: 0.66rem; color: var(--text-muted); font-weight: 600;
  letter-spacing: 0.7px; margin-bottom: 6px; text-transform: uppercase;
}
input, select, textarea {
  width: 100%; background: rgba(10,11,15,0.6);
  border: 1px solid var(--border2); border-radius: var(--radius-sm);
  color: var(--text); padding: 11px 13px; font-size: 0.9rem;
  font-family: var(--font-body); outline: none;
  transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
}
input::placeholder, textarea::placeholder { color: var(--text-muted); }
input:focus, select:focus, textarea:focus {
  border-color: rgba(79,142,247,0.55);
  box-shadow: 0 0 0 3px rgba(79,142,247,0.10);
  background: rgba(10,11,15,0.88);
}
input.error { border-color: rgba(255,94,94,0.55); box-shadow: 0 0 0 3px var(--danger-dim); }
select { cursor: pointer; }
select option { background: var(--card2); }
.row { display: flex; gap: 9px; }
.row > * { flex: 1; }

/* === BUTTONS === */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 8px; padding: 13px 18px; border: none; border-radius: var(--radius-sm);
  font-family: var(--font-body); font-size: 0.85rem; font-weight: 700;
  cursor: pointer; transition: all 0.18s var(--ease-smooth);
  position: relative; overflow: hidden; letter-spacing: 0.3px; will-change: transform;
}
.btn::after {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle at center, rgba(255,255,255,0.22) 0%, transparent 70%);
  opacity: 0; transition: opacity 0.3s;
}
.btn:active::after { opacity: 1; }
.btn:active { transform: scale(0.96); }
.btn-primary { background: linear-gradient(135deg, #4f8ef7 0%, #3b74d8 100%); color: #fff; width: 100%; box-shadow: 0 4px 18px rgba(79,142,247,0.25); }
.btn-primary:hover { box-shadow: 0 6px 28px rgba(79,142,247,0.40); transform: translateY(-1px); }
.btn-primary:active { transform: scale(0.96) translateY(0); }
.btn-success { background: linear-gradient(135deg, #3ddfa0 0%, #2cc48b 100%); color: #0a1a13; flex: 2; box-shadow: 0 4px 18px rgba(61,223,160,0.20); }
.btn-success:hover { box-shadow: 0 6px 28px rgba(61,223,160,0.35); transform: translateY(-1px); }
.btn-danger { background: linear-gradient(135deg, #ff5e5e 0%, #e04444 100%); color: #fff; box-shadow: 0 4px 18px rgba(255,94,94,0.20); }
.btn-danger:hover { box-shadow: 0 6px 28px rgba(255,94,94,0.35); transform: translateY(-1px); }
.btn-neutral { background: var(--glass2); border: 1px solid var(--border2); color: var(--text-soft); width: 100%; backdrop-filter: blur(8px); }
.btn-neutral:hover { border-color: var(--border-accent); color: var(--text); }
.btn-icon {
  width: 38px; height: 38px; border-radius: 50%; border: none; cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 0.82rem; transition: all 0.18s var(--ease-smooth); will-change: transform;
}
.btn-icon:active { transform: scale(0.88); }
.btn-icon-check { background: var(--success-dim); color: var(--success); border: 1px solid rgba(61,223,160,0.22); }
.btn-icon-check:hover { background: var(--success); color: #0a1a13; box-shadow: 0 0 16px rgba(61,223,160,0.35); }
.btn-icon-trash { background: var(--danger-dim); color: var(--danger); border: 1px solid rgba(255,94,94,0.20); }
.btn-icon-trash:hover { background: var(--danger); color: #fff; box-shadow: 0 0 16px rgba(255,94,94,0.35); }
.btn-icon-edit { background: var(--primary-dim); color: var(--primary); border: 1px solid rgba(79,142,247,0.20); }
.btn-icon-edit:hover { background: var(--primary); color: #fff; box-shadow: 0 0 16px var(--primary-glow); }

/* === SESSION BANNER === */
.session-banner {
  background: linear-gradient(135deg, rgba(20,22,32,0.92), rgba(14,17,28,0.96));
  border: 1px solid var(--border-accent); border-radius: var(--radius);
  padding: 16px 18px; margin-bottom: 14px; position: relative; overflow: hidden;
  backdrop-filter: blur(12px);
}
.session-banner::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: linear-gradient(180deg, var(--primary), var(--accent)); border-radius: 3px;
}
.session-label { font-size: 0.61rem; font-weight: 700; letter-spacing: 1.5px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 7px; }
.session-text { font-size: 0.95rem; font-weight: 700; display: flex; flex-wrap: wrap; gap: 7px; align-items: center; }
.session-text .tag {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--primary-dim); border: 1px solid rgba(79,142,247,0.20);
  color: var(--primary); border-radius: 30px; padding: 4px 12px; font-size: 0.78rem;
}
.session-tag-qty { font-weight: 900; color: var(--accent); }
.session-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; }
.session-cost { font-size: 0.78rem; color: var(--amber); display: flex; align-items: center; gap: 5px; }
.btn-reset {
  background: none; border: 1px solid rgba(255,94,94,0.25); color: var(--danger);
  font-size: 0.68rem; font-weight: 700; cursor: pointer; padding: 5px 10px;
  border-radius: 6px; opacity: 0.75; transition: all 0.18s;
}
.btn-reset:hover { opacity: 1; background: var(--danger-dim); }

/* === SESSION BAR === */
.session-bar {
  background: var(--glass); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 10px 14px; margin-bottom: 14px;
  display: flex; align-items: center; justify-content: space-between;
  font-size: 0.75rem; gap: 8px; flex-wrap: wrap; backdrop-filter: blur(16px);
}
.session-bar-left { display: flex; align-items: center; gap: 8px; color: var(--text-soft); }
.session-bar select {
  background: rgba(10,11,15,0.7); border: 1px solid var(--border2);
  border-radius: 20px; padding: 5px 26px 5px 13px;
  font-size: 0.75rem; font-weight: 600; color: var(--text); cursor: pointer;
}
.session-bar button {
  background: none; border: none; color: var(--text-muted); cursor: pointer;
  font-size: 0.72rem; padding: 5px 8px; border-radius: 8px; transition: all 0.18s;
}
.session-bar button:hover { background: var(--card2); color: var(--text); }
.session-bar .danger-btn:hover { color: var(--danger); }

/* === CATEGORY HEADER === */
.category-header {
  font-size: 0.6rem; font-weight: 800; letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--accent); padding: 14px 2px 7px; display: flex; align-items: center; gap: 10px;
}
.category-header::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--border-accent), transparent); }

/* === LIST ITEMS === */
.list-item {
  display: grid; grid-template-columns: 1fr 74px 86px; align-items: center;
  background: var(--glass); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 13px 14px; margin-bottom: 7px;
  transition: all 0.22s var(--ease-smooth); animation: itemIn 0.3s var(--ease-smooth);
  backdrop-filter: blur(10px); will-change: transform;
}
@keyframes itemIn { from { opacity:0; transform:translateX(-10px); } to { opacity:1; transform:none; } }
.list-item:hover { border-color: var(--border2); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
.list-item.done { opacity: 0.38; }
.list-item.done .item-name { text-decoration: line-through; }
.item-name { font-weight: 600; font-size: 0.92rem; display: inline-block; margin-right: 8px; }
.recipe-dots { display: inline-flex; gap: 4px; align-items: center; }
.recipe-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; box-shadow: 0 0 0 1.5px rgba(255,255,255,0.12); flex-shrink: 0; }
.qty-big { font-family: var(--font-display); font-size: 1.6rem; color: var(--accent); display: block; text-align: center; line-height: 1; letter-spacing: 1px; }
.qty-unit { font-size: 0.6rem; color: var(--text-muted); text-align: center; display: block; margin-top: 1px; }
.item-actions { display: flex; gap: 6px; justify-content: flex-end; align-items: center; }

/* === SORTABLE === */
.sortable-category {
  cursor: grab; display: flex; align-items: center; gap: 10px;
  background: var(--glass); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 7px;
  transition: all 0.2s; user-select: none; backdrop-filter: blur(10px);
}
.sortable-category:hover { border-color: var(--border2); }
.sortable-category.drag-over { border-color: var(--primary); background: var(--primary-dim); box-shadow: 0 0 0 2px rgba(79,142,247,0.20); }
.drag-handle { color: var(--text-muted); font-size: 0.9rem; }

/* === RECIPE CARD (ingredient rows) === */
.recipe-card {
  background: rgba(10,11,15,0.55); border: 1px solid var(--border2);
  border-radius: var(--radius-sm); padding: 12px; margin-bottom: 9px;
  animation: itemIn 0.22s var(--ease-smooth); position: relative; transition: all 0.2s;
}
.recipe-card.collapsed .recipe-card-grid,
.recipe-card.collapsed .ing-cost-line { display: none; }
.recipe-card.collapsed { padding: 9px 12px; background: rgba(10,11,15,0.35); }
.recipe-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; cursor: pointer; }
.recipe-card.collapsed .recipe-card-header { margin-bottom: 0; }
.recipe-card-header .ac-wrapper { flex: 1; }
.recipe-card-header input { margin: 0; font-weight: 600; }
.recipe-card.collapsed .in-n { background: transparent; border-color: transparent; padding-left: 0; font-weight: 600; }
.toggle-icon { width: 24px; font-size: 0.7rem; color: var(--text-muted); transition: transform 0.28s var(--ease-smooth); text-align: center; }
.recipe-card.collapsed .toggle-icon { transform: rotate(-90deg); }
.recipe-card-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 7px; }
.recipe-card-grid .field-sub label { font-size: 0.59rem; color: var(--text-muted); font-weight: 700; letter-spacing: 0.6px; text-transform: uppercase; display: block; margin-bottom: 4px; }
.recipe-card-grid input, .recipe-card-grid select { padding: 8px 10px; font-size: 0.82rem; margin: 0; }
.ing-cost-line { margin-top: 9px; padding-top: 9px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.ing-cost-preview { font-size: 0.72rem; color: var(--amber); font-weight: 700; }
.btn-del-row {
  width: 32px; height: 32px; flex-shrink: 0;
  background: var(--danger-dim); border: 1px solid rgba(255,94,94,0.20);
  color: var(--danger); border-radius: 9px;
  cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center;
  transition: all 0.18s;
}
.btn-del-row:hover { background: var(--danger); color: #fff; transform: scale(1.05); }

/* === AUTOCOMPLETE === */
.ac-wrapper { position: relative; }
.ac-box {
  position: absolute; top: calc(100% + 5px); left: 0; right: 0;
  background: var(--card2); border: 1px solid var(--border2);
  border-radius: var(--radius-sm); z-index: 500; display: none; overflow: hidden;
  box-shadow: var(--shadow);
}
.ac-item { padding: 10px 13px; font-size: 0.83rem; cursor: pointer; transition: background 0.13s; }
.ac-item:hover { background: var(--primary-dim); }
.ac-item span { color: var(--text-muted); font-size: 0.7rem; margin-left: 6px; }

/* === CATALOG === */
.catalog-card {
  background: var(--glass); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 15px 17px; margin-bottom: 10px;
  display: flex; align-items: center; justify-content: space-between;
  transition: all 0.22s var(--ease-smooth); animation: itemIn 0.3s var(--ease-smooth);
  backdrop-filter: blur(12px);
}
.catalog-card:hover { border-color: var(--border-accent); transform: translateX(3px); box-shadow: var(--shadow-sm); }
.catalog-name { font-weight: 700; font-size: 0.95rem; }
.catalog-meta { font-size: 0.7rem; color: var(--text-muted); margin-top: 3px; }
.catalog-cost { font-size: 0.76rem; color: var(--amber); font-weight: 700; margin-top: 4px; display: inline-flex; align-items: center; gap: 4px; }
.catalog-actions { display: flex; gap: 7px; }

/* === SEARCH === */
.search-field { position: relative; margin-bottom: 13px; display: flex; align-items: center; gap: 9px; }
.search-field i:first-child { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 0.85rem; pointer-events: none; }
.search-field input { padding-left: 38px; flex: 1; }
.import-icon-btn {
  background: var(--glass2); border: 1px solid var(--border2);
  border-radius: 40px; width: 44px; height: 40px;
  display: flex; align-items: center; justify-content: center; gap: 4px;
  cursor: pointer; transition: all 0.2s; color: var(--text-soft); font-size: 1rem;
  backdrop-filter: blur(8px);
}
.import-icon-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-dim); }

/* === COST PILL === */
.cost-pill {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--amber-dim); border: 1px solid rgba(255,179,64,0.22);
  border-radius: 99px; padding: 4px 12px; font-size: 0.73rem; font-weight: 700; color: var(--amber);
}

/* === TOAST === */
#toast-container {
  position: fixed; bottom: calc(var(--nav-h) + 12px);
  left: 50%; transform: translateX(-50%);
  z-index: 9999; display: flex; flex-direction: column; align-items: center; gap: 7px;
}
.toast {
  background: rgba(24,27,38,0.96); border: 1px solid var(--border2);
  border-radius: 99px; padding: 10px 20px;
  font-size: 0.81rem; font-weight: 600;
  display: flex; align-items: center; gap: 9px;
  box-shadow: var(--shadow); white-space: nowrap;
  animation: toastIn 0.3s var(--ease-snap); opacity: 1; transition: opacity 0.3s;
  backdrop-filter: blur(20px);
}
.toast.hide { opacity: 0; }
@keyframes toastIn { from { opacity:0; transform:translateY(12px) scale(0.92); } to { opacity:1; transform:none; } }
.toast.success { border-color: rgba(61,223,160,0.35); color: var(--success); }
.toast.error   { border-color: rgba(255,94,94,0.35); color: var(--danger); }
.toast.info    { border-color: rgba(79,142,247,0.35); color: var(--primary); }

/* === BOTTOM NAV === */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: var(--nav-h);
  background: rgba(10,11,15,0.96);
  backdrop-filter: blur(28px) saturate(1.5);
  -webkit-backdrop-filter: blur(28px) saturate(1.5);
  border-top: 1px solid var(--border);
  display: flex;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: var(--text-muted); cursor: pointer;
  font-size: 0.62rem; font-weight: 700; letter-spacing: 0.7px; gap: 5px;
  transition: color 0.2s var(--ease-smooth); position: relative; user-select: none;
}
.nav-item i { font-size: 1.25rem; transition: transform 0.25s var(--ease-snap), color 0.2s; }
.nav-item:active i { transform: scale(0.88) !important; }
.nav-item::before {
  content: ''; position: absolute; top: 0; left: 28%; right: 28%; height: 2px;
  border-radius: 0 0 4px 4px; background: var(--accent);
  transform: scaleX(0); transition: transform 0.28s var(--ease-snap); transform-origin: center;
}
.nav-item.active { color: var(--accent); }
.nav-item.active i { transform: translateY(-2px) scale(1.10); }
.nav-item.active::before { transform: scaleX(1); }
.nav-item.active::after {
  content: ''; position: absolute; top: 10px;
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--accent-dim); z-index: -1;
  animation: navPop 0.3s var(--ease-snap);
}
@keyframes navPop { from { transform:scale(0.3); opacity:0; } to { transform:scale(1); opacity:1; } }
.nav-badge {
  position: absolute; top: 8px; right: calc(25% - 6px);
  background: var(--primary); color: #fff; font-size: 0.54rem; font-weight: 900;
  border-radius: 99px; padding: 2px 5px; min-width: 16px; text-align: center;
  box-shadow: 0 0 10px rgba(79,142,247,0.5); animation: badgePop 0.25s var(--ease-snap);
}
@keyframes badgePop { from { transform:scale(0); } to { transform:scale(1); } }

/* === EMPTY STATES === */
.empty { text-align: center; padding: 48px 20px; color: var(--text-muted); }
.empty i { font-size: 2.6rem; opacity: 0.2; margin-bottom: 14px; display: block; }
.empty p { font-size: 0.85rem; line-height: 1.6; }

/* === MODAL === */
.modal-overlay {
  position: fixed; inset: 0; z-index: 2000;
  background: rgba(0,0,0,0.76); backdrop-filter: blur(8px);
  display: flex; align-items: flex-end; animation: fadeOverlay 0.2s ease;
}
@keyframes fadeOverlay { from { opacity:0 } to { opacity:1 } }
.modal-sheet {
  background: var(--card2); border: 1px solid var(--border2);
  border-radius: 26px 26px 0 0; padding: 14px 18px 42px;
  width: 100%; max-height: 84vh; overflow-y: auto;
  animation: slideUp 0.32s cubic-bezier(.16,1,.3,1);
}
@keyframes slideUp { from { transform: translateY(100%) } to { transform: none } }
.modal-handle { width: 42px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 20px; }
.modal-title { font-family: var(--font-display); font-size: 1.4rem; letter-spacing: 1px; margin-bottom: 5px; }
.modal-sub { font-size: 0.76rem; color: var(--text-muted); margin-bottom: 18px; line-height: 1.55; }
.import-recipe-item {
  display: flex; align-items: center; gap: 13px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 13px 15px; margin-bottom: 9px;
  transition: border-color 0.15s; cursor: pointer;
}
.import-recipe-item:has(.import-check:checked) { border-color: var(--primary); background: var(--primary-dim); }
.import-recipe-item .info { flex: 1; }
.import-recipe-item .name { font-weight: 700; font-size: 0.92rem; }
.import-recipe-item .meta { font-size: 0.7rem; color: var(--text-muted); margin-top: 3px; }
.badge-exists { display: inline-flex; align-items: center; gap: 3px; font-size: 0.62rem; color: var(--amber); font-weight: 700; background: var(--amber-dim); border: 1px solid rgba(255,179,64,0.22); border-radius: 5px; padding: 2px 7px; margin-top: 4px; }
.badge-new { display: inline-flex; align-items: center; gap: 3px; font-size: 0.62rem; color: var(--success); font-weight: 700; background: var(--success-dim); border: 1px solid rgba(61,223,160,0.22); border-radius: 5px; padding: 2px 7px; margin-top: 4px; }
.import-check { width: 20px; height: 20px; accent-color: var(--primary); cursor: pointer; flex-shrink: 0; }
.modal-actions { display: flex; gap: 10px; margin-top: 18px; }
.modal-actions .btn { flex: 1; }
.tag .recipe-dot { width: 10px; height: 10px; margin-right: 5px; }

/* === RESPONSIVE === */
@media (max-width: 640px) {
  :root { --nav-h: 74px; }
  .section { padding: 12px; }
  .card { padding: 15px; border-radius: 20px; }
  .btn, .btn-primary, .btn-neutral, .btn-success, .btn-danger { min-height: 50px; padding: 13px 15px; font-size: 0.9rem; border-radius: 15px; }
  .btn-icon { width: 44px; height: 44px; font-size: 1rem; }
  input, select, textarea { font-size: 16px; padding: 13px 13px; min-height: 50px; }
  .card-title { font-size: 0.72rem; padding: 7px 0; }
  .list-item { grid-template-columns: minmax(0, 1fr) auto minmax(82px, auto); padding: 13px 12px; gap: 9px; }
  .qty-big { font-size: 1.5rem; }
  .item-actions { gap: 8px; }
  .recipe-card-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
  .recipe-card-grid .field-sub input, .recipe-card-grid .field-sub select { min-height: 46px; }
  .tab { padding: 11px 4px; font-size: 0.73rem; }
  .session-bar { flex-wrap: wrap; justify-content: center; padding: 10px 14px; gap: 12px; }
  .session-bar select { font-size: 0.85rem; padding: 9px 28px 9px 14px; min-height: 46px; }
  .session-bar button { padding: 9px 13px; font-size: 0.8rem; min-height: 46px; }
  .session-text .tag { padding: 6px 12px; font-size: 0.8rem; }
  .session-banner { padding: 16px 18px; }
  .sortable-category { padding: 14px 13px; margin-bottom: 10px; touch-action: manipulation; }
  .ac-item { padding: 13px 15px; font-size: 0.9rem; }
  .catalog-card { flex-wrap: wrap; gap: 10px; }
  .catalog-actions { gap: 12px; }
  .catalog-actions .btn-icon { width: 46px; height: 46px; }
  .modal-sheet { padding: 14px 16px 32px; }
  .import-recipe-item { padding: 14px 15px; gap: 14px; }
  .import-recipe-item .name { font-size: 1rem; }
  .import-check { width: 24px; height: 24px; }
  .toast { font-size: 0.86rem; padding: 12px 20px; white-space: normal; text-align: center; max-width: 92vw; }
  .cost-pill { font-size: 0.8rem; padding: 5px 13px; }
  .row { flex-wrap: wrap; }
  .row > * { flex: 1 1 100%; }
  .row .field-group { min-width: 100%; }
  .header-actions .btn-ghost { padding: 7px 12px; min-height: 40px; }
  .logo { font-size: 1.4rem; }
  .nav-item i { font-size: 1.35rem; }
  .nav-item { font-size: 0.65rem; gap: 4px; }
  .nav-badge { top: 8px; right: calc(25% - 6px); font-size: 0.65rem; padding: 2px 7px; }
}
@media (max-width: 480px) {
  .list-item { grid-template-columns: 1fr auto 72px; padding: 11px 11px; }
  .qty-big { font-size: 1.3rem; }
  .btn-icon { width: 42px; height: 42px; }
  .recipe-card-grid { grid-template-columns: 1fr; gap: 8px; }
  .category-header { font-size: 0.68rem; padding: 11px 2px 5px; }
  .item-name { font-size: 0.86rem; }
}
@media (max-width: 360px) {
  .list-item { grid-template-columns: 1fr 52px 62px; padding: 9px 9px; }
  .qty-big { font-size: 1.1rem; }
  .btn-icon { width: 38px; height: 38px; font-size: 0.82rem; }
  .item-actions { gap: 5px; }
  .session-bar select { max-width: 135px; }
  .header-actions .btn-ghost span { display: none; }
}
@media (hover: none) and (pointer: coarse) {
  .btn, .btn-icon, .tab, .sortable-category, .nav-item, .card-title { cursor: default; -webkit-tap-highlight-color: transparent; }
}
@media (min-width: 768px) {
  .section { max-width: 680px; margin: 0 auto; }
}
input[type="number"] { -moz-appearance: textfield; }
input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button { opacity: 0.5; }
</style>
</head>
<body>

<div id="toast-container"></div>

<header>
  <div class="header-inner">
    <div class="logo">OVNI <span class="logo-accent">CTRL</span><span class="logo-version">V9</span></div>
    <div class="header-actions">
      <button class="btn-ghost accent-ghost" onclick="exportPDF()"><i class="fa-solid fa-file-pdf"></i> <span>PDF</span></button>
      <button class="btn-ghost" onclick="exportJSON()"><i class="fa-solid fa-download"></i> <span>JSON</span></button>
    </div>
  </div>
  <div id="shopping-tabs" class="tab-strip" style="display:none;">
    <div class="tab active" id="tab-todo" onclick="setMode('todo')">À ACHETER <span class="badge" id="cnt-todo">0</span></div>
    <div class="tab" id="tab-done" onclick="setMode('done')">PANIER <span class="badge" id="cnt-done">0</span></div>
    <div class="tab" id="tab-sort" onclick="setMode('sort')"><i class="fa-solid fa-arrows-up-down"></i> RAYONS</div>
  </div>
</header>

<div id="sec-prod" class="section active">
  <div class="session-bar" id="session-bar-prod">
    <div class="session-bar-left">
      <i class="fa-solid fa-list-check"></i>
      <span>Liste active :</span>
      <select id="session-select-prod"></select>
    </div>
    <div>
      <button onclick="createNewSession()" title="Nouvelle liste"><i class="fa-solid fa-plus"></i></button>
      <button onclick="renameCurrentSession()" title="Renommer"><i class="fa-solid fa-pen"></i></button>
      <button class="danger-btn" onclick="deleteCurrentSession()" title="Supprimer"><i class="fa-solid fa-trash"></i></button>
    </div>
  </div>
  <div class="card">
    <div class="card-title">
      <div class="title-left"><i class="fa-solid fa-bolt"></i> Lancer une Production</div>
    </div>
    <div class="card-body">
      <div class="row" style="margin-bottom:11px;">
        <div class="field-group" style="flex:2; margin:0">
          <div class="field-label">Fiche technique</div>
          <select id="prod-select"></select>
        </div>
        <div class="field-group" style="flex:1; margin:0">
          <div class="field-label">Quantité</div>
          <input type="number" id="prod-qty" value="1" min="1">
        </div>
      </div>
      <div id="prod-cost-preview" style="margin-bottom:11px; display:none;">
        <span class="cost-pill"><i class="fa-solid fa-euro-sign"></i> Coût estimé : <strong id="prod-cost-val">0.00 €</strong></span>
      </div>
      <button class="btn btn-primary" onclick="addProduction()"><i class="fa-solid fa-plus"></i> AJOUTER À LA LISTE ACTIVE</button>
    </div>
  </div>
  <div class="card" id="card-single">
    <div class="card-title" onclick="toggleCard(this)">
      <div class="title-left"><i class="fa-solid fa-pen"></i> Article Hors-Fiche</div>
      <i class="fa-solid fa-chevron-down toggle-icon"></i>
    </div>
    <div class="card-body">
      <div class="field-group">
        <div class="field-label">Nom de l'article</div>
        <input type="text" id="s-name" placeholder="ex: Sel fin" oninput="validateSingle()">
      </div>
      <div class="row" style="margin-bottom:11px;">
        <div>
          <div class="field-label">Quantité</div>
          <input type="number" id="s-qty" placeholder="0" min="0" step="0.001">
        </div>
        <div>
          <div class="field-label">Unité</div>
          <select id="s-unit">
            <option>kg</option><option>g</option><option>L</option><option>cl</option><option>pièce</option><option>boîte</option>
          </select>
        </div>
        <div>
          <div class="field-label">Rayon</div>
          <select id="s-cat">
            <option>Fruits &amp; Légumes</option><option>Viandes</option><option>Poissons</option>
            <option>Épicerie salée</option><option>Épicerie sucrée</option><option>Liquides</option>
            <option>Produits frais</option><option>Surgelés</option><option>Autre</option>
          </select>
        </div>
      </div>
      <button class="btn btn-neutral" onclick="addSingle()"><i class="fa-solid fa-cart-plus"></i> AJOUTER SEUL</button>
    </div>
  </div>
</div>

<div id="sec-list" class="section">
  <div class="session-banner">
    <div class="session-label">Liste active : <span id="active-session-name"></span></div>
    <div id="session-text" class="session-text">—</div>
    <div class="session-footer">
      <div class="session-cost" id="session-cost-badge" style="display:none;">
        <i class="fa-solid fa-coins"></i> <span id="session-cost-total"></span>
      </div>
      <button class="btn-reset" onclick="resetSession()">⟳ VIDER LA LISTE</button>
    </div>
  </div>
  <div id="list-display"></div>
</div>

<div id="sec-labo" class="section">
  <div class="card" id="card-create-recipe">
    <div class="card-title" onclick="toggleCard(this)">
      <div class="title-left"><i class="fa-solid fa-flask"></i> <span id="labo-title">Créer une Fiche</span></div>
      <i class="fa-solid fa-chevron-down toggle-icon"></i>
    </div>
    <div class="card-body">
      <div class="field-group">
        <div class="field-label">Nom de la recette</div>
        <input type="text" id="recipe-name" placeholder="ex: Burger Signature">
      </div>
      <div id="recipe-rows"></div>
      <div id="recipe-total-cost" class="cost-pill" style="display:none; margin-bottom:13px;"><i class="fa-solid fa-coins"></i> </div>
      <div class="row" style="margin-bottom:13px;">
        <button class="btn btn-neutral" onclick="addRow()"><i class="fa-solid fa-plus"></i> Ajouter un ingrédient</button>
      </div>
      <div class="row">
        <button class="btn btn-success" onclick="saveRecipe()"><i class="fa-solid fa-floppy-disk"></i> ENREGISTRER</button>
        <button class="btn btn-danger" id="btn-cancel" style="display:none;" onclick="cancelEdit()">ANNULER</button>
      </div>
    </div>
  </div>
  <div class="search-field">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input type="text" id="labo-search" placeholder="Rechercher une fiche…" oninput="renderLabo()">
    <div class="import-icon-btn" onclick="document.getElementById('discreet-import').click()" title="Importer des fiches JSON">
      <i class="fa-solid fa-file-import"></i>
    </div>
    <input type="file" id="discreet-import" accept=".json" style="display:none" onchange="handleImportFile(this)">
  </div>
  <div id="catalog-display"></div>
</div>

<nav class="bottom-nav">
  <div class="nav-item active" id="nav-prod" onclick="switchView('prod')">
    <i class="fa-solid fa-rocket"></i><span>PROD</span>
  </div>
  <div class="nav-item" id="nav-list" onclick="switchView('list')">
    <i class="fa-solid fa-cart-shopping"></i><span>COURSES</span>
    <span id="nav-badge" class="nav-badge" style="display:none;"></span>
  </div>
  <div class="nav-item" id="nav-labo" onclick="switchView('labo')">
    <i class="fa-solid fa-book-open"></i><span>LABO</span>
  </div>
</nav>

<script>
const DEFAULT_CATEGORIES = [
  'Fruits & Légumes','Viandes','Poissons','Produits frais',
  'Épicerie salée','Épicerie sucrée','Liquides','Surgelés','Autre'
];

let state = {
  view: 'prod',
  listMode: 'todo',
  editingId: null,
  sessions: {},
  currentSessionId: null,
  recipes: [
    {
      id: 1, name: 'OVNI Burger',
      ingredients: [
        { name: 'Pain brioche', qty: 1, unit: 'pièce', cat: 'Épicerie salée', price: 0.35 },
        { name: 'Steak haché', qty: 180, unit: 'g', cat: 'Viandes', price: 1.20 },
        { name: 'Cheddar', qty: 30, unit: 'g', cat: 'Produits frais', price: 0.40 },
        { name: 'Laitue', qty: 20, unit: 'g', cat: 'Fruits & Légumes', price: 0.08 },
        { name: 'Tomate', qty: 50, unit: 'g', cat: 'Fruits & Légumes', price: 0.15 },
      ]
    }
  ],
  categoryOrder: [...DEFAULT_CATEGORIES]
};

function toggleCard(titleElement) {
  const card = titleElement.closest('.card');
  if (card) card.classList.toggle('collapsed');
}

function currentSession() {
  if (!state.currentSessionId || !state.sessions[state.currentSessionId]) {
    const id = 'default_' + Date.now();
    state.sessions[id] = { id, name: 'Liste principale', recipes: {}, singles: 0, totalCost: 0, list: [] };
    state.currentSessionId = id;
  }
  return state.sessions[state.currentSessionId];
}

function createNewSession() {
  let name = prompt('Nom de la nouvelle liste :', 'Courses ' + (Object.keys(state.sessions).length+1));
  if (!name) return;
  const id = 'sess_' + Date.now();
  state.sessions[id] = { id, name, recipes: {}, singles: 0, totalCost: 0, list: [] };
  state.currentSessionId = id;
  saveState(); renderSessionSelector(); render();
  toast(`Liste "${name}" créée`);
}

function renameCurrentSession() {
  const sess = currentSession();
  const newName = prompt('Nouveau nom :', sess.name);
  if (newName && newName.trim()) {
    sess.name = newName.trim();
    saveState(); renderSessionSelector(); render();
    toast('Liste renommée');
  }
}

function deleteCurrentSession() {
  if (Object.keys(state.sessions).length <= 1) { toast('Impossible de supprimer la seule liste restante', 'error'); return; }
  const sess = currentSession();
  if (confirm(`Supprimer définitivement la liste "${sess.name}" ?`)) {
    delete state.sessions[state.currentSessionId];
    state.currentSessionId = Object.keys(state.sessions)[0];
    saveState(); renderSessionSelector(); render();
    toast(`Liste supprimée`);
  }
}

function selectSession(id) {
  if (state.sessions[id]) { state.currentSessionId = id; saveState(); render(); }
}

function renderSessionSelector() {
  const selProd = document.getElementById('session-select-prod');
  const activeNameSpan = document.getElementById('active-session-name');
  if (selProd) {
    const curId = state.currentSessionId;
    selProd.innerHTML = Object.values(state.sessions).map(s => `<option value="${s.id}" ${s.id === curId ? 'selected' : ''}>${escapeHtml(s.name)}</option>`).join('');
    selProd.onchange = (e) => selectSession(e.target.value);
  }
  if (activeNameSpan && currentSession()) activeNameSpan.innerText = currentSession().name;
}

function loadState() {
  try {
    const saved = localStorage.getItem('ovni_v9');
    if (saved) {
      const parsed = JSON.parse(saved);
      state = { ...state, ...parsed };
      if (!state.categoryOrder || !state.categoryOrder.length) state.categoryOrder = [...DEFAULT_CATEGORIES];
      if (!state.sessions || Object.keys(state.sessions).length === 0) {
        const oldList = state.list || [];
        const oldSession = state.session || { recipes: {}, singles: 0, totalCost: 0 };
        const newId = 'sess_' + Date.now();
        state.sessions = { [newId]: { id: newId, name: 'Liste principale', recipes: oldSession.recipes, singles: oldSession.singles, totalCost: oldSession.totalCost, list: oldList } };
        state.currentSessionId = newId;
        delete state.list; delete state.session;
      }
      if (!state.currentSessionId || !state.sessions[state.currentSessionId]) state.currentSessionId = Object.keys(state.sessions)[0];
    } else {
      const defaultId = 'sess_default';
      state.sessions = { [defaultId]: { id: defaultId, name: 'Liste principale', recipes: {}, singles: 0, totalCost: 0, list: [] } };
      state.currentSessionId = defaultId;
    }
  } catch(e) { console.warn('Load error', e); }
}

function saveState() {
  const toStore = { view: state.view, listMode: state.listMode, editingId: state.editingId, sessions: state.sessions, currentSessionId: state.currentSessionId, recipes: state.recipes, categoryOrder: state.categoryOrder };
  try { localStorage.setItem('ovni_v9', JSON.stringify(toStore)); } catch(e) {}
  render();
}

function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  const icons = { success: 'fa-check-circle', error: 'fa-triangle-exclamation', info: 'fa-info-circle' };
  el.innerHTML = `<i class="fa-solid ${icons[type] || icons.success}"></i>${msg}`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => { el.classList.add('hide'); setTimeout(() => el.remove(), 400); }, 2200);
}

// === NAVIGATION WITH SLIDE ANIMATION ===
const VIEW_ORDER = ['prod', 'list', 'labo'];
let _navLocked = false;

function switchView(v) {
  if (v === state.view || _navLocked) return;
  _navLocked = true;

  const oldIdx = VIEW_ORDER.indexOf(state.view);
  const newIdx = VIEW_ORDER.indexOf(v);
  const dir = newIdx > oldIdx ? 'right' : 'left';

  const oldSec = document.getElementById('sec-' + state.view);
  const newSec = document.getElementById('sec-' + v);

  oldSec.classList.remove('slide-in-right','slide-in-left');
  oldSec.classList.add(dir === 'right' ? 'slide-out-left' : 'slide-out-right');

  setTimeout(() => {
    oldSec.classList.remove('active','slide-out-left','slide-out-right');
    newSec.classList.add('active', dir === 'right' ? 'slide-in-right' : 'slide-in-left');
    setTimeout(() => { newSec.classList.remove('slide-in-right','slide-in-left'); _navLocked = false; }, 320);
  }, 130);

  state.view = v;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('nav-' + v).classList.add('active');
  document.getElementById('shopping-tabs').style.display = v === 'list' ? 'flex' : 'none';
  render();
}

function setMode(m) {
  state.listMode = m;
  ['todo','done','sort'].forEach(id => { const el = document.getElementById('tab-' + id); if (el) el.classList.toggle('active', id === m); });
  render();
}

function addProduction() {
  const name = document.getElementById('prod-select').value;
  const qty = parseInt(document.getElementById('prod-qty').value);
  if (!name) return toast('Sélectionne une fiche', 'error');
  if (!qty || qty <= 0) return toast('Quantité invalide', 'error');
  const recipe = state.recipes.find(r => r.name === name);
  if (!recipe) return;
  const sess = currentSession();
  sess.recipes[name] = (sess.recipes[name] || 0) + qty;
  const batchCost = recipeUnitCost(recipe) * qty;
  recipe.ingredients.forEach(ing => {
    const exist = sess.list.find(i => i.name === ing.name && i.unit === ing.unit);
    if (exist) { exist.qty = parseFloat((exist.qty + ing.qty * qty).toFixed(4)); exist.done = false; }
    else sess.list.push({ ...ing, qty: parseFloat((ing.qty * qty).toFixed(4)), done: false });
  });
  sess.totalCost = (sess.totalCost || 0) + batchCost;
  saveState();
  toast(`${qty}× ${name} ajouté à "${sess.name}" ✓`);
}

function handleAC(input) {
  const val = input.value.toLowerCase().trim();
  const box = input.nextElementSibling;
  if (val.length < 1) { box.style.display = 'none'; return; }
  const known = [];
  state.recipes.forEach(r => r.ingredients.forEach(i => { if (!known.find(k => k.name.toLowerCase() === i.name.toLowerCase())) known.push(i); }));
  const matches = known.filter(i => i.name.toLowerCase().includes(val)).slice(0, 5);
  if (matches.length) {
    box.innerHTML = matches.map(m => `<div class="ac-item" onclick="selectAC(this,'${escapeAttr(m.name)}','${escapeAttr(m.unit)}','${escapeAttr(m.cat)}')">${escapeHtml(m.name)}<span>${m.unit} · ${m.cat}</span></div>`).join('');
    box.style.display = 'block';

function updateRowCost(input) {

  const price = parseFloat(card.querySelector('.in-p').value) || 0;

function selectAC(el, n, u, c) {

function saveRecipe() {
  const name = document.getElementById('recipe-name').value.trim();
  if (!name) return toast('Nom de fiche requis', 'error');
  const dupCheck = state.recipes.find(r => r.name.toLowerCase() === name.toLowerCase() && r.id !== state.editingId);
  if (dupCheck) return toast('Ce nom existe déjà', 'error');
  const ings = []; let valid = true;
  document.querySelectorAll('.recipe-card').forEach(row => {
    const n = row.querySelector('.in-n').value.trim();
    const q = parseFloat(row.querySelector('.in-q').value);
    const p = parseFloat(row.querySelector('.in-p').value) || 0;
    if (!n || isNaN(q) || q <= 0) { valid = false; return; }
    ings.push({ name: n, qty: q, unit: row.querySelector('.in-u').value, cat: row.querySelector('.in-c').value, price: p });
  });
  if (!valid) return toast('Vérifie les ingrédients (nom & quantité)', 'error');
  if (!ings.length) return toast('Ajoute au moins un ingrédient', 'error');
  if (state.editingId) {
    const idx = state.recipes.findIndex(r => r.id === state.editingId);
    state.recipes[idx] = { id: state.editingId, name, ingredients: ings };
    toast(`${name} mis à jour`);
  } else {
    state.recipes.push({ id: Date.now(), name, ingredients: ings });
    toast(`${name} créé ✓`);
  }
  cancelEdit(); saveState();
}

function editRecipe(id) {
  const r = state.recipes.find(x => x.id === id);
  if (!r) return;
  state.editingId = id;
  document.getElementById('recipe-name').value = r.name;
  document.getElementById('recipe-rows').innerHTML = '';
  r.ingredients.slice().reverse().forEach(i => addRow(i));
  document.getElementById('labo-title').textContent = `Modifier : ${r.name}`;
  document.getElementById('btn-cancel').style.display = '';

  if (createCard.classList.contains('collapsed')) createCard.classList.remove('collapsed');
  document.getElementById('sec-labo').scrollIntoView({ behavior: 'smooth' });
}

function deleteRecipe(id) {

  state.recipes = state.recipes.filter(r => r.id !== id);

let dragSrc = null;
function buildSortView() {
  const sess = currentSession();
  const container = document.getElementById('list-display');
  container.innerHTML = '';
  const header = document.createElement('div');
  header.innerHTML = `<div style="font-size:0.72rem;color:var(--text-muted);margin-bottom:12px;padding:0 2px;"><i class="fa-solid fa-info-circle" style="color:var(--primary)"></i> Glisse pour réorganiser les rayons</div>`;
  container.appendChild(header);
  const listCats = [...new Set(sess.list.map(i => i.cat))];
  const allCats = [...new Set([...state.categoryOrder, ...listCats, ...DEFAULT_CATEGORIES])];
  allCats.forEach(cat => {
    const div = document.createElement('div');
    div.className = 'sortable-category'; div.draggable = true; div.dataset.cat = cat;
    const count = sess.list.filter(i => i.cat === cat).length;
    div.innerHTML = `<span class="drag-handle"><i class="fa-solid fa-grip-lines"></i></span><span style="flex:1; font-weight:700; font-size:0.88rem;">${escapeHtml(cat)}</span>${count ? `<span style="font-size:0.7rem;color:var(--text-muted);">${count} article${count>1?'s':''}</span>` : ''}`;
    div.addEventListener('dragstart', () => { dragSrc = div; div.style.opacity = '0.4'; });
    div.addEventListener('dragend', () => { div.style.opacity = '1'; dragSrc = null; });
    div.addEventListener('dragover', e => { e.preventDefault(); div.classList.add('drag-over'); });
    div.addEventListener('dragleave', () => div.classList.remove('drag-over'));
    div.addEventListener('drop', e => {
      e.preventDefault(); div.classList.remove('drag-over');
      if (dragSrc && dragSrc !== div) {
        const rows = [...container.querySelectorAll('.sortable-category')];
        const dstIdx = rows.indexOf(div);
        const newOrder = allCats.filter(c => c !== dragSrc.dataset.cat);
        newOrder.splice(dstIdx, 0, dragSrc.dataset.cat);
        state.categoryOrder = newOrder; saveState();
      }
    });
    container.appendChild(div);
  });
}

function convertToKgAndCeil(qty, unit) {
  let value = qty, displayUnit = unit;
  if (unit === 'g') { value = qty / 1000; displayUnit = 'kg'; }
  else if (unit === 'kg') { value = qty; displayUnit = 'kg'; }
  else if (unit === 'L' || unit === 'cl' || unit === 'ml') {
    if (unit === 'cl') value = qty / 100; else if (unit === 'ml') value = qty / 1000;
    displayUnit = 'kg';
  } else { displayUnit = unit; }
  return { value: Math.ceil(value * 100) / 100, unit: displayUnit };
}

function hashCode(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) { hash = ((hash << 5) - hash) + str.charCodeAt(i); hash |= 0; }
  return Math.abs(hash);
}
function recipeColor(recipeName) { return `hsl(${hashCode(recipeName) % 360}, 70%, 65%)`; }

function dateStr() { const d = new Date(); return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`; }
function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escapeAttr(s) { return String(s).replace(/'/g, "\\'"); }

function handleImportFile(input) {
  const file = input.files[0]; if (!file) return;
  readImportFile(file); input.value = '';
}
function readImportFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      const recipes = parseImportedRecipes(data);
      if (!recipes.length) { toast('Aucune fiche valide trouvée', 'error'); return; }
      showImportModal(recipes);
    } catch(err) { toast('Fichier JSON invalide', 'error'); }
  };
  reader.readAsText(file);
}
function parseImportedRecipes(data) {
  let candidates = [];
  if (data && Array.isArray(data.recipes)) candidates = data.recipes;
  else if (Array.isArray(data)) candidates = data;
  else if (data && typeof data === 'object' && data.name && Array.isArray(data.ingredients)) candidates = [data];
  return candidates.filter(r => r && typeof r.name === 'string' && r.name.trim() && Array.isArray(r.ingredients) && r.ingredients.length > 0).map(r => ({ id: r.id || Date.now() + Math.random(), name: r.name.trim(), ingredients: r.ingredients.map(i => ({ name: i.name || '', qty: parseFloat(i.qty) || 0, unit: i.unit || 'pièce', cat: i.cat || 'Autre', price: parseFloat(i.price) || 0 })).filter(i => i.name && i.qty > 0) })).filter(r => r.ingredients.length > 0);
}
function showImportModal(recipes) {
  const existingNames = new Set(state.recipes.map(r => r.name.toLowerCase()));
  const itemsHtml = recipes.map((r, idx) => {
    const cost = r.ingredients.reduce((s, i) => s + (i.price || 0), 0);
    const costText = cost > 0 ? ` · ${cost.toFixed(2)} €` : '';
    const exists = existingNames.has(r.name.toLowerCase());
    const badge = exists ? `<span class="badge-exists"><i class="fa-solid fa-triangle-exclamation"></i> Existe déjà</span>` : `<span class="badge-new"><i class="fa-solid fa-plus"></i> Nouveau</span>`;
    return `<label class="import-recipe-item"><input type="checkbox" class="import-check" data-idx="${idx}" ${exists ? '' : 'checked'}><div class="info"><div class="name">${escapeHtml(r.name)}</div><div class="meta">${r.ingredients.length} ingrédient${r.ingredients.length>1?'s':''}${costText}</div><div>${badge}</div></div></label>`;
  }).join('');
  const modal = document.createElement('div'); modal.className = 'modal-overlay'; modal.id = 'import-modal';
  modal.innerHTML = `<div class="modal-sheet"><div class="modal-handle"></div><div class="modal-title"><i class="fa-solid fa-file-import" style="color:var(--primary);margin-right:8px;font-size:1.1rem;"></i>${recipes.length} fiche${recipes.length>1?'s':''} détectée${recipes.length>1?'s':''}</div><div class="modal-sub">Sélectionne les fiches à importer. Les fiches existantes seront <strong style="color:var(--amber)">écrasées</strong> si cochées.</div><div id="import-list">${itemsHtml}</div><div class="modal-actions"><button class="btn btn-neutral" onclick="closeImportModal()">Annuler</button><button class="btn btn-success" id="confirm-import-btn">Importer la sélection</button></div></div>`;
  modal.addEventListener('click', e => { if (e.target === modal) closeImportModal(); });
  document.body.appendChild(modal);
  document.getElementById('confirm-import-btn').onclick = () => confirmImport(recipes);
}
function confirmImport(recipes) {
  const checks = document.querySelectorAll('#import-modal .import-check');
  const selectedIndices = []; checks.forEach(cb => { if (cb.checked) selectedIndices.push(parseInt(cb.dataset.idx)); });
  if (selectedIndices.length === 0) { toast('Aucune fiche sélectionnée', 'error'); return; }
  let added = 0, replaced = 0;
  selectedIndices.forEach(idx => {
    const r = recipes[idx];
    const existingIdx = state.recipes.findIndex(x => x.name.toLowerCase() === r.name.toLowerCase());
    if (existingIdx >= 0) { state.recipes[existingIdx] = { ...r, id: state.recipes[existingIdx].id }; replaced++; }
    else { state.recipes.push({ ...r, id: Date.now() + Math.random() }); added++; }
  });
  closeImportModal(); saveState();
  const msgParts = []; if (added) msgParts.push(`${added} ajoutée${added>1?'s':''}`); if (replaced) msgParts.push(`${replaced} mise${replaced>1?'s':''} à jour`);
  toast(msgParts.join(', ') + ' ✓', 'success');
}
function closeImportModal() { const modal = document.getElementById('import-modal'); if (modal) modal.remove(); }

function init() { loadState(); cancelEdit(); render(); }
init();
</script>
