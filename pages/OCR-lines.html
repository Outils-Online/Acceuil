<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>OCR-Lines</title>
    <!-- Polices Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root {
            /* Palette */
            --bg: #FDFCF0;
            --surface: #FFFFFF;
            --primary: #0A2472;
            --secondary: #006466;
            --accent: #F46060;
            --highlight: #FFD972;
            /* Typographie */
            --font-heading: 'Space Grotesk', sans-serif;
            --font-body: 'Inter', sans-serif;
            /* Rayons */
            --radius-sm: 12px;
            --radius-md: 15px;
            --radius-lg: 22px;
            /* Ombres */
            --shadow-card: 0 4px 12px rgba(10, 36, 114, 0.15);
            --shadow-modal: 0 8px 30px rgba(10, 36, 114, 0.18);
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            min-height: 100vh;
            background: var(--bg);
            font-family: var(--font-body);
            overflow: hidden;
            color: var(--primary);
        }

        .app-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
            min-height: 100vh;
            background: var(--bg);
        }

        #viewport {
            position: relative;
            flex: 1;
            min-height: 0;
            background: #000; /* fond caméra */
            overflow: hidden;
        }

        #video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
        }

        #photoCanvas, #selectionCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
        }
        #photoCanvas { display: none; }
        #selectionCanvas {
            z-index: 10;
            touch-action: none;
            cursor: default;
        }
        #selectionCanvas.frozen {
            cursor: crosshair;
        }

        /* Loader */
        #loader {
            display: none;
            position: absolute;
            top: 20px; left: 0;
            width: 100%;
            text-align: center;
            z-index: 50;
            pointer-events: none;
        }
        #loader .loader-inner {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            pointer-events: auto;
        }
        #btnStopOcr {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 7px 16px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            font-family: var(--font-body);
        }
        .badge {
            background: var(--primary);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 700;
            color: white;
            font-family: var(--font-heading);
        }

        /* Barre de contrôles */
        .controls {
            background: var(--surface);
            padding: 15px 10px 35px 10px;
            border-top: 1px solid var(--secondary);
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-shrink: 0;
            z-index: 100;
            position: relative;
        }
        button {
            padding: 18px;
            border-radius: var(--radius-md);
            border: none;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            min-width: 120px;
            text-transform: uppercase;
            font-family: var(--font-body);
            letter-spacing: 0.03em;
            transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
        }
        .btn-snap, .btn-export {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 12px rgba(244, 96, 96, 0.25);
        }
        .btn-snap:hover, .btn-export:hover {
            filter: brightness(1.05);
        }
        .btn-snap:active, .btn-export:active {
            transform: scale(0.96);
        }

        /* Bouton effacer — coin haut gauche */
        #btnClear {
            position: absolute;
            top: 14px; left: 14px;
            z-index: 20;
            min-width: 0;
            padding: 9px 16px 9px 12px;
            font-size: 13px;
            font-weight: 700;
            border-radius: 50px;
            background: rgba(255,255,255,0.92);
            color: var(--accent);
            border: 1px solid var(--accent);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: var(--shadow-card);
            line-height: 1;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: var(--font-body);
            transition: background 0.2s, transform 0.1s;
        }
        #btnClear:active {
            background: rgba(244, 96, 96, 0.1);
            transform: scale(0.93);
        }
        #btnClear .clear-count {
            background: var(--accent);
            color: #fff;
            border-radius: 20px;
            padding: 2px 7px;
            font-size: 12px;
            font-weight: 700;
            min-width: 18px;
            text-align: center;
        }

        /* Bouton retour accueil — coin haut droit */
        #btnHome {
            position: absolute;
            top: 14px; right: 14px;
            z-index: 20;
            min-width: 0;
            width: 38px; height: 38px;
            border-radius: 50%;
            background: rgba(255,255,255,0.92);
            color: var(--primary);
            border: 1px solid var(--secondary);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: var(--shadow-card);
            font-size: 16px;
            line-height: 1;
            display: flex; align-items: center; justify-content: center;
            text-decoration: none;
            transition: background 0.2s, transform 0.1s;
            font-family: var(--font-body);
        }
        #btnHome:active {
            background: rgba(10,36,114,0.08);
            transform: scale(0.93);
        }

        /* Modal OCR */
        #confirmModal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: var(--surface);
            color: var(--primary);
            padding: 22px;
            border-radius: var(--radius-lg);
            width: 88%; max-width: 400px;
            z-index: 200;
            box-shadow: var(--shadow-modal);
            border: 1px solid var(--secondary);
        }
        #ocrEditArea {
            width: 100%;
            height: 110px;
            background: var(--surface);
            border: 1px solid var(--secondary);
            border-radius: var(--radius-sm);
            padding: 12px;
            font-size: 15px;
            font-weight: 400;
            margin-bottom: 12px;
            color: var(--primary);
            resize: none;
            outline: none;
            display: block;
            font-family: var(--font-body);
        }
        #pageInput {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border: 1px solid var(--secondary);
            border-radius: var(--radius-sm);
            text-align: center;
            margin-bottom: 12px;
            display: block;
            background: var(--surface);
            color: var(--primary);
            font-family: var(--font-body);
        }
        .modal-btns {
            display: flex;
            gap: 10px;
        }
        .modal-btns button {
            min-width: 0;
            flex: 1;
            padding: 14px;
            border-radius: var(--radius-md);
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
        }
        .modal-btns button:first-child {
            background: var(--surface);
            border: 1px solid var(--secondary);
            color: var(--primary);
            font-weight: 600;
        }
        .modal-btns button:last-child {
            background: var(--accent);
            color: white;
            font-weight: 700;
        }

        /* Modales globales (clear, meta, filename) */
        #clearModal, #metaModal, #filenameModal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 300;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            padding: 16px;
            overflow-y: auto;
        }
        #clearModal.open, #metaModal.open, #filenameModal.open {
            display: flex;
            animation: fadeIn 0.18s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #clearModalBox, #metaModalBox, #filenameModalBox {
            background: var(--surface);
            border: 1px solid var(--secondary);
            border-radius: var(--radius-lg);
            width: 88%;
            max-width: 400px;
            max-height: calc(100vh - 32px);
            overflow-y: auto;
            padding: 24px 20px 20px;
            box-shadow: var(--shadow-modal);
            animation: slideUp 0.22s cubic-bezier(.22,.9,.36,1);
        }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        #clearModalBox .clear-icon {
            font-size: 36px;
            text-align: center;
            margin-bottom: 10px;
            color: var(--accent);
        }
        #clearModalBox h3, #metaModalBox h3, #filenameModalBox h3 {
            margin: 0 0 10px;
            font-size: 18px;
            color: var(--primary);
            text-align: center;
            font-family: var(--font-heading);
            font-weight: 700;
        }
        #clearModalBox p {
            margin: 0 0 20px;
            font-size: 14px;
            color: #333;
            text-align: center;
            line-height: 1.5;
        }
        #clearModalBox p strong {
            color: var(--accent);
            font-weight: 700;
        }

        .clear-modal-btns, .meta-modal-btns, .filename-modal-btns {
            display: flex;
            gap: 10px;
        }
        .clear-modal-btns button,
        .meta-modal-btns button,
        .filename-modal-btns button {
            flex: 1;
            min-width: 0;
            padding: 15px;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            border: none;
            font-family: var(--font-body);
        }
        .btn-cancel-clear, .btn-cancel-meta, .btn-cancel-filename {
            background: var(--surface);
            border: 1px solid var(--secondary);
            color: var(--primary);
            font-weight: 600;
        }
        .btn-confirm-clear, .btn-confirm-meta, .btn-confirm-filename {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 12px rgba(244, 96, 96, 0.3);
        }

        /* Champs meta / filename */
        .meta-field, #filenameInput {
            width: 100%;
            padding: 14px;
            font-size: 15px;
            border: 1px solid var(--secondary);
            border-radius: var(--radius-sm);
            margin-bottom: 12px;
            display: block;
            background: var(--surface);
            color: var(--primary);
            outline: none;
            font-family: var(--font-body);
        }
        .meta-field:focus, #filenameInput:focus, #pageInput:focus, #ocrEditArea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(10,36,114,0.1);
        }

        /* ── ISBN scan overlay ─────────────────────────────────────────── */
        #isbn-scan-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(0,0,0,0.93);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding: 16px;
        }
        #isbn-scan-video {
            width: 100%;
            max-width: 460px;
            border-radius: 24px;
            box-shadow: 0 12px 28px black;
        }
        #isbn-scan-hint {
            color: #bbb;
            font-size: 13px;
            text-align: center;
            font-family: var(--font-body);
        }
        .scan-close {
            background: transparent;
            border: 1.5px solid rgba(255,255,255,0.4);
            color: white;
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-family: var(--font-body);
            font-weight: 600;
            font-size: 13px;
            min-width: 0;
            text-transform: none;
            letter-spacing: 0;
        }
        /* Bouton scan ISBN dans la modale */
        #btnScanISBN {
            width: 100%;
            padding: 13px;
            font-size: 14px;
            font-weight: 700;
            border-radius: var(--radius-sm);
            background: var(--secondary);
            color: white;
            border: none;
            cursor: pointer;
            margin-bottom: 12px;
            font-family: var(--font-body);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            transition: background 0.2s, transform 0.1s;
        }
        #btnScanISBN:active { transform: scale(0.96); }
        #isbn-feedback-meta {
            font-size: 11px;
            color: var(--secondary);
            margin-top: -8px;
            margin-bottom: 8px;
            min-height: 16px;
            display: block;
            font-family: var(--font-body);
        }
        /* Champ ISBN dans la modale */
        #metaISBN {
            border-style: dashed;
            border-color: var(--secondary);
        }
        #metaISBN:focus { border-style: solid; }

        /* Loader Claude (non utilisé ici mais laissé pour compatibilité) */
        #claudeLoader {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 400;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(6px);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 14px;
        }
        #claudeLoader.open { display: flex; }
        #claudeLoader .cl-badge {
            background: var(--primary);
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.05em;
            animation: pulse 1.4s ease-in-out infinite;
            color: white;
            font-family: var(--font-heading);
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
        #claudeLoader .cl-sub { font-size: 12px; color: #888; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="viewport">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="photoCanvas"></canvas>
        <canvas id="selectionCanvas"></canvas>
        <div id="loader">
            <div class="loader-inner">
                <span class="badge">ANALYSE COMPARATIVE...</span>
                <button id="btnStopOcr" onclick="stopOcr()"><i class="fa-solid fa-xmark"></i> Stop</button>
            </div>
        </div>
        <button id="btnClear" onclick="openClearModal()" title="Effacer l'historique">
            <i class="fa-solid fa-trash-can"></i> Effacer <span class="clear-count" id="clearCount">0</span>
        </button>
        <a id="btnHome" href="#" onclick="window.parent.document.getElementById('iframe_ocr_lines').style.display='none'; return false;" title="Retour à l'accueil">
            <i class="fa-solid fa-xmark"></i>
        </a>
    </div>
    <div class="controls">
        <button class="btn-export" onclick="exportJSON()">Envoi</button>
        <button class="btn-snap" id="btnSnap" onclick="toggleSnap()">Figer</button>
    </div>
</div>

<div id="confirmModal">
    <textarea id="ocrEditArea"></textarea>
    <input type="number" id="pageInput" placeholder="N° Page" inputmode="numeric">
    <div class="modal-btns">
        <button onclick="closeModal()">Annuler</button>
        <button onclick="saveResult()">Valider</button>
    </div>
</div>

<div id="clearModal">
    <div id="clearModalBox">
        <div class="clear-icon"><i class="fa-solid fa-trash-can"></i></div>
        <h3>Effacer l'historique</h3>
        <p>Cette action supprimera définitivement<br><strong id="clearModalCount">0 entrée(s)</strong> enregistrée(s).</p>
        <div class="clear-modal-btns">
            <button class="btn-cancel-clear" onclick="closeClearModal()">Annuler</button>
            <button class="btn-confirm-clear" onclick="confirmClear()">Tout supprimer</button>
        </div>
    </div>
</div>

<!-- Modal métadonnées export -->
<div id="metaModal">
    <div id="metaModalBox">
        <h3><i class="fa-solid fa-book-open"></i> Métadonnées de la source</h3>
        <!-- ISBN + scan -->
        <button id="btnScanISBN" onclick="startISBNScanner()">
            <i class="fa-solid fa-barcode"></i> Scanner l'ISBN
        </button>
        <input class="meta-field" id="metaISBN" type="text" placeholder="ISBN (optionnel — auto-remplit les champs)" inputmode="numeric">
        <span id="isbn-feedback-meta"></span>
        <!-- Champs auteur / titre / éditeur -->
        <input class="meta-field" id="metaPrenom"     type="text" placeholder="Prénom Nom (auteur)">
        <input class="meta-field" id="metaTitre"      type="text" placeholder="Titre">
        <input class="meta-field" id="metaVille"      type="text" placeholder="Ville d'édition">
        <input class="meta-field" id="metaEditeur"    type="text" placeholder="Éditeur">
        <input class="meta-field" id="metaCollection" type="text" placeholder="Collection">
        <input class="meta-field" id="metaAnnee"      type="text" placeholder="Année" inputmode="numeric">
        <div class="meta-modal-btns">
            <button class="btn-cancel-meta" onclick="closeMetaModal()">Annuler</button>
            <button class="btn-confirm-meta" onclick="confirmExport()">Exporter</button>
        </div>
    </div>
</div>

<!-- Modal nom de fichier (fallback si Web Share API indisponible) -->
<div id="filenameModal">
    <div id="filenameModalBox">
        <h3><i class="fa-solid fa-download"></i> Télécharger le fichier</h3>
        <input type="text" id="filenameInput" placeholder="Nom du fichier" value="extraction">
        <div class="filename-modal-btns">
            <button class="btn-cancel-filename" onclick="closeFilenameModal()">Annuler</button>
            <button class="btn-confirm-filename" onclick="confirmDownload()">Télécharger</button>
        </div>
    </div>
</div>

<script>
    const video        = document.getElementById('video');
    const photoCanvas  = document.getElementById('photoCanvas');
    const selectCanvas = document.getElementById('selectionCanvas');
    const pctx         = photoCanvas.getContext('2d');
    const sctx         = selectCanvas.getContext('2d');
    const confirmModal = document.getElementById('confirmModal');
    const ocrEditArea  = document.getElementById('ocrEditArea');
    const loader       = document.getElementById('loader');
    const viewport     = document.getElementById('viewport');

    let isFrozen = false, isDrawing = false, startX, startY;
    let historyData = [];
    let ocrCancelled = false;
    let videoRect = { x: 0, y: 0, w: 0, h: 0 };

    // ── localStorage ─────────────────────────────────────────────────────────
    const LS_KEY = "ocr_history_v1";

    function lsSave(meta = null) {
        try {
            const existing = lsLoadRaw();
            const session = {
                savedAt: new Date().toISOString(),
                meta,
                entries: historyData
            };
            // Append : conserve les sessions précédentes
            const sessions = Array.isArray(existing) ? existing : [];
            sessions.push(session);
            localStorage.setItem(LS_KEY, JSON.stringify(sessions));
        } catch(e) {
            console.warn("localStorage indisponible :", e);
        }
    }

    function lsLoadRaw() {
        try {
            const raw = localStorage.getItem(LS_KEY);
            if (!raw) return null;
            return JSON.parse(raw);
        } catch(e) {
            console.warn("Erreur lecture localStorage :", e);
            return null;
        }
    }

    function lsLoad() {
        try {
            const sessions = lsLoadRaw();
            if (!Array.isArray(sessions) || sessions.length === 0) return;
            // Restaure la dernière session
            const last = sessions[sessions.length - 1];
            if (last && Array.isArray(last.entries) && last.entries.length > 0) {
                historyData = last.entries;
                updateCount();
            }
        } catch(e) {
            console.warn("Erreur restauration localStorage :", e);
        }
    }

    // ── Caméra ────────────────────────────────────────────────────────────────
   window.onload = () => {
    lsLoad();
    initCamera();
    chargerDictionnaire();
    window.parent.postMessage('etape_suivante', '*');
};

    async function initCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment', width: { ideal: 4096 }, height: { ideal: 2160 } }
            });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                syncCanvasSize();
            };
        } catch(e) { alert("Caméra bloquée : " + e.message); }
    }

    function syncCanvasSize() {
        const vw = viewport.clientWidth;
        const vh = viewport.clientHeight;
        photoCanvas.width  = vw;
        photoCanvas.height = vh;
        selectCanvas.width = vw;
        selectCanvas.height = vh;
    }

    window.addEventListener('resize', () => {
        if (!isFrozen) syncCanvasSize();
    });

    // ── Snap / Reset ──────────────────────────────────────────────────────────
    function toggleSnap() {
        if (!isFrozen) {
            const vidW = video.videoWidth;
            const vidH = video.videoHeight;

            photoCanvas.width  = vidW;
            photoCanvas.height = vidH;
            selectCanvas.width  = vidW;
            selectCanvas.height = vidH;

            pctx.filter = 'contrast(1.15) brightness(1.02) saturate(0)';
            pctx.drawImage(video, 0, 0, vidW, vidH);
            pctx.filter = 'none';

            const imgData = pctx.getImageData(0, 0, vidW, vidH);
            const d = imgData.data;
            for (let i = 0; i < d.length; i += 4) {
                let lum = d[i]*0.3 + d[i+1]*0.59 + d[i+2]*0.11;
                let val = lum < 130 ? lum*0.92 : Math.min(255, lum*1.03);
                d[i] = d[i+1] = d[i+2] = val;
            }
            pctx.putImageData(imgData, 0, 0);

            video.style.display = 'none';
            photoCanvas.style.display = 'block';
            selectCanvas.classList.add('frozen');
            document.getElementById('btnSnap').innerText = "Reprendre";
            isFrozen = true;
        } else {
            reset();
        }
    }

    function reset() {
        video.style.display = 'block';
        photoCanvas.style.display = 'none';
        pctx.clearRect(0, 0, photoCanvas.width, photoCanvas.height);
        sctx.clearRect(0, 0, selectCanvas.width, selectCanvas.height);
        syncCanvasSize();
        selectCanvas.classList.remove('frozen');
        document.getElementById('btnSnap').innerText = "Figer";
        confirmModal.style.display = 'none';
        isFrozen = false;
    }

    // ── Coordonnées ───────────────────────────────────────────────────────────
    function getPos(e) {
        const r  = selectCanvas.getBoundingClientRect();
        const ev = e.touches ? e.touches[0] : e;
        const scaleX = selectCanvas.width  / r.width;
        const scaleY = selectCanvas.height / r.height;
        return {
            x: (ev.clientX - r.left) * scaleX,
            y: (ev.clientY - r.top)  * scaleY
        };
    }

    // Contour adapté à la charte (primaire au lieu de violet)
    function drawRect(p) {
        sctx.clearRect(0, 0, selectCanvas.width, selectCanvas.height);
        const rx = startX, ry = startY, rw = p.x - startX, rh = p.y - startY;

        // Contour extérieur blanc (halo de lisibilité)
        sctx.strokeStyle = "rgba(255, 255, 255, 0.85)";
        sctx.lineWidth   = 9;
        sctx.shadowColor = "rgba(255, 255, 255, 0.4)";
        sctx.shadowBlur  = 8;
        sctx.strokeRect(rx, ry, rw, rh);

        // Contour intérieur bleu profond avec glow
        sctx.strokeStyle = "#0A2472";
        sctx.lineWidth   = 4;
        sctx.shadowColor = "rgba(10, 36, 114, 0.9)";
        sctx.shadowBlur  = 14;
        sctx.strokeRect(rx, ry, rw, rh);

        // Reset shadow
        sctx.shadowColor = "transparent";
        sctx.shadowBlur  = 0;
    }

    // ── Touch ─────────────────────────────────────────────────────────────────
    selectCanvas.addEventListener('touchstart',  (e) => { if (!isFrozen) return; e.preventDefault(); const p = getPos(e); startX = p.x; startY = p.y; isDrawing = true; }, { passive: false });
    selectCanvas.addEventListener('touchmove',   (e) => { if (!isDrawing) return; e.preventDefault(); drawRect(getPos(e)); }, { passive: false });
    selectCanvas.addEventListener('touchend',    async (e) => { if (!isDrawing) return; isDrawing = false; const p = getPos(e.changedTouches[0]); await processSelection(p); });

    // ── Souris ────────────────────────────────────────────────────────────────
    selectCanvas.addEventListener('mousedown',  (e) => { if (!isFrozen) return; const p = getPos(e); startX = p.x; startY = p.y; isDrawing = true; });
    selectCanvas.addEventListener('mousemove',  (e) => { if (!isDrawing) return; drawRect(getPos(e)); });
    selectCanvas.addEventListener('mouseup',    async (e) => { if (!isDrawing) return; isDrawing = false; await processSelection(getPos(e)); });
    selectCanvas.addEventListener('mouseleave', () => { isDrawing = false; });

    // ── OCR ───────────────────────────────────────────────────────────────────
    async function processSelection(p) {
        const w = Math.abs(p.x - startX);
        const h = Math.abs(p.y - startY);
        const x = Math.min(startX, p.x);
        const y = Math.min(startY, p.y);

        if (w < 20 || h < 10) return;

        ocrCancelled = false;
        loader.style.display = 'block';

        const c1 = document.createElement('canvas');
        const c2 = document.createElement('canvas');
        c1.width = c2.width = w;
        c1.height = c2.height = h;
        const ctx1 = c1.getContext('2d');
        const ctx2 = c2.getContext('2d');

        ctx1.drawImage(photoCanvas, x, y, w, h, 0, 0, w, h);

        ctx2.filter = 'brightness(0.9) contrast(1.2)';
        ctx2.drawImage(photoCanvas, x, y, w, h, 0, 0, w, h);

        try {
            const [r1, r2] = await Promise.all([
                Tesseract.recognize(c1, 'fra'),
                Tesseract.recognize(c2, 'fra')
            ]);

            if (ocrCancelled) return;

            const clean = (t) => t.replace(/-\s+/g, '').replace(/\s+/g, ' ').trim();
            const t1 = clean(r1.data.text);
            const t2 = clean(r2.data.text);
            ocrEditArea.value = (t1.length >= t2.length) ? t1 : t2;
            confirmModal.style.display = 'block';
        } catch(err) {
            if (!ocrCancelled) alert("Erreur OCR : " + err.message);
        }

        loader.style.display = 'none';
    }

    function stopOcr() {
        ocrCancelled = true;
        loader.style.display = 'none';
        sctx.clearRect(0, 0, selectCanvas.width, selectCanvas.height);
    }

    // ── Sauvegarde / Export ───────────────────────────────────────────────────

        const p = document.getElementById('pageInput').value;
        if (!p) return alert("Indiquez la page.");
        const texte = ocrEditArea.value.replace(/\s\s+/g, ' ').trim();
        historyData.push(`« ${texte} » p. ${p}`);
        document.getElementById('pageInput').value = "";
        updateCount();
        closeModal();
        reset();
    }

    function closeModal() {
        confirmModal.style.display = 'none';
        reset();
    }

    let dico = null;

    async function chargerDictionnaire() {
        if (dico) return;
        try {
            const r = await fetch('https://raw.githubusercontent.com/lorenbrichter/Words/master/Words/fr.txt');
            const txt = await r.text();

    // ── MODULE ISBN COMPLET ───────────────────────────────────────────────────

    // ── helpers champs ──────────────────────────────────────────────────────
    function setMetaField(id, value) {
        const el = document.getElementById('meta' + id);
        if (el && value && !el.value.trim()) el.value = value;
    }
    function isbnExtractYear(s) { return (s || '').match(/\d{4}/)?.[0] || ''; }
    function isbnSplitAuthor(name) {
        if (!name) return { prenom: '', nom: '' };
        if (name.includes(',')) {
            let [nom, prenom] = name.split(',').map(s => s.trim());
            return { prenom: prenom || '', nom };
        }
        let parts = name.trim().split(/\s+/);
        if (parts.length === 1) return { prenom: '', nom: parts[0] };
        return { prenom: parts.slice(0, -1).join(' '), nom: parts[parts.length - 1] };
    }
    function isbnFeedback(msg) {
        const fb = document.getElementById('isbn-feedback-meta');
        if (fb) fb.textContent = msg;
    }

    // ── UNIMARC helpers ──────────────────────────────────────────────────────
    function _bnfGetAll(xml, tag, code) {
        const results = [];
        for (let el of xml.getElementsByTagName('*')) {
            const local = el.localName || el.nodeName.split(':').pop();
            if (local !== 'datafield') continue;
            if (el.getAttribute('tag') !== tag) continue;
            if (!code) { results.push(el.textContent.trim()); continue; }
            for (let sf of el.getElementsByTagName('*')) {
                const sfLocal = sf.localName || sf.nodeName.split(':').pop();
                if (sfLocal === 'subfield' && sf.getAttribute('code') === code)
                    results.push(sf.textContent.trim());
            }
        }
        return results;
    }
    function _bnfGet(xml, tag, code) { return _bnfGetAll(xml, tag, code)[0] || ''; }
    function _bnfClean(s) { return (s || '').replace(/[\[\]]/g, '').replace(/\s*[,;:.\/]\s*$/, '').trim(); }

    // ── BnF UNIMARC fill ────────────────────────────────────────────────────
    async function fillFromBNF(xmlText) {
        const parser = new DOMParser();
        const xml = parser.parseFromString(xmlText, 'text/xml');
        let hasRecord = false;
        for (let n of xml.getElementsByTagName('*')) {
            const local = n.localName || n.nodeName.split(':').pop();
            if (local === 'record' || local === 'recordData') { hasRecord = true; break; }
        }
        if (!hasRecord) return false;

        const titrePropre = _bnfClean(_bnfGet(xml, '200', 'a'));
        const sousTitre   = _bnfClean(_bnfGet(xml, '200', 'e'));
        const titreComplet = sousTitre ? `${titrePropre} : ${sousTitre}` : titrePropre;

        let nomAuteur = '', prenomAuteur = '';
        for (const zone of ['700', '701', '702']) {
            const nom    = _bnfClean(_bnfGet(xml, zone, 'a'));
            const prenom = _bnfClean(_bnfGet(xml, zone, 'b'));
            if (nom) { nomAuteur = nom; prenomAuteur = prenom; break; }
        }
        if (!nomAuteur) nomAuteur = _bnfClean(_bnfGet(xml, '710', 'a'));

        const ville    = _bnfClean(_bnfGetAll(xml, '214', 'a')[0] || _bnfGetAll(xml, '210', 'a')[0] || '');
        const editeur  = _bnfClean(_bnfGetAll(xml, '214', 'c')[0] || _bnfGetAll(xml, '210', 'c')[0] || '');
        const anneeRaw =            _bnfGetAll(xml, '214', 'd')[0] || _bnfGetAll(xml, '210', 'd')[0] || '';
        const collTitre = _bnfClean(_bnfGet(xml, '225', 'a'));
        const collNum   = _bnfClean(_bnfGet(xml, '225', 'v'));
        const collection = collTitre ? (collNum ? `${collTitre}, n°${collNum}` : collTitre) : '';

        if (titreComplet) setMetaField('Titre', titreComplet);
        if (nomAuteur) {
            // Reconstituer "Prénom Nom" pour le champ unique
            const full = prenomAuteur ? `${prenomAuteur} ${nomAuteur}` : nomAuteur;
            setMetaField('Prenom', full);
        }
        if (editeur)   setMetaField('Editeur', editeur);
        if (ville)     setMetaField('Ville', ville);
        if (anneeRaw)  setMetaField('Annee', isbnExtractYear(anneeRaw));
        if (collection) setMetaField('Collection', collection);

        return !!(titreComplet || nomAuteur || editeur);
    }

    // ── BnF Dublin Core fill ─────────────────────────────────────────────────
    async function fillFromBNFDublinCore(xmlText) {
        const parser = new DOMParser();
        const xml = parser.parseFromString(xmlText, 'text/xml');
        const dcGet = (tag) => {
            for (let el of xml.getElementsByTagName('*'))
                if ((el.localName || el.nodeName.split(':').pop()).toLowerCase() === tag)
                    return el.textContent.trim();
            return '';
        };
        const dcGetAll = (tag) => {
            const r = [];
            for (let el of xml.getElementsByTagName('*'))
                if ((el.localName || el.nodeName.split(':').pop()).toLowerCase() === tag)
                    r.push(el.textContent.trim());
            return r;
        };
        const titre    = dcGet('title');
        const creators = dcGetAll('creator');
        const publisher= dcGet('publisher');
        const date     = dcGet('date');
        const desc     = dcGet('description');
        const descMatch = desc.match(/^([^:]+)\s*:\s*([^,]+)/);

        if (titre)          setMetaField('Titre', titre);
        if (publisher)      setMetaField('Editeur', _bnfClean(publisher));
        if (descMatch)      { setMetaField('Ville', _bnfClean(descMatch[1])); setMetaField('Editeur', _bnfClean(descMatch[2])); }
        if (date)           setMetaField('Annee', isbnExtractYear(date));
        if (creators.length) {
            const { prenom, nom } = isbnSplitAuthor(creators[0]);
            const full = prenom ? `${prenom} ${nom}` : nom;
            setMetaField('Prenom', full);
        }
        return !!(titre || creators.length || publisher);
    }

    // ── Cascade BnF → OpenLibrary → Google Books ─────────────────────────────
    async function fetchISBN(isbn) {
        let clean = isbn.replace(/[^0-9Xx]/g, '').toUpperCase();
        if (clean.length !== 10 && clean.length !== 13) return false;

        // 1. BnF UNIMARC
        isbnFeedback('⏳ BnF UNIMARC…');
        try {
            const q   = encodeURIComponent('"' + clean + '"');
            const res = await fetch(`https://catalogue.bnf.fr/api/SRU?version=1.2&operation=searchRetrieve&query=bib.isbn%20adj%20${q}&recordSchema=unimarcXchange&maximumRecords=3`);
            if (res.ok) {
                const ok = await fillFromBNF(await res.text());
                if (ok) { isbnFeedback('✓ BnF UNIMARC'); return true; }
            }
        } catch(e) { console.warn('[BnF UNIMARC]', e); }

        // 2. BnF Dublin Core
        isbnFeedback('⏳ BnF Dublin Core…');
        try {
            const q   = encodeURIComponent('"' + clean + '"');
            const res = await fetch(`https://catalogue.bnf.fr/api/SRU?version=1.2&operation=searchRetrieve&query=bib.isbn%20adj%20${q}&recordSchema=dublincore&maximumRecords=1`);
            if (res.ok) {
                const ok = await fillFromBNFDublinCore(await res.text());
                if (ok) { isbnFeedback('✓ BnF Dublin Core'); return true; }
            }
        } catch(e) { console.warn('[BnF DC]', e); }

        // 3. OpenLibrary
        isbnFeedback('⏳ OpenLibrary…');
        try {
            const ol = await fetch(`https://openlibrary.org/api/books?bibkeys=ISBN:${clean}&format=json&jscmd=data`).then(r => r.json());
            if (ol[`ISBN:${clean}`]) {
                const book = ol[`ISBN:${clean}`];
                setMetaField('Titre', book.title || '');
                setMetaField('Editeur', book.publishers?.[0]?.name || '');
                setMetaField('Ville', book.publish_places?.[0]?.name || '');
                setMetaField('Annee', isbnExtractYear(book.publish_date || ''));
                setMetaField('Collection', book.series?.[0]?.name || '');
                const aName = book.authors?.[0]?.name || '';
                if (aName) {
                    const { prenom, nom } = isbnSplitAuthor(aName);
                    setMetaField('Prenom', prenom ? `${prenom} ${nom}` : nom);
                }
                isbnFeedback('✓ OpenLibrary');
                return true;
            }
        } catch(e) {}

        // 4. Google Books
        isbnFeedback('⏳ Google Books…');
        try {
            const gb = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${clean}`).then(r => r.json());
            if (gb.items && gb.items[0]) {
                const info = gb.items[0].volumeInfo;
                setMetaField('Titre', info.title || '');
                setMetaField('Editeur', info.publisher || '');
                setMetaField('Annee', isbnExtractYear(info.publishedDate || ''));
                const authors = info.authors || [];
                if (authors.length) {
                    const { prenom, nom } = isbnSplitAuthor(authors[0]);
                    setMetaField('Prenom', prenom ? `${prenom} ${nom}` : nom);
                }
                isbnFeedback('✓ Google Books');
                return true;
            }
        } catch(e) {}

        isbnFeedback('✗ ISBN introuvable');
        return false;
    }

    // ── Debounce ─────────────────────────────────────────────────────────────
    function _isbnDebounce(fn, ms) { let t; return function(...a) { clearTimeout(t); t = setTimeout(() => fn.apply(this, a), ms); }; }

    // ── Écoute saisie ISBN dans la modale ────────────────────────────────────
    document.getElementById('metaISBN').addEventListener(
        'input',
        _isbnDebounce(e => {
            const val = e.target.value.replace(/[^0-9X]/gi, '');
            if (val.length === 10 || val.length === 13) fetchISBN(val);
        }, 500)
    );

    // ── Scanner caméra ISBN ───────────────────────────────────────────────────
    let _isbnScannerActive = false, _isbnStream = null, _isbnFrame = null;

    function _buildISBNOverlay() {
        if (document.getElementById('isbn-scan-overlay')) return;
        const div = document.createElement('div');
        div.id = 'isbn-scan-overlay';
        div.innerHTML = `
            <video id="isbn-scan-video" autoplay playsinline muted></video>
            <p id="isbn-scan-hint">Initialisation…</p>
            <button class="scan-close" onclick="stopISBNScanner()">✕ Fermer</button>`;
        document.body.appendChild(div);
    }

    async function _getBestRearCamera() {
        const fallbacks = [
            { video: { facingMode: { exact: 'environment' }, width: { ideal: 4096 }, height: { ideal: 2160 } } },
            { video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } } },
            { video: { facingMode: 'environment' } },
            { video: true }
        ];
        if (navigator.mediaDevices.enumerateDevices) {
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                const rearCams = devices.filter(d => d.kind === 'videoinput' && /(back|rear|environment|arrière|facing back|0,)/i.test(d.label));
                const mainCam = rearCams.find(d => !/(ultra|wide|tele|macro|depth|[234],)/i.test(d.label)) || rearCams[0];
                if (mainCam) {
                    try {
                        return await navigator.mediaDevices.getUserMedia({ video: { deviceId: { exact: mainCam.deviceId }, width: { ideal: 4096 }, height: { ideal: 2160 } } });
                    } catch(e) {}
                }
            } catch(e) {}
        }
        for (const c of fallbacks) {
            try { return await navigator.mediaDevices.getUserMedia(c); } catch(e) {}
        }
        throw new Error('Aucune caméra accessible');
    }

    window.startISBNScanner = async function startISBNScanner() {
        if (_isbnScannerActive) return;
        _buildISBNOverlay();
        const video = document.getElementById('isbn-scan-video');
        const hint  = document.getElementById('isbn-scan-hint');
        hint.textContent = 'Ouverture caméra…';
        try {
            const stream = await _getBestRearCamera();
            _isbnStream = stream;
            video.srcObject = stream;
            await video.play();
            _isbnScannerActive = true;   // armé AVANT la boucle
            hint.textContent = 'Centrez le code-barres ISBN';

            // Autofocus continu
            const track = stream.getVideoTracks()[0];
            if (track) {
                try { await track.applyConstraints({ advanced: [{ focusMode: 'continuous' }] }); } catch(e) {}
            }

            if ('BarcodeDetector' in window) {
                const detector = new BarcodeDetector({ formats: ['ean_13', 'ean_8', 'upc_a', 'code_128'] });
                const tick = () => {
                    if (!_isbnScannerActive) return;          // stop propre
                    if (video.readyState >= 2) {
                        detector.detect(video).then(codes => {
                            if (codes.length && _isbnScannerActive)   // double-guard
                                _onISBNDetected(codes[0].rawValue);
                        }).catch(() => {});
                    }
                    _isbnFrame = requestAnimationFrame(tick);
                };
                tick();
            } else {
                // Fallback Quagga2
                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.2.6/dist/quagga.min.js';
                script.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.id = 'quagga-canvas-isbn';
                    canvas.style.display = 'none';
                    document.body.appendChild(canvas);
                    const quaggaTick = () => {
                        if (!_isbnScannerActive) return;
                        if (video.readyState >= 2) {
                            const vw = video.videoWidth, vh = video.videoHeight;
                            if (vw && vh) {
                                canvas.width = vw; canvas.height = vh;
                                canvas.getContext('2d').drawImage(video, 0, 0, vw, vh);
                                const cw = Math.round(vw * 0.9), ch = Math.round(vh * 0.5);
                                const cx = Math.round((vw - cw) / 2), cy = Math.round((vh - ch) / 2);
                                const crop = document.createElement('canvas');
                                crop.width = cw; crop.height = ch;
                                crop.getContext('2d').drawImage(canvas, cx, cy, cw, ch, 0, 0, cw, ch);
                                Quagga.decodeSingle({
                                    decoder: { readers: ['ean_reader', 'ean_8_reader', 'code_128_reader'] },
                                    src: crop.toDataURL()
                                }, result => {
                                    if (result && result.codeResult && result.codeResult.code && _isbnScannerActive)
                                        _onISBNDetected(result.codeResult.code);
                                });
                            }
                        }
                        _isbnFrame = requestAnimationFrame(quaggaTick);
                    };
                    quaggaTick();
                };
                document.head.appendChild(script);
            }
        } catch(err) {
            hint.textContent = 'Erreur caméra : autorisez l\'accès';
            console.error('[ISBN Scanner]', err);
        }
    }

    window.stopISBNScanner = function stopISBNScanner() {
        _isbnScannerActive = false;                           // coupe la boucle en premier
        if (_isbnFrame) { cancelAnimationFrame(_isbnFrame); _isbnFrame = null; }
        if (_isbnStream) { _isbnStream.getTracks().forEach(t => t.stop()); _isbnStream = null; }
        const ov = document.getElementById('isbn-scan-overlay');
        if (ov) ov.remove();
    }

    function _onISBNDetected(code) {
        if (!_isbnScannerActive) return;                      // guard : ignore si déjà arrêté
        const clean = String(code).replace(/[^0-9X]/gi, '');
        if (clean.length !== 13 && clean.length !== 10) return;
        stopISBNScanner();
        const field = document.getElementById('metaISBN');
        if (field) { field.value = clean; fetchISBN(clean); }
    }



    // ── Moteur de correction OCR JS pur ──────────────────────────────────────
    function supprimerArtefacts(texte) {
        return texte
            .replace(/[¤\uFFFD]/g, '●')
            .replace(/(?<![A-Za-zÀ-ÿ0-9])\|(?![A-Za-zÀ-ÿ0-9])/g, '●')
            .replace(/(?<!\w)[_=@#$%^&*~`](?=[A-Za-zÀ-ÿ])/g, '●')
            .replace(/([A-Za-zÀ-ÿ])\d([A-Za-zÀ-ÿ])/g, (m, a, b) => `${a}●${b}`)
            .replace(/ {2,}/g, ' ');
    }

    function detecterMotsColles(texte) {
        if (!dico || dico.size === 0) return texte;
        return texte.replace(/[A-Za-zÀ-ÿ]{10,}/g, (mot) => {
            const m = mot.toLowerCase();
            if (dico.has(m)) return mot;
            for (let k = 3; k <= m.length - 3; k++) {
                const g = m.slice(0, k);
                const d = m.slice(k);
                if (dico.has(g) && dico.has(d)) {
                    return `[${mot} → ${g} ${d}]`;
                }
            }
            return `[${mot} →?]`;
        });
    }

    function fusionnerSequence(fragments) {
        const brut = fragments.join('').toLowerCase();
        if (dico && dico.has(brut)) return [brut];
        if (!dico || dico.size === 0) return null;
        const mots = [];
        let reste = fragments.slice();
        while (reste.length > 0) {
            let trouvé = false;
            for (let len = reste.length; len >= 1; len--) {
                const candidat = reste.slice(0, len).join('').toLowerCase();
                if (dico.has(candidat)) {
                    mots.push(candidat);
                    reste = reste.slice(len);
                    trouvé = true;
                    break;
                }
            }
            if (!trouvé) return null;
        }
        return mots;
    }

    function reconstruireMots(texte) {
        const courants = new Set([
            'a','l','y','e','u','à','en','un','le','la','de','du','et','ou','on',
            'il','ce','se','si','je','tu','me','te','ne','ni','au','ai','es','est',
            'les','des','une','que','qui','par','sur','son','ses','mon','ton',
            'ma','ta','sa','car','or','ici','cet','plus','mais','très',
            'dans','avec','pour','sans','sous','chez','vers','dont','leur','aux'
        ]);

        const tokens = texte.split(/(\s+)/);
        const result = [];
        let i = 0;

        while (i < tokens.length) {
            const tok = tokens[i];
            if (/^[A-Za-zÀ-ÿ]+$/.test(tok) && tok.length <= 4 && !courants.has(tok.toLowerCase())) {
                const sequence = [tok];
                let j = i + 1;
                while (j < tokens.length) {
                    const suivant = tokens[j + 1];
                    if (!suivant || !/^[A-Za-zÀ-ÿ]+$/.test(suivant)) break;
                    if (suivant.length <= 4 && !courants.has(suivant.toLowerCase())) {
                        sequence.push(suivant); j += 2;
                    } else if (sequence.length >= 2 && suivant.length <= 6) {
                        sequence.push(suivant); j += 2; break;
                    } else break;
                }
                if (sequence.length >= 2) {
                    const ancien = sequence.join(' ');
                    const reconstruction = fusionnerSequence(sequence);
                    result.push(reconstruction
                        ? `[${ancien} → ${reconstruction.join(' ')}]`
                        : `[${ancien} →?]`
                    );
                    i = j;
                } else {
                    result.push(tok); i++;
                }
            } else {
                result.push(tok); i++;
            }
        }
        return result.join('');
    }

    function fusionnerTirets(texte) {
        return texte.replace(/([A-Za-zÀ-ÿ]+)-\s*\n\s*([A-Za-zÀ-ÿ]+)/g, '$1$2');
    }

    function regrouperBlocs(texte) {
        let prev;
        do {
            prev = texte;
            texte = texte.replace(/\[([^\]]+)\]\s+\[([^\]]+)\]/g, (match, a, b) => {
                const parse = (s) => {
                    const idx = s.indexOf(' → ');
                    if (idx === -1) return { ancien: s.replace(' →?',''), nouveau: '?' };
                    return { ancien: s.slice(0, idx), nouveau: s.slice(idx + 3) };
                };
                const ba = parse(a), bb = parse(b);
                const nouveauFinal = (ba.nouveau === '?' || bb.nouveau === '?') ? '?' : `${ba.nouveau} ${bb.nouveau}`;
                return `[${ba.ancien} ${bb.ancien} → ${nouveauFinal}]`;
            });
        } while (texte !== prev);
        return texte;
    }

    function corrigerOCR(texte) {
        let t = fusionnerTirets(texte);
        t = supprimerArtefacts(t);
        t = detecterMotsColles(t);
        t = reconstruireMots(t);
        t = regrouperBlocs(t);
        return t;
    }

    // ── Export : modal métadonnées ────────────────────────────────────────────
    function exportJSON() {
        if (!historyData.length) return alert("Vide.");
        document.getElementById('metaModal').classList.add('open');
    }

    function closeMetaModal() {
        document.getElementById('metaModal').classList.remove('open');
    }

    function confirmExport() {
        const prenom     = document.getElementById('metaPrenom').value.trim();
        const titre      = document.getElementById('metaTitre').value.trim();
        const ville      = document.getElementById('metaVille').value.trim();
        const editeur    = document.getElementById('metaEditeur').value.trim();
        const collection = document.getElementById('metaCollection').value.trim();
        const annee      = document.getElementById('metaAnnee').value.trim();

        if (!prenom || !titre) return alert("Prénom Nom et Titre sont requis.");

        lsSave({ prenom, titre, ville, editeur, collection, annee });

        closeMetaModal();

        const rawText = historyData.join('\n----------------\n');
        const texteCorrige = corrigerOCR(rawText);
        const finalText = injectHeaders(texteCorrige, prenom, titre, ville, editeur, collection, annee);

        partager(finalText);
    }

    function injectHeaders(texte, prenom, titre, ville, editeur, collection, annee) {
        return texte.replace(/p\.\s*(\d+)/gi, (match, num) => {
            const collPart = collection ? `, coll. « ${collection} »` : '';
            const header = `(${prenom}, ${titre}, ${ville}, ${editeur}${collPart}, ${annee}, p. ${num}.)`;
            return `${header}`;
        });
    }

    async function partager(texte) {
        if (navigator.share) {
            try {
                await navigator.share({ title: 'Extraction OCR', text: texte });
                return;
            } catch(e) {
                if (e.name === 'AbortError') return;
            }
        }
        window._pendingExportText = texte;
        document.getElementById('filenameInput').value = "extraction";
        document.getElementById('filenameModal').classList.add('open');
    }

    function buildContent() {
        return historyData.join('\n----------------\n');
    }

    function closeFilenameModal() {
        document.getElementById('filenameModal').classList.remove('open');
    }

    function confirmDownload() {
        const nom = document.getElementById('filenameInput').value.trim() || "extraction";
        closeFilenameModal();
        const content = window._pendingExportText || buildContent();
        window._pendingExportText = null;
        const b = new Blob([content], { type: 'text/plain' });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(b);
        a.download = nom + ".txt";
        a.click();
    }

    function updateCount() {
        const n = historyData.length;
        document.getElementById('clearCount').textContent = n;
        document.getElementById('btnClear').style.opacity = n === 0 ? '0.45' : '1';
    }

    function openClearModal() {
        if (!historyData.length) return;
        const n = historyData.length;
        document.getElementById('clearModalCount').textContent = n + ' entrée' + (n > 1 ? 's' : '');
        document.getElementById('clearModal').classList.add('open');
    }
    function closeClearModal() { document.getElementById('clearModal').classList.remove('open'); }
    function confirmClear() { historyData = []; updateCount(); closeClearModal(); }

</script>
</body>
</html>
