<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>OCR-Lines</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root { --primary: #4b4be6; --bg: #000; }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; min-height: 100vh; background: var(--bg); font-family: sans-serif; overflow: hidden; color: white; }

        .app-container { display: flex; flex-direction: column; width: 100%; height: 100vh; min-height: 100vh; }

        #viewport {
            position: relative;
            flex: 1;
            min-height: 0;
            background: #000;
            overflow: hidden;
        }

        /* Video remplit le viewport */
        #video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Canvas superposés, même taille que le viewport */
        #photoCanvas, #selectionCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
        }
        #photoCanvas { display: none; }
        #selectionCanvas { z-index: 10; touch-action: none; cursor: default; }
        #selectionCanvas.frozen { cursor: crosshair; }

        /* Loader */
        #loader {
            display: none;
            position: absolute;
            top: 20px; left: 0;
            width: 100%;
            text-align: center;
            z-index: 50;
            pointer-events: none;
        }
        #loader .loader-inner {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            pointer-events: auto;
        }
        #btnStopOcr {
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 7px 14px;
            font-size: 12px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .badge { background: var(--primary); padding: 8px 20px; border-radius: 30px; font-size: 12px; font-weight: bold; }

        /* Barre de contrôles */
        .controls {
            background: #16161e;
            padding: 15px 10px 35px 10px;
            border-top: 1px solid #333;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-shrink: 0;
            z-index: 100;
            position: relative;
        }
        button {
            padding: 18px;
            border-radius: 12px;
            border: none;
            font-weight: 800;
            font-size: 14px;
            cursor: pointer;
            min-width: 120px;
            text-transform: uppercase;
        }
        .btn-snap { background: #e74c3c; color: white; }
        .btn-export { background: #2ecc71; color: white; }

        /* Bouton effacer — coin haut gauche */
        #btnClear {
            position: absolute;
            top: 14px; left: 14px;
            z-index: 20;
            min-width: 0;
            padding: 9px 14px 9px 11px;
            font-size: 13px;
            font-weight: 800;
            border-radius: 50px;
            background: rgba(20, 20, 30, 0.82);
            color: #ff5f5f;
            border: 1.5px solid rgba(255, 95, 95, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 2px 14px rgba(0,0,0,0.55);
            line-height: 1;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.15s, transform 0.1s;
        }
        #btnClear:active { background: rgba(255, 95, 95, 0.18); transform: scale(0.93); }
        #btnClear .clear-count {
            background: #ff5f5f;
            color: #fff;
            border-radius: 20px;
            padding: 2px 7px;
            font-size: 12px;
            font-weight: 900;
            min-width: 18px;
            text-align: center;
        }

        /* Modal OCR */
        #confirmModal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            color: #333;
            padding: 15px;
            border-radius: 15px;
            width: 88%; max-width: 400px;
            z-index: 200;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }
        #ocrEditArea {
            width: 100%; height: 110px;
            background: #f0f2f5;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 10px;
            font-size: 15px; font-weight: 600;
            margin-bottom: 12px;
            color: #000;
            resize: none; outline: none;
            display: block;
        }
        #pageInput {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #eee;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 12px;
            display: block;
        }
        .modal-btns { display: flex; gap: 10px; }
        .modal-btns button { min-width: 0; flex: 1; padding: 14px; }

        /* Modal confirmation suppression */
        #clearModal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 300;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 30px;
        }
        #clearModal.open { display: flex; animation: fadeIn 0.18s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #clearModalBox {
            background: #1a1a26;
            border: 1px solid rgba(255,95,95,0.25);
            border-radius: 20px;
            width: 88%; max-width: 380px;
            padding: 24px 20px 20px;
            box-shadow: 0 -4px 40px rgba(255,60,60,0.15), 0 10px 40px rgba(0,0,0,0.7);
            animation: slideUp 0.22s cubic-bezier(.22,.9,.36,1);
        }
        @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        #clearModalBox .clear-icon { font-size: 36px; text-align: center; margin-bottom: 10px; }
        #clearModalBox h3 { margin: 0 0 6px; font-size: 17px; color: #fff; text-align: center; }
        #clearModalBox p { margin: 0 0 20px; font-size: 13px; color: #aaa; text-align: center; line-height: 1.5; }
        #clearModalBox p strong { color: #ff7070; }
        .clear-modal-btns { display: flex; gap: 10px; }
        .clear-modal-btns button { flex: 1; min-width: 0; padding: 15px; border-radius: 12px; font-size: 14px; font-weight: 800; text-transform: uppercase; }
        .btn-cancel-clear { background: #2a2a3a; color: #ccc; border: none; }
        .btn-confirm-clear { background: #e74c3c; color: white; border: none; box-shadow: 0 4px 16px rgba(231,76,60,0.35); }

        /* Bouton retour accueil — coin haut droit */
        #btnHome {
            position: absolute;
            top: 14px; right: 14px;
            z-index: 20;
            min-width: 0;
            width: 38px; height: 38px;
            border-radius: 50%;
            background: rgba(20, 20, 30, 0.82);
            color: rgba(255,255,255,0.75);
            border: 1.5px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 2px 14px rgba(0,0,0,0.55);
            font-size: 16px;
            line-height: 1;
            display: flex; align-items: center; justify-content: center;
            text-decoration: none;
            transition: background 0.15s, transform 0.1s;
        }
        #btnHome:active { background: rgba(255,255,255,0.15); transform: scale(0.93); }

        /* Modal métadonnées export */
        #metaModal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 300;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 20px;
        }
        #metaModal.open { display: flex; animation: fadeIn 0.18s ease; }
        #metaModalBox {
            background: #1a1a26;
            border: 1px solid rgba(75,75,230,0.3);
            border-radius: 20px;
            width: 92%; max-width: 420px;
            padding: 22px 18px 18px;
            box-shadow: 0 -4px 40px rgba(75,75,230,0.15), 0 10px 40px rgba(0,0,0,0.7);
            animation: slideUp 0.22s cubic-bezier(.22,.9,.36,1);
            max-height: 88vh;
            overflow-y: auto;
        }
        #metaModalBox h3 { margin: 0 0 16px; font-size: 16px; color: #fff; text-align: center; letter-spacing: 0.03em; }
        .meta-field {
            width: 100%;
            padding: 11px 13px;
            font-size: 15px;
            border: 1.5px solid rgba(75,75,230,0.3);
            border-radius: 10px;
            margin-bottom: 10px;
            display: block;
            background: #0d0d1a;
            color: #fff;
            outline: none;
        }
        .meta-field:focus { border-color: var(--primary); }
        .meta-field::placeholder { color: #555; }
        .meta-modal-btns { display: flex; gap: 10px; margin-top: 6px; }
        .meta-modal-btns button { flex: 1; min-width: 0; padding: 15px; border-radius: 12px; font-size: 14px; font-weight: 800; text-transform: uppercase; }
        .btn-cancel-meta { background: #2a2a3a; color: #ccc; border: none; }
        .btn-confirm-meta { background: var(--primary); color: white; border: none; box-shadow: 0 4px 16px rgba(75,75,230,0.35); }

        /* Loader Claude */
        #claudeLoader {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 400;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(6px);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 14px;
        }
        #claudeLoader.open { display: flex; }
        #claudeLoader .cl-badge {
            background: var(--primary);
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0.05em;
            animation: pulse 1.4s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
        #claudeLoader .cl-sub { font-size: 12px; color: #888; }

        /* Modal nom de fichier (fallback téléchargement) */
        #filenameModal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 300;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 30px;
        }
        #filenameModal.open { display: flex; animation: fadeIn 0.18s ease; }
        #filenameModalBox {
            background: #1a1a26;
            border: 1px solid rgba(75,75,230,0.3);
            border-radius: 20px;
            width: 88%; max-width: 380px;
            padding: 24px 20px 20px;
            box-shadow: 0 -4px 40px rgba(75,75,230,0.15), 0 10px 40px rgba(0,0,0,0.7);
            animation: slideUp 0.22s cubic-bezier(.22,.9,.36,1);
        }
        #filenameModalBox h3 { margin: 0 0 14px; font-size: 17px; color: #fff; text-align: center; }
        #filenameInput {
            width: 100%;
            padding: 13px;
            font-size: 16px;
            border: 2px solid rgba(75,75,230,0.4);
            border-radius: 10px;
            text-align: center;
            margin-bottom: 14px;
            display: block;
            background: #0d0d1a;
            color: #fff;
            outline: none;
        }
        #filenameInput:focus { border-color: var(--primary); }
        .filename-modal-btns { display: flex; gap: 10px; }
        .filename-modal-btns button { flex: 1; min-width: 0; padding: 15px; border-radius: 12px; font-size: 14px; font-weight: 800; text-transform: uppercase; }
        .btn-cancel-filename { background: #2a2a3a; color: #ccc; border: none; }
        .btn-confirm-filename { background: var(--primary); color: white; border: none; box-shadow: 0 4px 16px rgba(75,75,230,0.35); }
    </style>
</head>
<body>

<div class="app-container">
    <div id="viewport">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="photoCanvas"></canvas>
        <canvas id="selectionCanvas"></canvas>
        <div id="loader">
            <div class="loader-inner">
                <span class="badge">ANALYSE COMPARATIVE...</span>
                <button id="btnStopOcr" onclick="stopOcr()">✕ Stop</button>
            </div>
        </div>
        <button id="btnClear" onclick="openClearModal()" title="Effacer l'historique">
            🗑️ Effacer <span class="clear-count" id="clearCount">0</span>
        </button>
        <a id="btnHome" href="#" onclick="window.parent.document.getElementById('iframe_ocr_lines').style.display='none'; return false;" title="Retour à l'accueil">✕</a>
    </div>
    <div class="controls">
        <button class="btn-export" onclick="exportJSON()">Envoi</button>
        <button class="btn-snap" id="btnSnap" onclick="toggleSnap()">Figer</button>
    </div>
</div>

<div id="confirmModal">
    <textarea id="ocrEditArea"></textarea>
    <input type="number" id="pageInput" placeholder="N° Page" inputmode="numeric">
    <div class="modal-btns">
        <button onclick="closeModal()" style="background:#eee; color:#333;">Annuler</button>
        <button onclick="saveResult()" style="background:var(--primary); color:white;">Valider</button>
    </div>
</div>

<div id="clearModal">
    <div id="clearModalBox">
        <div class="clear-icon">🗑️</div>
        <h3>Effacer l'historique</h3>
        <p>Cette action supprimera définitivement<br><strong id="clearModalCount">0 entrée(s)</strong> enregistrée(s).</p>
        <div class="clear-modal-btns">
            <button class="btn-cancel-clear" onclick="closeClearModal()">Annuler</button>
            <button class="btn-confirm-clear" onclick="confirmClear()">Tout supprimer</button>
        </div>
    </div>
</div>

<!-- Modal métadonnées export -->
<div id="metaModal">
    <div id="metaModalBox">
        <h3>📚 Métadonnées de la source</h3>
        <input class="meta-field" id="metaPrenom"     type="text" placeholder="Prénom Nom (auteur)">
        <input class="meta-field" id="metaTitre"      type="text" placeholder="Titre">
        <input class="meta-field" id="metaVille"      type="text" placeholder="Ville d'édition">
        <input class="meta-field" id="metaEditeur"    type="text" placeholder="Éditeur">
        <input class="meta-field" id="metaCollection" type="text" placeholder="Collection">
        <input class="meta-field" id="metaAnnee"      type="text" placeholder="Année" inputmode="numeric">
        <div class="meta-modal-btns">
            <button class="btn-cancel-meta" onclick="closeMetaModal()">Annuler</button>
            <button class="btn-confirm-meta" onclick="confirmExport()">Exporter</button>
        </div>
    </div>
</div>

<!-- Modal nom de fichier (fallback si Web Share API indisponible) -->
<div id="filenameModal">
    <div id="filenameModalBox">
        <h3>📥 Télécharger le fichier</h3>
        <input type="text" id="filenameInput" placeholder="Nom du fichier" value="extraction">
        <div class="filename-modal-btns">
            <button class="btn-cancel-filename" onclick="closeFilenameModal()">Annuler</button>
            <button class="btn-confirm-filename" onclick="confirmDownload()">Télécharger</button>
        </div>
    </div>
</div>

<script>
    const video        = document.getElementById('video');
    const photoCanvas  = document.getElementById('photoCanvas');
    const selectCanvas = document.getElementById('selectionCanvas');
    const pctx         = photoCanvas.getContext('2d');
    const sctx         = selectCanvas.getContext('2d');
    const confirmModal = document.getElementById('confirmModal');
    const ocrEditArea  = document.getElementById('ocrEditArea');
    const loader       = document.getElementById('loader');
    const viewport     = document.getElementById('viewport');

    let isFrozen = false, isDrawing = false, startX, startY;
    let historyData = [];
    let ocrCancelled = false;
    let videoRect = { x: 0, y: 0, w: 0, h: 0 };

    // ── Caméra ────────────────────────────────────────────────────────────────
    window.onload = () => initCamera();

    async function initCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment', width: { ideal: 4096 }, height: { ideal: 2160 } }
            });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                syncCanvasSize();
            };
        } catch(e) { alert("Caméra bloquée : " + e.message); }
    }

    function syncCanvasSize() {
        const vw = viewport.clientWidth;
        const vh = viewport.clientHeight;
        photoCanvas.width  = vw;
        photoCanvas.height = vh;
        selectCanvas.width = vw;
        selectCanvas.height = vh;
    }

    window.addEventListener('resize', () => {
        if (!isFrozen) syncCanvasSize();
    });

    // ── Snap / Reset ──────────────────────────────────────────────────────────
    function toggleSnap() {
        if (!isFrozen) {
            const vidW = video.videoWidth;
            const vidH = video.videoHeight;

            photoCanvas.width  = vidW;
            photoCanvas.height = vidH;
            selectCanvas.width  = vidW;
            selectCanvas.height = vidH;

            pctx.filter = 'contrast(1.15) brightness(1.02) saturate(0)';
            pctx.drawImage(video, 0, 0, vidW, vidH);
            pctx.filter = 'none';

            const imgData = pctx.getImageData(0, 0, vidW, vidH);
            const d = imgData.data;
            for (let i = 0; i < d.length; i += 4) {
                let lum = d[i]*0.3 + d[i+1]*0.59 + d[i+2]*0.11;
                let val = lum < 130 ? lum*0.92 : Math.min(255, lum*1.03);
                d[i] = d[i+1] = d[i+2] = val;
            }
            pctx.putImageData(imgData, 0, 0);

            video.style.display = 'none';
            photoCanvas.style.display = 'block';
            selectCanvas.classList.add('frozen');
            document.getElementById('btnSnap').innerText = "Reprendre";
            isFrozen = true;
        } else {
            reset();
        }
    }

    function reset() {
        video.style.display = 'block';
        photoCanvas.style.display = 'none';
        pctx.clearRect(0, 0, photoCanvas.width, photoCanvas.height);
        sctx.clearRect(0, 0, selectCanvas.width, selectCanvas.height);
        syncCanvasSize();
        selectCanvas.classList.remove('frozen');
        document.getElementById('btnSnap').innerText = "Figer";
        confirmModal.style.display = 'none';
        isFrozen = false;
    }

    // ── Coordonnées ───────────────────────────────────────────────────────────
    function getPos(e) {
        const r  = selectCanvas.getBoundingClientRect();
        const ev = e.touches ? e.touches[0] : e;
        const scaleX = selectCanvas.width  / r.width;
        const scaleY = selectCanvas.height / r.height;
        return {
            x: (ev.clientX - r.left) * scaleX,
            y: (ev.clientY - r.top)  * scaleY
        };
    }

    function drawRect(p) {
        sctx.clearRect(0, 0, selectCanvas.width, selectCanvas.height);
        sctx.strokeStyle = "#4b4be6";
        sctx.lineWidth   = 3;
        sctx.strokeRect(startX, startY, p.x - startX, p.y - startY);
    }

    // ── Touch ─────────────────────────────────────────────────────────────────
    selectCanvas.addEventListener('touchstart',  (e) => { if (!isFrozen) return; e.preventDefault(); const p = getPos(e); startX = p.x; startY = p.y; isDrawing = true; }, { passive: false });
    selectCanvas.addEventListener('touchmove',   (e) => { if (!isDrawing) return; e.preventDefault(); drawRect(getPos(e)); }, { passive: false });
    selectCanvas.addEventListener('touchend',    async (e) => { if (!isDrawing) return; isDrawing = false; const p = getPos(e.changedTouches[0]); await processSelection(p); });

    // ── Souris ────────────────────────────────────────────────────────────────
    selectCanvas.addEventListener('mousedown',  (e) => { if (!isFrozen) return; const p = getPos(e); startX = p.x; startY = p.y; isDrawing = true; });
    selectCanvas.addEventListener('mousemove',  (e) => { if (!isDrawing) return; drawRect(getPos(e)); });
    selectCanvas.addEventListener('mouseup',    async (e) => { if (!isDrawing) return; isDrawing = false; await processSelection(getPos(e)); });
    selectCanvas.addEventListener('mouseleave', () => { isDrawing = false; });

    // ── OCR ───────────────────────────────────────────────────────────────────
    async function processSelection(p) {
        const w = Math.abs(p.x - startX);
        const h = Math.abs(p.y - startY);
        const x = Math.min(startX, p.x);
        const y = Math.min(startY, p.y);

        if (w < 20 || h < 10) return;

        ocrCancelled = false;
        loader.style.display = 'block';

        const c1 = document.createElement('canvas');
        const c2 = document.createElement('canvas');
        c1.width = c2.width = w;
        c1.height = c2.height = h;
        const ctx1 = c1.getContext('2d');
        const ctx2 = c2.getContext('2d');

        ctx1.drawImage(photoCanvas, x, y, w, h, 0, 0, w, h);

        ctx2.filter = 'brightness(0.9) contrast(1.2)';
        ctx2.drawImage(photoCanvas, x, y, w, h, 0, 0, w, h);

        try {
            const [r1, r2] = await Promise.all([
                Tesseract.recognize(c1, 'fra'),
                Tesseract.recognize(c2, 'fra')
            ]);

            if (ocrCancelled) return;

            const clean = (t) => t.replace(/-\s+/g, '').replace(/\s+/g, ' ').trim();
            const t1 = clean(r1.data.text);
            const t2 = clean(r2.data.text);
            ocrEditArea.value = (t1.length >= t2.length) ? t1 : t2;
            confirmModal.style.display = 'block';
        } catch(err) {
            if (!ocrCancelled) alert("Erreur OCR : " + err.message);
        }

        loader.style.display = 'none';
    }

    function stopOcr() {
        ocrCancelled = true;
        loader.style.display = 'none';
        sctx.clearRect(0, 0, selectCanvas.width, selectCanvas.height);
    }

    // ── Sauvegarde / Export ───────────────────────────────────────────────────
    function saveResult() {
        const p = document.getElementById('pageInput').value;
        if (!p) return alert("Indiquez la page.");
        const texte = ocrEditArea.value.replace(/\s\s+/g, ' ').trim();
        historyData.push(`${texte} p. ${p}`);
        document.getElementById('pageInput').value = "";
        updateCount();
        closeModal();
        reset();
    }

    function closeModal() {
        confirmModal.style.display = 'none';
        reset();
    }

    // ── Dictionnaire français ─────────────────────────────────────────────────
    let dico = null;

    async function chargerDictionnaire() {
        if (dico) return;
        try {
            const r = await fetch('https://raw.githubusercontent.com/lorenbrichter/Words/master/Words/fr.txt');
            const txt = await r.text();
            dico = new Set(txt.split('\n').map(w => w.trim().toLowerCase()).filter(w => w.length > 2));
        } catch(e) {
            dico = new Set(); // vide = pas de reconstruction dico
        }
    }

    // Initialiser le dico dès le chargement de l'app
    window.addEventListener('load', () => { chargerDictionnaire(); });

    // ── Moteur de correction OCR JS pur ──────────────────────────────────────

    // Règle 1a : suppression des artefacts parasites → ●
    function supprimerArtefacts(texte) {
        return texte
            .replace(/[¤\uFFFD]/g, '●')
            .replace(/(?<![A-Za-zÀ-ÿ0-9])\|(?![A-Za-zÀ-ÿ0-9])/g, '●')
            // Caractères parasites en début de mot (_Pntadopté, =ES)
            .replace(/(?<!\w)[_=@#$%^&*~`](?=[A-Za-zÀ-ÿ])/g, '●')
            // Chiffres isolés collés entre deux lettres
            .replace(/([A-Za-zÀ-ÿ])\d([A-Za-zÀ-ÿ])/g, (m, a, b) => `${a}●${b}`)
            .replace(/ {2,}/g, ' ');
    }

    // Règle 1b : mots collés sans espace (ennuyeuxet → [ennuyeuxet → ennuyeux et])
    function detecterMotsColles(texte) {
        if (!dico || dico.size === 0) return texte;
        return texte.replace(/[A-Za-zÀ-ÿ]{10,}/g, (mot) => {
            const m = mot.toLowerCase();
            if (dico.has(m)) return mot;
            for (let k = 3; k <= m.length - 3; k++) {
                const g = m.slice(0, k);
                const d = m.slice(k);
                if (dico.has(g) && dico.has(d)) {
                    return `[${mot} → ${g} ${d}]`;
                }
            }
            return `[${mot} →?]`;
        });
    }

    // Tente de fusionner une séquence de fragments en mots du dictionnaire
    function fusionnerSequence(fragments) {
        const brut = fragments.join('').toLowerCase();
        if (dico && dico.has(brut)) return [brut];
        if (!dico || dico.size === 0) return null;
        const mots = [];
        let reste = fragments.slice();
        while (reste.length > 0) {
            let trouvé = false;
            for (let len = reste.length; len >= 1; len--) {
                const candidat = reste.slice(0, len).join('').toLowerCase();
                if (dico.has(candidat)) {
                    mots.push(candidat);
                    reste = reste.slice(len);
                    trouvé = true;
                    break;
                }
            }
            if (!trouvé) return null;
        }
        return mots;
    }

    // Règle 2 : reconstruction des mots cassés avec dictionnaire
    function reconstruireMots(texte) {
        const courants = new Set([
            'a','l','y','e','u','à','en','un','le','la','de','du','et','ou','on',
            'il','ce','se','si','je','tu','me','te','ne','ni','au','ai','es','est',
            'les','des','une','que','qui','par','sur','son','ses','mon','ton',
            'ma','ta','sa','car','or','ici','cet','plus','mais','très',
            'dans','avec','pour','sans','sous','chez','vers','dont','leur','aux'
        ]);

        const tokens = texte.split(/(\s+)/);
        const result = [];
        let i = 0;

        while (i < tokens.length) {
            const tok = tokens[i];
            if (/^[A-Za-zÀ-ÿ]+$/.test(tok) && tok.length <= 4 && !courants.has(tok.toLowerCase())) {
                const sequence = [tok];
                let j = i + 1;
                while (j < tokens.length) {
                    const suivant = tokens[j + 1];
                    if (!suivant || !/^[A-Za-zÀ-ÿ]+$/.test(suivant)) break;
                    if (suivant.length <= 4 && !courants.has(suivant.toLowerCase())) {
                        sequence.push(suivant); j += 2;
                    } else if (sequence.length >= 2 && suivant.length <= 6) {
                        sequence.push(suivant); j += 2; break;
                    } else break;
                }
                if (sequence.length >= 2) {
                    const ancien = sequence.join(' ');
                    const reconstruction = fusionnerSequence(sequence);
                    result.push(reconstruction
                        ? `[${ancien} → ${reconstruction.join(' ')}]`
                        : `[${ancien} →?]`
                    );
                    i = j;
                } else {
                    result.push(tok); i++;
                }
            } else {
                result.push(tok); i++;
            }
        }
        return result.join('');
    }

    // Règle 3 : mots coupés par tiret en fin de ligne → fusion silencieuse
    function fusionnerTirets(texte) {
        return texte.replace(/([A-Za-zÀ-ÿ]+)-\s*\n\s*([A-Za-zÀ-ÿ]+)/g, '$1$2');
    }

    // Règle 4 : regrouper les blocs [...] contigus en un seul bloc
    function regrouperBlocs(texte) {
        let prev;
        do {
            prev = texte;
            texte = texte.replace(/\[([^\]]+)\]\s+\[([^\]]+)\]/g, (match, a, b) => {
                const parse = (s) => {
                    const idx = s.indexOf(' → ');
                    if (idx === -1) return { ancien: s.replace(' →?',''), nouveau: '?' };
                    return { ancien: s.slice(0, idx), nouveau: s.slice(idx + 3) };
                };
                const ba = parse(a), bb = parse(b);
                const nouveauFinal = (ba.nouveau === '?' || bb.nouveau === '?') ? '?' : `${ba.nouveau} ${bb.nouveau}`;
                return `[${ba.ancien} ${bb.ancien} → ${nouveauFinal}]`;
            });
        } while (texte !== prev);
        return texte;
    }

    // Application complète du moteur
    function corrigerOCR(texte) {
        let t = fusionnerTirets(texte);
        t = supprimerArtefacts(t);
        t = detecterMotsColles(t);
        t = reconstruireMots(t);
        t = regrouperBlocs(t);
        return t;
    }

    // ── Export : modal métadonnées ────────────────────────────────────────────
    function exportJSON() {
        if (!historyData.length) return alert("Vide.");
        document.getElementById('metaModal').classList.add('open');
    }

    function closeMetaModal() {
        document.getElementById('metaModal').classList.remove('open');
    }

    function confirmExport() {
        const prenom     = document.getElementById('metaPrenom').value.trim();
        const titre      = document.getElementById('metaTitre').value.trim();
        const ville      = document.getElementById('metaVille').value.trim();
        const editeur    = document.getElementById('metaEditeur').value.trim();
        const collection = document.getElementById('metaCollection').value.trim();
        const annee      = document.getElementById('metaAnnee').value.trim();

        if (!prenom || !titre) return alert("Prénom Nom et Titre sont requis.");

        closeMetaModal();

        // 1. Correction OCR avec marqueurs (sur le texte brut sans "p. X")
        const rawText = historyData.join('\n----------------\n');
        const texteCorrige = corrigerOCR(rawText);

        // 2. Injection des en-têtes — remplace "p. X" par "en-tête\np. X" (une seule occurrence)
        const finalText = injectHeaders(texteCorrige, prenom, titre, ville, editeur, collection, annee);

        // 3. Partage
        partager(finalText);
    }

    // Injection : insère l'en-tête AVANT p. X, conserve p. X une seule fois
    function injectHeaders(texte, prenom, titre, ville, editeur, collection, annee) {
        return texte.replace(/p\.\s*(\d+)/gi, (match, num) => {
            const header = `${prenom}, ${titre}, ${ville}, ${editeur}, coll. « ${collection} », ${annee}, p. ${num}`;
            return `${header}`;
        });
    }

    // Partage natif ou fallback téléchargement
    async function partager(texte) {
        if (navigator.share) {
            try {
                await navigator.share({ title: 'Extraction OCR', text: texte });
                return;
            } catch(e) {
                if (e.name === 'AbortError') return;
            }
        }
        window._pendingExportText = texte;
        document.getElementById('filenameInput').value = "extraction";
        document.getElementById('filenameModal').classList.add('open');
    }

    // Construit le contenu texte brut (sans traitement)
    function buildContent() {
        return historyData.join('\n----------------\n');
    }

    // ── Modal nom de fichier (fallback) ──────────────────────────────────────
    function closeFilenameModal() {
        document.getElementById('filenameModal').classList.remove('open');
    }

    function confirmDownload() {
        const nom = document.getElementById('filenameInput').value.trim() || "extraction";
        closeFilenameModal();
        const content = window._pendingExportText || buildContent();
        window._pendingExportText = null;
        const b = new Blob([content], { type: 'text/plain' });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(b);
        a.download = nom + ".txt";
        a.click();
    }

    // ── Historique ────────────────────────────────────────────────────────────
    function updateCount() {
        const n = historyData.length;
        document.getElementById('clearCount').textContent = n;
        document.getElementById('btnClear').style.opacity = n === 0 ? '0.45' : '1';
    }

    function openClearModal() {
        if (!historyData.length) return;
        const n = historyData.length;
        document.getElementById('clearModalCount').textContent = n + ' entrée' + (n > 1 ? 's' : '');
        document.getElementById('clearModal').classList.add('open');
    }
    function closeClearModal() { document.getElementById('clearModal').classList.remove('open'); }
    function confirmClear() { historyData = []; updateCount(); closeClearModal(); }
</script>
</body>
