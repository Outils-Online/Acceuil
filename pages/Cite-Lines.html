<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Générateur de Citations Bibliographiques</title>
  <!-- Polices selon charte -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    /* ===== VARIABLES — Charte Graphique Ivoire & Corail ===== */
    :root {
      --bg-page: #FDFCF0;
      --bg-card: #FFFFFF;
      --primary: #0A2472;
      --secondary: #006466;
      --accent: #F46060;
      --highlight: #FFD972;
      --ink-light: #5B6E8C;
      --border-light: #E2E0D0;
      --shadow-default: 0 4px 12px rgba(10,36,114,0.15);
      --shadow-hover: 0 8px 20px rgba(10,36,114,0.2);
      --radius-card: 24px;
      --radius-button: 15px;
      --radius-input: 12px;
      --transition: 0.2s ease;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-page);
      color: var(--primary);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.6;
    }

    /* Croix fermeture */
    .close-btn {
      position: fixed;
      top: 20px;
      right: 24px;
      width: 44px;
      height: 44px;
      background: var(--bg-card);
      border: 1px solid var(--secondary);
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.4rem;
      color: var(--primary);
      transition: all var(--transition);
      z-index: 1000;
      box-shadow: var(--shadow-default);
    }
    .close-btn:hover {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
      transform: scale(1.02);
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: clamp(1.5rem, 4vw, 2.5rem) clamp(1rem, 4vw, 2rem);
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
    }

    .section-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.7rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--primary);
      margin-bottom: 0.25rem;
    }

    .section-sub {
      font-size: 0.9rem;
      color: var(--ink-light);
    }

    /* Type selector */
    .type-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .type-btn {
      padding: 8px 20px;
      border: 1.5px solid var(--secondary);
      border-radius: var(--radius-button);
      background: var(--bg-card);
      color: var(--primary);
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .type-btn i { font-size: 1rem; }
    .type-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
      transform: translateY(-2px);
      box-shadow: var(--shadow-default);
    }
    .type-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    .type-btn--scan {
      background: var(--secondary) !important;
      color: white !important;
      border-color: var(--secondary) !important;
    }
    .type-btn--scan:hover {
      background: var(--accent) !important;
      border-color: var(--accent) !important;
    }

    /* Cards */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-card);
      padding: clamp(1.5rem, 3vw, 2rem);
      box-shadow: var(--shadow-default);
      transition: box-shadow var(--transition);
    }
    .card:hover { box-shadow: var(--shadow-hover); }

    .card-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 1.5rem;
      padding-bottom: 0.8rem;
      border-bottom: 2px solid var(--secondary);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .card-title-icon {
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
    }

    /* Form */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    label {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    label .req { color: var(--accent); margin-left: 3px; }
    label .opt {
      font-weight: 400;
      color: var(--ink-light);
      text-transform: none;
      font-size: 0.7rem;
      margin-left: 6px;
    }
    input, select, textarea {
      padding: 12px 14px;
      border: 1px solid var(--secondary);
      border-radius: var(--radius-input);
      background: var(--bg-page);
      color: var(--primary);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      transition: all var(--transition);
      outline: none;
      width: 100%;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(244,96,96,0.2);
      background: var(--bg-card);
    }
    input.error, select.error {
      border-color: var(--accent);
      background-color: rgba(244,96,96,0.05);
    }
    .field-hint { font-size: 0.7rem; color: var(--ink-light); font-style: italic; margin-top: 2px; }
    .error-msg { font-size: 0.7rem; color: var(--accent); display: none; margin-top: 4px; }
    .error-msg.visible { display: block; }

    /* Buttons */
    .form-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 2rem;
    }
    .btn {
      padding: 12px 26px;
      border-radius: var(--radius-button);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: all var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-primary {
      background: var(--accent);
      color: white;
      box-shadow: 0 2px 6px rgba(244,96,96,0.3);
    }
    .btn-primary:hover {
      background: #E04545;
      transform: translateY(-2px);
      box-shadow: 0 6px 14px rgba(244,96,96,0.4);
    }
    .btn-secondary {
      background: transparent;
      color: var(--primary);
      border: 1.5px solid var(--secondary);
    }
    .btn-secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-2px);
    }

    /* Result */
    .result-box {
      background: var(--bg-page);
      border: 2px dashed var(--secondary);
      border-radius: var(--radius-input);
      padding: 1.3rem;
      font-family: 'Space Grotesk', serif;
      font-size: 0.95rem;
      line-height: 1.7;
      color: var(--primary);
      min-height: 100px;
      transition: all var(--transition);
    }
    .result-box.has-content {
      border-style: solid;
      border-color: var(--accent);
      background: rgba(244,96,96,0.05);
    }
    .result-placeholder {
      color: var(--ink-light);
      font-family: 'Inter', sans-serif;
      font-style: italic;
    }
    .result-actions {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    .btn-copy {
      background: var(--primary);
      color: white;
      font-size: 0.85rem;
      padding: 8px 20px;
    }
    .btn-copy:hover { background: var(--secondary); transform: translateY(-1px); }
    .btn-save {
      background: transparent;
      border: 1.5px solid var(--secondary);
      color: var(--primary);
      font-size: 0.85rem;
      padding: 8px 20px;
    }
    .btn-save:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }
    .copy-confirm {
      font-size: 0.8rem;
      color: #2e7d32;
      font-weight: 600;
      display: none;
      align-items: center;
      gap: 5px;
      background: #e8f5e9;
      padding: 5px 12px;
      border-radius: 40px;
    }
    .copy-confirm.show { display: flex; }

    /* History */
    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.2rem;
    }
    .history-count {
      font-size: 0.75rem;
      background: var(--accent);
      color: white;
      border-radius: 40px;
      padding: 2px 10px;
      font-weight: 700;
      margin-left: 10px;
    }
    .history-empty {
      color: var(--ink-light);
      font-style: italic;
      text-align: center;
      padding: 1.8rem 0;
    }
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 420px;
      overflow-y: auto;
    }
    .history-item {
      background: var(--bg-page);
      border: 1px solid var(--border-light);
      border-radius: 16px;
      padding: 14px 18px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      transition: all var(--transition);
    }
    .history-item:hover { border-color: var(--secondary); box-shadow: var(--shadow-default); }
    .history-item-content { flex: 1; min-width: 0; }
    .history-type {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .history-text {
      font-family: 'Space Grotesk', serif;
      font-size: 0.85rem;
      line-height: 1.5;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .history-date { font-size: 0.7rem; color: var(--ink-light); margin-top: 5px; }
    .history-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .btn-icon {
      width: 32px; height: 32px;
      border: none;
      background: transparent;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      transition: all var(--transition);
      color: var(--primary);
    }
    .btn-icon:hover { background: var(--secondary); color: white; }
    .btn-icon.danger:hover { background: var(--accent); color: white; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--primary);
      color: white;
      padding: 12px 24px;
      border-radius: var(--radius-button);
      font-size: 0.85rem;
      font-weight: 600;
      opacity: 0;
      transform: translateY(12px);
      transition: all 0.25s ease;
      pointer-events: none;
      z-index: 300;
      box-shadow: var(--shadow-default);
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* Scanner overlay */
    #isbn-scan-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0,0,0,0.93);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 16px;
    }
    #isbn-scan-video {
      width: 100%;
      max-width: 460px;
      border-radius: 24px;
      box-shadow: 0 12px 28px black;
    }
    #isbn-scan-hint {
      color: #bbb;
      font-size: 12px;
      text-align: center;
    }
    .scan-close {
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.4);
      color: white;
      padding: 8px 20px;
      border-radius: 15px;
      cursor: pointer;
    }

    @media (max-width: 680px) {
      .form-grid { grid-template-columns: 1fr; gap: 16px; }
      .type-btn { font-size: 0.8rem; padding: 6px 14px; }
      .close-btn { top: 12px; right: 16px; width: 40px; height: 40px; }
    }
  </style>
</head>
<body>

<button class="close-btn" onclick="quitterApplication()"><i class="fas fa-times"></i></button>

<div class="container">
  <div>
    <p class="section-title">Générateur de citations</p>
    <p class="section-sub" style="margin-bottom:1rem;">Sélectionnez le type de source à citer</p>
    <div class="type-grid" id="type-grid"></div>
  </div>

  <div class="card" id="form-card">
    <div class="card-title"><span class="card-title-icon"></span><span id="form-card-title">Choisissez un type de source</span></div>
    <div id="dynamic-form"></div>
  </div>

  <div class="card">
    <div class="card-title"><span class="card-title-icon"></span>Résultat</div>
    <div class="result-box" id="result-box"><span class="result-placeholder">La citation générée apparaîtra ici…</span></div>
    <div class="result-actions" id="result-actions" style="display:none;">
      <button class="btn btn-copy" onclick="copyCitation()"><i class="fas fa-copy"></i> Copier</button>
      <button class="btn btn-save" onclick="saveCitation()"><i class="fas fa-save"></i> Sauvegarder</button>
      <span class="copy-confirm" id="copy-confirm"><i class="fas fa-check-circle"></i> Copié !</span>
    </div>
  </div>

  <div class="card">
    <div class="history-header">
      <div class="card-title" style="margin-bottom:0;padding-bottom:0;border:none;">
        <span class="card-title-icon"></span>Historique
        <span class="history-count" id="history-count">0</span>
      </div>
      <button class="btn btn-secondary" style="font-size:0.8rem;padding:6px 18px;" onclick="clearHistory()"><i class="fas fa-trash-alt"></i> Tout effacer</button>
    </div>
    <div id="history-list" class="history-list"><p class="history-empty">Aucune citation sauvegardée.</p></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ---------- MODÈLES DE FORMULAIRES ---------- */
const TYPES = {
  ouvrage: { label:'Ouvrage', icon:'fas fa-book', fields:[
    { id:'isbn', label:'ISBN', required:false, full:true, hint:'ex: 9782070368228 — scanner auto' },
    { id:'prenoms', label:'Prénom(s)', required:true },
    { id:'noms', label:'Nom(s)', required:true },
    { id:'titre', label:'Titre', required:true, full:true },
    { id:'ville', label:'Ville d\'édition', required:true },
    { id:'editeur', label:'Éditeur', required:true },
    { id:'collection', label:'Collection', required:false },
    { id:'annee', label:'Année', required:true, type:'number' },
    { id:'page', label:'Page(s)', required:false }
  ] },
  periodique:{ label:'Périodique', icon:'fas fa-newspaper', fields:[
    { id:'prenoms', label:'Prénom(s)', required:true },
    { id:'noms', label:'Nom(s)', required:true },
    { id:'titre', label:'Titre de l\'article', required:true, full:true },
    { id:'ville', label:'Ville d\'édition', required:true },
    { id:'journal', label:'Journal', required:true },
    { id:'date', label:'Date', required:true, type:'date' },
    { id:'page', label:'Page(s)', required:false },
    { id:'url', label:'URL', required:false, full:true, type:'url' }
  ] },
  musique:{ label:'Musique', icon:'fas fa-music', fields:[
    { id:'prenoms', label:'Prénom(s)', required:true },
    { id:'noms', label:'Nom(s)', required:true },
    { id:'titre', label:'Titre', required:true },
    { id:'min', label:'Durée (min)', required:true, type:'number' },
    { id:'sec', label:'Durée (sec)', required:true, type:'number' },
    { id:'album', label:'Album', required:true },
    { id:'ville', label:'Ville', required:true },
    { id:'producteur', label:'Producteur', required:true },
    { id:'annee', label:'Année', required:true, type:'number' },
    { id:'url', label:'URL', required:false, full:true }
  ] },
  video:{ label:'Vidéo', icon:'fas fa-video', fields:[
    { id:'prenoms', label:'Prénom(s)', required:true },
    { id:'noms', label:'Nom(s)', required:true },
    { id:'titre', label:'Titre', required:true, full:true },
    { id:'ville', label:'Ville', required:true },
    { id:'editeur', label:'Éditeur', required:true },
    { id:'collection', label:'Collection', required:false },
    { id:'annee', label:'Année', required:true, type:'number' },
    { id:'min', label:'Durée (min)', required:true, type:'number' },
    { id:'sec', label:'Durée (sec)', required:true, type:'number' },
    { id:'url', label:'URL', required:false }
  ] },
  revue:{ label:'Revue', icon:'fas fa-graduation-cap', fields:[
    { id:'prenoms', label:'Prénom(s) auteur', required:true },
    { id:'noms', label:'Nom(s) auteur', required:true },
    { id:'titre_article', label:'Titre article', required:true, full:true },
    { id:'prenoms_dir', label:'Prénom(s) dir.', required:false },
    { id:'noms_dir', label:'Nom(s) dir.', required:false },
    { id:'titre_numero', label:'Titre du numéro', required:true, full:true },
    { id:'ville', label:'Ville', required:true },
    { id:'titre_revue', label:'Titre revue', required:true },
    { id:'numero', label:'Numéro', required:false },
    { id:'annee', label:'Année', required:true, type:'number' },
    { id:'page', label:'Page(s)', required:false },
    { id:'url', label:'URL', required:false }
  ] },
  loi:{ label:'Loi', icon:'fas fa-gavel', fields:[
    { id:'type_acte', label:'Type d\'acte', required:true, type:'select', options:['Loi','Ordonnance','Décret','Arrêté'] },
    { id:'numero_loi', label:'Numéro', required:true },
    { id:'date_loi', label:'Date', required:true, type:'date' },
    { id:'article', label:'Article', required:false },
    { id:'recueil', label:'Recueil', required:false },
    { id:'numero_article', label:'Numéro article', required:false },
    { id:'date_vigueur', label:'Date vigueur', required:false, type:'date' },
    { id:'url', label:'URL', required:false }
  ] },
  siteweb:{ label:'Site web', icon:'fas fa-globe', fields:[
    { id:'auteur', label:'Auteur(s)', required:false, full:true },
    { id:'titre', label:'Titre du site', required:true, full:true },
    { id:'plateforme', label:'Plateforme', required:false },
    { id:'url', label:'URL', required:true, full:true }
  ] },
  dictionnaire:{ label:'Dictionnaire', icon:'fas fa-book-open', fields:[
    { id:'prenoms', label:'Prénom(s)', required:true },
    { id:'noms', label:'Nom(s)', required:true },
    { id:'titre', label:'Titre', required:true, full:true },
    { id:'volume', label:'Volume', required:false },
    { id:'ville', label:'Ville', required:true },
    { id:'editeur', label:'Éditeur', required:true },
    { id:'annee', label:'Année', required:true, type:'number' },
    { id:'page', label:'Page(s)', required:false },
    { id:'url', label:'URL', required:false }
  ] }
};

function v(id){ let el=document.getElementById('f_'+id); return el?el.value.trim():''; }
function formatDateFR(d){ if(!d) return ''; const m=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre']; let [y,mn,dd]=d.split('-'); return `${parseInt(dd)} ${m[parseInt(mn)-1]} ${y}`; }
function todayFR(){ return formatDateFR(new Date().toISOString().split('T')[0]); }
function formatDuration(min,sec){ return `${String(parseInt(min)||0).padStart(2,'0')} min. ${String(parseInt(sec)||0).padStart(2,'0')} sec.`; }

const GENERATORS = {
  ouvrage:d=>`${d.prenoms} ${d.noms}, <em>${d.titre}</em>, ${d.ville}, ${d.editeur}${d.collection?`, coll. « ${d.collection} `:''}, ${d.annee}${d.page?`, p. ${d.page}`:''}.`,
  periodique:d=>`${d.prenoms} ${d.noms}, « ${d.titre} », ${d.ville}, <em>${d.journal}</em>, ${formatDateFR(d.date)}${d.page?`, p. ${d.page}`:''}${d.url?`, <a href="${d.url}" target="_blank">${d.url}</a> (consulté le : ${todayFR()})`:''}.`,
  musique:d=>`${d.prenoms} ${d.noms}, « ${d.titre} », ${formatDuration(d.min,d.sec)}, dans l'album <em>${d.album}</em>, ${d.ville}, ${d.producteur}, ${d.annee}${d.url?`, <a href="${d.url}" target="_blank">${d.url}</a> (consulté le : ${todayFR()})`:''}.`,
  video:d=>`${d.prenoms} ${d.noms}, <em>${d.titre}</em>, ${d.ville}, ${d.editeur}${d.collection?`, coll. « ${d.collection} `:''}, ${d.annee}, ${formatDuration(d.min,d.sec)}${d.url?`, <a href="${d.url}" target="_blank">${d.url}</a> (consulté le : ${todayFR()})`:''}.`,
  revue:d=>`${d.prenoms} ${d.noms}, « ${d.titre_article} »${(d.prenoms_dir&&d.noms_dir)?`, dans ${d.prenoms_dir} ${d.noms_dir} (dir)` : ''}, <em>${d.titre_numero}</em>, ${d.ville}, <em>${d.titre_revue}</em>${d.numero?`, n°${d.numero}`:''}, ${d.annee}${d.page?`, p. ${d.page}`:''}${d.url?`, <a href="${d.url}" target="_blank">${d.url}</a> (consulté le : ${todayFR()})`:''}.`,
  loi:d=>`${d.type_acte} n°${d.numero_loi} du ${formatDateFR(d.date_loi)}${d.article?` - art. ${d.article}`:''}${d.recueil?`, ${d.recueil} [en ligne]`:''}${d.numero_article&&d.date_vigueur?`, Article ${d.numero_article} version en vigueur depuis le ${formatDateFR(d.date_vigueur)}`:''}${d.url?`, <a href="${d.url}" target="_blank">${d.url}</a> (consulté le : ${todayFR()})`:''}.`,
  siteweb:d=>`${d.auteur?d.auteur+', ':''}« ${d.titre} »${d.plateforme?`, ${d.plateforme}`:''}, <a href="${d.url}" target="_blank">${d.url}</a> (consulté le : ${todayFR()}).`,
  dictionnaire:d=>`${d.prenoms} ${d.noms} (dir), <em>${d.titre}</em>${d.volume?`, ${d.volume}`:''}, ${d.ville}, ${d.editeur}, ${d.annee}${d.page?`, p. ${d.page}`:''}${d.url?`, <a href="${d.url}" target="_blank">${d.url}</a> (consulté le : ${todayFR()})`:''}.`
};

let currentType=null, currentCitation='';
let history=JSON.parse(localStorage.getItem('citatio_history')||'[]');

function renderTypeButtons(){
  const grid=document.getElementById('type-grid');
  grid.innerHTML='';
  const scanBtn=document.createElement('button');
  scanBtn.className='type-btn type-btn--scan';
  scanBtn.innerHTML='<i class="fas fa-camera"></i> Capturer ISBN';
  scanBtn.onclick=()=>{ if(typeof startScanner==='function') startScanner(); };
  grid.appendChild(scanBtn);
  Object.entries(TYPES).forEach(([key,type])=>{
    const btn=document.createElement('button');
    btn.className='type-btn';
    btn.dataset.type=key;
    btn.innerHTML=`<i class="${type.icon}"></i> ${type.label}`;
    btn.onclick=()=>selectType(key);
    grid.appendChild(btn);
  });
}
function selectType(key){
  currentType=key;
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.toggle('active',b.dataset.type===key));
  document.getElementById('form-card-title').innerHTML=`<i class="${TYPES[key].icon}"></i> ${TYPES[key].label}`;
  renderForm(key);
  setResult('');
}
function renderForm(key){
  const fields=TYPES[key].fields;
  const container=document.getElementById('dynamic-form');
  container.innerHTML='';
  const gridDiv=document.createElement('div'); gridDiv.className='form-grid';
  fields.forEach(f=>{
    const group=document.createElement('div'); group.className=`form-group${f.full?' full':''}`;
    const label=document.createElement('label'); label.htmlFor='f_'+f.id;
    label.innerHTML=f.label+(f.required?'<span class="req">*</span>':'<span class="opt">(optionnel)</span>');
    group.appendChild(label);
    let input;
    if(f.type==='select'){ input=document.createElement('select'); f.options.forEach(opt=>{let o=document.createElement('option'); o.value=opt; o.textContent=opt; input.appendChild(o);});}
    else if(f.type==='date'){ input=document.createElement('input'); input.type='date';}
    else{ input=document.createElement('input'); input.type=f.type||'text'; if(f.hint) input.placeholder=f.hint;}
    input.id='f_'+f.id; input.required=!!f.required;
    group.appendChild(input);
    if(f.hint && f.type!=='select' && !input.placeholder){
      let hintSpan=document.createElement('span'); hintSpan.className='field-hint'; hintSpan.textContent=f.hint; group.appendChild(hintSpan);
    }
    let errSpan=document.createElement('span'); errSpan.className='error-msg'; errSpan.id='err_'+f.id; errSpan.textContent='Champ requis.'; group.appendChild(errSpan);
    gridDiv.appendChild(group);
  });
  container.appendChild(gridDiv);
  let actions=document.createElement('div'); actions.className='form-actions';
  actions.innerHTML=`<button class="btn btn-primary" onclick="generateCitation()"><i class="fas fa-quote-right"></i> Générer</button><button class="btn btn-secondary" onclick="resetForm()"><i class="fas fa-undo-alt"></i> Réinitialiser</button>`;
  container.appendChild(actions);
  setTimeout(()=>setupISBNField(), 0);
}
function generateCitation(){
  if(!currentType) return;
  let valid=true;
  TYPES[currentType].fields.forEach(f=>{
    let el=document.getElementById('f_'+f.id), err=document.getElementById('err_'+f.id);
    if(f.required && el && !el.value.trim()){ el.classList.add('error'); err.classList.add('visible'); valid=false;}
    else if(el){ el.classList.remove('error'); err.classList.remove('visible');}
  });
  if(!valid){ showToast('⚠ Remplissez les champs obligatoires.'); return; }
  let data={}; TYPES[currentType].fields.forEach(f=>{ data[f.id]=v(f.id); });
  let html=GENERATORS[currentType](data);
  currentCitation=html; setResult(html);
}
function setResult(html){
  let box=document.getElementById('result-box'), actions=document.getElementById('result-actions');
  if(!html){ box.innerHTML='<span class="result-placeholder">La citation générée apparaîtra ici…</span>'; box.classList.remove('has-content'); actions.style.display='none'; currentCitation='';}
  else{ box.innerHTML=html; box.classList.add('has-content'); actions.style.display='flex';}
}
function copyCitation(){ if(!currentCitation) return; let d=document.createElement('div'); d.innerHTML=currentCitation; navigator.clipboard.writeText(d.textContent||d.innerText).then(()=>{ let c=document.getElementById('copy-confirm'); c.classList.add('show'); setTimeout(()=>c.classList.remove('show'),2000);});}
function saveCitation(){ if(!currentCitation) return; let d=document.createElement('div'); d.innerHTML=currentCitation; let item={ id:Date.now(), type:currentType, typeLabel:TYPES[currentType].label, icon:TYPES[currentType].icon, html:currentCitation, text:d.textContent||d.innerText, date:new Date().toLocaleString('fr-FR') }; history.unshift(item); if(history.length>50) history=history.slice(0,50); localStorage.setItem('citatio_history',JSON.stringify(history)); renderHistory(); showToast('✓ Sauvegardée');}
function renderHistory(){ let list=document.getElementById('history-list'), cnt=document.getElementById('history-count'); cnt.textContent=history.length; if(!history.length){ list.innerHTML='<p class="history-empty">Aucune citation sauvegardée.</p>'; return;} list.innerHTML=''; history.forEach(item=>{ let div=document.createElement('div'); div.className='history-item'; div.innerHTML=`<div class="history-item-content"><div class="history-type"><i class="${item.icon}"></i> ${item.typeLabel}</div><div class="history-text">${item.html}</div><div class="history-date"><i class="far fa-calendar-alt"></i> ${item.date}</div></div><div class="history-actions"><button class="btn-icon" onclick="copyHistoryItem(${item.id})"><i class="fas fa-copy"></i></button><button class="btn-icon danger" onclick="deleteHistoryItem(${item.id})"><i class="fas fa-trash-alt"></i></button></div>`; list.appendChild(div);});}
function copyHistoryItem(id){ let item=history.find(h=>h.id===id); if(item) navigator.clipboard.writeText(item.text).then(()=>showToast('✓ Copié !'));}
function deleteHistoryItem(id){ history=history.filter(h=>h.id!==id); localStorage.setItem('citatio_history',JSON.stringify(history)); renderHistory();}
function clearHistory(){ if(history.length){ history=[]; localStorage.setItem('citatio_history','[]'); renderHistory(); showToast('Historique effacé.');}}
function resetForm(){ if(!currentType) return; TYPES[currentType].fields.forEach(f=>{ let el=document.getElementById('f_'+f.id); if(el) el.value=''; let err=document.getElementById('err_'+f.id); if(err) err.classList.remove('visible'); }); setResult('');}
function showToast(msg){ let t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500);}
function quitterApplication(){ window.top.location.href='https://outils-online.github.io/Acceuil/';}

/* ========================================================
   MODULE ISBN COMPLET — RÉPARÉ (inspiré de Cite-Lines.html)
   ======================================================== */
function setField(id, value) {
  let el = document.getElementById('f_'+id);
  if(el && value && !el.value.trim()) el.value = value;
}
function extractYear(s) { return (s||'').match(/\d{4}/)?.[0] || ''; }
function splitAuthor(name) {
  if(!name) return {prenom:'', nom:''};
  if(name.includes(',')){ let [nom, prenom]=name.split(',').map(s=>s.trim()); return {prenom:prenom||'', nom}; }
  let parts=name.trim().split(/\s+/);
  if(parts.length===1) return {prenom:'', nom:parts[0]};
  return {prenom:parts.slice(0,-1).join(' '), nom:parts[parts.length-1]};
}

async function fetchISBN(isbn) {
  let clean = isbn.replace(/[^0-9Xx]/g,'').toUpperCase();
  if(clean.length!==10 && clean.length!==13) return false;
  let fb = document.getElementById('isbn-feedback');
  if(fb) fb.textContent = '⏳ Recherche...';
  try {
    let ol = await fetch(`https://openlibrary.org/api/books?bibkeys=ISBN:${clean}&format=json&jscmd=data`).then(r=>r.json());
    if(ol[`ISBN:${clean}`]) {
      let book = ol[`ISBN:${clean}`];
      setField('titre', book.title || '');
      setField('editeur', book.publishers?.[0]?.name || '');
      setField('ville', book.publish_places?.[0]?.name || '');
      setField('annee', extractYear(book.publish_date || ''));
      setField('collection', book.series?.[0]?.name || '');
      let authorName = book.authors?.[0]?.name || '';
      if(authorName) { let {prenom,nom}=splitAuthor(authorName); setField('prenoms', prenom); setField('noms', nom); }
      if(fb) fb.textContent = '✓ Open Library';
      showToast('✓ ISBN trouvé (Open Library)');
      return true;
    }
  } catch(e) {}
  try {
    let gb = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${clean}`).then(r=>r.json());
    if(gb.items && gb.items[0]) {
      let info = gb.items[0].volumeInfo;
      setField('titre', info.title || '');
      setField('editeur', info.publisher || '');
      setField('annee', extractYear(info.publishedDate || ''));
      let authors = info.authors || [];
      if(authors.length) { let {prenom,nom}=splitAuthor(authors[0]); setField('prenoms', prenom); setField('noms', nom); }
      if(fb) fb.textContent = '✓ Google Books';
      showToast('✓ ISBN trouvé (Google Books)');
      return true;
    }
  } catch(e) {}
  if(fb) fb.textContent = '✗ Introuvable';
  showToast('❌ ISBN non trouvé');
  return false;
}

function setupISBNField() {
  let field = document.getElementById('f_isbn');
  if(!field || field.dataset.isbnReady) return;
  field.dataset.isbnReady = '1';
  let btn = document.createElement('button');
  btn.type = 'button';
  btn.innerHTML = '<i class="fas fa-camera"></i> Scanner ISBN';
  btn.style.marginTop = '8px';
  btn.style.padding = '8px 16px';
  btn.style.borderRadius = '15px';
  btn.style.border = '1px solid var(--secondary)';
  btn.style.background = 'transparent';
  btn.style.cursor = 'pointer';
  btn.style.fontWeight = '600';
  btn.onclick = () => startScanner();
  field.parentNode.appendChild(btn);
  let fb = document.createElement('span');
  fb.id = 'isbn-feedback';
  fb.style.display = 'block';
  fb.style.fontSize = '0.7rem';
  fb.style.marginTop = '4px';
  field.parentNode.appendChild(fb);
  field.addEventListener('input', debounce(e => {
    let val = e.target.value.replace(/[^0-9X]/gi,'');
    if(val.length===10 || val.length===13) fetchISBN(val);
  }, 500));
}

function debounce(fn, ms) { let t; return function(...a){ clearTimeout(t); t=setTimeout(()=>fn.apply(this,a), ms); }; }

/* ------------- SCANNER CAMERA (BarcodeDetector + Quagga2) ------------- */
let scannerActive = false, videoStream = null, animFrame = null;

function buildOverlay() {
  if(document.getElementById('isbn-scan-overlay')) return;
  let div = document.createElement('div'); div.id = 'isbn-scan-overlay';
  div.innerHTML = `<video id="isbn-scan-video" autoplay playsinline muted style="width:100%;max-width:460px;border-radius:24px;"></video>
                   <p id="isbn-scan-hint" style="color:#fff;">Initialisation...</p>
                   <button class="scan-close" onclick="stopScanner()">✕ Fermer</button>`;
  document.body.appendChild(div);
}

async function startScanner() {
  if(scannerActive) return;
  buildOverlay();
  let video = document.getElementById('isbn-scan-video');
  let hint = document.getElementById('isbn-scan-hint');
  hint.textContent = 'Ouverture caméra...';
  try {
    let stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    videoStream = stream;
    video.srcObject = stream;
    await video.play();
    hint.textContent = 'Centrez le code-barres ISBN';
    scannerActive = true;

    if('BarcodeDetector' in window) {
      let detector = new BarcodeDetector({ formats: ['ean_13','ean_8','upc_a','code_128'] });
      function tick() {
        if(!scannerActive) return;
        if(video.readyState >= 2) {
          detector.detect(video).then(codes => {
            if(codes.length > 0) onISBNDetected(codes[0].rawValue);
          }).catch(()=>{});
        }
        animFrame = requestAnimationFrame(tick);
      }
      tick();
    } else {
      // Fallback Quagga2
      let script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.2.6/dist/quagga.min.js';
      script.onload = () => {
        let canvas = document.createElement('canvas');
        canvas.id = 'quagga-canvas'; canvas.style.display = 'none';
        document.body.appendChild(canvas);
        function quaggaTick() {
          if(!scannerActive) return;
          if(video.readyState >= 2) {
            let vw = video.videoWidth, vh = video.videoHeight;
            if(vw && vh) {
              canvas.width = vw; canvas.height = vh;
              let ctx = canvas.getContext('2d');
              ctx.drawImage(video, 0, 0, vw, vh);
              let cropW = Math.round(vw * 0.9), cropH = Math.round(vh * 0.5);
              let cropX = Math.round((vw - cropW)/2), cropY = Math.round((vh - cropH)/2);
              let cropCanvas = document.createElement('canvas');
              cropCanvas.width = cropW; cropCanvas.height = cropH;
              cropCanvas.getContext('2d').drawImage(canvas, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);
              Quagga.decodeSingle({
                decoder: { readers: ['ean_reader','ean_8_reader','code_128_reader'] },
                src: cropCanvas.toDataURL()
              }, result => {
                if(result && result.codeResult && result.codeResult.code) onISBNDetected(result.codeResult.code);
              });
            }
          }
          animFrame = requestAnimationFrame(quaggaTick);
        }
        quaggaTick();
      };
      document.head.appendChild(script);
    }
  } catch(err) {
    hint.textContent = 'Erreur caméra : autorisez l\'accès';
    console.error(err);
  }
}

function stopScanner() {
  scannerActive = false;
  if(animFrame) cancelAnimationFrame(animFrame);
  if(videoStream) videoStream.getTracks().forEach(t => t.stop());
  let ov = document.getElementById('isbn-scan-overlay');
  if(ov) ov.remove();
}

function onISBNDetected(code) {
  let clean = String(code).replace(/[^0-9X]/gi, '');
  if(clean.length === 13 || clean.length === 10) {
    stopScanner();
    // Sélectionner le type "Ouvrage"
    selectType('ouvrage');
    setTimeout(() => {
      let field = document.getElementById('f_isbn');
      if(field) {
        field.value = clean;
        field.dispatchEvent(new Event('input', { bubbles: true }));
        fetchISBN(clean);
      }
    }, 200);
  }
}

window.startScanner = startScanner;
window.stopScanner = stopScanner;

// Initialisation
renderTypeButtons();
renderHistory();
setupISBNField(); // pour le cas où le champ ISBN existe déjà
</script>
