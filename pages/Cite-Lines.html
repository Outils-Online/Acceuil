<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Générateur de Citations Bibliographiques</title>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ===== VARIABLES ===== */
    :root {
      --bg: #f5f2ee;
      --bg-card: #ffffff;
      --bg-dark: #1a1714;
      --ink: #1a1714;
      --ink-muted: #6b6560;
      --ink-light: #a09b96;
      --accent: #c0392b;
      --accent-light: #e8d5d3;
      --border: #e0dbd5;
      --shadow: 0 2px 16px rgba(26,23,20,0.08);
      --shadow-lg: 0 8px 40px rgba(26,23,20,0.14);
      --radius: 4px;
      --radius-lg: 8px;
      --transition: 0.2s ease;
    }

    [data-theme="dark"] {
      --bg: #16140f;
      --bg-card: #1f1c17;
      --ink: #f0ebe4;
      --ink-muted: #9c9488;
      --ink-light: #5a554e;
      --accent: #e05a4e;
      --accent-light: #2e1a18;
      --border: #2e2a24;
      --shadow: 0 2px 16px rgba(0,0,0,0.3);
      --shadow-lg: 0 8px 40px rgba(0,0,0,0.5);
    }

    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.6;
      transition: background var(--transition), color var(--transition);
    }

    /* ===== HEADER ===== */
    header {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 0 clamp(1rem, 4vw, 3rem);
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow);
    }

    .logo {
      font-family: 'Libre Baskerville', serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-dot {
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      display: inline-block;
    }

    .header-actions { display: flex; align-items: center; gap: 12px; }

    /* ===== DARK MODE TOGGLE ===== */
    .theme-toggle {
      width: 42px; height: 24px;
      background: var(--border);
      border-radius: 12px;
      border: none;
      cursor: pointer;
      position: relative;
      transition: background var(--transition);
    }

    .theme-toggle::after {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      background: var(--bg-card);
      border-radius: 50%;
      top: 3px; left: 3px;
      transition: transform var(--transition), background var(--transition);
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }

    [data-theme="dark"] .theme-toggle { background: var(--accent); }
    [data-theme="dark"] .theme-toggle::after { transform: translateX(18px); }

    .theme-label {
      font-size: 0.78rem;
      color: var(--ink-muted);
      font-weight: 500;
    }

    /* ===== LAYOUT ===== */
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: clamp(1.5rem, 4vw, 3rem) clamp(1rem, 4vw, 2rem);
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
    }

    /* ===== SECTION TITLE ===== */
    .section-title {
      font-family: 'Libre Baskerville', serif;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
    }

    .section-sub {
      font-size: 0.87rem;
      color: var(--ink-muted);
    }

    /* ===== TYPE SELECTOR ===== */
    .type-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .type-btn {
      padding: 7px 16px;
      border: 1.5px solid var(--border);
      border-radius: 100px;
      background: transparent;
      color: var(--ink-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
    }

    .type-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-light);
    }

    .type-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ===== CARD ===== */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: clamp(1.25rem, 3vw, 2rem);
      box-shadow: var(--shadow);
      transition: background var(--transition), border-color var(--transition);
    }

    .card-title {
      font-family: 'Libre Baskerville', serif;
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 1.25rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title-icon {
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ===== FORM ===== */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .form-group.full { grid-column: 1 / -1; }

    label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--ink-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    label .req {
      color: var(--accent);
      margin-left: 2px;
    }

    label .opt {
      font-weight: 400;
      color: var(--ink-light);
      text-transform: none;
      letter-spacing: 0;
      font-size: 0.75rem;
      margin-left: 4px;
    }

    input, select, textarea {
      padding: 9px 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      transition: border-color var(--transition), background var(--transition);
      outline: none;
      width: 100%;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      background: var(--bg-card);
    }

    input.error, select.error { border-color: #e74c3c; }

    textarea { resize: vertical; min-height: 70px; }

    select { cursor: pointer; }

    .field-hint {
      font-size: 0.74rem;
      color: var(--ink-light);
      font-style: italic;
    }

    .error-msg {
      font-size: 0.74rem;
      color: #e74c3c;
      display: none;
    }

    .error-msg.visible { display: block; }

    /* ===== ACTIONS ===== */
    .form-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 1.5rem;
      align-items: center;
    }

    .btn {
      padding: 10px 22px;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover { background: #a93226; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(192,57,43,0.3); }

    .btn-secondary {
      background: transparent;
      color: var(--ink-muted);
      border: 1.5px solid var(--border);
    }

    .btn-secondary:hover { border-color: var(--ink-muted); color: var(--ink); }

    /* ===== RESULT ===== */
    .result-box {
      background: var(--bg);
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      font-family: 'Libre Baskerville', serif;
      font-size: 0.95rem;
      line-height: 1.8;
      color: var(--ink);
      min-height: 80px;
      transition: background var(--transition);
      word-break: break-word;
    }

    .result-box.has-content {
      border-style: solid;
      border-color: var(--accent);
      background: var(--accent-light);
    }

    [data-theme="dark"] .result-box.has-content {
      background: #2a1210;
    }

    .result-placeholder {
      color: var(--ink-light);
      font-family: 'DM Sans', sans-serif;
      font-style: italic;
      font-size: 0.88rem;
    }

    .result-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .btn-copy {
      background: var(--ink);
      color: var(--bg-card);
      font-size: 0.82rem;
      padding: 7px 16px;
    }

    .btn-copy:hover { opacity: 0.85; }

    .btn-save {
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--ink-muted);
      font-size: 0.82rem;
      padding: 7px 16px;
    }

    .btn-save:hover { border-color: var(--accent); color: var(--accent); }

    .copy-confirm {
      font-size: 0.8rem;
      color: #27ae60;
      font-weight: 500;
      display: none;
      align-items: center;
      gap: 4px;
    }

    .copy-confirm.show { display: flex; }

    /* ===== HISTORY ===== */
    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .history-count {
      font-size: 0.8rem;
      background: var(--accent);
      color: #fff;
      border-radius: 100px;
      padding: 2px 9px;
      font-weight: 600;
    }

    .history-empty {
      color: var(--ink-light);
      font-style: italic;
      font-size: 0.88rem;
      text-align: center;
      padding: 1.5rem 0;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 400px;
      overflow-y: auto;
    }

    .history-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      transition: border-color var(--transition);
    }

    .history-item:hover { border-color: var(--accent); }

    .history-item-content {
      flex: 1;
      min-width: 0;
    }

    .history-type {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent);
      margin-bottom: 3px;
    }

    .history-text {
      font-family: 'Libre Baskerville', serif;
      font-size: 0.82rem;
      line-height: 1.5;
      color: var(--ink);
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .history-date {
      font-size: 0.72rem;
      color: var(--ink-light);
      margin-top: 3px;
    }

    .history-actions { display: flex; gap: 4px; flex-shrink: 0; }

    .btn-icon {
      width: 28px; height: 28px;
      border: none;
      background: transparent;
      border-radius: var(--radius);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      transition: background var(--transition);
      color: var(--ink-muted);
    }

    .btn-icon:hover { background: var(--border); color: var(--ink); }

    .btn-icon.danger:hover { background: #fde8e8; color: #e74c3c; }

    /* ===== SCROLLBAR ===== */
    .history-list::-webkit-scrollbar { width: 4px; }
    .history-list::-webkit-scrollbar-track { background: transparent; }
    .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--ink);
      color: var(--bg);
      padding: 10px 20px;
      border-radius: var(--radius);
      font-size: 0.88rem;
      font-weight: 500;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s ease;
      pointer-events: none;
      z-index: 200;
    }

    .toast.show { opacity: 1; transform: translateY(0); }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      .type-grid { gap: 6px; }
      .type-btn { font-size: 0.8rem; padding: 6px 13px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <span class="logo-dot"></span>
    Citatio
  </div>
  <div class="header-actions">
    <span class="theme-label" id="theme-label">Mode sombre</span>
    <button class="theme-toggle" id="theme-toggle" aria-label="Basculer le thème" title="Mode sombre"></button>
  </div>
</header>

<!-- MAIN -->
<div class="container">

  <!-- TYPE SELECTOR -->
  <div>
    <p class="section-title">Générateur de citations</p>
    <p class="section-sub" style="margin-bottom:1rem;">Sélectionnez le type de source à citer</p>
    <div class="type-grid" id="type-grid"></div>
  </div>

  <!-- FORM CARD -->
  <div class="card" id="form-card">
    <div class="card-title">
      <span class="card-title-icon"></span>
      <span id="form-card-title">Choisissez un type de source</span>
    </div>
    <div id="dynamic-form"></div>
  </div>

  <!-- RESULT CARD -->
  <div class="card">
    <div class="card-title">
      <span class="card-title-icon"></span>
      Résultat
    </div>
    <div class="result-box" id="result-box">
      <span class="result-placeholder">La citation générée apparaîtra ici…</span>
    </div>
    <div class="result-actions" id="result-actions" style="display:none;">
      <button class="btn btn-copy" id="btn-copy" onclick="copyCitation()">
        📋 Copier
      </button>
      <button class="btn btn-save" onclick="saveCitation()">
        💾 Sauvegarder dans l'historique
      </button>
      <span class="copy-confirm" id="copy-confirm">✓ Copié !</span>
    </div>
  </div>

  <!-- HISTORY CARD -->
  <div class="card">
    <div class="history-header">
      <div class="card-title" style="margin-bottom:0;padding-bottom:0;border:none;">
        <span class="card-title-icon"></span>
        Historique
        <span class="history-count" id="history-count">0</span>
      </div>
      <button class="btn btn-secondary" style="font-size:0.8rem;padding:6px 14px;" onclick="clearHistory()">Tout effacer</button>
    </div>
    <div id="history-list" class="history-list">
      <p class="history-empty">Aucune citation sauvegardée.</p>
    </div>
  </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
/* ========================================================
   MODÈLES DE FORMULAIRES PAR TYPE
   ======================================================== */

/* ========================================================
   UTILS
   ======================================================== */

/** Formate une date ISO YYYY-MM-DD en "JJ mois AAAA" en français */
function formatDateFR(dateStr) {
  if (!dateStr) return '';
  const MOIS = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  const [y, m, d] = dateStr.split('-');
  return `${parseInt(d)} ${MOIS[parseInt(m)-1]} ${y}`;
}

/** Formate les secondes/minutes en "00 min. 00 sec." */
function formatDuration(min, sec) {
  const m = String(parseInt(min)||0).padStart(2,'0');
  const s = String(parseInt(sec)||0).padStart(2,'0');
  return `${m} min. ${s} sec.`;
}

/** Retourne aujourd'hui en français */
function todayFR() {
  return formatDateFR(new Date().toISOString().split('T')[0]);
}

/** Lire la valeur d'un champ du formulaire */
function v(id) {
  const el = document.getElementById('f_'+id);
  return el ? el.value.trim() : '';
}

/* ========================================================
   GÉNÉRATEURS DE CITATIONS
   ======================================================== */
const GENERATORS = {
  ouvrage(d) {
    let c = `${d.prenoms} ${d.noms}, <em>${d.titre}</em>, ${d.ville}, ${d.editeur}`;
    if (d.collection) c += `, coll. « ${d.collection} »`;
    c += `, ${d.annee}`;
    if (d.page) c += `, p. ${d.page}`;
    c += '.';
    return c;
  },
  periodique(d) {
    let c = `${d.prenoms} ${d.noms}, « ${d.titre} », ${d.ville}, <em>${d.journal}</em>, ${formatDateFR(d.date)}`;
    if (d.page) c += `, p. ${d.page}`;
    if (d.url) c += `, <a href="${d.url}" target="_blank">${d.url}</a> (consulté le : ${todayFR()})`;
    c += '.';
    return c;
  },
  musique(d) {
    let c = `${d.prenoms} ${d.noms}, « ${d.titre} », ${formatDuration(d.min, d.sec)}, dans l'album <em>${d.album}</em>, ${d.ville}, ${d.producteur}, ${d.annee}`;
    if (d.url) c += `, <a href="${d.url}" target="_blank">${d.url}</a> (consulté le : ${todayFR()})`;
    c += '.';
    return c;
  },
  video(d) {
    let c = `${d.prenoms} ${d.noms}, <em>${d.titre}</em>, ${d.ville}, ${d.editeur}`;
    if (d.collection) c += `, coll. « ${d.collection} »`;
    c += `, ${d.annee}, ${formatDuration(d.min, d.sec)}`;
    if (d.url) c += `, <a href="${d.url}" target="_blank">${d.url}</a> (consulté le : ${todayFR()})`;
    c += '.';
    return c;
  },
  revue(d) {
    let c = `${d.prenoms} ${d.noms}, « ${d.titre_article} »`;
    if (d.prenoms_dir && d.noms_dir) c += `, dans ${d.prenoms_dir} ${d.noms_dir} (dir)`;
    c += `, <em>${d.titre_numero}</em>, ${d.ville}, <em>${d.titre_revue}</em>`;
    if (d.numero) c += `, n°${d.numero}`;
    c += `, ${d.annee}`;
    if (d.page) c += `, p. ${d.page}`;
    if (d.url) c += `, <a href="${d.url}" target="_blank">${d.url}</a> (consulté le : ${todayFR()})`;
    c += '.';
    return c;
  },
  loi(d) {
    let c = `${d.type_acte} n°${d.numero_loi} du ${formatDateFR(d.date_loi)}`;
    if (d.article) c += ` - art. ${d.article}`;
    if (d.recueil) c += `, ${d.recueil} [en ligne]`;
    if (d.numero_article && d.date_vigueur) c += `, Article ${d.numero_article} version en vigueur depuis le ${formatDateFR(d.date_vigueur)}`;
    if (d.url) c += `, <a href="${d.url}" target="_blank">${d.url}</a> (consulté le : ${todayFR()})`;
    c += '.';
    return c;
  },
  siteweb(d) {
    let c = '';
    if (d.auteur) c += `${d.auteur}, `;
    c += `« ${d.titre} »`;
    if (d.plateforme) c += `, ${d.plateforme}`;
    c += `, <a href="${d.url}" target="_blank">${d.url}</a> (consulté le : ${todayFR()})`;
    c += '.';
    return c;
  },
  dictionnaire(d) {
    let c = `${d.prenoms} ${d.noms} (dir), <em>${d.titre}</em>`;
    if (d.volume) c += `, ${d.volume}`;
    c += `, ${d.ville}, ${d.editeur}, ${d.annee}`;
    if (d.page) c += `, p. ${d.page}`;
    if (d.url) c += `, <a href="${d.url}" target="_blank">${d.url}</a> (consulté le : ${todayFR()})`;
    c += '.';
    return c;
  }
};

/* ========================================================
   ÉTAT GLOBAL
   ======================================================== */
let currentType = null;
let currentCitation = '';
let history = JSON.parse(localStorage.getItem('citatio_history') || '[]');

/* ========================================================
   RENDU DU FORMULAIRE
   ======================================================== */
function renderTypeButtons() {
  const grid = document.getElementById('type-grid');
  grid.innerHTML = '';
  Object.entries(TYPES).forEach(([key, type]) => {
    const btn = document.createElement('button');
    btn.className = 'type-btn';
    btn.dataset.type = key;
    btn.textContent = `${type.icon} ${type.label}`;
    btn.onclick = () => selectType(key);
    grid.appendChild(btn);
  });
}

function selectType(key) {
  currentType = key;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.toggle('active', b.dataset.type === key));
  document.getElementById('form-card-title').textContent = `${TYPES[key].icon} ${TYPES[key].label}`;
  renderForm(key);
  // Reset result
  setResult('');
}

function renderForm(key) {
  const fields = TYPES[key].fields;
  const container = document.getElementById('dynamic-form');
  container.innerHTML = '';

  const grid = document.createElement('div');
  grid.className = 'form-grid';

  fields.forEach(f => {
    const group = document.createElement('div');
    group.className = `form-group${f.full ? ' full' : ''}`;

    const label = document.createElement('label');
    label.htmlFor = 'f_' + f.id;
    label.innerHTML = f.label + (f.required ? '<span class="req">*</span>' : '<span class="opt">(optionnel)</span>');
    group.appendChild(label);

    let input;
    if (f.type === 'select') {
      input = document.createElement('select');
      f.options.forEach(opt => {
        const o = document.createElement('option');
        o.value = opt; o.textContent = opt;
        input.appendChild(o);
      });
    } else if (f.type === 'date') {
      input = document.createElement('input');
      input.type = 'date';
    } else {
      input = document.createElement('input');
      input.type = f.type || 'text';
      if (f.hint) input.placeholder = f.hint;
    }

    input.id = 'f_' + f.id;
    input.required = !!f.required;
    group.appendChild(input);

    if (f.hint && f.type !== 'select' && !input.placeholder) {
      const hint = document.createElement('span');
      hint.className = 'field-hint';
      hint.textContent = f.hint;
      group.appendChild(hint);
    }

    const errMsg = document.createElement('span');
    errMsg.className = 'error-msg';
    errMsg.id = 'err_' + f.id;
    errMsg.textContent = 'Ce champ est requis.';
    group.appendChild(errMsg);

    grid.appendChild(group);
  });

  container.appendChild(grid);

  // Actions
  const actions = document.createElement('div');
  actions.className = 'form-actions';
  actions.innerHTML = `
    <button class="btn btn-primary" onclick="generateCitation()">✦ Générer la citation</button>
    <button class="btn btn-secondary" onclick="resetForm()">↺ Réinitialiser</button>
  `;
  container.appendChild(actions);
}

/* ========================================================
   GÉNÉRER LA CITATION
   ======================================================== */
function generateCitation() {
  if (!currentType) return;
  const fields = TYPES[currentType].fields;
  let valid = true;

  // Validation
  fields.forEach(f => {
    const el = document.getElementById('f_' + f.id);
    const err = document.getElementById('err_' + f.id);
    if (f.required && el && !el.value.trim()) {
      el.classList.add('error');
      err.classList.add('visible');
      valid = false;
    } else if (el) {
      el.classList.remove('error');
      err.classList.remove('visible');
    }
  });

  if (!valid) {
    showToast('⚠ Veuillez remplir les champs obligatoires.');
    return;
  }

  // Collecte des données
  const data = {};
  fields.forEach(f => { data[f.id] = v(f.id); });

  const html = GENERATORS[currentType](data);
  currentCitation = html;
  setResult(html);
}

function setResult(html) {
  const box = document.getElementById('result-box');
  const actions = document.getElementById('result-actions');
  if (!html) {
    box.innerHTML = '<span class="result-placeholder">La citation générée apparaîtra ici…</span>';
    box.classList.remove('has-content');
    actions.style.display = 'none';
    currentCitation = '';
  } else {
    box.innerHTML = html;
    box.classList.add('has-content');
    actions.style.display = 'flex';
  }
}

/* ========================================================
   COPIER / SAUVEGARDER
   ======================================================== */
function copyCitation() {
  if (!currentCitation) return;
  // Copie le texte brut (sans HTML)
  const tmp = document.createElement('div');
  tmp.innerHTML = currentCitation;
  const text = tmp.textContent || tmp.innerText;
  navigator.clipboard.writeText(text).then(() => {
    const conf = document.getElementById('copy-confirm');
    conf.classList.add('show');
    setTimeout(() => conf.classList.remove('show'), 2000);
  });
}

function saveCitation() {
  if (!currentCitation) return;
  const tmp = document.createElement('div');
  tmp.innerHTML = currentCitation;
  const text = tmp.textContent || tmp.innerText;
  const item = {
    id: Date.now(),
    type: currentType,
    typeLabel: TYPES[currentType].label,
    html: currentCitation,
    text,
    date: new Date().toLocaleString('fr-FR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' })
  };
  history.unshift(item);
  if (history.length > 50) history = history.slice(0, 50); // limite à 50
  localStorage.setItem('citatio_history', JSON.stringify(history));
  renderHistory();
  showToast('✓ Citation sauvegardée !');
}

/* ========================================================
   HISTORIQUE
   ======================================================== */
function renderHistory() {
  const list = document.getElementById('history-list');
  const count = document.getElementById('history-count');
  count.textContent = history.length;

  if (!history.length) {
    list.innerHTML = '<p class="history-empty">Aucune citation sauvegardée.</p>';
    return;
  }

  list.innerHTML = '';
  history.forEach(item => {
    const el = document.createElement('div');
    el.className = 'history-item';
    el.innerHTML = `
      <div class="history-item-content">
        <div class="history-type">${TYPES[item.type]?.icon || ''} ${item.typeLabel}</div>
        <div class="history-text">${item.html}</div>
        <div class="history-date">${item.date}</div>
      </div>
      <div class="history-actions">
        <button class="btn-icon" title="Copier" onclick="copyHistoryItem(${item.id})">📋</button>
        <button class="btn-icon danger" title="Supprimer" onclick="deleteHistoryItem(${item.id})">🗑</button>
      </div>
    `;
    list.appendChild(el);
  });
}

function copyHistoryItem(id) {
  const item = history.find(h => h.id === id);
  if (!item) return;
  navigator.clipboard.writeText(item.text).then(() => showToast('✓ Copié !'));
}

function deleteHistoryItem(id) {
  history = history.filter(h => h.id !== id);
  localStorage.setItem('citatio_history', JSON.stringify(history));
  renderHistory();
}

function clearHistory() {
  if (!history.length) return;
  history = [];
  localStorage.setItem('citatio_history', JSON.stringify(history));
  renderHistory();
  showToast('Historique effacé.');
}

/* ========================================================
   RESET FORMULAIRE
   ======================================================== */
function resetForm() {
  if (!currentType) return;
  TYPES[currentType].fields.forEach(f => {
    const el = document.getElementById('f_' + f.id);
    if (el) { el.value = ''; el.classList.remove('error'); }
    const err = document.getElementById('err_' + f.id);
    if (err) err.classList.remove('visible');
  });
  setResult('');
}

/* ========================================================
   TOAST
   ======================================================== */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

/* ========================================================
   DARK MODE
   ======================================================== */
function initTheme() {
  const saved = localStorage.getItem('citatio_theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const theme = saved || (prefersDark ? 'dark' : 'light');
  applyTheme(theme);
}

function applyTheme(theme) {
  document.documentElement.dataset.theme = theme;
  localStorage.setItem('citatio_theme', theme);
  document.getElementById('theme-label').textContent = theme === 'dark' ? 'Mode clair' : 'Mode sombre';
}

document.getElementById('theme-toggle').addEventListener('click', () => {
  const current = document.documentElement.dataset.theme;
  applyTheme(current === 'dark' ? 'light' : 'dark');
});

/* ========================================================
   INIT
   ======================================================== */
initTheme();
renderTypeButtons();
renderHistory();
</script>

<!-- ═══════════════════════════════════════════════════════
     MODULE ISBN — auto-remplissage + scan caméra
     Autonome, non destructif, encapsulé dans une IIFE
     ═══════════════════════════════════════════════════════ -->
<script>
(function () {
  'use strict';

  /* ── Champs cibles (préfixe f_ car générés dynamiquement) ───────── */
  const ISBN_FIELDS = ['titre', 'prenoms', 'noms', 'editeur', 'annee'];

  function getField(id) { return document.getElementById('f_' + id); }

  function fieldsReady() {
    return getField('isbn') && ISBN_FIELDS.some(id => getField(id));
  }

  /* ── Debounce ───────────────────────────────────────────────────── */
  function debounce(fn, delay) {
    let t;
    return function (...a) { clearTimeout(t); t = setTimeout(() => fn.apply(this, a), delay); };
  }

  /* ── Extraire l'année d'une chaîne de date ─────────────────────── */
  function extractYear(str) {
    if (!str) return '';
    const m = str.match(/\d{4}/);
    return m ? m[0] : '';
  }

  /* ── Feedback visuel sous le champ ISBN ─────────────────────────── */
  function setFeedback(msg, type) {
    const el = document.getElementById('isbn-feedback');
    if (!el) return;
    const colors = { info:'var(--ink-muted)', success:'#27ae60', error:'#e74c3c', loading:'#2980b9' };
    el.textContent = msg;
    el.style.color = colors[type] || 'var(--ink-muted)';
    el.style.opacity = '1';
    if (type !== 'loading') setTimeout(() => { el.style.opacity = '0'; }, 3000);
  }

  /* ── Écriture sécurisée : ne pas écraser une valeur manuelle ────── */
  function setField(id, value) {
    const el = getField(id);
    if (!el) { console.warn(`[ISBN] champ #f_${id} absent du DOM`); return; }
    if (!value) { console.warn(`[ISBN] donnée manquante pour #f_${id}`); return; }
    if (el.value && el.value.trim() !== '') return; // ne pas écraser
    el.value = value;
  }

  /* ── Séparation prénom / nom ────────────────────────────────────── */
  function splitAuthor(fullName) {
    if (!fullName) return { prenom: '', nom: '' };
    // Format "Nom, Prénom" (OpenLibrary retourne parfois ce format)
    if (fullName.includes(',')) {
      const [nom, prenom] = fullName.split(',').map(s => s.trim());
      return { prenom: prenom || '', nom: nom || '' };
    }
    const parts = fullName.trim().split(/\s+/);
    if (parts.length === 1) return { prenom: '', nom: parts[0] };
    return {
      prenom: parts.slice(0, -1).join(' '),
      nom:    parts[parts.length - 1]
    };
  }

  /* ── Normalisation d'une valeur brute (objet ou string) ────────── */
  function resolveStr(raw) {
    if (!raw) return '';
    if (typeof raw === 'object') return raw.name || raw.title || '';
    return String(raw).trim();
  }

  /* ── Remplissage depuis données OpenLibrary (jscmd=data) ─────────── */
  function fillFromOpenLibrary(book) {
    setField('titre',      book.title || '');
    setField('editeur',    resolveStr(book.publishers?.[0]));
    setField('ville',      resolveStr(book.publish_places?.[0]));
    setField('annee',      extractYear(book.publish_date || ''));
    setField('collection', resolveStr(book.series?.[0]));

    const authorName = book.authors?.[0]?.name || '';
    const byStmt     = book.by_statement || '';
    const authorKey  = book.authors?.[0]?.key || '';

    if (authorName) {
      const { prenom, nom } = splitAuthor(authorName);
      setField('prenoms', prenom);
      setField('noms',    nom);
    } else if (byStmt) {
      const cleaned = byStmt.replace(/^(par|by)\s+/i, '').split(/,|;/)[0].trim();
      const { prenom, nom } = splitAuthor(cleaned);
      setField('prenoms', prenom);
      setField('noms',    nom);
    } else if (authorKey) {
      fetch(`https://openlibrary.org${authorKey}.json`)
        .then(r => r.json())
        .then(a => {
          const name = a.personal_name || a.name || '';
          if (!name) { console.warn('[ISBN] auteur OL introuvable via', authorKey); return; }
          const { prenom, nom } = splitAuthor(name);
          setField('prenoms', prenom);
          setField('noms',    nom);
        })
        .catch(err => console.warn('[ISBN] erreur author OL:', err));
    } else {
      console.warn('[ISBN] aucun auteur trouvé dans OpenLibrary');
    }
  }

  /* ── Remplissage depuis données Google Books ────────────────────── */
  function fillFromGoogleBooks(item) {
    const info = item.volumeInfo || {};
    setField('titre',   info.title || '');
    setField('editeur', info.publisher || '');
    setField('annee',   extractYear(info.publishedDate || ''));

    const rawCity = info.publishedCountry || '';
    setField('ville', rawCity);

    const cats = info.categories || [];
    setField('collection', cats[0] || '');

    const authors = info.authors || [];
    if (authors.length > 0) {
      const { prenom, nom } = splitAuthor(authors[0]);
      setField('prenoms', prenom);
      setField('noms',    nom);
    } else {
      console.warn('[ISBN] aucun auteur trouvé dans Google Books');
    }
  }

  /* ── Cascade API : OpenLibrary d'abord, Google Books en fallback ── */
  async function fetchISBN(isbn) {
    const clean = isbn.replace(/[^0-9Xx]/g, '').toUpperCase();
    if (clean.length !== 10 && clean.length !== 13) return;

    setFeedback('⏳ Recherche en cours…', 'loading');

    // ── 1. OpenLibrary ──────────────────────────────────────────────
    try {
      const olRes  = await fetch(
        `https://openlibrary.org/api/books?bibkeys=ISBN:${clean}&format=json&jscmd=data`
      );
      const olData = await olRes.json();
      const olKey  = `ISBN:${clean}`;

      if (olData[olKey]) {
        fillFromOpenLibrary(olData[olKey]);
        setFeedback('✓ Données récupérées via Open Library', 'success');
        if (typeof showToast === 'function') showToast('✓ Données récupérées via Open Library');
        return;
      }
      console.info('[ISBN] Open Library : aucun résultat pour', clean, '— tentative Google Books');
    } catch (err) {
      console.warn('[ISBN] Open Library inaccessible :', err);
    }

    // ── 2. Google Books (fallback) ──────────────────────────────────
    try {
      const gbRes  = await fetch(
        `https://www.googleapis.com/books/v1/volumes?q=isbn:${clean}`
      );
      const gbData = await gbRes.json();
      const items  = gbData.items || [];

      if (items.length > 0) {
        fillFromGoogleBooks(items[0]);
        setFeedback('✓ Données récupérées via Google Books', 'success');
        if (typeof showToast === 'function') showToast('✓ Données récupérées via Google Books');
        return;
      }
      console.info('[ISBN] Google Books : aucun résultat pour', clean);
    } catch (err) {
      console.warn('[ISBN] Google Books inaccessible :', err);
    }

    // ── 3. Échec total ──────────────────────────────────────────────
    setFeedback('ISBN introuvable sur les deux APIs.', 'error');
    if (typeof showToast === 'function') showToast('⚠ ISBN introuvable sur Open Library et Google Books');
  }

  /* ── Scanner ZXing ──────────────────────────────────────────────── */
  let scannerActive = false, videoStream = null, animFrame = null;

  function loadZXing() {
    return new Promise((res, rej) => {
      if (window.ZXing) { res(); return; }
      const s = document.createElement('script');
      s.src = 'https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js';
      s.onload = res; s.onerror = rej;
      document.head.appendChild(s);
    });
  }

  function buildOverlay() {
    let o = document.getElementById('isbn-scan-overlay');
    if (o) return o;
    o = document.createElement('div');
    o.id = 'isbn-scan-overlay';
    Object.assign(o.style, {
      position:'fixed', inset:'0', background:'rgba(0,0,0,0.9)',
      display:'flex', flexDirection:'column', alignItems:'center',
      justifyContent:'center', zIndex:'9999', gap:'14px'
    });
    const lbl = document.createElement('p');
    lbl.textContent = '📷 Pointez la caméra vers le code-barres ISBN';
    Object.assign(lbl.style, { color:'#fff', fontFamily:'inherit', fontSize:'14px', margin:'0' });

    const video = document.createElement('video');
    video.id = 'isbn-scan-video';
    Object.assign(video.style, { width:'100%', maxWidth:'420px', borderRadius:'8px', border:'2px solid rgba(255,255,255,0.2)' });
    video.setAttribute('playsinline',''); video.muted = true;

    const canvas = document.createElement('canvas');
    canvas.id = 'isbn-scan-canvas'; canvas.style.display = 'none';

    const hint = document.createElement('p');
    hint.id = 'isbn-scan-hint'; hint.textContent = 'Initialisation…';
    Object.assign(hint.style, { color:'#aaa', fontFamily:'inherit', fontSize:'12px', margin:'0' });

    const close = document.createElement('button');
    close.textContent = '✕ Fermer';
    Object.assign(close.style, {
      padding:'8px 20px', background:'transparent', color:'#fff',
      border:'1px solid rgba(255,255,255,0.4)', borderRadius:'4px',
      cursor:'pointer', fontFamily:'inherit', fontSize:'13px'
    });
    close.onclick = stopScanner;

    o.append(lbl, video, canvas, hint, close);
    document.body.appendChild(o);
    return o;
  }

  async function startScanner() {
    if (scannerActive) return;
    try { await loadZXing(); } catch { setFeedback('Scanner indisponible.', 'error'); return; }
    buildOverlay();
    const video  = document.getElementById('isbn-scan-video');
    const canvas = document.getElementById('isbn-scan-canvas');
    const hint   = document.getElementById('isbn-scan-hint');
    try {
      videoStream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:'environment' } });
    } catch { setFeedback('Accès caméra refusé.', 'error'); stopScanner(); return; }
    video.srcObject = videoStream;
    await video.play();
    scannerActive = true;
    hint.textContent = 'Scan en cours…';

    function tick() {
      if (!scannerActive) return;
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        try {
          const src    = new ZXing.HTMLCanvasElementLuminanceSource(canvas);
          const result = new ZXing.MultiFormatReader().decode(new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(src)));
          if (result) {
            const code = result.getText();
            stopScanner();
            const isbnEl = getField('isbn');
            if (isbnEl) { isbnEl.value = code; isbnEl.dispatchEvent(new Event('input')); }
            fetchISBN(code);
            return;
          }
        } catch (_) {}
      }
      animFrame = requestAnimationFrame(tick);
    }
    animFrame = requestAnimationFrame(tick);
  }

  function stopScanner() {
    scannerActive = false;
    if (animFrame)    { cancelAnimationFrame(animFrame); animFrame = null; }
    if (videoStream)  { videoStream.getTracks().forEach(t => t.stop()); videoStream = null; }
    const o = document.getElementById('isbn-scan-overlay');
    if (o) o.remove();
  }

  /* ── Injection UI dans le groupe du champ ISBN ──────────────────── */
  function injectUI() {
    const isbnEl = getField('isbn');
    if (!isbnEl || document.getElementById('isbn-feedback')) return;

    /* Feedback */
    const fb = document.createElement('span');
    fb.id = 'isbn-feedback';
    Object.assign(fb.style, {
      display:'block', fontSize:'12px', marginTop:'4px',
      transition:'opacity 0.5s', opacity:'0', fontFamily:'inherit'
    });
    isbnEl.parentNode.appendChild(fb);

    /* Bouton Scanner */
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.id   = 'isbn-scan-btn';
    btn.innerHTML = '📷 Scanner ISBN';
    Object.assign(btn.style, {
      marginTop:'8px', padding:'7px 16px',
      border:'1.5px solid var(--border)',
      borderRadius:'var(--radius)', background:'transparent',
      color:'var(--ink-muted)', cursor:'pointer',
      fontFamily:'inherit', fontSize:'0.85rem', fontWeight:'500',
      transition:'all 0.2s', display:'inline-flex', alignItems:'center', gap:'6px'
    });
    btn.onmouseenter = () => { btn.style.borderColor='var(--accent)'; btn.style.color='var(--accent)'; };
    btn.onmouseleave = () => { btn.style.borderColor='var(--border)'; btn.style.color='var(--ink-muted)'; };
    btn.onclick = startScanner;
    isbnEl.parentNode.appendChild(btn);

    /* Écoute input avec debounce */
    const dFetch = debounce(e => fetchISBN(e.target.value), 500);
    isbnEl.addEventListener('input', dFetch);
  }

  /* ── Hook sur renderForm pour ré-injecter après chaque rendu ────── */
  function hookRenderForm() {
    const original = window.renderForm;
    if (typeof original !== 'function') return;
    window.renderForm = function (key) {
      original(key);
      /* Petit délai pour laisser le DOM se construire */
      setTimeout(() => injectUI(), 0);
    };
  }

  /* ── Init ───────────────────────────────────────────────────────── */
  function initISBNModule() {
    hookRenderForm();
    /* Si le formulaire "ouvrage" est déjà actif au chargement */
    if (fieldsReady()) injectUI();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initISBNModule);
  } else {
    initISBNModule();
  }

})();
</script>

<!-- ═══════════════════════════════════════════════════════
     MODULE ISBN — validation + conversion + normalisation
     Auto-adaptatif, plug-and-play, sans configuration
     ═══════════════════════════════════════════════════════ -->
<script>
(function () {
  'use strict';

  /* ══════════════════════════════════════════════════════════════════
     CONFIGURATION
  ══════════════════════════════════════════════════════════════════ */
  const CFG = {
    debounceDelay : 400,
    styleValid    : '2px solid #27ae60',
    styleInvalid  : '2px solid #e74c3c',
    styleNeutral  : '',
    feedbackValid : '✓ ISBN-13 valide',
    feedbackInvalid: '✗ ISBN invalide',
    feedbackConverted: '↔ Converti en ISBN-13',
  };

  /* ══════════════════════════════════════════════════════════════════
     UTILITAIRES
  ══════════════════════════════════════════════════════════════════ */

  function debounce(fn, delay) {
    let t;
    return function (...args) { clearTimeout(t); t = setTimeout(() => fn.apply(this, args), delay); };
  }

  /** Retourne un ID unique pour taguer les champs déjà traités */
  function markField(el) {
    if (!el.dataset.isbnModuleAttached) {
      el.dataset.isbnModuleAttached = '1';
      return true;
    }
    return false;
  }

  /* ══════════════════════════════════════════════════════════════════
     1. NETTOYAGE
  ══════════════════════════════════════════════════════════════════ */

  function cleanISBN(raw) {
    return raw.replace(/[^0-9Xx]/g, '').toUpperCase();
  }

  /* ══════════════════════════════════════════════════════════════════
     2. VALIDATION ISBN-10
  ══════════════════════════════════════════════════════════════════ */

  function isValidISBN10(isbn) {
    if (isbn.length !== 10) return false;
    if (!/^\d{9}[\dX]$/.test(isbn)) return false;
    const sum = isbn.split('').reduce((acc, ch, i) => {
      const val = ch === 'X' ? 10 : parseInt(ch, 10);
      return acc + val * (10 - i);
    }, 0);
    return sum % 11 === 0;
  }

  /* ══════════════════════════════════════════════════════════════════
     3. VALIDATION ISBN-13
  ══════════════════════════════════════════════════════════════════ */

  function isValidISBN13(isbn) {
    if (isbn.length !== 13) return false;
    if (!/^\d{13}$/.test(isbn)) return false;
    if (!/^97[89]/.test(isbn)) return false;
    const sum = isbn.split('').reduce((acc, ch, i) => {
      return acc + parseInt(ch, 10) * (i % 2 === 0 ? 1 : 3);
    }, 0);
    return sum % 10 === 0;
  }

  /* ══════════════════════════════════════════════════════════════════
     4. CONVERSION ISBN-10 → ISBN-13
  ══════════════════════════════════════════════════════════════════ */

  function convertISBN10to13(isbn10) {
    const base = '978' + isbn10.slice(0, 9);
    const sum  = base.split('').reduce((acc, ch, i) => {
      return acc + parseInt(ch, 10) * (i % 2 === 0 ? 1 : 3);
    }, 0);
    const check = (10 - (sum % 10)) % 10;
    return base + check;
  }

  /* ══════════════════════════════════════════════════════════════════
     5. NORMALISATION — toujours produire ISBN-13 si possible
  ══════════════════════════════════════════════════════════════════ */

  /**
   * @returns {{ isbn: string, status: 'valid13'|'converted'|'invalid'|'incomplete' }}
   */
  function normalizeISBN(raw) {
    const clean = cleanISBN(raw);

    if (clean.length === 0) return { isbn: raw, status: 'incomplete' };

    // ISBN-13 direct
    if (clean.length === 13) {
      if (isValidISBN13(clean)) return { isbn: clean, status: 'valid13' };
      return { isbn: raw, status: 'invalid' };
    }

    // ISBN-10 → conversion
    if (clean.length === 10) {
      if (isValidISBN10(clean)) {
        const isbn13 = convertISBN10to13(clean);
        return { isbn: isbn13, status: 'converted' };
      }
      return { isbn: raw, status: 'invalid' };
    }

    // En cours de saisie (< 10 ou entre 11-12)
    return { isbn: raw, status: 'incomplete' };
  }

  /* ══════════════════════════════════════════════════════════════════
     6. FEEDBACK VISUEL — non destructif
  ══════════════════════════════════════════════════════════════════ */

  function getFeedbackEl(input) {
    const id = 'isbn-val-fb-' + (input.id || input.name || Math.random().toString(36).slice(2));
    let el = document.getElementById(id);
    if (!el) {
      el = document.createElement('span');
      el.id = id;
      Object.assign(el.style, {
        display      : 'block',
        fontSize     : '11px',
        marginTop    : '3px',
        transition   : 'opacity 0.3s',
        opacity      : '0',
        fontFamily   : 'inherit',
        pointerEvents: 'none',
      });
      input.parentNode && input.parentNode.insertBefore(el, input.nextSibling);
    }
    return el;
  }

  function applyFeedback(input, status, isbn13) {
    const fb = getFeedbackEl(input);

    // Reset outline — on ne touche pas à border si le champ a déjà une bordure custom
    const originalOutline = input.dataset.isbnOriginalOutline ?? input.style.outline;
    if (!input.dataset.isbnOriginalOutline) input.dataset.isbnOriginalOutline = originalOutline;

    if (status === 'valid13' || status === 'converted') {
      input.style.outline = CFG.styleValid;
      fb.style.color      = '#27ae60';
      fb.textContent      = status === 'converted' ? CFG.feedbackConverted : CFG.feedbackValid;
      fb.style.opacity    = '1';
    } else if (status === 'invalid') {
      input.style.outline = CFG.styleInvalid;
      fb.style.color      = '#e74c3c';
      fb.textContent      = CFG.feedbackInvalid;
      fb.style.opacity    = '1';
    } else {
      // incomplete — neutre, pas de bruit
      input.style.outline = input.dataset.isbnOriginalOutline || '';
      fb.style.opacity    = '0';
    }
  }

  /* ══════════════════════════════════════════════════════════════════
     7. HANDLER — appelé sur input / change / blur
  ══════════════════════════════════════════════════════════════════ */

  function handleISBNInput(e) {
    const input = e.target;
    const raw   = input.value;

    // Sur blur uniquement : normaliser la valeur dans le champ
    const shouldWrite = e.type === 'blur' || e.type === 'change';

    const { isbn, status } = normalizeISBN(raw);

    if (shouldWrite && (status === 'valid13' || status === 'converted') && isbn !== raw) {
      // Écriture silencieuse — on préserve la position curseur pour blur
      input.value = isbn;
      // Déclencher un événement input pour notifier les autres listeners
      input.dispatchEvent(new Event('input', { bubbles: true }));
    }

    applyFeedback(input, status, isbn);
  }

  /* ══════════════════════════════════════════════════════════════════
     8. ATTACHEMENT DES LISTENERS
  ══════════════════════════════════════════════════════════════════ */

  function attachListeners(input) {
    if (!markField(input)) return; // déjà traité

    const debouncedInput = debounce(handleISBNInput, CFG.debounceDelay);

    // input → feedback temps réel (debounced pour ne pas perturber la saisie)
    input.addEventListener('input', debouncedInput);
    // change / blur → normalisation de la valeur
    input.addEventListener('change', handleISBNInput);
    input.addEventListener('blur',   handleISBNInput);
  }

  /* ══════════════════════════════════════════════════════════════════
     9. DÉTECTION DES CHAMPS ISBN
  ══════════════════════════════════════════════════════════════════ */

  /** Retourne le texte du <label> associé à un input (for= ou parent) */
  function getLabelText(input) {
    // Via for=
    if (input.id) {
      const lbl = document.querySelector(`label[for="${CSS.escape(input.id)}"]`);
      if (lbl) return lbl.textContent.toLowerCase();
    }
    // Via parent label
    const parent = input.closest('label');
    if (parent) return parent.textContent.toLowerCase();
    // Via aria-label
    return (input.getAttribute('aria-label') || '').toLowerCase();
  }

  function isISBNField(input) {
    if (input.type === 'hidden' || input.type === 'submit' || input.type === 'button') return false;

    const id          = (input.id          || '').toLowerCase();
    const name        = (input.name        || '').toLowerCase();
    const placeholder = (input.placeholder || '').toLowerCase();
    const labelText   = getLabelText(input);

    if (id.includes('isbn') || name.includes('isbn')) return true;
    if (placeholder.includes('isbn'))                  return true;
    if (labelText.includes('isbn'))                    return true;

    // Heuristique valeur : 10 ou 13 chiffres consécutifs
    const val = cleanISBN(input.value);
    if (val.length === 10 || val.length === 13) return true;

    return false;
  }

  function detectISBNFields(root) {
    return Array.from((root || document).querySelectorAll('input, textarea'))
      .filter(isISBNField);
  }

  /* ══════════════════════════════════════════════════════════════════
     10. SCAN INITIAL
  ══════════════════════════════════════════════════════════════════ */

  function scanInputs(root) {
    detectISBNFields(root).forEach(attachListeners);
  }

  /* ══════════════════════════════════════════════════════════════════
     11. MUTATIONOBSERVER — formulaires dynamiques
  ══════════════════════════════════════════════════════════════════ */

  function startObserver() {
    const observer = new MutationObserver(mutations => {
      for (const mutation of mutations) {
        for (const node of mutation.addedNodes) {
          if (node.nodeType !== 1) continue; // éléments seulement
          // Le nœud lui-même est-il un input ISBN ?
          if ((node.tagName === 'INPUT' || node.tagName === 'TEXTAREA') && isISBNField(node)) {
            attachListeners(node);
          }
          // Chercher dans les descendants
          scanInputs(node);
        }
      }
    });

    observer.observe(document.body, { childList: true, subtree: true });
  }

  /* ══════════════════════════════════════════════════════════════════
     12. API PUBLIQUE (optionnelle — accessible via window.ISBNModule)
  ══════════════════════════════════════════════════════════════════ */

  window.ISBNModule = {
    cleanISBN,
    isValidISBN10,
    isValidISBN13,
    convertISBN10to13,
    normalizeISBN,
    scanInputs,
    detectISBNFields,
    attachListeners,
  };

  /* ══════════════════════════════════════════════════════════════════
     13. INIT
  ══════════════════════════════════════════════════════════════════ */

  function init() {
    scanInputs(document);
    startObserver();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})();

</script>
</body>
</html>
