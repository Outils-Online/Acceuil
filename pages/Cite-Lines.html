<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Générateur de Références Bibliographiques</title>
  <!-- Polices selon charte -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <!-- Font Awesome 6 (gratuit) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    /* ===== VARIABLES — Charte Graphique Ivoire & Corail ===== */
    :root {
      --bg-page: #FDFCF0;            /* Fond principal Ivoire */
      --bg-card: #FFFFFF;            /* Surfaces : blanc pur */
      --primary: #0A2472;            /* Bleu profond pour titres et structure */
      --secondary: #006466;          /* Vert forêt pour bordures, détails */
      --accent: #F46060;             /* Corail pour boutons d'action, alertes */
      --highlight: #FFD972;          /* Jaune ambre pour mises en évidence */
      --ink-light: #5B6E8C;          /* Gris-bleu pour textes secondaires */
      --border-light: #E2E0D0;       /* Bordure douce sur fond clair */
      --shadow-default: 0 4px 12px rgba(10,36,114,0.15);
      --shadow-hover: 0 8px 20px rgba(10,36,114,0.2);
      --radius-card: 24px;
      --radius-button: 15px;
      --radius-input: 12px;
      --transition: 0.2s ease;
    }

    /* ===== RESET & BASE ===== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-page);
      color: var(--primary);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.6;
    }

    /* ===== BOUTON FERMETURE (croix) en haut à droite ===== */
    .close-btn {
      position: fixed;
      top: 20px;
      right: 24px;
      width: 44px;
      height: 44px;
      background: var(--bg-card);
      border: 1px solid var(--secondary);
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.4rem;
      color: var(--primary);
      transition: all var(--transition);
      z-index: 1000;
      box-shadow: var(--shadow-default);
    }
    .close-btn:hover {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
      transform: scale(1.02);
    }

    /* ===== LAYOUT ===== */
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: clamp(1.5rem, 4vw, 2.5rem) clamp(1rem, 4vw, 2rem);
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
    }

    /* ===== SECTION TITLE ===== */
    .section-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.7rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--primary);
      margin-bottom: 0.25rem;
    }

    .section-sub {
      font-size: 0.9rem;
      color: var(--ink-light);
    }

    /* ===== TYPE SELECTOR ===== */
    .type-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .type-btn {
      padding: 8px 20px;
      border: 1.5px solid var(--secondary);
      border-radius: var(--radius-button);
      background: transparent;
      color: var(--primary);
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
      background-color: var(--bg-card);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .type-btn i {
      font-size: 1rem;
    }

    .type-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
      transform: translateY(-2px);
      box-shadow: var(--shadow-default);
    }

    .type-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    /* ===== CARD ===== */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-card);
      padding: clamp(1.5rem, 3vw, 2rem);
      box-shadow: var(--shadow-default);
      transition: box-shadow var(--transition);
    }

    .card:hover {
      box-shadow: var(--shadow-hover);
    }

    .card-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 1.5rem;
      padding-bottom: 0.8rem;
      border-bottom: 2px solid var(--secondary);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-title-icon {
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ===== FORM ===== */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group.full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    label .req {
      color: var(--accent);
      margin-left: 3px;
    }

    label .opt {
      font-weight: 400;
      color: var(--ink-light);
      text-transform: none;
      letter-spacing: 0;
      font-size: 0.7rem;
      margin-left: 6px;
    }

    input, select, textarea {
      padding: 12px 14px;
      border: 1px solid var(--secondary);
      border-radius: var(--radius-input);
      background: var(--bg-page);
      color: var(--primary);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      transition: all var(--transition);
      outline: none;
      width: 100%;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(244, 96, 96, 0.2);
      background: var(--bg-card);
    }

    input.error, select.error {
      border-color: var(--accent);
      background-color: rgba(244, 96, 96, 0.05);
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    select {
      cursor: pointer;
    }

    .field-hint {
      font-size: 0.7rem;
      color: var(--ink-light);
      font-style: italic;
      margin-top: 2px;
    }

    .error-msg {
      font-size: 0.7rem;
      color: var(--accent);
      display: none;
      margin-top: 4px;
    }

    .error-msg.visible {
      display: block;
    }

    /* ===== ACTIONS ===== */
    .form-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 2rem;
      align-items: center;
    }

    .btn {
      padding: 12px 26px;
      border-radius: var(--radius-button);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: all var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
      box-shadow: 0 2px 6px rgba(244, 96, 96, 0.3);
    }

    .btn-primary:hover {
      background: #E04545;
      transform: translateY(-2px);
      box-shadow: 0 6px 14px rgba(244, 96, 96, 0.4);
    }

    .btn-secondary {
      background: transparent;
      color: var(--primary);
      border: 1.5px solid var(--secondary);
    }

    .btn-secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-2px);
    }

    /* ===== RESULT ===== */
    .result-box {
      background: var(--bg-page);
      border: 2px dashed var(--secondary);
      border-radius: var(--radius-input);
      padding: 1.3rem;
      font-family: 'Space Grotesk', serif;
      font-size: 0.95rem;
      line-height: 1.7;
      color: var(--primary);
      min-height: 100px;
      transition: all var(--transition);
      word-break: break-word;
    }

    .result-box.has-content {
      border-style: solid;
      border-color: var(--accent);
      background: rgba(244, 96, 96, 0.05);
    }

    .result-placeholder {
      color: var(--ink-light);
      font-family: 'Inter', sans-serif;
      font-style: italic;
      font-size: 0.9rem;
    }

    .result-actions {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .btn-copy {
      background: var(--primary);
      color: white;
      font-size: 0.85rem;
      padding: 8px 20px;
    }

    .btn-copy:hover {
      background: var(--secondary);
      transform: translateY(-1px);
    }

    .btn-save {
      background: transparent;
      border: 1.5px solid var(--secondary);
      color: var(--primary);
      font-size: 0.85rem;
      padding: 8px 20px;
    }

    .btn-save:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-1px);
    }

    .copy-confirm {
      font-size: 0.8rem;
      color: #2e7d32;
      font-weight: 600;
      display: none;
      align-items: center;
      gap: 5px;
      background: #e8f5e9;
      padding: 5px 12px;
      border-radius: 40px;
    }

    .copy-confirm.show {
      display: flex;
    }

    /* ===== HISTORY ===== */
    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.2rem;
    }

    .history-count {
      font-size: 0.75rem;
      background: var(--accent);
      color: white;
      border-radius: 40px;
      padding: 2px 10px;
      font-weight: 700;
      margin-left: 10px;
    }

    .history-empty {
      color: var(--ink-light);
      font-style: italic;
      font-size: 0.9rem;
      text-align: center;
      padding: 1.8rem 0;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 420px;
      overflow-y: auto;
    }

    .history-item {
      background: var(--bg-page);
      border: 1px solid var(--border-light);
      border-radius: 16px;
      padding: 14px 18px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      transition: all var(--transition);
    }

    .history-item:hover {
      border-color: var(--secondary);
      box-shadow: var(--shadow-default);
    }

    .history-item-content {
      flex: 1;
      min-width: 0;
    }

    .history-type {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .history-text {
      font-family: 'Space Grotesk', serif;
      font-size: 0.85rem;
      line-height: 1.5;
      color: var(--primary);
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .history-date {
      font-size: 0.7rem;
      color: var(--ink-light);
      margin-top: 5px;
    }

    .history-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .btn-icon {
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      transition: all var(--transition);
      color: var(--primary);
    }

    .btn-icon i {
      font-size: 1rem;
    }

    .btn-icon:hover {
      background: var(--secondary);
      color: white;
    }

    .btn-icon.danger:hover {
      background: var(--accent);
      color: white;
    }

    /* ===== SCROLLBAR ===== */
    .history-list::-webkit-scrollbar {
      width: 5px;
    }
    .history-list::-webkit-scrollbar-track {
      background: var(--border-light);
      border-radius: 10px;
    }
    .history-list::-webkit-scrollbar-thumb {
      background: var(--secondary);
      border-radius: 10px;
    }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--primary);
      color: white;
      padding: 12px 24px;
      border-radius: var(--radius-button);
      font-size: 0.85rem;
      font-weight: 600;
      opacity: 0;
      transform: translateY(12px);
      transition: all 0.25s ease;
      pointer-events: none;
      z-index: 300;
      box-shadow: var(--shadow-default);
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 680px) {
      .form-grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }
      .type-grid {
        gap: 10px;
      }
      .type-btn {
        font-size: 0.8rem;
        padding: 6px 14px;
      }
      .card-title {
        font-size: 1rem;
      }
      .close-btn {
        top: 12px;
        right: 16px;
        width: 40px;
        height: 40px;
      }
    }

    /* ===== SCAN BUTTON (type-btn special) ===== */
    .type-btn--scan {
      background: var(--secondary) !important;
      color: white !important;
      border-color: var(--secondary) !important;
      font-weight: 700;
    }
    .type-btn--scan:hover {
      background: var(--accent) !important;
      border-color: var(--accent) !important;
    }

    /* ===== ISBN FEEDBACK ===== */
    #isbn-feedback {
      font-size: 0.7rem;
      margin-top: 4px;
      font-weight: 500;
    }
  </style>
</head>
<body>

<!-- Bouton fermeture croix en haut à droite -->
<button class="close-btn" onclick="quitterApplication()" title="Fermer">
  <i class="fas fa-times"></i>
</button>

<div class="container">
  <div>
    <p class="section-title">Générateur de références 
    </p>
    <p class="section-sub" style="margin-bottom:1rem;">Sélectionnez le type de source à citer (style bibliographique français)</p>
    <div class="type-grid" id="type-grid"></div>
  </div>

  <div class="card" id="form-card">
    <div class="card-title">
      <span class="card-title-icon"></span>
      <span id="form-card-title">Choisissez un type de source</span>
    </div>
    <div id="dynamic-form"></div>
  </div>

  <div class="card">
    <div class="card-title">
      <span class="card-title-icon"></span>
      Résultat
    </div>
    <div class="result-box" id="result-box">
      <span class="result-placeholder">La citation générée apparaîtra ici…</span>
    </div>
    <div class="result-actions" id="result-actions" style="display:none;">
      <button class="btn btn-copy" id="btn-copy" onclick="copyCitation()"><i class="fas fa-copy"></i> Copier</button>
      <button class="btn btn-save" onclick="saveCitation()"><i class="fas fa-save"></i> Sauvegarder</button>
      <span class="copy-confirm" id="copy-confirm"><i class="fas fa-check-circle"></i> Copié !</span>
    </div>
  </div>

  <div class="card">
    <div class="history-header">
      <div class="card-title" style="margin-bottom:0;padding-bottom:0;border:none;">
        <span class="card-title-icon"></span>
        Historique
        <span class="history-count" id="history-count">0</span>
      </div>
      <button class="btn btn-secondary" style="font-size:0.8rem;padding:6px 18px;" onclick="clearHistory()"><i class="fas fa-trash-alt"></i> Tout effacer</button>
    </div>
    <div id="history-list" class="history-list">
      <p class="history-empty">Aucune citation sauvegardée.</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ========================================================
   MODÈLES DE FORMULAIRES (avec icônes Font Awesome)
   ======================================================== */

      { id: 'volume', label: 'Volume', required: false, hint: 'ex: tome II' },
      { id: 'ville', label: 'Ville d\'édition', required: true },
      { id: 'editeur', label: 'Éditeur', required: true },
      { id: 'annee', label: 'Année', required: true, type: 'number' },
      { id: 'page', label: 'Page(s)', required: false },
      { id: 'url', label: 'URL', required: false, full: true, type: 'url' },
    ]
  }
};

/* ──────────────── FONCTIONS UTILES & GÉNÉRATEURS ────────────── */
function formatDateFR(dateStr) {
  if (!dateStr) return '';
  const MOIS = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  const [y, m, d] = dateStr.split('-');
  return `${parseInt(d)} ${MOIS[parseInt(m)-1]} ${y}`;
}
function formatDuration(min, sec) {
  const m = String(parseInt(min)||0).padStart(2,'0');
  const s = String(parseInt(sec)||0).padStart(2,'0');
  return `${m} min. ${s} sec.`;
}
function todayFR() { return formatDateFR(new Date().toISOString().split('T')[0]); }
function v(id) { const el = document.getElementById('f_'+id); return el ? el.value.trim() : ''; }

const GENERATORS = {
  ouvrage(d) { let c = `${d.prenoms} ${d.noms}, <em>${d.titre}</em>, ${d.ville}, ${d.editeur}`; if (d.collection) c += `, coll. « ${d.collection} »`; c += `, ${d.annee}`; if (d.page) c += `, p. ${d.page}`; c += '.'; return c; },
  periodique(d) { let c = `${d.prenoms} ${d.noms}, « ${d.titre} », ${d.ville}, <em>${d.journal}</em>, ${formatDateFR(d.date)}`; if (d.page) c += `, p. ${d.page}`; if (d.url) c += `, <a href="${d.url}" target="_blank">${d.url}</a> (consulté le : ${todayFR()})`; c += '.'; return c; },
  musique(d) { let c = `${d.prenoms} ${d.noms}, « ${d.titre} », ${formatDuration(d.min, d.sec)}, dans l'album <em>${d.album}</em>, ${d.ville}, ${d.producteur}, ${d.annee}`; if (d.url) c += `, <a href="${d.url}" target="_blank">${d.url}</a> (consulté le : ${todayFR()})`; c += '.'; return c; },
  video(d) { let c = `${d.prenoms} ${d.noms}, <em>${d.titre}</em>, ${d.ville}, ${d.editeur}`; if (d.collection) c += `, coll. « ${d.collection} »`; c += `, ${d.annee}, ${formatDuration(d.min, d.sec)}`; if (d.url) c += `, <a href="${d.url}" target="_blank">${d.url}</a> (consulté le : ${todayFR()})`; c += '.'; return c; },
  revue(d) { let c = `${d.prenoms} ${d.noms}, « ${d.titre_article} »`; if (d.prenoms_dir && d.noms_dir) c += `, dans ${d.prenoms_dir} ${d.noms_dir} (dir)`; c += `, <em>${d.titre_numero}</em>, ${d.ville}, <em>${d.titre_revue}</em>`; if (d.numero) c += `, n°${d.numero}`; c += `, ${d.annee}`; if (d.page) c += `, p. ${d.page}`; if (d.url) c += `, <a href="${d.url}" target="_blank">${d.url}</a> (consulté le : ${todayFR()})`; c += '.'; return c; },
  loi(d) { let c = `${d.type_acte} n°${d.numero_loi} du ${formatDateFR(d.date_loi)}`; if (d.article) c += ` - art. ${d.article}`; if (d.recueil) c += `, ${d.recueil} [en ligne]`; if (d.numero_article && d.date_vigueur) c += `, Article ${d.numero_article} version en vigueur depuis le ${formatDateFR(d.date_vigueur)}`; if (d.url) c += `, <a href="${d.url}" target="_blank">${d.url}</a> (consulté le : ${todayFR()})`; c += '.'; return c; },
  siteweb(d) { let c = ''; if (d.auteur) c += `${d.auteur}, `; c += `« ${d.titre} »`; if (d.plateforme) c += `, ${d.plateforme}`; c += `, <a href="${d.url}" target="_blank">${d.url}</a> (consulté le : ${todayFR()})`; c += '.'; return c; },
  dictionnaire(d) { let c = `${d.prenoms} ${d.noms} (dir), <em>${d.titre}</em>`; if (d.volume) c += `, ${d.volume}`; c += `, ${d.ville}, ${d.editeur}, ${d.annee}`; if (d.page) c += `, p. ${d.page}`; if (d.url) c += `, <a href="${d.url}" target="_blank">${d.url}</a> (consulté le : ${todayFR()})`; c += '.'; return c; }
};

let currentType = null, currentCitation = '';
let history = JSON.parse(localStorage.getItem('citatio_history') || '[]');

function renderTypeButtons() {
  const grid = document.getElementById('type-grid');
  grid.innerHTML = '';
  const scanBtn = document.createElement('button');
  scanBtn.id = 'btn-scan-global';
  scanBtn.className = 'type-btn type-btn--scan';
  scanBtn.innerHTML = '<i class="fas fa-camera"></i> Capturer ISBN';
  scanBtn.onclick = () => { if (typeof globalStartScanner === 'function') globalStartScanner(); };
  grid.appendChild(scanBtn);
  Object.entries(TYPES).forEach(([key, type]) => {
    const btn = document.createElement('button');
    btn.className = 'type-btn';
    btn.dataset.type = key;
    btn.innerHTML = `<i class="${type.icon}"></i> ${type.label}`;
    btn.onclick = () => selectType(key);
    grid.appendChild(btn);
  });
}
function selectType(key) { currentType = key; document.querySelectorAll('.type-btn').forEach(b => b.classList.toggle('active', b.dataset.type === key)); document.getElementById('form-card-title').innerHTML = `<i class="${TYPES[key].icon}"></i> ${TYPES[key].label}`; renderForm(key); setResult(''); }
function renderForm(key) { const fields = TYPES[key].fields; const container = document.getElementById('dynamic-form'); container.innerHTML = ''; const gridDiv = document.createElement('div'); gridDiv.className = 'form-grid'; fields.forEach(f => { const group = document.createElement('div'); group.className = `form-group${f.full ? ' full' : ''}`; const label = document.createElement('label'); label.htmlFor = 'f_' + f.id; label.innerHTML = f.label + (f.required ? '<span class="req">*</span>' : '<span class="opt">(optionnel)</span>'); group.appendChild(label); let input; if (f.type === 'select') { input = document.createElement('select'); f.options.forEach(opt => { const o = document.createElement('option'); o.value = opt; o.textContent = opt; input.appendChild(o); }); } else if (f.type === 'date') { input = document.createElement('input'); input.type = 'date'; } else { input = document.createElement('input'); input.type = f.type || 'text'; if (f.hint) input.placeholder = f.hint; } input.id = 'f_' + f.id; input.required = !!f.required; group.appendChild(input); if (f.hint && f.type !== 'select' && !input.placeholder) { const hint = document.createElement('span'); hint.className = 'field-hint'; hint.textContent = f.hint; group.appendChild(hint); } const errMsg = document.createElement('span'); errMsg.className = 'error-msg'; errMsg.id = 'err_' + f.id; errMsg.textContent = 'Champ requis.'; group.appendChild(errMsg); gridDiv.appendChild(group); }); container.appendChild(gridDiv); const actions = document.createElement('div'); actions.className = 'form-actions'; actions.innerHTML = `<button class="btn btn-primary" onclick="generateCitation()"><i class="fas fa-quote-right"></i> Générer la citation</button><button class="btn btn-secondary" onclick="resetForm()"><i class="fas fa-undo-alt"></i> Réinitialiser</button>`; container.appendChild(actions); }
function generateCitation() { if (!currentType) return; let valid = true; TYPES[currentType].fields.forEach(f => { const el = document.getElementById('f_' + f.id); const err = document.getElementById('err_' + f.id); if (f.required && el && !el.value.trim()) { el.classList.add('error'); err.classList.add('visible'); valid = false; } else if (el) { el.classList.remove('error'); err.classList.remove('visible'); } }); if (!valid) { showToast('⚠ Veuillez remplir les champs obligatoires.'); return; } const data = {}; TYPES[currentType].fields.forEach(f => { data[f.id] = v(f.id); }); const html = GENERATORS[currentType](data); currentCitation = html; setResult(html); }
function setResult(html) { const box = document.getElementById('result-box'); const actions = document.getElementById('result-actions'); if (!html) { box.innerHTML = '<span class="result-placeholder">La citation générée apparaîtra ici…</span>'; box.classList.remove('has-content'); actions.style.display = 'none'; currentCitation = ''; } else { box.innerHTML = html; box.classList.add('has-content'); actions.style.display = 'flex'; } }
function copyCitation() { if (!currentCitation) return; const tmp = document.createElement('div'); tmp.innerHTML = currentCitation; const text = tmp.textContent || tmp.innerText; navigator.clipboard.writeText(text).then(() => { const conf = document.getElementById('copy-confirm'); conf.classList.add('show'); setTimeout(() => conf.classList.remove('show'), 2000); }); }
function saveCitation() { if (!currentCitation) return; const tmp = document.createElement('div'); tmp.innerHTML = currentCitation; const text = tmp.textContent || tmp.innerText; const item = { id: Date.now(), type: currentType, typeLabel: TYPES[currentType].label, icon: TYPES[currentType].icon, html: currentCitation, text, date: new Date().toLocaleString('fr-FR') }; history.unshift(item); if (history.length > 50) history = history.slice(0,50); localStorage.setItem('citatio_history', JSON.stringify(history)); renderHistory(); showToast('✓ Citation sauvegardée !'); }
function renderHistory() { const list = document.getElementById('history-list'); const count = document.getElementById('history-count'); count.textContent = history.length; if (!history.length) { list.innerHTML = '<p class="history-empty">Aucune citation sauvegardée.</p>'; return; } list.innerHTML = ''; history.forEach(item => { const el = document.createElement('div'); el.className = 'history-item'; el.innerHTML = `<div class="history-item-content"><div class="history-type"><i class="${item.icon}"></i> ${item.typeLabel}</div><div class="history-text">${item.html}</div><div class="history-date"><i class="far fa-calendar-alt"></i> ${item.date}</div></div><div class="history-actions"><button class="btn-icon" title="Copier" onclick="copyHistoryItem(${item.id})"><i class="fas fa-copy"></i></button><button class="btn-icon danger" title="Supprimer" onclick="deleteHistoryItem(${item.id})"><i class="fas fa-trash-alt"></i></button></div>`; list.appendChild(el); }); }
function copyHistoryItem(id) { const item = history.find(h => h.id === id); if (!item) return; navigator.clipboard.writeText(item.text).then(() => showToast('✓ Copié !')); }
function deleteHistoryItem(id) { history = history.filter(h => h.id !== id); localStorage.setItem('citatio_history', JSON.stringify(history)); renderHistory(); }
function clearHistory() { if (!history.length) return; history = []; localStorage.setItem('citatio_history', JSON.stringify(history)); renderHistory(); showToast('Historique effacé.'); }
function resetForm() { if (!currentType) return; TYPES[currentType].fields.forEach(f => { const el = document.getElementById('f_' + f.id); if (el) { el.value = ''; el.classList.remove('error'); } const err = document.getElementById('err_' + f.id); if (err) err.classList.remove('visible'); }); setResult(''); }
function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }
function quitterApplication() { window.top.location.href = 'https://outils-online.github.io/Acceuil/'; }

renderTypeButtons();
renderHistory();

// Simulation minimale du module ISBN (pour la démo, le scanner réel serait ajouté)
window.globalStartScanner = function() { showToast('Scanner ISBN — fonction avancée disponible'); };
</script>
