<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Générateur de Citations Bibliographiques</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    /* ===== VARIABLES — Charte Graphique Ivoire & Corail ===== */
    :root {
      --bg-page: #FDFCF0;
      --bg-card: #FFFFFF;
      --primary: #0A2472;
      --secondary: #006466;
      --accent: #F46060;
      --highlight: #FFD972;
      --ink-light: #5B6E8C;
      --border-light: #E2E0D0;
      --shadow-default: 0 4px 12px rgba(10,36,114,0.15);
      --shadow-hover: 0 8px 20px rgba(10,36,114,0.2);
      --radius-card: 24px;
      --radius-button: 15px;
      --radius-input: 12px;
      --transition: 0.2s ease;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-page);
      color: var(--primary);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.6;
    }
    .close-btn {
      position: fixed;
      top: 20px;
      right: 24px;
      width: 44px;
      height: 44px;
      background: var(--bg-card);
      border: 1px solid var(--secondary);
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.4rem;
      color: var(--primary);
      transition: all var(--transition);
      z-index: 1000;
      box-shadow: var(--shadow-default);
    }
    .close-btn:hover {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
      transform: scale(1.02);
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: clamp(1.5rem, 4vw, 2.5rem) clamp(1rem, 4vw, 2rem);
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
    }
    .section-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.7rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--primary);
      margin-bottom: 0.25rem;
    }
    .section-sub {
      font-size: 0.9rem;
      color: var(--ink-light);
    }
    .type-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    .type-btn {
      padding: 8px 20px;
      border: 1.5px solid var(--secondary);
      border-radius: var(--radius-button);
      background: var(--bg-card);
      color: var(--primary);
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .type-btn i { font-size: 1rem; }
    .type-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
      transform: translateY(-2px);
      box-shadow: var(--shadow-default);
    }
    .type-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    .type-btn--scan {
      background: var(--secondary) !important;
      color: white !important;
      border-color: var(--secondary) !important;
    }
    .type-btn--scan:hover {
      background: var(--accent) !important;
      border-color: var(--accent) !important;
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-card);
      padding: clamp(1.5rem, 3vw, 2rem);
      box-shadow: var(--shadow-default);
      transition: box-shadow var(--transition);
    }
    .card:hover { box-shadow: var(--shadow-hover); }
    .card-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 1.5rem;
      padding-bottom: 0.8rem;
      border-bottom: 2px solid var(--secondary);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .card-title-icon {
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    label {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    label .req { color: var(--accent); margin-left: 3px; }
    label .opt {
      font-weight: 400;
      color: var(--ink-light);
      text-transform: none;
      font-size: 0.7rem;
      margin-left: 6px;
    }
    input, select, textarea {
      padding: 12px 14px;
      border: 1px solid var(--secondary);
      border-radius: var(--radius-input);
      background: var(--bg-page);
      color: var(--primary);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      transition: all var(--transition);
      outline: none;
      width: 100%;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(244,96,96,0.2);
      background: var(--bg-card);
    }
    input.error, select.error {
      border-color: var(--accent);
      background-color: rgba(244,96,96,0.05);
    }
    .field-hint { font-size: 0.7rem; color: var(--ink-light); font-style: italic; margin-top: 2px; }
    .error-msg { font-size: 0.7rem; color: var(--accent); display: none; margin-top: 4px; }
    .error-msg.visible { display: block; }
    .form-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 2rem;
    }
    .btn {
      padding: 12px 26px;
      border-radius: var(--radius-button);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: all var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-primary {
      background: var(--accent);
      color: white;
      box-shadow: 0 2px 6px rgba(244,96,96,0.3);
    }
    .btn-primary:hover {
      background: #E04545;
      transform: translateY(-2px);
      box-shadow: 0 6px 14px rgba(244,96,96,0.4);
    }
    .btn-secondary {
      background: transparent;
      color: var(--primary);
      border: 1.5px solid var(--secondary);
    }
    .btn-secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-2px);
    }
    .result-box {
      background: var(--bg-page);
      border: 2px dashed var(--secondary);
      border-radius: var(--radius-input);
      padding: 1.3rem;
      font-family: 'Space Grotesk', serif;
      font-size: 0.95rem;
      line-height: 1.7;
      color: var(--primary);
      min-height: 100px;
      transition: all var(--transition);
    }
    .result-box.has-content {
      border-style: solid;
      border-color: var(--accent);
      background: rgba(244,96,96,0.05);
    }
    .result-placeholder {
      color: var(--ink-light);
      font-family: 'Inter', sans-serif;
      font-style: italic;
    }
    .result-actions {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    .btn-copy {
      background: var(--primary);
      color: white;
      font-size: 0.85rem;
      padding: 8px 20px;
    }
    .btn-copy:hover { background: var(--secondary); transform: translateY(-1px); }
    .btn-save {
      background: transparent;
      border: 1.5px solid var(--secondary);
      color: var(--primary);
      font-size: 0.85rem;
      padding: 8px 20px;
    }
    .btn-save:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }
    .copy-confirm {
      font-size: 0.8rem;
      color: #2e7d32;
      font-weight: 600;
      display: none;
      align-items: center;
      gap: 5px;
      background: #e8f5e9;
      padding: 5px 12px;
      border-radius: 40px;
    }
    .copy-confirm.show { display: flex; }
    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.2rem;
    }
    .history-count {
      font-size: 0.75rem;
      background: var(--accent);
      color: white;
      border-radius: 40px;
      padding: 2px 10px;
      font-weight: 700;
      margin-left: 10px;
    }
    .history-empty {
      color: var(--ink-light);
      font-style: italic;
      text-align: center;
      padding: 1.8rem 0;
    }
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 420px;
      overflow-y: auto;
    }
    .history-item {
      background: var(--bg-page);
      border: 1px solid var(--border-light);
      border-radius: 16px;
      padding: 14px 18px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      transition: all var(--transition);
    }
    .history-item:hover { border-color: var(--secondary); box-shadow: var(--shadow-default); }
    .history-item-content { flex: 1; min-width: 0; }
    .history-type {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .history-text {
      font-family: 'Space Grotesk', serif;
      font-size: 0.85rem;
      line-height: 1.5;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .history-date { font-size: 0.7rem; color: var(--ink-light); margin-top: 5px; }
    .history-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .btn-icon {
      width: 32px; height: 32px;
      border: none;
      background: transparent;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      transition: all var(--transition);
      color: var(--primary);
    }
    .btn-icon:hover { background: var(--secondary); color: white; }
    .btn-icon.danger:hover { background: var(--accent); color: white; }
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--primary);
      color: white;
      padding: 12px 24px;
      border-radius: var(--radius-button);
      font-size: 0.85rem;
      font-weight: 600;
      opacity: 0;
      transform: translateY(12px);
      transition: all 0.25s ease;
      pointer-events: none;
      z-index: 300;
      box-shadow: var(--shadow-default);
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    #isbn-scan-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0,0,0,0.93);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 16px;
    }
    #isbn-scan-video {
      width: 100%;
      max-width: 460px;
      border-radius: 24px;
      box-shadow: 0 12px 28px black;
    }
    #isbn-scan-hint {
      color: #bbb;
      font-size: 12px;
      text-align: center;
    }
    .scan-close {
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.4);
      color: white;
      padding: 8px 20px;
      border-radius: 15px;
      cursor: pointer;
    }
    @media (max-width: 680px) {
      .form-grid { grid-template-columns: 1fr; gap: 16px; }
      .type-btn { font-size: 0.8rem; padding: 6px 14px; }
      .close-btn { top: 12px; right: 16px; width: 40px; height: 40px; }
    }
  </style>
</head>
<body>
<button class="close-btn" onclick="quitterApplication()"><i class="fas fa-times"></i></button>
<div class="container">
  <div>
    <p class="section-title">Générateur de citations</p>
    <p class="section-sub" style="margin-bottom:1rem;">Sélectionnez le type de source à citer</p>
    <div class="type-grid" id="type-grid"></div>
  </div>
  <div class="card" id="form-card">
    <div class="card-title"><span class="card-title-icon"></span><span id="form-card-title">Choisissez un type de source</span></div>
    <div id="dynamic-form"></div>
  </div>
  <div class="card">
    <div class="card-title"><span class="card-title-icon"></span>Résultat</div>
    <div class="result-box" id="result-box"><span class="result-placeholder">La citation générée apparaîtra ici…</span></div>
    <div class="result-actions" id="result-actions" style="display:none;">
      <button class="btn btn-copy" onclick="copyCitation()"><i class="fas fa-copy"></i> Copier</button>
      <button class="btn btn-save" onclick="saveCitation()"><i class="fas fa-save"></i> Sauvegarder</button>
      <span class="copy-confirm" id="copy-confirm"><i class="fas fa-check-circle"></i> Copié !</span>
    </div>
  </div>
  <div class="card">
    <div class="history-header">
      <div class="card-title" style="margin-bottom:0;padding-bottom:0;border:none;">
        <span class="card-title-icon"></span>Historique
        <span class="history-count" id="history-count">0</span>
      </div>
      <button class="btn btn-secondary" style="font-size:0.8rem;padding:6px 18px;" onclick="clearHistory()"><i class="fas fa-trash-alt"></i> Tout effacer</button>
    </div>
    <div id="history-list" class="history-list"><p class="history-empty">Aucune citation sauvegardée.</p></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
/* ══════════════════════════════════════════════
   ÉTAT GLOBAL
══════════════════════════════════════════════ */
let mode        = localStorage.getItem('mode') || 'bureau';
let favs        = JSON.parse(localStorage.getItem('favs')        || '[]');
let clics       = JSON.parse(localStorage.getItem('clics')       || '{}');
let customTools = JSON.parse(localStorage.getItem('customTools') || '[]');
let favOnly     = localStorage.getItem('favOnly') === 'true';
 
let activeTag             = null;
let multiviewActive       = false;
let multiviewSelectedTags = [];
 
const ALL_TAGS = ['admin','compta','recherche','video','texte','radio'];
const MODE_TAGS = {
    bureau:   ['admin','compta','recherche'],
    creative: ['video','texte','radio'],
    perso:    []
};
const TAG_LABELS = {
    admin:'Admin', compta:'Compta', recherche:'Recherche',
    video:'Vidéo', texte:'Texte', radio:'Radio'
};
const TAG_DISPLAY = {
    admin:'ADMIN', compta:'COMPTA', recherche:'RECH.',
    video:'VIDÉO', texte:'TEXTE', radio:'RADIO'
};
 
/* ══════════════════════════════════════════════
   NOMMAGE DU FICHIER DE SAUVEGARDE
   Format : Sauv-Oo-JJmoisAAAA-[X_elements].json
══════════════════════════════════════════════ */
const MOIS_FR = [
    'janvier','février','mars','avril','mai','juin',
    'juillet','août','septembre','octobre','novembre','décembre'
];
 
function _buildSaveFilename() {
    const now   = new Date();
    const jour  = String(now.getDate()).padStart(2, '0');
    const mois  = MOIS_FR[now.getMonth()];
    const annee = now.getFullYear();
 
    // ── Comptage sémantique des éléments ──
    // • ovni_v9        → nombre de sessions dans ovni_v9.sessions
    // • ocr_history_v1 → longueur du tableau parsé
    // • toute autre clé applicative → +1
    const SKIP = new Set(['__last_backup_file__','__backup_size__','__drift_snooze__','__dir_handle_name__']);
    let totalElements = 0;
 
    for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (SKIP.has(k) || k.startsWith('__sm_') || k.startsWith('__')) continue;
 
        if (k === 'ovni_v9') {
            try {
                const parsed = JSON.parse(localStorage.getItem(k) || '{}');
                const sessions = parsed.sessions;
                totalElements += (Array.isArray(sessions) ? sessions.length : 0);
            } catch(e) { totalElements += 1; }
 
        } else if (k === 'ocr_history_v1') {
            try {
                const parsed = JSON.parse(localStorage.getItem(k) || '[]');
                totalElements += (Array.isArray(parsed) ? parsed.length : 1);
            } catch(e) { totalElements += 1; }
 
        } else {
            totalElements += 1;
        }
    }
 
    return `Sauv-Oo-${jour}${mois}${annee}-[${totalElements}_elements].json`;
}
 
/* ══════════════════════════════════════════════
   ALERTE BACKUP DRIFT
══════════════════════════════════════════════ */
const DRIFT_THRESHOLD = 800;
const DRIFT_SNOOZE_MS = 30 * 60 * 1000;
 
function _getDataSize() {
    let total = 0;
    const skip = new Set(['__last_backup_file__','__backup_size__','__drift_snooze__']);
    for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (!skip.has(k)) total += (localStorage.getItem(k) || '').length;
    }
    return total;
}
 
function checkDriftAlert() {
    const snooze = localStorage.getItem('__drift_snooze__');
    if (snooze && Date.now() < parseInt(snooze)) return;
 
    const sizeNow    = _getDataSize();
    const sizeBackup = parseInt(localStorage.getItem('__backup_size__') || '0');
    const drift      = sizeNow - sizeBackup;
    if (drift < DRIFT_THRESHOLD) return;
 
    const approxChanges = Math.round(drift / 200);
    const el = document.getElementById('driftCount');
    if (el) el.textContent = approxChanges + ' modification' + (approxChanges > 1 ? 's' : '');
 
    // Affiche le badge "mode PC" dans l'alerte si dossier lié
    const badge = document.getElementById('driftModeBadge');
    const isDirLinked = !!localStorage.getItem('__dir_handle_name__');
    if (badge) badge.style.display = isDirLinked ? 'inline-flex' : 'none';
 
    setTimeout(() => {
        document.getElementById('driftAlert').classList.add('visible');
    }, 600);
}
 
function driftSaveNow() {
    document.getElementById('driftAlert').classList.remove('visible');
    if (window.StorageManager && window.StorageManager.exportToFile) {
        window.StorageManager.exportToFile();
    }
    localStorage.setItem('__backup_size__', String(_getDataSize()));
    localStorage.removeItem('__drift_snooze__');
}
 
function driftLater() {
    document.getElementById('driftAlert').classList.remove('visible');
    localStorage.setItem('__drift_snooze__', String(Date.now() + DRIFT_SNOOZE_MS));
}
 
/* ══════════════════════════════════════════════
   INIT
══════════════════════════════════════════════ */
window.onload = () => {
    renderCustomTools();
    initUI();
    setMode(mode);
    document.getElementById('mainGrid').style.visibility = 'visible';
    checkDriftAlert();
 
    // Drag & drop fusion
    const dz = document.getElementById('fusionDropZone');
    if (dz) {
        dz.addEventListener('dragover', e => {
            e.preventDefault(); e.stopPropagation();
            dz.style.borderColor = 'var(--primary)';
            dz.style.background  = 'rgba(75,75,230,0.1)';
        });
        dz.addEventListener('dragleave', () => {
            dz.style.borderColor = 'rgba(10,36,114,0.20)';
            dz.style.background  = 'rgba(10,36,114,0.02)';
        });
        dz.addEventListener('drop', e => {
            e.preventDefault(); e.stopPropagation();
            dz.style.borderColor = 'rgba(10,36,114,0.20)';
            dz.style.background  = 'rgba(10,36,114,0.02)';
            const dropped = e.dataTransfer.files;
            if (dropped && dropped.length) {
                const fi = document.getElementById('fusionFileInput');
                if (fi) {
                    try {
                        const dt = new DataTransfer();
                        dt.items.add(dropped[0]);
                        fi.files = dt.files;
                    } catch(err) {}
                }
                onFusionFileDirect(dropped[0]);
            }
        });
    }
};
 
function initUI() {
    document.querySelectorAll('.btn-3d[data-id]').forEach(btn => {
        const id = btn.dataset.id;
        btn.querySelector('.count-badge').innerText = clics[id] || 0;
        btn.querySelector('.btn-star').classList.toggle('active', favs.includes(id));
    });
}
 
function getTop6Tags() {
    const tagScore = {};
    ALL_TAGS.forEach(t => { tagScore[t] = 0; });
    document.querySelectorAll('.btn-3d[data-id]').forEach(btn => {
        const bTags = btn.dataset.tags || '';
        const id    = btn.dataset.id;
        ALL_TAGS.forEach(t => {
            if (bTags.includes(t)) tagScore[t] += (clics[id] || 0);
        });
    });
    return ALL_TAGS.slice().sort((a, b) => tagScore[b] - tagScore[a]).slice(0, 6);
}
 
/* ══════════════════════════════════════════════
   MODE
══════════════════════════════════════════════ */
function setMode(m) {
    mode = m;
    localStorage.setItem('mode', m);
    document.querySelectorAll('.config-btn').forEach(b => b.classList.remove('active'));
    const btnId = 'btn' + m.charAt(0).toUpperCase() + m.slice(1);
    if (document.getElementById(btnId)) document.getElementById(btnId).classList.add('active');
    if (multiviewActive) {
        multiviewActive = false;
        multiviewSelectedTags = [];
        document.getElementById('btnMultiview').classList.remove('active');
        const mv = document.getElementById('multiviewContainer');
        if (mv) mv.remove();
        document.getElementById('mainGrid').style.display = '';
    }
    const tags = MODE_TAGS[m] || [];
    activeTag = tags.length > 0 ? tags[0] : null;
    renderTagFilters();
    document.getElementById('btnAddPerso').classList.toggle('hidden', m !== 'perso');
    applyFilters();
}
 
/* ══════════════════════════════════════════════
   FILTRES
══════════════════════════════════════════════ */
function renderTagFilters() {
    const fg = document.getElementById('filtersGroup');
    fg.innerHTML = '';
    if (multiviewActive) {
        getTop6Tags().forEach(tag => {
            const btn = document.createElement('button');
            btn.className = 'tag-btn';
            btn.textContent = TAG_DISPLAY[tag] || tag.toUpperCase();
            btn.dataset.tag = tag;
            if (multiviewSelectedTags.includes(tag)) btn.classList.add('tag-mv-selected');
            btn.addEventListener('click', () => onTagClick(tag));
            fg.appendChild(btn);
        });
    } else {
        const tags = MODE_TAGS[mode] || [];
        if (tags.length === 0) {
            fg.innerHTML = '<span style="font-size:10px;opacity:0.5">Tes liens personnalisés</span>';
            return;
        }
        tags.forEach(tag => {
            const btn = document.createElement('button');
            btn.className = 'tag-btn';
            btn.textContent = TAG_DISPLAY[tag] || tag.toUpperCase();
            btn.dataset.tag = tag;
            if (activeTag === tag) btn.classList.add('tag-active');
            btn.addEventListener('click', () => onTagClick(tag));
            fg.appendChild(btn);
        });
    }
}
 
function isMobile() {
    return window.matchMedia('(max-width: 768px)').matches ||
           /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);
}
 
let toastTimer = null;
function showToast(msg) {
    const toast = document.getElementById('mvToast');
    toast.textContent = msg;
    toast.style.display = 'block';
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { toast.style.display = 'none'; }, 4000);
}
 
function onTagClick(tag) {
    if (multiviewActive) {
        const idx = multiviewSelectedTags.indexOf(tag);
        if (idx === -1) {
            if (isMobile() && multiviewSelectedTags.length >= 3) {
                showToast('Vous ne pouvez sélectionner que 3 tags maximum sur mobile.');
                return;
            }
            multiviewSelectedTags.push(tag);
        } else {
            multiviewSelectedTags.splice(idx, 1);
        }
        renderTagFilters();
        renderMultiviewGrid();
    } else {
        activeTag = tag;
        renderTagFilters();
        applyFilters();
    }
}
 
function applyFilters() {
    document.querySelectorAll('.btn-3d[data-id]').forEach(btn => {
        const bMain = btn.dataset.main || 'custom';
        const bTags = btn.dataset.tags || '';
        let show = (mode === bMain || (mode === 'perso' && bMain === 'custom'));
        if (activeTag && !bTags.includes(activeTag)) show = false;
        if (favOnly && !favs.includes(btn.dataset.id)) show = false;
        btn.classList.toggle('hidden', !show);
    });
}
 
function toggleFavFilter() {

        if (favs.includes(id)) favs = favs.filter(f => f !== id);
        else favs.push(id);

        btn.querySelector('.btn-star').classList.toggle('active');
        applyFilters();

    clics[id] = (clics[id] || 0) + 1;
    localStorage.setItem('clics', JSON.stringify(clics));

function toggleMultiview() {
    multiviewActive = !multiviewActive;

    if (!multiviewActive) {
        if (multiviewSelectedTags.length > 0) activeTag = multiviewSelectedTags[0];

        if (mv) mv.remove();

function getButtonsSortedByClics(tag) {
    const allBtns = Array.from(document.querySelectorAll('#mainGrid .btn-3d[data-id]'));
    return allBtns
        .filter(btn => (btn.dataset.tags || '').includes(tag))
        .sort((a, b) => (clics[b.dataset.id] || 0) - (clics[a.dataset.id] || 0));
}
 
function renderMultiviewGrid() {
    const existing = document.getElementById('multiviewContainer');
    if (existing) existing.remove();
    document.getElementById('mainGrid').style.display = 'none';
 
    if (multiviewSelectedTags.length === 0) {
        document.getElementById('mainGrid').style.display = '';
        document.querySelectorAll('#mainGrid .btn-3d[data-id]').forEach(b => b.classList.add('hidden'));
        return;
    }
 
    const container = document.createElement('div');
    container.id = 'multiviewContainer';
    const mobile = isMobile();
    if (!mobile) container.classList.add('mv-desktop');
    const n = multiviewSelectedTags.length;
 
    if (!mobile) {
        multiviewSelectedTags.forEach(tag => {
            const btns = getButtonsSortedByClics(tag);
            const col = document.createElement('div');
            col.className = 'mv-col';
            const header = document.createElement('div');
            header.className = 'mv-col-header';
            header.textContent = TAG_LABELS[tag] || tag.toUpperCase();
            col.appendChild(header);
            if (btns.length === 0) {
                const empty = document.createElement('div');
                empty.style.cssText = 'font-size:11px;opacity:0.4;padding:20px 0;';
                empty.textContent = 'Aucun outil';
                col.appendChild(empty);
            } else {
                const inner = document.createElement('div');
                inner.className = 'mv-col-inner';
                btns.forEach(orig => {
                    const clone = orig.cloneNode(true);
                    clone.classList.remove('hidden');
                    const star = clone.querySelector('.btn-star');
                    if (star) star.classList.toggle('active', favs.includes(orig.dataset.id));
                    const cnt = clone.querySelector('.count-badge');
                    if (cnt) cnt.innerText = clics[orig.dataset.id] || 0;
                    clone.onclick = (e) => {
                        const oc = orig.getAttribute('onclick');
                        if (oc) { window.event = e; eval(oc.replace('this', 'orig')); }
                    };
                    inner.appendChild(clone);
                });
                col.appendChild(inner);
            }
            container.appendChild(col);
        });
    } else {
        let col0 = [], col1 = [];
        if (n === 1) {
            const allBtns = getButtonsSortedByClics(multiviewSelectedTags[0]).slice(0, 6);
            const half = Math.ceil(allBtns.length / 2);
            col0 = allBtns.slice(0, half);
            col1 = allBtns.slice(half);
        } else if (n === 2) {
            col0 = getButtonsSortedByClics(multiviewSelectedTags[0]).slice(0, 3);
            col1 = getButtonsSortedByClics(multiviewSelectedTags[1]).slice(0, 3);
        } else {
            const tagBtns = multiviewSelectedTags.slice(0, 3).map(tag => getButtonsSortedByClics(tag));
            col0 = tagBtns.map(tb => tb[0] || null).filter(Boolean);
            col1 = tagBtns.map(tb => tb[1] || null).filter(Boolean);
        }
        [col0, col1].forEach((colBtns, colIdx) => {
            const col = document.createElement('div');
            col.className = 'mv-col';
            const header = document.createElement('div');
            header.className = 'mv-col-header';
            if (n === 1) {
                header.textContent = TAG_LABELS[multiviewSelectedTags[0]] || multiviewSelectedTags[0];
            } else if (n === 2) {
                header.textContent = TAG_LABELS[multiviewSelectedTags[colIdx]] || multiviewSelectedTags[colIdx];
            } else {
                header.textContent = multiviewSelectedTags.slice(0, 3).map(t => TAG_DISPLAY[t] || t).join(' · ');
            }
            col.appendChild(header);
            if (colBtns.length === 0) {
                const empty = document.createElement('div');
                empty.style.cssText = 'font-size:11px;opacity:0.4;padding:20px 0;text-align:center;';
                empty.textContent = 'Aucun outil';
                col.appendChild(empty);
            } else {
                colBtns.forEach(orig => {
                    const clone = orig.cloneNode(true);
                    clone.classList.remove('hidden');
                    const star = clone.querySelector('.btn-star');
                    if (star) star.classList.toggle('active', favs.includes(orig.dataset.id));
                    const cnt = clone.querySelector('.count-badge');
                    if (cnt) cnt.innerText = clics[orig.dataset.id] || 0;
                    clone.onclick = (e) => {
                        const oc = orig.getAttribute('onclick');
                        if (oc) { window.event = e; eval(oc.replace('this', 'orig')); }
                    };
                    col.appendChild(clone);
                });
            }
            container.appendChild(col);
        });
    }
 
    document.getElementById('mainGrid').parentNode.insertBefore(
        container, document.getElementById('mainGrid').nextSibling
    );
}
 
/* ══════════════════════════════════════════════
   FUSION JSON — Deep Merge
   Compatible avec TOUS les noms de fichiers JSON
   (backup-app.json, backup-app (X).json,
    Sauv-Oo-JJmoisAAAA-[X_elements].json, etc.)
══════════════════════════════════════════════ */
 
/**
 * mergeValues(baseStr, patchStr)
 * Règles :
 *  - Objets  → fusion récursive des clés
 *  - Nombres → addition
 *  - Tableaux → concat + déduplication (par .id, .text, ou JSON complet)
 *  - Strings simples / autres → patch écrase base
 */
function mergeValues(baseStr, patchStr) {
    function tryParse(v) {
        if (typeof v !== 'string') return { val: v, parsed: true };
        try { return { val: JSON.parse(v), parsed: true }; }
        catch(e) { return { val: v, parsed: false }; }
    }
    const b = tryParse(baseStr);
    const p = tryParse(patchStr);
    if (!b.parsed || !p.parsed) return patchStr;
 
    function merge(bv, pv) {
        if (bv === undefined || bv === null) return pv;
        if (pv === undefined || pv === null) return bv;
        if (typeof bv === 'object' && !Array.isArray(bv) &&
            typeof pv === 'object' && !Array.isArray(pv)) {
            const r = Object.assign({}, bv);
            Object.keys(pv).forEach(k => { r[k] = merge(bv[k], pv[k]); });
            return r;
        }
        if (typeof bv === 'number' && typeof pv === 'number') return bv + pv;
        if (Array.isArray(bv) && Array.isArray(pv)) {
            const seen = new Map();
            return bv.concat(pv).filter(item => {
                let key;
                if (item && typeof item === 'object') {
                    key = item.id   !== undefined ? 'id:'   + String(item.id)
                        : item.text !== undefined ? 'text:' + String(item.text)
                        : 'json:' + JSON.stringify(item);
                } else {
                    key = 'prim:' + String(item);
                }
                if (seen.has(key)) return false;
                seen.set(key, true);
                return true;
            });
        }
        return pv;
    }
    return JSON.stringify(merge(b.val, p.val));
}
 
let _pendingFusionResult = null;
 
/**
 * onFusionFileSelected — accepte TOUT fichier .json
 * quel que soit son nom (ancien ou nouveau format)
 */
function onFusionFileSelected(input) {
    const file = input.files && input.files[0];
    if (!file) return;
    const label = document.getElementById('fusionFileName');
    if (label) label.textContent = file.name;
 
    const reader = new FileReader();
    reader.onload = function(e) {
        let patchData;
        try {
            const raw = e.target.result.replace(/```json\s*/gi,'').replace(/```\s*/g,'').trim();
            patchData = JSON.parse(raw);
            if (typeof patchData !== 'object' || patchData === null) throw new Error('Format invalide');
        } catch(err) {
            alert('Fichier JSON invalide : ' + err.message);
            return;
        }
 
        const INTERNAL_KEYS = new Set(['__last_backup_file__','__backup_size__','__drift_snooze__','__dir_handle_name__']);
        const baseData = {};
        for (let i = 0; i < localStorage.length; i++) {
            const k = localStorage.key(i);
            if (!INTERNAL_KEYS.has(k) && !k.startsWith('__')) {
                baseData[k] = localStorage.getItem(k);
            }
        }
 
        const merged = Object.assign({}, baseData);
        Object.keys(patchData).forEach(k => {
            if (INTERNAL_KEYS.has(k) || k.startsWith('__')) return;
            const patchStr = typeof patchData[k] === 'string'
                ? patchData[k]
                : JSON.stringify(patchData[k]);
            if (merged[k] !== undefined) {
                merged[k] = mergeValues(merged[k], patchStr);
            } else {
                merged[k] = patchStr;
            }
        });
 
        _pendingFusionResult = merged;
 
        const preview = {};
        Object.keys(merged).forEach(k => {
            try { preview[k] = JSON.parse(merged[k]); } catch(e) { preview[k] = merged[k]; }
        });
        document.getElementById('fusionResultPre').textContent = JSON.stringify(preview, null, 2);
        document.getElementById('fusionResultBox').style.display = 'block';
        document.getElementById('btnSaveFusion').style.display = '';
    };
    reader.onerror = function() { alert('Impossible de lire le fichier.'); };
    reader.readAsText(file);
}
 
function saveFusion() {
    if (!_pendingFusionResult) return;
    const SKIP = new Set(['__last_backup_file__','__backup_size__','__drift_snooze__','__dir_handle_name__']);
    Object.keys(_pendingFusionResult).forEach(k => {
        if (SKIP.has(k)) return;
        try {
            Storage.prototype._setItem
                ? Storage.prototype._setItem.call(localStorage, k, _pendingFusionResult[k])
                : localStorage.setItem(k, _pendingFusionResult[k]);
        } catch(ex) {}
    });
    closeFusionModal();
    _pendingFusionResult = null;
    const t = document.getElementById('__sm_toast__') || document.getElementById('mvToast');
    if (t) {
        t.textContent = '✓ Fusion appliquée — rechargement…';
        t.style.background = '#32a852';
        t.style.display = 'block';
        t.style.opacity = '1';
    }
    setTimeout(() => { location.reload(); }, 900);
}
 
function onFusionFileDirect(file) {
    if (!file) return;
    const label = document.getElementById('fusionFileName');
    if (label) label.textContent = file.name;
    const fakeInput = { files: [file] };
    onFusionFileSelected(fakeInput);
}
 
function closeFusionModal() {
    closeTool('fusionModal');
    _pendingFusionResult = null;
    const fi = document.getElementById('fusionFileInput');
    if (fi) fi.value = '';
    const lbl = document.getElementById('fusionFileName');
    if (lbl) lbl.textContent = 'Appuyez ici pour choisir un fichier JSON';
    document.getElementById('fusionResultBox').style.display = 'none';
    document.getElementById('btnSaveFusion').style.display = 'none';
}

<!-- ═══════════════════════════════════════════════════════════════════
     BLOC <script> #2 — STORAGE MANAGER v3 HYBRIDE
     Mode PC  : showDirectoryPicker + auto-save toutes 20 modifications
     Mode Mobile/Fallback : téléchargement via #driftAlert
     Nommage  : Sauv-Oo-JJmoisAAAA-[X_elements].json
     Remplace le bloc Storage Manager v2 existant
═══════════════════════════════════════════════════════════════════ -->
<script>
(function (global) {
  'use strict';
 
  var CONFIG = {
    BACKUP_FILE_KEY  : '__last_backup_file__',
    DIR_HANDLE_KEY   : '__dir_handle_name__',
    INDICATOR_ID     : '__sm_indicator__',
    FILE_INPUT_ID    : '__sm_file_input__',
    TOAST_ID         : '__sm_toast__',
    TOAST_DURATION   : 3000,
    Z_INDEX          : 99990,
    MIN_CHARS        : 30,
    AUTO_SAVE_EVERY  : 20   // modifications avant auto-save PC
  };
 
  /* ── Compteur de modifications depuis dernier backup ── */
  var _modCount = 0;
 
  /* ── Référence au FileSystemDirectoryHandle (Mode PC) ── */
  var _dirHandle = null;
 
  /* ── Indique si showDirectoryPicker est disponible ── */
  var _canUseDir = (typeof window.showDirectoryPicker === 'function');
 
  /* ════════════════════════════════════════
     1. PERSISTANCE
  ════════════════════════════════════════ */
  function initStoragePersistence() {
    if (navigator.storage && navigator.storage.persist) {
      navigator.storage.persist().then(function (granted) {
        console.log('[StorageManager] Persistance : ' + (granted ? 'activée ✓' : 'refusée'));
      }).catch(function (err) { console.warn('[StorageManager] persist() :', err); });
    }
  }
 
  /* ════════════════════════════════════════
     2. NOMMAGE — construit le nom du fichier
  ════════════════════════════════════════ */
  function _buildFilename() {
    if (typeof _buildSaveFilename === 'function') return _buildSaveFilename();
    // Fallback autonome — même logique sémantique que _buildSaveFilename
    var now   = new Date();
    var MOIS  = ['janvier','février','mars','avril','mai','juin',
                 'juillet','août','septembre','octobre','novembre','décembre'];
    var jour  = String(now.getDate()).padStart(2,'0');
    var mois  = MOIS[now.getMonth()];
    var annee = now.getFullYear();
 
    var SKIP = new Set(['__last_backup_file__','__backup_size__','__drift_snooze__','__dir_handle_name__']);
    var totalElements = 0;
 
    for (var i = 0; i < localStorage.length; i++) {
      var k = localStorage.key(i);
      if (SKIP.has(k) || k.indexOf('__sm_') === 0 || k.indexOf('__') === 0) continue;
 
      if (k === 'ovni_v9') {
        try {
          var parsed = JSON.parse(localStorage.getItem(k) || '{}');
          var sessions = parsed.sessions;
          totalElements += (Array.isArray(sessions) ? sessions.length : 0);
        } catch(e) { totalElements += 1; }
 
      } else if (k === 'ocr_history_v1') {
        try {
          var arr = JSON.parse(localStorage.getItem(k) || '[]');
          totalElements += (Array.isArray(arr) ? arr.length : 1);
        } catch(e) { totalElements += 1; }
 
      } else {
        totalElements += 1;
      }
    }
 
    return 'Sauv-Oo-' + jour + mois + annee + '-[' + totalElements + '_elements].json';
  }
 
  /* ════════════════════════════════════════
     3. COLLECTE DES DONNÉES
  ════════════════════════════════════════ */
  function _collectData() {
    var data = {};
    var SKIP = new Set([CONFIG.BACKUP_FILE_KEY, CONFIG.DIR_HANDLE_KEY]);
    for (var i = 0; i < localStorage.length; i++) {
      var key = localStorage.key(i);
      if (!SKIP.has(key)) data[key] = localStorage.getItem(key);
    }
    return data;
  }
 
  /* ════════════════════════════════════════
     4a. EXPORT — Mode PC (showDirectoryPicker)
  ════════════════════════════════════════ */
  function _exportToDirectory(silent) {
    if (!_dirHandle) return false;
    var filename = _buildFilename();
    var json     = JSON.stringify(_collectData(), null, 2);
    var blob     = new Blob([json], { type: 'application/json' });
 
    _dirHandle.getFileHandle(filename, { create: true })
      .then(function (fileHandle) { return fileHandle.createWritable(); })
      .then(function (writable) {
        return writable.write(blob).then(function () { return writable.close(); });
      })
      .then(function () {
        localStorage.setItem(CONFIG.BACKUP_FILE_KEY, new Date().toISOString());
        _updateBackupSize();
        _modCount = 0;
        refreshIndicatorState();
        if (!silent) showToast('✓ Sauvegardé dans le dossier lié');
      })
      .catch(function (err) {
        console.error('[StorageManager] Erreur écriture dossier :', err);
        if (!silent) showToast('Erreur lors de la sauvegarde dossier', true);
      });
    return true;
  }
 
  /* ════════════════════════════════════════
     4b. EXPORT — Mode Mobile / Fallback (téléchargement)
  ════════════════════════════════════════ */
  function _exportToDownload() {
    try {
      var filename = _buildFilename();
      var json     = JSON.stringify(_collectData(), null, 2);
      var blob     = new Blob([json], { type: 'application/json' });
      var url      = URL.createObjectURL(blob);
      var a        = document.createElement('a');
      a.href = url; a.download = filename; a.style.display = 'none';
      document.body.appendChild(a); a.click();
      setTimeout(function () { document.body.removeChild(a); URL.revokeObjectURL(url); }, 1500);
      localStorage.setItem(CONFIG.BACKUP_FILE_KEY, new Date().toISOString());
      _updateBackupSize();
      _modCount = 0;
      refreshIndicatorState();
      showToast('✓ Backup téléchargé');
    } catch (err) {
      console.error('[StorageManager] Erreur export :', err);
      showToast('Erreur lors de l\'export', true);
    }
  }
 
  /* ════════════════════════════════════════
     4c. EXPORT — Point d'entrée unifié
  ════════════════════════════════════════ */
  function exportToFile() {
    if (_dirHandle) {
      _exportToDirectory(false);
    } else {
      _exportToDownload();
    }
  }
 
  /* ════════════════════════════════════════
     4d. UPDATE taille référence
  ════════════════════════════════════════ */
  function _updateBackupSize() {
    try {
      var sz = 0;
      var skipSz = new Set([CONFIG.BACKUP_FILE_KEY, '__backup_size__', '__drift_snooze__', CONFIG.DIR_HANDLE_KEY]);
      for (var si = 0; si < localStorage.length; si++) {
        var sk = localStorage.key(si);
        if (!skipSz.has(sk)) sz += (localStorage.getItem(sk) || '').length;
      }
      localStorage.setItem('__backup_size__', String(sz));
      localStorage.removeItem('__drift_snooze__');
    } catch(e) {}
  }
 
  /* ════════════════════════════════════════
     5. LIER UN DOSSIER (Mode PC uniquement)
  ════════════════════════════════════════ */
  function linkDirectory() {
    if (!_canUseDir) {
      showToast('showDirectoryPicker non supporté sur cet appareil', true);
      return;
    }
    window.showDirectoryPicker({ mode: 'readwrite' })
      .then(function (handle) {
        _dirHandle = handle;
        localStorage.setItem(CONFIG.DIR_HANDLE_KEY, handle.name);
        refreshIndicatorState();
        _updateDirBadge();
        showToast('✓ Dossier lié : ' + handle.name);
        // Sauvegarde immédiate après liaison
        _exportToDirectory(false);
      })
      .catch(function (err) {
        if (err.name !== 'AbortError') {
          console.error('[StorageManager] Erreur liaison dossier :', err);
          showToast('Impossible de lier le dossier', true);
        }
      });
  }
 
  function unlinkDirectory() {
    _dirHandle = null;
    localStorage.removeItem(CONFIG.DIR_HANDLE_KEY);
    refreshIndicatorState();
    _updateDirBadge();
    showToast('Dossier dissocié');
  }
 
  /* ════════════════════════════════════════
     6. IMPORT FICHIER (Restauration)
  ════════════════════════════════════════ */
  function importFromFile() {
    var fi = document.getElementById(CONFIG.FILE_INPUT_ID);
    if (fi) fi.click();
  }
 
  function _handleFileImport(event) {
    var file = event.target.files && event.target.files[0];
    if (!file) return;
    event.target.value = '';
    var reader = new FileReader();
    reader.onload = function (e) {
      try {
        var raw     = e.target.result;
        var cleaned = raw.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();
        var data    = JSON.parse(cleaned);
        if (typeof data !== 'object' || data === null) throw new Error('Format invalide');
        var keys = Object.keys(data).length;
        var ok   = global.confirm('Restaurer ' + keys + ' entrée(s) depuis le backup ?\n\nLes données actuelles seront remplacées.');
        if (!ok) return;
        localStorage.clear();
        Object.keys(data).forEach(function (k) { try { localStorage.setItem(k, data[k]); } catch (e) {} });
        showToast('✓ Données restaurées — rechargement…');
        setTimeout(function () { global.location.reload(); }, 900);
      } catch (err) {
        console.error('[StorageManager] Erreur import :', err);
        showToast('Fichier invalide ou corrompu', true);
      }
    };
    reader.onerror = function () { showToast('Impossible de lire le fichier', true); };
    reader.readAsText(file);
  }
 
  /* ════════════════════════════════════════
     7. PARTAGE
  ════════════════════════════════════════ */
  function shareBackup() {
    try {
      var filename = _buildFilename();
      var json     = JSON.stringify(_collectData(), null, 2);
      var blob     = new Blob([json], { type: 'application/json' });
      var file     = new File([blob], filename, { type: 'application/json' });
      if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
        navigator.share({ title: 'Backup application', text: 'Sauvegarde des données — ' + _formatDate(new Date()), files: [file] })
          .then(function () { showToast('✓ Backup partagé'); })
          .catch(function (err) { if (err.name !== 'AbortError') showToast('Erreur lors du partage', true); });
      } else if (navigator.share) {
        navigator.share({ title: 'Backup application', text: json })
          .catch(function (err) { if (err.name !== 'AbortError') showToast('Erreur lors du partage', true); });
      } else if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(json)
          .then(function () { showToast('✓ Backup copié dans le presse-papier'); })
          .catch(function () { showToast('Partage non supporté sur cet appareil', true); });
      } else {
        showToast('Partage non supporté sur cet appareil', true);
      }
    } catch (err) {
      console.error('[StorageManager] Erreur partage :', err);
      showToast('Erreur lors du partage', true);
    }
  }
 
  /* ════════════════════════════════════════
     8. AUTO-SAVE — toutes 20 modifications (Mode PC)
  ════════════════════════════════════════ */
  function handleAutoSave(key) {
    // Ignorer les clés internes
    var SKIP = new Set([CONFIG.BACKUP_FILE_KEY, CONFIG.DIR_HANDLE_KEY,
                        '__backup_size__', '__drift_snooze__']);
    if (SKIP.has(key) || (key && key.startsWith('__sm_'))) return;
 
    if (_dirHandle) {
      _modCount++;
      if (_modCount >= CONFIG.AUTO_SAVE_EVERY) {
        console.log('[StorageManager] Auto-save PC déclenché (' + _modCount + ' modifications)');
        _exportToDirectory(true); // silent = true
      }
    }
  }
 
  /* ════════════════════════════════════════
     9. TAILLE localStorage
  ════════════════════════════════════════ */
  function _getLocalStorageSize() {
    var total = 0;
    for (var i = 0; i < localStorage.length; i++) {
      var key = localStorage.key(i);
      if (key !== CONFIG.BACKUP_FILE_KEY)
        total += (localStorage.getItem(key) || '').length;
    }
    return total;
  }

    clearTimeout(toast.__smTimer);
    toast.__smTimer = setTimeout(function () {
      toast.style.opacity = '0';
      setTimeout(function () { toast.style.display = 'none'; }, 300);
    }, CONFIG.TOAST_DURATION);

    var fileDot = document.getElementById('__sm_file_dot__');
    var fileRaw = localStorage.getItem(CONFIG.BACKUP_FILE_KEY);

      var needsAlert = size > CONFIG.MIN_CHARS && !fileRaw;
      fileDot.style.background = needsAlert ? '#ff8c00' : (fileRaw ? '#32a852' : '#888');
    }
    var dot = document.getElementById('__sm_dot__');
    if (dot) {
      var globalAlert = _getLocalStorageSize() > CONFIG.MIN_CHARS && !localStorage.getItem(CONFIG.BACKUP_FILE_KEY);
      dot.style.background = globalAlert ? '#ff8c00' : '#32a852';
    }
    _updateDirBadge();

  function _applyStyles(el, styles) {
    Object.keys(styles).forEach(function (p) { el.style[p] = styles[p]; });
  }

    return {
      flex: '1', minWidth: '72px', padding: '9px 6px',

      fontSize: '11px', fontWeight: '700', cursor: 'pointer',

  function _tapFeedback(btn) {
    btn.addEventListener('touchstart', function () { btn.style.opacity = '0.7'; }, { passive: true });
    btn.addEventListener('touchend',   function () { btn.style.opacity = '1'; },   { passive: true });
  }
 
  function _createPanelButton(label, bgColor, onClick) {
    var btn = document.createElement('button');
    btn.textContent = label;
    _applyStyles(btn, {
      display: 'block', width: '100%', padding: '11px 14px',
      border: 'none', borderRadius: '12px', background: bgColor,
      color: 'white', fontSize: '12px', fontWeight: '700',
      cursor: 'pointer', textAlign: 'left', fontFamily: 'inherit',
      transition: 'opacity 0.15s ease',
      WebkitTapHighlightColor: 'transparent', outline: 'none'
    });
    btn.addEventListener('click', onClick);
    _tapFeedback(btn);
    return btn;
  }
 
  function _timeAgo(date) {
    var diffMs   = Date.now() - date.getTime();
    var diffMins = Math.floor(diffMs / 60000);
    var diffH    = Math.floor(diffMs / 3600000);
    var diffD    = Math.floor(diffMs / 86400000);
    if (diffMins < 1)  return 'à l\'instant';
    if (diffMins < 60) return 'il y a ' + diffMins + ' min';
    if (diffH < 24)    return 'il y a ' + diffH + 'h';
    return 'il y a ' + diffD + ' jour' + (diffD > 1 ? 's' : '');
  }
 
  function _formatDate(date) {
    try {
      return date.toLocaleDateString('fr-FR', {
        day: '2-digit', month: '2-digit', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    } catch (e) { return date.toString(); }
  }
 
  /* ════════════════════════════════════════
     12. INIT + INTERCEPTION localStorage
  ════════════════════════════════════════ */
  function init() {
    initStoragePersistence();
    createUIIndicator();
 
    var _orig = {
      setItem   : Storage.prototype.setItem,
      removeItem: Storage.prototype.removeItem,
      clear     : Storage.prototype.clear
    };
    Storage.prototype._setItem = _orig.setItem;
 
    Storage.prototype.setItem = function (key, value) {
      _orig.setItem.call(this, key, value);
      if (this === localStorage) {
        handleAutoSave(key);
        if (typeof checkDriftAlert === 'function') checkDriftAlert();
      }
    };
    Storage.prototype.removeItem = function (key) { _orig.removeItem.call(this, key); };
    Storage.prototype.clear = function () { _orig.clear.call(this); };
  }
 
  global.StorageManager = {
    init              : init,
    exportToFile      : exportToFile,
    importFromFile    : importFromFile,
    linkDirectory     : linkDirectory,
    unlinkDirectory   : unlinkDirectory,
    refreshState      : refreshIndicatorState
  };
 
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
 
})(window);
</script>

<script>
(function() {
    /* ── Palette Quartz Ink & Coral ── */
    const VIBRANT = ['#006466', '#F46060', '#FFD972'];
    const DARK    = '#0A2472';
 
    /* ── Génère la mosaïque SVG ── */
    function buildMosaic() {
        const svg = document.getElementById('mosaic-svg');
        if (!svg) return;
        svg.innerHTML = '';
 
        const G = 4; // grille 4×4
        const step = 100 / (G - 1);
        let pts = [];
        let colColors = [[], [], []];
 
        for (let y = 0; y < G; y++) {
            for (let x = 0; x < G; x++) {
                let px = x * step, py = y * step;
                if (x > 0 && x < G - 1 && y > 0 && y < G - 1) {
                    px += (Math.random() - 0.5) * step * 0.8;
                    py += (Math.random() - 0.5) * step * 0.8;
                }
                pts.push({ x: px, y: py });
            }
        }
 
        for (let y = 0; y < G - 1; y++) {
            for (let x = 0; x < G - 1; x++) {
                const p1 = pts[y * G + x], p2 = pts[y * G + (x + 1)];
                const p3 = pts[(y + 1) * G + (x + 1)], p4 = pts[(y + 1) * G + x];
                const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                const isDark = Math.random() < 0.125;
                const color = isDark ? DARK : VIBRANT[Math.floor(Math.random() * VIBRANT.length)];
                if (!isDark && x < 3) colColors[x].push(color);
                poly.setAttribute('points', `${p1.x},${p1.y} ${p2.x},${p2.y} ${p3.x},${p3.y} ${p4.x},${p4.y}`);
                poly.setAttribute('fill', color);
                poly.setAttribute('stroke', color);
                poly.setAttribute('stroke-width', '0.5');
                svg.appendChild(poly);
            }
        }
        return colColors;
    }
 
    /* ── Anime les lettres du mot OUTILS ── */
    function buildLetters(colColors) {
        const container = document.getElementById('word-outils');
        if (!container) return;
        if (!container.dataset.built) {
            'OUTILS'.split('').forEach(ch => {
                const s = document.createElement('span');
                s.textContent = ch;
                s.className = 'logo-letter';
                container.appendChild(s);
            });
            container.dataset.built = '1';
        }
        container.querySelectorAll('.logo-letter').forEach((l, i) => {
            const col = i < 2 ? 0 : (i < 4 ? 1 : 2);
            const pool = colColors && colColors[col].length ? colColors[col] : VIBRANT;
            l.style.color = pool[Math.floor(Math.random() * pool.length)];
        });
    }
 
    /* ── Point d'entrée public (appelé par onclick du logo) ── */
    window.refreshLogo = function() {
        const colColors = buildMosaic();
        buildLetters(colColors);
        randomizeBadgeLines();
    };
 
    /* ── Couleur badge contrastée selon la couleur du bouton parent ── */
    function randomizeBadgeLines() {
        const contrast = {
            'btn-blue'  : ['#F46060', '#FFD972'],
            'btn-purple': ['#F46060', '#FFD972'],
            'btn-google': ['#FFD972', '#F46060'],
            'btn-green' : ['#FFD972', '#F46060'],
            'btn-orange': ['#0A2472', '#006466'],
            'btn-red'   : ['#FFD972', '#0A2472'],
        };
        const darkIcon = new Set(['#FFD972']);
 
        document.querySelectorAll('.badge-lines').forEach(badge => {
            const btn = badge.closest('.btn-3d');
            if (!btn) return;
            const cls = [...btn.classList].find(c => contrast[c]) || 'btn-blue';
            const pool = contrast[cls];
            const color = pool[Math.floor(Math.random() * pool.length)];
            badge.style.background = color;
            const icon = badge.querySelector('i');
            if (icon) {
                icon.style.color = darkIcon.has(color) ? '#0A2472' : 'white';
            }
        });
    }
 
    /* ── Hover reset des lettres ── */
    document.addEventListener('DOMContentLoaded', () => {
        const box = document.querySelector('.logo-box');
        if (box) {
            box.addEventListener('mouseleave', () => {
                document.querySelectorAll('.logo-letter').forEach(l => l.style.color = '');
            });
        }
        window.refreshLogo();
    });
})();
</script>

function setField(id, value) {
  let el = document.getElementById('f_'+id);
  if(el && value && !el.value.trim()) el.value = value;
}
function extractYear(s) { return (s||'').match(/\d{4}/)?.[0] || ''; }
function splitAuthor(name) {
  if(!name) return {prenom:'', nom:''};
  if(name.includes(',')){ let [nom, prenom]=name.split(',').map(s=>s.trim()); return {prenom:prenom||'', nom}; }
  let parts=name.trim().split(/\s+/);
  if(parts.length===1) return {prenom:'', nom:parts[0]};
  return {prenom:parts.slice(0,-1).join(' '), nom:parts[parts.length-1]};
}

// ─── UNIMARC helpers — parsing robuste sans espaces de noms ───────────────────
function _bnfGetAll(xml, tag, code) {
  const results = [];
  const allNodes = xml.getElementsByTagName('*');
  for (let el of allNodes) {
    const local = el.localName || el.nodeName.split(':').pop();
    if (local !== 'datafield') continue;
    if (el.getAttribute('tag') !== tag) continue;
    if (!code) { results.push(el.textContent.trim()); continue; }
    const subNodes = el.getElementsByTagName('*');
    for (let sf of subNodes) {
      const sfLocal = sf.localName || sf.nodeName.split(':').pop();
      if (sfLocal === 'subfield' && sf.getAttribute('code') === code) {
        results.push(sf.textContent.trim());
      }
    }
  }
  return results;
}
function _bnfGet(xml, tag, code) { return _bnfGetAll(xml, tag, code)[0] || ''; }
function _bnfClean(s) { return (s || '').replace(/[\[\]]/g, '').replace(/\s*[,;:.\/]\s*$/, '').trim(); }

// ─── Remplissage depuis UNIMARC BnF ──────────────────────────────────────────
async function fillFromBNF(xmlText) {
  const parser = new DOMParser();
  const xml = parser.parseFromString(xmlText, 'text/xml');

  // Vérifie qu'on a bien au moins un record
  let hasRecord = false;
  for (let n of xml.getElementsByTagName('*')) {
    const local = n.localName || n.nodeName.split(':').pop();
    if (local === 'record' || local === 'recordData') { hasRecord = true; break; }
  }
  if (!hasRecord) return false;

  // ── TITRE — 200 $a (titre propre) + $e (sous-titre) ──
  const titrePropre = _bnfClean(_bnfGet(xml, '200', 'a'));
  const sousTitre   = _bnfClean(_bnfGet(xml, '200', 'e'));
  const titreComplet = sousTitre ? `${titrePropre} : ${sousTitre}` : titrePropre;

  // ── AUTEURS — 700 (principal), 701 (co-auteur), 702 (autre), 710 (collectivité) ──
  let nomAuteur = '', prenomAuteur = '';
  for (const zone of ['700', '701', '702']) {
    const nom    = _bnfClean(_bnfGet(xml, zone, 'a'));
    const prenom = _bnfClean(_bnfGet(xml, zone, 'b'));
    if (nom) { nomAuteur = nom; prenomAuteur = prenom; break; }
  }
  if (!nomAuteur) nomAuteur = _bnfClean(_bnfGet(xml, '710', 'a'));

  // ── PUBLICATION — Zone 214 (nouvel UNIMARC BnF depuis ~2017) puis 210 ──
  // 214 $a=lieu, $c=éditeur, $d=date  /  210 idem
  const ville   = _bnfClean(_bnfGetAll(xml, '214', 'a')[0]   || _bnfGetAll(xml, '210', 'a')[0]   || '');
  const editeur = _bnfClean(_bnfGetAll(xml, '214', 'c')[0]   || _bnfGetAll(xml, '210', 'c')[0]   || '');
  const anneeRaw=              _bnfGetAll(xml, '214', 'd')[0] || _bnfGetAll(xml, '210', 'd')[0]   || '';

  // ── COLLECTION — 225 $a + $v (numéro) ──
  const collTitre = _bnfClean(_bnfGet(xml, '225', 'a'));
  const collNum   = _bnfClean(_bnfGet(xml, '225', 'v'));
  const collection = collTitre ? (collNum ? `${collTitre}, n°${collNum}` : collTitre) : '';

  // ── PAGES — 215 $a (ex: "342 p.") ──
  const physique = _bnfGet(xml, '215', 'a');
  const pagesMatch = physique.match(/(\d+)\s*(p\.|pages|f\.|ff\.)/i);
  const pages = pagesMatch ? pagesMatch[1] : '';

  // ── Remplissage ──
  if (titreComplet) setField('titre', titreComplet);
  if (nomAuteur)    { setField('noms', nomAuteur); setField('prenoms', prenomAuteur); }
  if (editeur)      setField('editeur', editeur);
  if (ville)        setField('ville', ville);
  if (anneeRaw)     setField('annee', extractYear(anneeRaw));
  if (collection)   setField('collection', collection);
  if (pages)        setField('page', pages);

  console.log('[BnF UNIMARC]', { titreComplet, nomAuteur, prenomAuteur, editeur, ville, anneeRaw, collection, pages });
  return !!(titreComplet || nomAuteur || editeur);
}

// ─── Fallback Dublin Core BnF (structure plus simple) ────────────────────────
async function fillFromBNFDublinCore(xmlText) {
  const parser = new DOMParser();
  const xml = parser.parseFromString(xmlText, 'text/xml');
  const dcGet = (tag) => {
    for (let el of xml.getElementsByTagName('*')) {
      if ((el.localName || el.nodeName.split(':').pop()).toLowerCase() === tag)
        return el.textContent.trim();
    }
    return '';
  };
  const dcGetAll = (tag) => {
    const r = [];
    for (let el of xml.getElementsByTagName('*'))
      if ((el.localName || el.nodeName.split(':').pop()).toLowerCase() === tag) r.push(el.textContent.trim());
    return r;
  };
  const titre    = dcGet('title');
  const creators = dcGetAll('creator');
  const publisher= dcGet('publisher');
  const date     = dcGet('date');
  // dc:description contient parfois "Lieu : Éditeur, AAAA"
  const desc = dcGet('description');
  const descMatch = desc.match(/^([^:]+)\s*:\s*([^,]+)/);

  if (titre)          setField('titre', titre);
  if (publisher)      setField('editeur', _bnfClean(publisher));
  if (descMatch)      { setField('ville', _bnfClean(descMatch[1])); setField('editeur', _bnfClean(descMatch[2])); }
  if (date)           setField('annee', extractYear(date));
  if (creators.length){ const {prenom,nom}=splitAuthor(creators[0]); setField('prenoms', prenom); setField('noms', nom); }
  return !!(titre || creators.length || publisher);
}

// ─── Cascade : BnF UNIMARC → BnF Dublin Core → OpenLibrary → Google Books ────
async function fetchISBN(isbn) {
  let clean = isbn.replace(/[^0-9Xx]/g, '').toUpperCase();
  if (clean.length !== 10 && clean.length !== 13) return false;
  let fb = document.getElementById('isbn-feedback');

  // 1. BnF UNIMARC — requête adj (correspondance exacte), maximumRecords=3
  if (fb) fb.textContent = '⏳ Recherche BnF (UNIMARC)…';
  try {
    const isbnQ  = encodeURIComponent('"' + clean + '"');
    const bnfUrl = `https://catalogue.bnf.fr/api/SRU?version=1.2&operation=searchRetrieve&query=bib.isbn%20adj%20${isbnQ}&recordSchema=unimarcXchange&maximumRecords=3`;
    const res    = await fetch(bnfUrl);
    if (res.ok) {
      const ok = await fillFromBNF(await res.text());
      if (ok) { if (fb) fb.textContent = '✓ BnF UNIMARC'; showToast('✓ ISBN trouvé (BnF)'); return true; }
    }
  } catch(e) { console.warn('[BnF UNIMARC]', e); }

  // 2. BnF Dublin Core
  if (fb) fb.textContent = '⏳ Recherche BnF (Dublin Core)…';
  try {
    const isbnQ = encodeURIComponent('"' + clean + '"');
    const dcUrl = `https://catalogue.bnf.fr/api/SRU?version=1.2&operation=searchRetrieve&query=bib.isbn%20adj%20${isbnQ}&recordSchema=dublincore&maximumRecords=1`;
    const res   = await fetch(dcUrl);
    if (res.ok) {
      const ok = await fillFromBNFDublinCore(await res.text());
      if (ok) { if (fb) fb.textContent = '✓ BnF Dublin Core'; showToast('✓ ISBN trouvé (BnF)'); return true; }
    }
  } catch(e) { console.warn('[BnF DC]', e); }
  if (fb) fb.textContent = '⏳ Recherche OpenLibrary...';
  try {
    let ol = await fetch(`https://openlibrary.org/api/books?bibkeys=ISBN:${clean}&format=json&jscmd=data`).then(r=>r.json());
    if (ol[`ISBN:${clean}`]) {
      let book = ol[`ISBN:${clean}`];
      setField('titre', book.title || '');
      setField('editeur', book.publishers?.[0]?.name || '');
      setField('ville', book.publish_places?.[0]?.name || '');
      setField('annee', extractYear(book.publish_date || ''));
      setField('collection', book.series?.[0]?.name || '');
      let authorName = book.authors?.[0]?.name || '';
      if (authorName) { let {prenom,nom}=splitAuthor(authorName); setField('prenoms', prenom); setField('noms', nom); }
      if (fb) fb.textContent = '✓ OpenLibrary';
      showToast('✓ ISBN trouvé (OpenLibrary)');
      return true;
    }
  } catch(e) {}
  if (fb) fb.textContent = '⏳ Recherche Google Books...';
  try {
    let gb = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${clean}`).then(r=>r.json());
    if (gb.items && gb.items[0]) {
      let info = gb.items[0].volumeInfo;
      setField('titre', info.title || '');
      setField('editeur', info.publisher || '');
      setField('annee', extractYear(info.publishedDate || ''));
      let authors = info.authors || [];
      if (authors.length) { let {prenom,nom}=splitAuthor(authors[0]); setField('prenoms', prenom); setField('noms', nom); }
      if (fb) fb.textContent = '✓ Google Books';
      showToast('✓ ISBN trouvé (Google Books)');
      return true;
    }
  } catch(e) {}
  if (fb) fb.textContent = '✗ Introuvable';
  showToast('❌ ISBN non trouvé');
  return false;
}

function setupISBNField() {
  let field = document.getElementById('f_isbn');
  if (!field || field.dataset.isbnReady) return;
  field.dataset.isbnReady = '1';
  let btn = document.createElement('button');
  btn.type = 'button';
  btn.innerHTML = '<i class="fas fa-camera"></i> Scanner ISBN';
  btn.style.marginTop = '8px';
  btn.style.padding = '8px 16px';
  btn.style.borderRadius = '15px';
  btn.style.border = '1px solid var(--secondary)';
  btn.style.background = 'transparent';
  btn.style.cursor = 'pointer';
  btn.style.fontWeight = '600';
  btn.onclick = () => startScanner();
  field.parentNode.appendChild(btn);
  let fb = document.createElement('span');
  fb.id = 'isbn-feedback';
  fb.style.display = 'block';
  fb.style.fontSize = '0.7rem';
  fb.style.marginTop = '4px';
  field.parentNode.appendChild(fb);
  field.addEventListener('input', debounce(e => {
    let val = e.target.value.replace(/[^0-9X]/gi, '');
    if (val.length === 10 || val.length === 13) fetchISBN(val);
  }, 500));
}
function debounce(fn, ms) { let t; return function(...a){ clearTimeout(t); t=setTimeout(()=>fn.apply(this,a), ms); }; }

// ================= SCANNER CAMÉRA (BarcodeDetector + Quagga2) =================
let scannerActive = false, videoStream = null, animFrame = null;
function buildOverlay() {
  if (document.getElementById('isbn-scan-overlay')) return;
  let div = document.createElement('div'); div.id = 'isbn-scan-overlay';
  div.innerHTML = `<video id="isbn-scan-video" autoplay playsinline muted style="width:100%;max-width:460px;border-radius:24px;"></video>
                   <p id="isbn-scan-hint" style="color:#fff;">Initialisation...</p>
                   <button class="scan-close" onclick="stopScanner()">✕ Fermer</button>`;
  document.body.appendChild(div);
}

/**
 * Sélectionne la meilleure caméra arrière disponible :
 * Priorité : caméra principale (pas grand-angle, pas téléobjectif)
 * Compatible Chrome/Safari/Firefox sur mobile et desktop.
 */
async function getBestRearCameraStream() {
  // 1. Essai avec exact facingMode + haute résolution (Chrome Android)
  const constraints = [
    // Tentative 1 : caméra arrière, haute résolution, zoom natif à 1 (caméra principale)
    {
      video: {
        facingMode: { exact: 'environment' },
        width: { ideal: 4096 },
        height: { ideal: 2160 },
        zoom: { ideal: 1 }
      }
    },
    // Tentative 2 : caméra arrière, haute résolution sans zoom forcé
    {
      video: {
        facingMode: { exact: 'environment' },
        width: { ideal: 4096 },
        height: { ideal: 2160 }
      }
    },
    // Tentative 3 : facingMode souple (Safari iOS)
    {
      video: {
        facingMode: 'environment',
        width: { ideal: 1920 },
        height: { ideal: 1080 }
      }
    },
    // Tentative 4 : fallback générique
    { video: { facingMode: 'environment' } },
    // Tentative 5 : toute caméra disponible
    { video: true }
  ];

  // Sur Chrome Android, on peut énumérer les devices et choisir
  // la caméra arrière principale (évite le grand-angle)
  if (navigator.mediaDevices.enumerateDevices) {
    try {
      const devices = await navigator.mediaDevices.enumerateDevices();
      const videoCams = devices.filter(d => d.kind === 'videoinput');

      if (videoCams.length > 1) {
        // Filtrer les caméras arrière identifiables par leur label
        const rearCams = videoCams.filter(d => {
          const label = (d.label || '').toLowerCase();
          return label.includes('back') || label.includes('rear') ||
                 label.includes('environment') || label.includes('arrière') ||
                 label.includes('0,') || // pattern Chrome Android : "camera2 0, facing back"
                 label.includes('facing back');
        });

        // Parmi les caméras arrière, préférer la caméra principale (souvent la 2ème, index 0)
        // et exclure "ultra" (grand-angle) et "tele"
        const mainCam = rearCams.find(d => {
          const label = (d.label || '').toLowerCase();
          return !label.includes('ultra') && !label.includes('wide') &&
                 !label.includes('tele') && !label.includes('macro') &&
                 !label.includes('depth') && !label.includes('2,') &&
                 !label.includes('3,') && !label.includes('4,');
        }) || rearCams[0];

        if (mainCam) {
          try {
            const stream = await navigator.mediaDevices.getUserMedia({
              video: {
                deviceId: { exact: mainCam.deviceId },
                width: { ideal: 4096 },
                height: { ideal: 2160 }
              }
            });
            console.log('[Camera] Caméra sélectionnée :', mainCam.label);
            return stream;
          } catch(e) {
            console.warn('[Camera] Impossible de sélectionner par deviceId, fallback constraints', e);
          }
        }
      }
    } catch(e) {
      console.warn('[Camera] enumerateDevices échoué', e);
    }
  }

  // Fallback : essayer les contraintes en cascade
  for (const constraint of constraints) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia(constraint);
      console.log('[Camera] Stream obtenu avec contrainte :', JSON.stringify(constraint.video));
      return stream;
    } catch(e) {
      console.warn('[Camera] Contrainte échouée, essai suivant...', e.name);
    }
  }

  throw new Error('Aucune caméra accessible');
}

async function startScanner() {
  if (scannerActive) return;
  buildOverlay();
  let video = document.getElementById('isbn-scan-video');
  let hint = document.getElementById('isbn-scan-hint');
  hint.textContent = 'Ouverture caméra...';
  try {
    const stream = await getBestRearCameraStream();
    videoStream = stream;
    video.srcObject = stream;
    await video.play();
    hint.textContent = 'Centrez le code-barres ISBN';
    scannerActive = true;

    // Appliquer le focus continu si supporté
    const track = stream.getVideoTracks()[0];
    if (track) {
      try {
        await track.applyConstraints({ advanced: [{ focusMode: 'continuous' }] });
      } catch(e) { /* non supporté sur certains navigateurs */ }
    }

    if ('BarcodeDetector' in window) {
      let detector = new BarcodeDetector({ formats: ['ean_13','ean_8','upc_a','code_128'] });
      function tick() {
        if (!scannerActive) return;
        if (video.readyState >= 2) {
          detector.detect(video).then(codes => { if (codes.length > 0) onISBNDetected(codes[0].rawValue); }).catch(()=>{});
        }
        animFrame = requestAnimationFrame(tick);
      }
      tick();
    } else {
      // Fallback Quagga2
      let script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.2.6/dist/quagga.min.js';
      script.onload = () => {
        let canvas = document.createElement('canvas');
        canvas.id = 'quagga-canvas'; canvas.style.display = 'none';
        document.body.appendChild(canvas);
        function quaggaTick() {
          if (!scannerActive) return;
          if (video.readyState >= 2) {
            let vw = video.videoWidth, vh = video.videoHeight;
            if (vw && vh) {
              canvas.width = vw; canvas.height = vh;
              let ctx = canvas.getContext('2d');
              ctx.drawImage(video, 0, 0, vw, vh);
              let cropW = Math.round(vw * 0.9), cropH = Math.round(vh * 0.5);
              let cropX = Math.round((vw - cropW)/2), cropY = Math.round((vh - cropH)/2);
              let cropCanvas = document.createElement('canvas');
              cropCanvas.width = cropW; cropCanvas.height = cropH;
              cropCanvas.getContext('2d').drawImage(canvas, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);
              Quagga.decodeSingle({
                decoder: { readers: ['ean_reader','ean_8_reader','code_128_reader'] },
                src: cropCanvas.toDataURL()
              }, result => { if (result && result.codeResult && result.codeResult.code) onISBNDetected(result.codeResult.code); });
            }
          }
          animFrame = requestAnimationFrame(quaggaTick);
        }
        quaggaTick();
      };
      document.head.appendChild(script);
    }
  } catch(err) {
    hint.textContent = 'Erreur caméra : autorisez l\'accès';
    console.error('[Camera] Erreur :', err);
  }
}
function stopScanner() {
  scannerActive = false;
  if (animFrame) cancelAnimationFrame(animFrame);
  if (videoStream) videoStream.getTracks().forEach(t => t.stop());
  let ov = document.getElementById('isbn-scan-overlay');
  if (ov) ov.remove();
}
function onISBNDetected(code) {
  let clean = String(code).replace(/[^0-9X]/gi, '');
  if (clean.length !== 13 && clean.length !== 10) return;

  stopScanner();
  selectType('ouvrage');

  // Attente active du champ f_isbn (jusqu'à 3 secondes)
  let attempts = 0;
  const MAX = 30;
  const interval = setInterval(() => {
    let field = document.getElementById('f_isbn');
    attempts++;
    if (field) {
      clearInterval(interval);
      field.value = clean;
      // setupISBNField() se charge de l'écouteur 'input',
      // mais on appelle fetchISBN directement pour éviter la double requête
      setupISBNField();
      fetchISBN(clean);
    } else if (attempts >= MAX) {
      clearInterval(interval);
      console.warn('Champ f_isbn introuvable après scan ISBN');
    }
  }, 100);
}
window.startScanner = startScanner;
window.stopScanner = stopScanner;

renderTypeButtons();
renderHistory();
setupISBNField();
</script>
