<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Boîte à outils Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='80'>🧰</text></svg>">
    <meta name="theme-color" content="#4b4be6">
</head>
<body>

<div id="iframe_calculette" class="iframe-container">
    <button class="close-iframe" onclick="closeIframe('iframe_calculette')">FERMER X</button>
    <iframe src="https://es-d-0544653420260421-019da75d-1b6e-7819-b877-2b48cfb03541.codepen.dev/"></iframe>
</div>
<div id="iframe_minuteur" class="iframe-container">
    <button class="close-iframe" onclick="closeIframe('iframe_minuteur')">FERMER X</button>
    <iframe src="https://es-d-0544653420260421-019da784-8528-73d9-b9de-3f2eb3988b3e.codepen.dev/"></iframe>
</div>
<div id="iframe_sign_pdf" class="iframe-container">
    <button class="close-iframe" onclick="closeIframe('iframe_sign_pdf')">FERMER X</button>
    <iframe src="sign-pdf.html" allow="camera; microphone"></iframe>
</div>
<div id="iframe_photo_recu" class="iframe-container">
    <button class="close-iframe" onclick="closeIframe('iframe_photo_recu')">FERMER X</button>
    <iframe src="photo-recu.html" allow="camera; microphone"></iframe>
</div>

<div class="nav-shell">
    <div class="logo-box">
        <span class="logo-icon">🧰</span>
        <div class="logo-text-stack"><span>Outils</span><span>Online</span></div>
    </div>
    <div class="config-bar">
        <button id="btnBureau" class="config-btn active" onclick="setMode('bureau')">Bureau</button>
        <button id="btnCreative" class="config-btn" onclick="setMode('creative')">Créative</button>
        <button id="btnPerso" class="config-btn" onclick="setMode('perso')">⭐ Perso</button>
    </div>
    <div class="spacer"></div>
</div>

<div class="filters-container">
    <button id="favFilterMain" style="width:40px; height:40px; border-radius:12px; background:var(--card-bg); border:none; color:white;" onclick="toggleFavFilter()">☆</button>
    <div class="filters-group" id="filtersGroup"></div>
    <button onclick="resetFilters()" style="width:40px; height:40px; border-radius:12px; background:var(--card-bg); border:none; color:white;">🔄</button>
</div>

<div class="grid" id="mainGrid">
    <button class="btn-3d btn-purple" data-id="sign-pdf" data-main="bureau" data-tags="admin" onclick="openIframe('iframe_sign_pdf', this)">
        <div class="btn-star">★</div><div class="favicon-badge">✍️</div><div>Sign PDF</div><div class="count-badge">0</div>
    </button>
    <button class="btn-3d btn-purple" data-id="organise-pdf" data-main="bureau" data-tags="admin" data-url="https://www.ilovepdf.com/fr/organiser-pdf" onclick="handleTool(this)">
        <div class="btn-star">★</div><div class="favicon-badge">📂</div><div>Organiser PDF</div><div class="count-badge">0</div>
    </button>
    <button class="btn-3d btn-purple" data-id="pdf-jpg" data-main="bureau" data-tags="admin" data-url="https://www.ilovepdf.com/pdf_to_jpg" onclick="handleTool(this)">
        <div class="btn-star">★</div><div class="favicon-badge">🖼️</div><div>PDF -> JPG</div><div class="count-badge">0</div>
    </button>
    <button class="btn-3d btn-google" data-id="gmail-admin" data-main="bureau" data-tags="admin" data-url="https://drive.google.com/drive/u/0/" onclick="handleTool(this)">
        <div class="btn-star">★</div><div class="favicon-badge">✉️</div><div>Gmail</div><div class="count-badge">0</div>
    </button>
    <button class="btn-3d btn-green" data-id="photo-recu" data-main="bureau" data-tags="compta" onclick="openIframe('iframe_photo_recu', this)">
        <div class="btn-star">★</div><div class="favicon-badge">📷</div><div>Photo Reçu</div><div class="count-badge">0</div>
    </button>
    <button class="btn-3d btn-green" data-id="calculette" data-main="bureau" data-tags="compta" onclick="openIframe('iframe_calculette', this)">
        <div class="btn-star">★</div><div class="favicon-badge">🧮</div><div>Calculette</div><div class="count-badge">0</div>
    </button>
    <button class="btn-3d btn-green" data-id="drive-compta" data-main="bureau" data-tags="compta" data-url="https://drive.google.com/drive/u/0/" onclick="handleTool(this)">
        <div class="btn-star">★</div><div class="favicon-badge">📁</div><div>Drive</div><div class="count-badge">0</div>
    </button>
    <button class="btn-3d btn-blue" data-id="archive-url" data-main="bureau" data-tags="recherche" data-url="https://web.archive.org/" onclick="handleTool(this)">
        <div class="btn-star">★</div><div class="favicon-badge">🏛️</div><div>Archive URL</div><div class="count-badge">0</div>
    </button>
    <button class="btn-3d btn-blue" data-id="ign" data-main="bureau" data-tags="recherche" data-url="https://remonterletemps.ign.fr/telecharger/" onclick="handleTool(this)">
        <div class="btn-star">★</div><div class="favicon-badge">🗺️</div><div>IGN</div><div class="count-badge">0</div>
    </button>
    <button class="btn-3d btn-blue" data-id="google-street" data-main="bureau" data-tags="recherche" data-url="https://www.google.com/maps" onclick="handleTool(this)">
        <div class="btn-star">★</div><div class="favicon-badge">📍</div><div>Google Street</div><div class="count-badge">0</div>
    </button>
    <button class="btn-3d btn-blue" data-id="recherche-actu" data-main="bureau" data-tags="recherche" data-url="https://news.google.com/" onclick="handleTool(this)">
        <div class="btn-star">★</div><div class="favicon-badge">📰</div><div>Recherche actu</div><div class="count-badge">0</div>
    </button>
    <button class="btn-3d btn-blue" data-id="minuteur" data-main="bureau" data-tags="recherche" onclick="openIframe('iframe_minuteur', this)">
        <div class="btn-star">★</div><div class="favicon-badge">⏲️</div><div>Minuteur</div><div class="count-badge">0</div>
    </button>

    <button class="btn-3d btn-orange" data-id="yt-mp4" data-main="creative" data-tags="video" data-url="https://fr.ssyoutube.com/" onclick="handleTool(this)">
        <div class="btn-star">★</div><div class="favicon-badge">🎬</div><div>Youtube MP4</div><div class="count-badge">0</div>
    </button>
    <button class="btn-3d btn-orange" data-id="transfer" data-main="creative" data-tags="video" data-url="https://www.transfernow.net/fr" onclick="handleTool(this)">
        <div class="btn-star">★</div><div class="favicon-badge">📤</div><div>Transfer Fichier</div><div class="count-badge">0</div>
    </button>
    <button class="btn-3d btn-orange" data-id="transcribe-v" data-main="creative" data-tags="video" data-url="https://turboscribe.ai/dashboard" onclick="handleTool(this)">
        <div class="btn-star">★</div><div class="favicon-badge">🎙️</div><div>Transcription vidéo</div><div class="count-badge">0</div>
    </button>
    <button class="btn-3d btn-orange" data-id="transcribe-t" data-main="creative" data-tags="texte" data-url="https://turboscribe.ai/dashboard" onclick="handleTool(this)">
        <div class="btn-star">★</div><div class="favicon-badge">📝</div><div>Transcription texte</div><div class="count-badge">0</div>
    </button>
    <button class="btn-3d btn-red" data-id="yt-radio" data-main="creative" data-tags="radio" data-url="https://www.youtube.com/" onclick="handleTool(this)">
        <div class="btn-star">★</div><div class="favicon-badge">📺</div><div>Youtube</div><div class="count-badge">0</div>
    </button>
    <button class="btn-3d btn-red" data-id="gmail-radio" data-main="creative" data-tags="radio" data-url="https://mail.google.com/" onclick="handleTool(this)">
        <div class="btn-star">★</div><div class="favicon-badge">📧</div><div>Gmail</div><div class="count-badge">0</div>
    </button>
    <button class="btn-3d btn-red" data-id="yt-mp4-radio" data-main="creative" data-tags="radio" data-url="https://fr.ssyoutube.com/" onclick="handleTool(this)">
        <div class="btn-star">★</div><div class="favicon-badge">🎵</div><div>Youtube MP4</div><div class="count-badge">0</div>
    </button>

    <button id="btnAddPerso" class="btn-3d hidden" style="border: 2px dashed rgba(255,255,255,0.2); background:none" onclick="openTool('addModal')">
        <div style="font-size:30px">+</div><div>Ajouter</div>
    </button>
</div>

<div id="addModal" class="modal">
    <div class="box-content">
        <h3 style="margin-bottom:15px">Nouveau Lien Perso</h3>
        <input type="text" id="newTitle" placeholder="Nom" class="cam-input">
        <input type="text" id="newUrl" placeholder="URL (ex: google.com)" class="cam-input">
        <input type="text" id="newIcon" placeholder="Icône (emoji)" class="cam-input" value="🔗">
        <select id="newColor" class="cam-input">
            <option value="btn-purple">Violet</option>
            <option value="btn-blue">Bleu</option>
            <option value="btn-green">Vert</option>
            <option value="btn-orange">Orange</option>
            <option value="btn-red">Rouge</option>
            <option value="btn-google">Google</option>
        </select>
        <button class="btn-3d btn-blue" style="min-height:50px; width:100%" onclick="addNewTool()">Enregistrer</button>
        <button onclick="closeTool('addModal')" style="margin-top:15px; background:none; border:none; color:#777; width:100%; cursor:pointer">Annuler</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
