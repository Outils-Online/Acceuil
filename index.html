<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OVNI CONTROL V9</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap');

:root {
  --bg: #080c14;
  --surface: #0d1420;
  --card: #111827;
  --card2: #161f2e;
  --border: #1e2d40;
  --border2: #243346;
  --primary: #3b82f6;
  --primary-dim: rgba(59,130,246,0.15);
  --accent: #c8ff57;
  --accent-dim: rgba(200,255,87,0.12);
  --danger: #ef4444;
  --danger-dim: rgba(239,68,68,0.12);
  --success: #22c55e;
  --success-dim: rgba(34,197,94,0.12);
  --amber: #f59e0b;
  --amber-dim: rgba(245,158,11,0.12);
  --text: #f1f5f9;
  --text-muted: #64748b;
  --text-soft: #94a3b8;
  --font-display: 'Syne', sans-serif;
  --font-body: 'Space Grotesk', sans-serif;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 90px;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(ellipse 80% 50% at 20% -20%, rgba(59,130,246,0.08) 0%, transparent 60%),
                    radial-gradient(ellipse 60% 40% at 80% 110%, rgba(200,255,87,0.05) 0%, transparent 50%);
  pointer-events: none; z-index: 0;
}

header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(8,12,20,0.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px;
}
.header-inner { display: flex; align-items: center; justify-content: space-between; }
.logo {
  font-family: var(--font-display);
  font-size: 1.1rem; font-weight: 800;
  letter-spacing: 2px;
  color: var(--text);
}
.logo span { color: var(--accent); }
.logo sub { font-size: 0.5rem; color: var(--text-muted); letter-spacing: 0; vertical-align: middle; }

.header-actions { display: flex; gap: 8px; align-items: center; }
.btn-ghost {
  background: var(--card); border: 1px solid var(--border2);
  color: var(--text-soft); padding: 7px 12px;
  border-radius: var(--radius-sm); font-size: 0.72rem; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; gap: 6px;
  transition: all 0.2s;
  font-family: var(--font-body);
}
.btn-ghost:hover { border-color: var(--primary); color: var(--text); }
.btn-ghost.accent-ghost { border-color: rgba(200,255,87,0.3); color: var(--accent); }
.btn-ghost.accent-ghost:hover { background: var(--accent-dim); }

.tab-strip {
  display: flex; gap: 4px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 10px; padding: 3px;
  margin-top: 12px;
}
.tab {
  flex: 1; text-align: center;
  padding: 9px 6px;
  font-size: 0.7rem; font-weight: 700;
  letter-spacing: 0.5px;
  border-radius: 7px; cursor: pointer;
  color: var(--text-muted);
  transition: all 0.25s;
}
.tab.active {
  background: var(--primary);
  color: #fff;
  box-shadow: 0 2px 12px rgba(59,130,246,0.35);
}
.tab .badge {
  display: inline-block;
  background: rgba(255,255,255,0.2);
  border-radius: 99px;
  padding: 1px 6px; margin-left: 4px;
  font-size: 0.65rem;
}

.section { display: none; padding: 16px; animation: fadeUp 0.3s ease; }
.section.active { display: block; }
@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 14px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s;
}
.card:hover { border-color: var(--border2); }
.card-title {
  font-size: 0.7rem; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--accent);
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  cursor: pointer;
  user-select: none;
}
.card-title .title-left {
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-title i:first-child { font-size: 0.8rem; opacity: 0.8; }
.card-title .toggle-icon {
  transition: transform 0.2s;
  font-size: 0.75rem;
}
.card.collapsed .card-body { display: none; }
.card.collapsed .toggle-icon { transform: rotate(-90deg); }

.field-group { margin-bottom: 10px; }
.field-label { font-size: 0.68rem; color: var(--text-muted); font-weight: 600; letter-spacing: 0.5px; margin-bottom: 5px; }
input, select, textarea {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text);
  padding: 10px 12px;
  font-size: 0.9rem;
  font-family: var(--font-body);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59,130,246,0.12); }
input.error { border-color: var(--danger); box-shadow: 0 0 0 3px rgba(239,68,68,0.12); }
select option { background: var(--card); }

.row { display: flex; gap: 8px; }
.row > * { flex: 1; }

.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 7px; padding: 12px 16px;
  border: none; border-radius: var(--radius-sm);
  font-family: var(--font-body); font-size: 0.85rem; font-weight: 700;
  cursor: pointer; transition: all 0.2s;
  position: relative; overflow: hidden;
  letter-spacing: 0.3px;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--primary); color: #fff; width: 100%; }
.btn-primary:hover { background: #2563eb; box-shadow: 0 4px 20px rgba(59,130,246,0.4); }
.btn-success { background: var(--success); color: #fff; flex: 2; }
.btn-success:hover { box-shadow: 0 4px 20px rgba(34,197,94,0.3); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { box-shadow: 0 4px 20px rgba(239,68,68,0.3); }
.btn-neutral { background: var(--card2); border: 1px solid var(--border2); color: var(--text-soft); width: 100%; }
.btn-neutral:hover { border-color: var(--border); color: var(--text); }
.btn-icon {
  width: 36px; height: 36px; border-radius: 50%;
  border: none; cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 0.8rem; transition: all 0.2s;
}
.btn-icon:active { transform: scale(0.9); }
.btn-icon-check { background: var(--success-dim); color: var(--success); border: 1px solid rgba(34,197,94,0.2); }
.btn-icon-check:hover { background: var(--success); color: #fff; }
.btn-icon-trash { background: var(--danger-dim); color: var(--danger); border: 1px solid rgba(239,68,68,0.2); }
.btn-icon-trash:hover { background: var(--danger); color: #fff; }
.btn-icon-edit { background: var(--primary-dim); color: var(--primary); border: 1px solid rgba(59,130,246,0.2); }
.btn-icon-edit:hover { background: var(--primary); color: #fff; }

.session-banner {
  background: linear-gradient(135deg, #0d1a30, #0a1520);
  border: 1px solid rgba(59,130,246,0.25);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 14px;
  position: relative; overflow: hidden;
}
.session-banner::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: linear-gradient(180deg, var(--primary), var(--accent));
  border-radius: 3px;
}
.session-label { font-size: 0.62rem; font-weight: 700; letter-spacing: 1.5px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; }
.session-text { font-size: 0.95rem; font-weight: 700; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.session-text .tag {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--primary-dim); border: 1px solid rgba(59,130,246,0.2);
  color: var(--primary); border-radius: 30px;
  padding: 3px 10px; font-size: 0.78rem;
}
.session-tag-qty { font-weight: 900; color: var(--accent); }
.session-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
.session-cost {
  font-size: 0.8rem; color: var(--amber);
  display: flex; align-items: center; gap: 5px;
}
.btn-reset { background: none; border: none; color: var(--danger); font-size: 0.68rem; font-weight: 700; cursor: pointer; opacity: 0.7; }
.btn-reset:hover { opacity: 1; }

.category-header {
  font-size: 0.62rem; font-weight: 800; letter-spacing: 2px;
  text-transform: uppercase; color: var(--accent);
  padding: 12px 4px 6px;
  display: flex; align-items: center; gap: 8px;
}
.category-header::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
.list-item {
  display: grid;
  grid-template-columns: 1fr 72px 82px;
  align-items: center;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 12px 14px;
  margin-bottom: 7px;
  transition: all 0.25s;
  animation: itemIn 0.3s ease;
}
@keyframes itemIn { from { opacity:0; transform:translateX(-8px); } to { opacity:1; transform:none; } }
.list-item:hover { border-color: var(--border2); transform: translateY(-1px); }
.list-item.done { opacity: 0.45; }
.list-item.done .item-name { text-decoration: line-through; }
.item-name { font-weight: 700; font-size: 0.9rem; display: inline-block; margin-right: 8px; }
.recipe-dots { display: inline-flex; gap: 4px; align-items: center; }
.recipe-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.15);
  flex-shrink: 0;
}
.qty-big { font-size: 1.5rem; font-weight: 900; color: var(--accent); display: block; text-align: center; line-height: 1.1; }
.qty-unit { font-size: 0.62rem; color: var(--text-muted); text-align: center; display: block; }
.item-actions { display: flex; gap: 6px; justify-content: flex-end; align-items: center; }

.sortable-category {
  cursor: grab; display: flex; align-items: center;
  gap: 8px; background: var(--card2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 10px 12px;
  margin-bottom: 6px; transition: all 0.2s;
  user-select: none;
}
.sortable-category:hover { border-color: var(--border2); }
.sortable-category.drag-over { border-color: var(--primary); background: var(--primary-dim); }
.drag-handle { color: var(--text-muted); font-size: 0.9rem; }

.recipe-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 8px;
  animation: itemIn 0.2s ease;
  position: relative;
  transition: all 0.2s ease;
}
.recipe-card.collapsed .recipe-card-grid, 
.recipe-card.collapsed .ing-cost-line { 
  display: none; 
}
.recipe-card.collapsed {
  padding: 8px 12px;
  background: var(--card);
}
.recipe-card-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
  cursor: pointer;
}
.recipe-card.collapsed .recipe-card-header { margin-bottom: 0; }
.recipe-card-header .ac-wrapper { flex: 1; }
.recipe-card-header input { margin: 0; font-weight: 700; }
.recipe-card.collapsed .in-n { background: transparent; border-color: transparent; padding-left: 0; }

.toggle-icon {
  width: 24px; font-size: 0.7rem; color: var(--text-muted);
  transition: transform 0.3s; text-align: center;
}
.recipe-card.collapsed .toggle-icon { transform: rotate(-90deg); }

.recipe-card-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  gap: 6px;
}
.recipe-card-grid .field-sub label { font-size: 0.6rem; color: var(--text-muted); font-weight: 700; letter-spacing: 0.5px; display: block; margin-bottom: 3px; }
.recipe-card-grid input, .recipe-card-grid select { padding: 8px; font-size: 0.82rem; margin: 0; }
.ing-cost-line {
  margin-top: 8px; padding-top: 8px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.ing-cost-preview { font-size: 0.72rem; color: var(--amber); font-weight: 700; }
.btn-del-row {
  width: 32px; height: 32px; flex-shrink: 0;
  background: var(--danger-dim); border: 1px solid rgba(239,68,68,0.2);
  color: var(--danger); border-radius: 8px;
  cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.btn-del-row:hover { background: var(--danger); color: #fff; }

.ac-wrapper { position: relative; }
.ac-box {
  position: absolute; top: calc(100% + 4px); left: 0; right: 0;
  background: var(--card2); border: 1px solid var(--border2);
  border-radius: var(--radius-sm); z-index: 500;
  display: none; overflow: hidden;
  box-shadow: var(--shadow);
}
.ac-item { padding: 9px 12px; font-size: 0.82rem; cursor: pointer; transition: background 0.15s; }
.ac-item:hover { background: var(--primary-dim); }
.ac-item span { color: var(--text-muted); font-size: 0.7rem; margin-left: 6px; }

.catalog-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px;
  margin-bottom: 10px;
  display: flex; align-items: center; justify-content: space-between;
  transition: all 0.2s;
  animation: itemIn 0.3s ease;
}
.catalog-card:hover { border-color: var(--border2); transform: translateX(2px); }
.catalog-name { font-weight: 700; font-size: 0.95rem; }
.catalog-meta { font-size: 0.7rem; color: var(--text-muted); margin-top: 3px; }
.catalog-cost { font-size: 0.8rem; color: var(--amber); font-weight: 700; margin-top: 3px; }
.catalog-actions { display: flex; gap: 6px; }

.search-field {
  position: relative;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.search-field i:first-child {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--text-muted); font-size: 0.85rem;
  pointer-events: none;
}
.search-field input {
  padding-left: 36px;
  flex: 1;
}
.import-icon-btn {
  background: var(--card2);
  border: 1px solid var(--border2);
  border-radius: 40px;
  width: 42px;
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--text-soft);
  font-size: 1rem;
}
.import-icon-btn:hover {
  border-color: var(--primary);
  color: var(--primary);
  background: var(--primary-dim);
}

/* Discret session bar */
.session-bar {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 30px;
  padding: 6px 12px;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 0.75rem;
  gap: 8px;
  flex-wrap: wrap;
}
.session-bar-left {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--text-soft);
}
.session-bar select {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 4px 24px 4px 12px;
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--text);
  cursor: pointer;
}
.session-bar button {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 0.7rem;
  padding: 4px 6px;
  border-radius: 20px;
  transition: all 0.2s;
}
.session-bar button:hover {
  background: var(--card2);
  color: var(--text);
}
.session-bar .danger-btn:hover {
  color: var(--danger);
}

#toast-container { position: fixed; bottom: 95px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; align-items: center; gap: 6px; }
.toast {
  background: var(--card2); border: 1px solid var(--border2);
  border-radius: 99px; padding: 9px 18px;
  font-size: 0.8rem; font-weight: 600;
  display: flex; align-items: center; gap: 8px;
  box-shadow: var(--shadow); white-space: nowrap;
  animation: toastIn 0.3s ease; opacity: 1;
  transition: opacity 0.3s;
}
.toast.hide { opacity: 0; }
@keyframes toastIn { from { opacity:0; transform:translateY(10px) scale(0.95); } to { opacity:1; transform:none; } }
.toast.success { border-color: rgba(34,197,94,0.3); color: var(--success); }
.toast.error { border-color: rgba(239,68,68,0.3); color: var(--danger); }
.toast.info { border-color: rgba(59,130,246,0.3); color: var(--primary); }

.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: 78px;
  background: rgba(8,12,20,0.97);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
}
.nav-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: var(--text-muted); cursor: pointer;
  font-size: 0.65rem; font-weight: 700;
  letter-spacing: 0.5px; gap: 5px;
  transition: color 0.2s;
  position: relative;
}
.nav-item i { font-size: 1.3rem; }
.nav-item.active { color: var(--accent); }
.nav-item.active::before {
  content: ''; position: absolute; top: 0; left: 25%; right: 25%; height: 2px;
  background: var(--accent); border-radius: 0 0 4px 4px;
}
.nav-badge {
  position: absolute; top: 8px; right: calc(25% - 6px);
  background: var(--primary); color: #fff;
  font-size: 0.55rem; font-weight: 900;
  border-radius: 99px; padding: 1px 5px;
  min-width: 16px; text-align: center;
}

.empty { text-align: center; padding: 40px 20px; color: var(--text-muted); }
.empty i { font-size: 2.5rem; opacity: 0.3; margin-bottom: 12px; display: block; }
.empty p { font-size: 0.85rem; }

.cost-pill {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--amber-dim); border: 1px solid rgba(245,158,11,0.2);
  border-radius: 99px; padding: 3px 10px;
  font-size: 0.72rem; font-weight: 700; color: var(--amber);
}

.tag .recipe-dot {
  width: 10px; height: 10px;
  margin-right: 5px;
}

.modal-overlay {
  position: fixed; inset: 0; z-index: 2000;
  background: rgba(0,0,0,0.72);
  backdrop-filter: blur(6px);
  display: flex; align-items: flex-end;
  animation: fadeOverlay 0.2s ease;
}
@keyframes fadeOverlay { from { opacity:0 } to { opacity:1 } }
.modal-sheet {
  background: var(--card2);
  border: 1px solid var(--border2);
  border-radius: 24px 24px 0 0;
  padding: 12px 16px 36px;
  width: 100%; max-height: 82vh; overflow-y: auto;
  animation: slideUp 0.3s cubic-bezier(.16,1,.3,1);
}
@keyframes slideUp { from { transform: translateY(100%) } to { transform: none } }
.modal-handle { width: 40px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 18px; }
.modal-title { font-family: var(--font-display); font-size: 1.05rem; font-weight: 800; margin-bottom: 4px; }
.modal-sub { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 16px; line-height: 1.5; }
.import-recipe-item {
  display: flex; align-items: center; gap: 12px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 14px; margin-bottom: 8px;
  transition: border-color 0.15s;
}
.import-recipe-item:has(.import-check:checked) { border-color: var(--primary); background: var(--primary-dim); }
.import-recipe-item .info { flex: 1; }
.import-recipe-item .name { font-weight: 700; font-size: 0.9rem; }
.import-recipe-item .meta { font-size: 0.7rem; color: var(--text-muted); margin-top: 2px; }
.badge-exists { display: inline-flex; align-items: center; gap: 3px; font-size: 0.62rem; color: var(--amber); font-weight: 700; background: var(--amber-dim); border: 1px solid rgba(245,158,11,0.2); border-radius: 4px; padding: 1px 6px; margin-top: 3px; }
.badge-new { display: inline-flex; align-items: center; gap: 3px; font-size: 0.62rem; color: var(--success); font-weight: 700; background: var(--success-dim); border: 1px solid rgba(34,197,94,0.2); border-radius: 4px; padding: 1px 6px; margin-top: 3px; }
.import-check { width: 20px; height: 20px; accent-color: var(--primary); cursor: pointer; flex-shrink: 0; }
.modal-actions { display: flex; gap: 10px; margin-top: 16px; }
.modal-actions .btn { flex: 1; }

/* ========== MOBILE ERGONOMY ENHANCEMENTS - DEEPLY REFINED ========== */
@media (max-width: 640px) {
  body { padding-bottom: 78px; }
  .section { padding: 12px; }
  .card { padding: 14px; border-radius: 18px; }
  .btn, .btn-primary, .btn-neutral, .btn-success, .btn-danger {
    min-height: 48px;
    padding: 12px 14px;
    font-size: 0.9rem;
    border-radius: 14px;
  }
  .btn-icon {
    width: 44px;
    height: 44px;
    font-size: 1rem;
  }
  input, select, textarea {
    font-size: 16px;
    padding: 12px 12px;
    min-height: 48px;
  }
  .card-title {
    font-size: 0.75rem;
    padding: 8px 0;
  }
  .list-item {
    grid-template-columns: minmax(0, 1fr) auto minmax(85px, auto);
    padding: 12px 12px;
    gap: 8px;
  }
  .qty-big { font-size: 1.3rem; }
  .item-actions { gap: 8px; }
  .recipe-card-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
  .recipe-card-grid .field-sub input,
  .recipe-card-grid .field-sub select { min-height: 44px; }
  .recipe-card-header .ac-wrapper input { min-height: 44px; }
  .tab { padding: 12px 4px; font-size: 0.75rem; }
  .session-bar { flex-wrap: wrap; justify-content: center; padding: 8px 12px; gap: 12px; }
  .session-bar select { font-size: 0.85rem; padding: 8px 28px 8px 14px; min-height: 44px; }
  .session-bar button { padding: 8px 12px; font-size: 0.8rem; min-height: 44px; }
  .session-text .tag { padding: 6px 12px; font-size: 0.8rem; }
  .session-banner { padding: 16px; }
  .sortable-category { padding: 14px 12px; margin-bottom: 10px; touch-action: manipulation; }
  .drag-handle i { font-size: 1.2rem; }
  .ac-item { padding: 12px 14px; font-size: 0.9rem; }
  .catalog-card { flex-wrap: wrap; gap: 10px; }
  .catalog-actions { gap: 12px; }
  .catalog-actions .btn-icon { width: 44px; height: 44px; }
  .modal-sheet { padding: 12px 16px 28px; }
  .import-recipe-item { padding: 14px; gap: 14px; }
  .import-recipe-item .name { font-size: 1rem; }
  .import-check { width: 24px; height: 24px; }
  .toast { font-size: 0.85rem; padding: 12px 20px; white-space: normal; text-align: center; max-width: 90vw; }
  .cost-pill { font-size: 0.8rem; padding: 4px 12px; }
  .row { flex-wrap: wrap; }
  .row > * { flex: 1 1 100%; }
  .row .field-group { min-width: 100%; }
  .header-actions .btn-ghost { padding: 6px 12px; min-height: 42px; }
  .bottom-nav { height: 72px; }
  .nav-item i { font-size: 1.5rem; }
  .nav-item { font-size: 0.7rem; gap: 4px; }
  .nav-badge { top: 8px; right: calc(25% - 6px); font-size: 0.65rem; padding: 2px 7px; }
}
@media (max-width: 480px) {
  .list-item {
    grid-template-columns: 1fr auto 70px;
    padding: 10px 10px;
  }
  .qty-big { font-size: 1.1rem; }
  .btn-icon { width: 40px; height: 40px; }
  .recipe-card-grid { grid-template-columns: 1fr; gap: 8px; }
  .recipe-card-grid .field-sub label { font-size: 0.7rem; }
  .category-header { font-size: 0.7rem; padding: 10px 2px 4px; }
  .item-name { font-size: 0.85rem; }
  .recipe-dots { gap: 3px; }
  .session-text .tag { font-size: 0.7rem; padding: 4px 8px; }
  .session-cost { font-size: 0.7rem; }
  .btn-reset { font-size: 0.65rem; }
  .catalog-name { font-size: 0.85rem; }
}
@media (max-width: 360px) {
  .list-item {
    grid-template-columns: 1fr 50px 60px;
    padding: 8px 8px;
  }
  .qty-big { font-size: 1rem; }
  .qty-unit { font-size: 0.55rem; }
  .btn-icon { width: 36px; height: 36px; font-size: 0.8rem; }
  .item-actions { gap: 5px; }
  .session-bar select { max-width: 130px; }
  .header-actions .btn-ghost span { display: none; }
  .header-actions .btn-ghost { padding: 6px 10px; }
}
@media (hover: none) and (pointer: coarse) {
  .btn, .btn-icon, .tab, .sortable-category, .nav-item, .card-title {
    cursor: default;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(0.96); }
}

/* Additional fixes for number inputs to prevent overflow */
input[type="number"] {
  -moz-appearance: textfield;
}
input[type="number"]::-webkit-inner-spin-button, 
input[type="number"]::-webkit-outer-spin-button {
  opacity: 0.5;
}
</style>
</head>
<body>

<div id="toast-container"></div>

<header>
  <div class="header-inner">
    <div class="logo">OVNI <span>CTRL</span> <sub>V9</sub></div>
    <div class="header-actions">
      <button class="btn-ghost accent-ghost" onclick="exportPDF()"><i class="fa-solid fa-file-pdf"></i> PDF</button>
      <button class="btn-ghost" onclick="exportJSON()"><i class="fa-solid fa-download"></i> JSON</button>
    </div>
  </div>
  <div id="shopping-tabs" class="tab-strip" style="display:none;">
    <div class="tab active" id="tab-todo" onclick="setMode('todo')">À ACHETER <span class="badge" id="cnt-todo">0</span></div>
    <div class="tab" id="tab-done" onclick="setMode('done')">PANIER <span class="badge" id="cnt-done">0</span></div>
    <div class="tab" id="tab-sort" onclick="setMode('sort')"><i class="fa-solid fa-arrows-up-down"></i> RAYONS</div>
  </div>
</header>

<div id="sec-prod" class="section active">
  <!-- Barre discrète de sélection de liste -->
  <div class="session-bar" id="session-bar-prod">
    <div class="session-bar-left">
      <i class="fa-solid fa-list-check"></i>
      <span>Liste active :</span>
      <select id="session-select-prod"></select>
    </div>
    <div>
      <button onclick="createNewSession()" title="Nouvelle liste"><i class="fa-solid fa-plus"></i></button>
      <button onclick="renameCurrentSession()" title="Renommer"><i class="fa-solid fa-pen"></i></button>
      <button class="danger-btn" onclick="deleteCurrentSession()" title="Supprimer"><i class="fa-solid fa-trash"></i></button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">
      <div class="title-left"><i class="fa-solid fa-bolt"></i> Lancer une Production</div>
    </div>
    <div class="card-body">
      <div class="row" style="margin-bottom:10px;">
        <div class="field-group" style="flex:2; margin:0">
          <div class="field-label">Fiche technique</div>
          <select id="prod-select"></select>
        </div>
        <div class="field-group" style="flex:1; margin:0">
          <div class="field-label">Quantité</div>
          <input type="number" id="prod-qty" value="1" min="1">
        </div>
      </div>
      <div id="prod-cost-preview" style="margin-bottom:10px; display:none;">
        <span class="cost-pill"><i class="fa-solid fa-euro-sign"></i> Coût estimé : <strong id="prod-cost-val">0.00 €</strong></span>
      </div>
      <button class="btn btn-primary" onclick="addProduction()"><i class="fa-solid fa-plus"></i> AJOUTER À LA LISTE ACTIVE</button>
    </div>
  </div>

  <div class="card" id="card-single">
    <div class="card-title" onclick="toggleCard(this)">
      <div class="title-left"><i class="fa-solid fa-pen"></i> Article Hors-Fiche</div>
      <i class="fa-solid fa-chevron-down toggle-icon"></i>
    </div>
    <div class="card-body">
      <div class="field-group">
        <div class="field-label">Nom de l'article</div>
        <input type="text" id="s-name" placeholder="ex: Sel fin" oninput="validateSingle()">
      </div>
      <div class="row" style="margin-bottom:10px;">
        <div>
          <div class="field-label">Quantité</div>
          <input type="number" id="s-qty" placeholder="0" min="0" step="0.001">
        </div>
        <div>
          <div class="field-label">Unité</div>
          <select id="s-unit">
            <option>kg</option><option>g</option><option>L</option><option>cl</option><option>pièce</option><option>boîte</option>
          </select>
        </div>
        <div>
          <div class="field-label">Rayon</div>
          <select id="s-cat">
            <option>Fruits &amp; Légumes</option><option>Viandes</option><option>Poissons</option>
            <option>Épicerie salée</option><option>Épicerie sucrée</option><option>Liquides</option>
            <option>Produits frais</option><option>Surgelés</option><option>Autre</option>
          </select>
        </div>
      </div>
      <button class="btn btn-neutral" onclick="addSingle()"><i class="fa-solid fa-cart-plus"></i> AJOUTER SEUL</button>
    </div>
  </div>
</div>

<div id="sec-list" class="section">
  <div class="session-banner">
    <div class="session-label">Liste active : <span id="active-session-name"></span></div>
    <div id="session-text" class="session-text">—</div>
    <div class="session-footer">
      <div class="session-cost" id="session-cost-badge" style="display:none;">
        <i class="fa-solid fa-coins"></i> <span id="session-cost-total"></span>
      </div>
      <button class="btn-reset" onclick="resetSession()">⟳ VIDER LA LISTE</button>
    </div>
  </div>
  <div id="list-display"></div>
</div>

<div id="sec-labo" class="section">
  <div class="card" id="card-create-recipe">
    <div class="card-title" onclick="toggleCard(this)">
      <div class="title-left"><i class="fa-solid fa-flask"></i> Créer une Fiche</div>
      <i class="fa-solid fa-chevron-down toggle-icon"></i>
    </div>
    <div class="card-body">
      <div class="field-group">
        <div class="field-label">Nom de la recette</div>
        <input type="text" id="recipe-name" placeholder="ex: Burger Signature">
      </div>
      <div id="recipe-rows"></div>
      <div id="recipe-total-cost" class="cost-pill" style="display:none; margin-bottom:12px;"><i class="fa-solid fa-coins"></i> </div>
      <div class="row" style="margin-bottom:12px;">
        <button class="btn btn-neutral" onclick="addRow()"><i class="fa-solid fa-plus"></i> Ajouter un ingrédient</button>
      </div>
      <div class="row">
        <button class="btn btn-success" onclick="saveRecipe()"><i class="fa-solid fa-floppy-disk"></i> ENREGISTRER</button>
        <button class="btn btn-danger" id="btn-cancel" style="display:none;" onclick="cancelEdit()">ANNULER</button>
      </div>
    </div>
  </div>

  <div class="search-field">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input type="text" id="labo-search" placeholder="Rechercher une fiche…" oninput="renderLabo()">
    <div class="import-icon-btn" onclick="document.getElementById('discreet-import').click()" title="Importer des fiches JSON">
      <i class="fa-solid fa-file-import"></i> 📂
    </div>
    <input type="file" id="discreet-import" accept=".json" style="display:none" onchange="handleImportFile(this)">
  </div>

  <div id="catalog-display"></div>
</div>

<nav class="bottom-nav">
  <div class="nav-item active" id="nav-prod" onclick="switchView('prod')">
    <i class="fa-solid fa-rocket"></i>PROD
  </div>
  <div class="nav-item" id="nav-list" onclick="switchView('list')">
    <i class="fa-solid fa-cart-shopping"></i>COURSES
    <span id="nav-badge" class="nav-badge" style="display:none;"></span>
  </div>
  <div class="nav-item" id="nav-labo" onclick="switchView('labo')">
    <i class="fa-solid fa-book-open"></i>LABO
  </div>
</nav>

<script>
// ======================== STATE WITH MULTIPLE SESSIONS ========================
const DEFAULT_CATEGORIES = [
  'Fruits & Légumes','Viandes','Poissons','Produits frais',
  'Épicerie salée','Épicerie sucrée','Liquides','Surgelés','Autre'
];

let state = {
  view: 'prod',
  listMode: 'todo',
  editingId: null,
  sessions: {},
  currentSessionId: null,
  recipes: [
    {
      id: 1, name: 'OVNI Burger',
      ingredients: [
        { name: 'Pain brioche', qty: 1, unit: 'pièce', cat: 'Épicerie salée', price: 0.35 },
        { name: 'Steak haché', qty: 180, unit: 'g', cat: 'Viandes', price: 1.20 },
        { name: 'Cheddar', qty: 30, unit: 'g', cat: 'Produits frais', price: 0.40 },
        { name: 'Laitue', qty: 20, unit: 'g', cat: 'Fruits & Légumes', price: 0.08 },
        { name: 'Tomate', qty: 50, unit: 'g', cat: 'Fruits & Légumes', price: 0.15 },
      ]
    }
  ],
  categoryOrder: [...DEFAULT_CATEGORIES]
};

// Toggle collapsible cards
function toggleCard(titleElement) {
  const card = titleElement.closest('.card');
  if (card) {
    card.classList.toggle('collapsed');
  }
}

function currentSession() {
  if (!state.currentSessionId || !state.sessions[state.currentSessionId]) {
    const id = 'default_' + Date.now();
    state.sessions[id] = { id, name: 'Liste principale', recipes: {}, singles: 0, totalCost: 0, list: [] };
    state.currentSessionId = id;
  }
  return state.sessions[state.currentSessionId];
}

function createNewSession() {
  let name = prompt('Nom de la nouvelle liste :', 'Courses ' + (Object.keys(state.sessions).length+1));
  if (!name) return;
  const id = 'sess_' + Date.now();
  state.sessions[id] = { id, name, recipes: {}, singles: 0, totalCost: 0, list: [] };
  state.currentSessionId = id;
  saveState();
  renderSessionSelector();
  render();
  toast(`Liste "${name}" créée`);
}

function renameCurrentSession() {
  const sess = currentSession();
  const newName = prompt('Nouveau nom :', sess.name);
  if (newName && newName.trim()) {
    sess.name = newName.trim();
    saveState();
    renderSessionSelector();
    render();
    toast('Liste renommée');
  }
}

function deleteCurrentSession() {
  if (Object.keys(state.sessions).length <= 1) {
    toast('Impossible de supprimer la seule liste restante', 'error');
    return;
  }
  const sess = currentSession();
  if (confirm(`Supprimer définitivement la liste "${sess.name}" ?`)) {
    delete state.sessions[state.currentSessionId];
    state.currentSessionId = Object.keys(state.sessions)[0];
    saveState();
    renderSessionSelector();
    render();
    toast(`Liste supprimée`);
  }
}

function selectSession(id) {
  if (state.sessions[id]) {
    state.currentSessionId = id;
    saveState();
    render();
  }
}

function renderSessionSelector() {
  const selProd = document.getElementById('session-select-prod');
  const activeNameSpan = document.getElementById('active-session-name');
  if (selProd) {
    const curId = state.currentSessionId;
    selProd.innerHTML = Object.values(state.sessions).map(s => `<option value="${s.id}" ${s.id === curId ? 'selected' : ''}>${escapeHtml(s.name)}</option>`).join('');
    selProd.onchange = (e) => selectSession(e.target.value);
  }
  if (activeNameSpan && currentSession()) activeNameSpan.innerText = currentSession().name;
}

function loadState() {
  try {
    const saved = localStorage.getItem('ovni_v9');
    if (saved) {
      const parsed = JSON.parse(saved);
      state = { ...state, ...parsed };
      if (!state.categoryOrder || !state.categoryOrder.length) state.categoryOrder = [...DEFAULT_CATEGORIES];
      if (!state.sessions || Object.keys(state.sessions).length === 0) {
        const oldList = state.list || [];
        const oldSession = state.session || { recipes: {}, singles: 0, totalCost: 0 };
        const newId = 'sess_' + Date.now();
        state.sessions = {
          [newId]: {
            id: newId,
            name: 'Liste principale',
            recipes: oldSession.recipes,
            singles: oldSession.singles,
            totalCost: oldSession.totalCost,
            list: oldList
          }
        };
        state.currentSessionId = newId;
        delete state.list;
        delete state.session;
      }
      if (!state.currentSessionId || !state.sessions[state.currentSessionId]) {
        state.currentSessionId = Object.keys(state.sessions)[0];
      }
    } else {
      const defaultId = 'sess_default';
      state.sessions = {
        [defaultId]: { id: defaultId, name: 'Liste principale', recipes: {}, singles: 0, totalCost: 0, list: [] }
      };
      state.currentSessionId = defaultId;
    }
  } catch(e) { console.warn('Load error', e); }
}

function saveState() {
  const toStore = {
    view: state.view,
    listMode: state.listMode,
    editingId: state.editingId,
    sessions: state.sessions,
    currentSessionId: state.currentSessionId,
    recipes: state.recipes,
    categoryOrder: state.categoryOrder
  };
  try { localStorage.setItem('ovni_v9', JSON.stringify(toStore)); } catch(e) {}
  render();
}

function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  const icons = { success: 'fa-check-circle', error: 'fa-triangle-exclamation', info: 'fa-info-circle' };
  el.innerHTML = `<i class="fa-solid ${icons[type] || icons.success}"></i>${msg}`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => { el.classList.add('hide'); setTimeout(() => el.remove(), 400); }, 2200);
}

function switchView(v) {
  state.view = v;
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('sec-' + v).classList.add('active');
  document.getElementById('nav-' + v).classList.add('active');
  document.getElementById('shopping-tabs').style.display = v === 'list' ? 'flex' : 'none';
  render();
}

function setMode(m) {
  state.listMode = m;
  ['todo','done','sort'].forEach(id => {
    const el = document.getElementById('tab-' + id);
    if (el) el.classList.toggle('active', id === m);
  });
  render();
}

function addProduction() {
  const name = document.getElementById('prod-select').value;
  const qty = parseInt(document.getElementById('prod-qty').value);
  if (!name) return toast('Sélectionne une fiche', 'error');
  if (!qty || qty <= 0) return toast('Quantité invalide', 'error');

  const recipe = state.recipes.find(r => r.name === name);
  if (!recipe) return;

  const sess = currentSession();
  sess.recipes[name] = (sess.recipes[name] || 0) + qty;
  const batchCost = recipeUnitCost(recipe) * qty;

  recipe.ingredients.forEach(ing => {
    const exist = sess.list.find(i => i.name === ing.name && i.unit === ing.unit);
    if (exist) { exist.qty = parseFloat((exist.qty + ing.qty * qty).toFixed(4)); exist.done = false; }
    else sess.list.push({ ...ing, qty: parseFloat((ing.qty * qty).toFixed(4)), done: false });
  });
  sess.totalCost = (sess.totalCost || 0) + batchCost;

  saveState();
  toast(`${qty}× ${name} ajouté à "${sess.name}" ✓`);
}

function addSingle() {
  const name = document.getElementById('s-name').value.trim();
  const qty = parseFloat(document.getElementById('s-qty').value);
  const unit = document.getElementById('s-unit').value;
  const cat = document.getElementById('s-cat').value;
  if (!name) return toast('Nom requis', 'error');
  if (isNaN(qty) || qty <= 0) return toast('Quantité invalide', 'error');

  const sess = currentSession();
  sess.singles = (sess.singles || 0) + 1;
  const exist = sess.list.find(i => i.name.toLowerCase() === name.toLowerCase() && i.unit === unit);
  if (exist) { exist.qty = parseFloat((exist.qty + qty).toFixed(4)); exist.done = false; }
  else sess.list.push({ name, qty, unit, cat, done: false });

  document.getElementById('s-name').value = '';
  document.getElementById('s-qty').value = '';
  saveState();
  toast(`${name} ajouté à "${sess.name}"`);
}

function resetSession() {
  const sess = currentSession();
  if (!confirm(`Vider toute la liste "${sess.name}" ?`)) return;
  sess.list = [];
  sess.recipes = {};
  sess.singles = 0;
  sess.totalCost = 0;
  saveState();
  toast('Liste réinitialisée', 'info');
}

function toggleItem(name, unit) {
  const sess = currentSession();
  const item = sess.list.find(i => i.name === name && i.unit === unit);
  if (item) { item.done = !item.done; saveState(); }
}

function delItem(name, unit) {
  const sess = currentSession();
  sess.list = sess.list.filter(i => !(i.name === name && i.unit === unit));
  saveState();
  toast('Article supprimé', 'info');
}

// ======================== RECIPE EDITOR ========================
function toggleRow(header) {
  const card = header.closest('.recipe-card');
  card.classList.toggle('collapsed');
}

function addRow(data = {}) {
  document.querySelectorAll('.recipe-card').forEach(c => c.classList.add('collapsed'));
  const cats = DEFAULT_CATEGORIES;
  const units = ['kg','g','L','cl','ml','pièce','boîte','sachet','botte','tranche','portion','dose'];
  const catOpts = cats.map(c => `<option value="${c}" ${data.cat === c ? 'selected' : ''}>${c}</option>`).join('');
  const unitOpts = units.map(u => `<option value="${u}" ${data.unit === u ? 'selected' : ''}>${u}</option>`).join('');

  const div = document.createElement('div');
  div.className = 'recipe-card';
  div.innerHTML = `
    <div class="recipe-card-header" onclick="toggleRow(this)">
      <i class="fa-solid fa-chevron-down toggle-icon"></i>
      <div class="ac-wrapper" style="flex:1" onclick="event.stopPropagation()">
        <input type="text" class="in-n" placeholder="Nom de l'ingrédient" value="${escapeHtml(data.name||'')}" oninput="handleAC(this); updateRowCost(this)">
        <div class="ac-box"></div>
      </div>
      <button class="btn-del-row" onclick="event.stopPropagation(); this.closest('.recipe-card').remove(); updateRecipeTotalCost()">×</button>
    </div>
    <div class="recipe-card-grid">
      <div class="field-sub"><label>Quantité</label><input type="number" class="in-q" placeholder="0" step="0.001" min="0" value="${data.qty||''}" oninput="updateRowCost(this)"></div>
      <div class="field-sub"><label>Unité</label><select class="in-u">${unitOpts}</select></div>
      <div class="field-sub"><label>Rayon</label><select class="in-c">${catOpts}</select></div>
      <div class="field-sub"><label>Prix (€) pour cette qté</label><input type="number" class="in-p" placeholder="0.00" step="0.001" min="0" value="${data.price != null && data.price > 0 ? data.price : ''}" oninput="updateRowCost(this)"></div>
    </div>
    <div class="ing-cost-line"><span style="font-size:0.65rem;color:var(--text-muted);">Coût de cet ingrédient</span><span class="ing-cost-preview">—</span></div>`;
  document.getElementById('recipe-rows').prepend(div);
  updateRowCost(div.querySelector('.in-q'));
}

function handleAC(input) {
  const val = input.value.toLowerCase().trim();
  const box = input.nextElementSibling;
  if (val.length < 1) { box.style.display = 'none'; return; }
  const known = [];
  state.recipes.forEach(r => r.ingredients.forEach(i => {
    if (!known.find(k => k.name.toLowerCase() === i.name.toLowerCase())) known.push(i);
  }));
  const matches = known.filter(i => i.name.toLowerCase().includes(val)).slice(0, 5);
  if (matches.length) {
    box.innerHTML = matches.map(m => `<div class="ac-item" onclick="selectAC(this,'${escapeAttr(m.name)}','${escapeAttr(m.unit)}','${escapeAttr(m.cat)}')">${escapeHtml(m.name)}<span>${m.unit} · ${m.cat}</span></div>`).join('');
    box.style.display = 'block';
  } else { box.style.display = 'none'; }
}

function updateRowCost(input) {
  const card = input.closest('.recipe-card');
  if (!card) return;
  const price = parseFloat(card.querySelector('.in-p').value) || 0;
  const preview = card.querySelector('.ing-cost-preview');
  if (price > 0) {
    preview.textContent = `${price.toFixed(2)} €`;
    preview.style.color = 'var(--amber)';
  } else {
    preview.textContent = '—';
    preview.style.color = 'var(--text-muted)';
  }
  updateRecipeTotalCost();
}

function updateRecipeTotalCost() {
  let total = 0;
  document.querySelectorAll('.recipe-card').forEach(card => {
    total += parseFloat(card.querySelector('.in-p').value) || 0;
  });
  const el = document.getElementById('recipe-total-cost');
  if (el) {
    if (total > 0) {
      el.innerHTML = `<i class="fa-solid fa-coins"></i> Coût total fiche : ${total.toFixed(2)} €`;
      el.style.display = 'inline-flex';
    } else { el.style.display = 'none'; }
  }
}

function selectAC(el, n, u, c) {
  const card = el.closest('.recipe-card');
  card.querySelector('.in-n').value = n;
  const unitSel = card.querySelector('.in-u');
  const opt = [...unitSel.options].find(o => o.value === u);
  if (opt) unitSel.value = u;
  card.querySelector('.in-c').value = c;
  el.closest('.ac-box').style.display = 'none';
  updateRowCost(card.querySelector('.in-q'));
}

document.addEventListener('click', e => {
  if (!e.target.closest('.ac-wrapper')) document.querySelectorAll('.ac-box').forEach(b => b.style.display = 'none');
});

function saveRecipe() {
  const name = document.getElementById('recipe-name').value.trim();
  if (!name) return toast('Nom de fiche requis', 'error');
  const dupCheck = state.recipes.find(r => r.name.toLowerCase() === name.toLowerCase() && r.id !== state.editingId);
  if (dupCheck) return toast('Ce nom existe déjà', 'error');

  const ings = [];
  let valid = true;
  document.querySelectorAll('.recipe-card').forEach(row => {
    const n = row.querySelector('.in-n').value.trim();
    const q = parseFloat(row.querySelector('.in-q').value);
    const p = parseFloat(row.querySelector('.in-p').value) || 0;
    if (!n || isNaN(q) || q <= 0) { valid = false; return; }
    ings.push({ name: n, qty: q, unit: row.querySelector('.in-u').value, cat: row.querySelector('.in-c').value, price: p });
  });
  if (!valid) return toast('Vérifie les ingrédients (nom & quantité)', 'error');
  if (!ings.length) return toast('Ajoute au moins un ingrédient', 'error');

  if (state.editingId) {
    const idx = state.recipes.findIndex(r => r.id === state.editingId);
    state.recipes[idx] = { id: state.editingId, name, ingredients: ings };
    toast(`${name} mis à jour`);
  } else {
    state.recipes.push({ id: Date.now(), name, ingredients: ings });
    toast(`${name} créé ✓`);
  }
  cancelEdit();
  saveState();
}

function editRecipe(id) {
  const r = state.recipes.find(x => x.id === id);
  if (!r) return;
  state.editingId = id;
  document.getElementById('recipe-name').value = r.name;
  document.getElementById('recipe-rows').innerHTML = '';
  r.ingredients.slice().reverse().forEach(i => addRow(i));
  document.getElementById('labo-title').innerHTML = `<i class="fa-solid fa-pen"></i>Modifier : ${escapeHtml(r.name)}`;
  document.getElementById('btn-cancel').style.display = '';
  // open the create card if collapsed
  const createCard = document.getElementById('card-create-recipe');
  if (createCard.classList.contains('collapsed')) createCard.classList.remove('collapsed');
  document.getElementById('sec-labo').scrollIntoView({ behavior: 'smooth' });
}

function deleteRecipe(id) {
  if (!confirm('Supprimer cette fiche ?')) return;
  state.recipes = state.recipes.filter(r => r.id !== id);
  toast('Fiche supprimée', 'info');
  saveState();
}

function cancelEdit() {
  state.editingId = null;
  document.getElementById('recipe-name').value = '';
  document.getElementById('recipe-rows').innerHTML = '';
  document.getElementById('recipe-total-cost').style.display = 'none';
  document.getElementById('labo-title').innerHTML = `<i class="fa-solid fa-flask"></i>Créer une Fiche`;
  document.getElementById('btn-cancel').style.display = 'none';
  addRow();
}

// ======================== DRAG SORT ========================
let dragSrc = null;
function buildSortView() {
  const sess = currentSession();
  const container = document.getElementById('list-display');
  container.innerHTML = '';
  const header = document.createElement('div');
  header.innerHTML = `<div style="font-size:0.72rem;color:var(--text-muted);margin-bottom:10px;padding:0 2px;"><i class="fa-solid fa-info-circle" style="color:var(--primary)"></i> Glisse pour réorganiser les rayons</div>`;
  container.appendChild(header);
  const listCats = [...new Set(sess.list.map(i => i.cat))];
  const allCats = [...new Set([...state.categoryOrder, ...listCats, ...DEFAULT_CATEGORIES])];
  allCats.forEach(cat => {
    const div = document.createElement('div');
    div.className = 'sortable-category';
    div.draggable = true;
    div.dataset.cat = cat;
    const count = sess.list.filter(i => i.cat === cat).length;
    div.innerHTML = `<span class="drag-handle"><i class="fa-solid fa-grip-lines"></i></span><span style="flex:1; font-weight:700; font-size:0.88rem;">${escapeHtml(cat)}</span>${count ? `<span style="font-size:0.7rem;color:var(--text-muted);">${count} article${count>1?'s':''}</span>` : ''}`;
    div.addEventListener('dragstart', () => { dragSrc = div; div.style.opacity = '0.4'; });
    div.addEventListener('dragend', () => { div.style.opacity = '1'; dragSrc = null; });
    div.addEventListener('dragover', e => { e.preventDefault(); div.classList.add('drag-over'); });
    div.addEventListener('dragleave', () => div.classList.remove('drag-over'));
    div.addEventListener('drop', e => {
      e.preventDefault(); div.classList.remove('drag-over');
      if (dragSrc && dragSrc !== div) {
        const rows = [...container.querySelectorAll('.sortable-category')];
        const srcIdx = rows.indexOf(dragSrc);
        const dstIdx = rows.indexOf(div);
        const newOrder = allCats.filter(c => c !== dragSrc.dataset.cat);
        newOrder.splice(dstIdx, 0, dragSrc.dataset.cat);
        state.categoryOrder = newOrder;
        saveState();
      }
    });
    container.appendChild(div);
  });
}

// ======================== HELPERS ========================
function convertToKgAndCeil(qty, unit) {
  let value = qty;
  let displayUnit = unit;
  if (unit === 'g') { value = qty / 1000; displayUnit = 'kg'; }
  else if (unit === 'kg') { value = qty; displayUnit = 'kg'; }
  else if (unit === 'L' || unit === 'cl' || unit === 'ml') {
    if (unit === 'cl') value = qty / 100;
    else if (unit === 'ml') value = qty / 1000;
    displayUnit = 'kg';
  } else { displayUnit = unit; }
  const rounded = Math.ceil(value * 100) / 100;
  return { value: rounded, unit: displayUnit };
}

function hashCode(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) { hash = ((hash << 5) - hash) + str.charCodeAt(i); hash |= 0; }
  return Math.abs(hash);
}
function recipeColor(recipeName) { return `hsl(${hashCode(recipeName) % 360}, 70%, 65%)`; }

function exportJSON() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `ovni_backup_${dateStr()}.json`; a.click();
  toast('JSON exporté', 'info');
}
function exportPDF() {
  const sess = currentSession();
  if (!sess.list.length) return toast('La liste est vide', 'error');
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  doc.setFillColor(8, 12, 20); doc.rect(0, 0, 210, 297, 'F');
  doc.setTextColor(248, 250, 252); doc.setFontSize(22); doc.setFont('helvetica', 'bold'); doc.text('OVNI CONTROL', 14, 22);
  doc.setFontSize(10); doc.setTextColor(100, 116, 139); doc.text('Liste de courses — ' + new Date().toLocaleDateString('fr-FR'), 14, 30);
  doc.text(`Liste : ${sess.name}`, 14, 37);
  const sessionParts = [];
  for (const [n, q] of Object.entries(sess.recipes)) sessionParts.push(`${q}× ${n}`);
  if (sessionParts.length) { doc.setFontSize(8); doc.setTextColor(200, 255, 87); doc.text('Productions : ' + sessionParts.join(' · '), 14, 44); }
  if (sess.totalCost > 0) { doc.setFontSize(8); doc.setTextColor(245, 158, 11); doc.text(`Coût estimé : ${sess.totalCost.toFixed(2)} €`, 14, 51); }
  const grouped = {};
  sess.list.forEach(item => { if (!grouped[item.cat]) grouped[item.cat] = []; grouped[item.cat].push(item); });
  const ordered = state.categoryOrder.filter(c => grouped[c]).concat(Object.keys(grouped).filter(c => !state.categoryOrder.includes(c)));
  let yOffset = 58;
  ordered.forEach(cat => {
    if (!grouped[cat]) return;
    const rows = grouped[cat].map(i => [ i.done ? '✓' : '□', i.name, `${formatQty(i.qty)} ${i.unit}`, i.cat ]);
    doc.autoTable({ startY: yOffset, head: [[{ content: cat, colSpan: 4, styles: { fillColor: [30, 41, 59], textColor: [200, 255, 87], fontStyle: 'bold', fontSize: 9 } }]], body: rows, columns: [ { header: '', dataKey: 0 }, { header: 'Article', dataKey: 1 }, { header: 'Quantité', dataKey: 2 }, { header: 'Rayon', dataKey: 3 } ], theme: 'plain', styles: { fillColor: [13, 20, 32], textColor: [241, 245, 249], fontSize: 9, cellPadding: 3 }, alternateRowStyles: { fillColor: [17, 24, 39] }, margin: { left: 14, right: 14 }, didParseCell: (data) => { if (data.row.raw && data.row.raw[0] === '✓') data.cell.styles.textColor = [100, 116, 139]; } });
    yOffset = doc.lastAutoTable.finalY + 6;
  });
  doc.save(`ovni_courses_${dateStr()}.pdf`);
  toast('PDF généré ✓');
}
function dateStr() { const d = new Date(); return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`; }
function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escapeAttr(s) { return String(s).replace(/'/g, "\\'"); }
function formatQty(n) { return parseFloat(n).toString().replace('.', ','); }
function recipeUnitCost(recipe) { return recipe.ingredients.reduce((sum, i) => sum + (i.price || 0), 0); }

// ======================== RENDERS ========================
function renderProdView() {
  const sel = document.getElementById('prod-select');
  if (!sel) return;
  const cur = sel.value;
  sel.innerHTML = state.recipes.length ? state.recipes.map(r => `<option ${r.name===cur?'selected':''}>${escapeHtml(r.name)}</option>`).join('') : '<option disabled>Aucune fiche</option>';
  updateCostPreview();
}
function updateCostPreview() {
  const name = document.getElementById('prod-select')?.value;
  const qty = parseInt(document.getElementById('prod-qty')?.value) || 0;
  const recipe = state.recipes.find(r => r.name === name);
  const preview = document.getElementById('prod-cost-preview');
  const val = document.getElementById('prod-cost-val');
  if (recipe && qty > 0) {
    const cost = recipeUnitCost(recipe) * qty;
    if (cost > 0) { val.textContent = `${cost.toFixed(2)} €`; preview.style.display = ''; return; }
  }
  preview.style.display = 'none';
}
document.addEventListener('change', e => { if (e.target.id === 'prod-select' || e.target.id === 'prod-qty') updateCostPreview(); });
document.addEventListener('input', e => { if (e.target.id === 'prod-qty') updateCostPreview(); });

function renderListView() {
  if (state.view !== 'list') return;
  if (state.listMode === 'sort') { buildSortView(); return; }
  const sess = currentSession();
  const parts = [];
  for (const [n, q] of Object.entries(sess.recipes)) {
    const color = recipeColor(n);
    parts.push(`<span class="tag"><span class="recipe-dot" style="background:${color};"></span><span class="session-tag-qty">${q}×</span> ${escapeHtml(n)}</span>`);
  }
  if (sess.singles > 0) parts.push(`<span class="tag"><span class="recipe-dot" style="background:#64748b;"></span><span class="session-tag-qty">${sess.singles}</span> manuelle${sess.singles>1?'s':''}</span>`);
  document.getElementById('session-text').innerHTML = parts.length ? parts.join('') : '<span style="color:var(--text-muted);font-size:0.85rem;">Aucune production lancée</span>';
  const costBadge = document.getElementById('session-cost-badge');
  if (sess.totalCost > 0) { document.getElementById('session-cost-total').textContent = sess.totalCost.toFixed(2) + ' €'; costBadge.style.display = 'flex'; } else { costBadge.style.display = 'none'; }
  document.getElementById('cnt-todo').textContent = sess.list.filter(i => !i.done).length;
  document.getElementById('cnt-done').textContent = sess.list.filter(i => i.done).length;
  const display = document.getElementById('list-display');
  display.innerHTML = '';
  const items = sess.list.filter(i => i.done === (state.listMode === 'done'));
  if (!items.length) { display.innerHTML = `<div class="empty"><i class="fa-solid fa-${state.listMode==='done'?'check-double':'list-check'}"></i><p>${state.listMode==='done'?'Aucun article coché':'La liste est vide'}</p></div>`; return; }

  const producedRecipeNames = new Set(Object.keys(sess.recipes));
  const grouped = {};
  items.forEach(i => { grouped[i.cat] = grouped[i.cat] || []; grouped[i.cat].push(i); });
  const ordered = state.categoryOrder.filter(c => grouped[c]).concat(Object.keys(grouped).filter(c => !state.categoryOrder.includes(c)));

  ordered.forEach(cat => {
    if (!grouped[cat]) return;
    display.innerHTML += `<div class="category-header">${escapeHtml(cat)}</div>`;
    grouped[cat].forEach(item => {
      const relatedRecipes = state.recipes.filter(recipe => producedRecipeNames.has(recipe.name) && recipe.ingredients.some(ing => ing.name === item.name && ing.unit === item.unit));
      const dotsHtml = relatedRecipes.map(recipe => `<span class="recipe-dot" style="background:${recipeColor(recipe.name)};" title="${escapeAttr(recipe.name)}"></span>`).join('');
      const converted = convertToKgAndCeil(item.qty, item.unit);
      const displayQty = converted.value.toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).replace(',', '.');
      display.innerHTML += `<div class="list-item ${item.done ? 'done' : ''}"><div><span class="item-name">${escapeHtml(item.name)}</span><span class="recipe-dots">${dotsHtml}</span></div><div><span class="qty-big">${displayQty}</span><span class="qty-unit">${converted.unit}</span></div><div class="item-actions"><button class="btn-icon btn-icon-check" onclick="toggleItem('${escapeAttr(item.name)}','${escapeAttr(item.unit)}')"><i class="fa-solid fa-${item.done ? 'rotate-left' : 'check'}"></i></button><button class="btn-icon btn-icon-trash" onclick="delItem('${escapeAttr(item.name)}','${escapeAttr(item.unit)}')"><i class="fa-solid fa-trash"></i></button></div></div>`;
    });
  });
}

function renderLabo() {
  const q = (document.getElementById('labo-search')?.value || '').toLowerCase();
  const filtered = q ? state.recipes.filter(r => r.name.toLowerCase().includes(q)) : state.recipes;
  const container = document.getElementById('catalog-display');
  if (!container) return;
  if (!filtered.length) { container.innerHTML = `<div class="empty"><i class="fa-solid fa-book-open"></i><p>${q ? 'Aucun résultat' : 'Aucune fiche créée'}</p></div>`; return; }
  container.innerHTML = filtered.map(r => {
    const cost = recipeUnitCost(r);
    return `<div class="catalog-card"><div><div class="catalog-name">${escapeHtml(r.name)}</div><div class="catalog-meta">${r.ingredients.length} ingrédient${r.ingredients.length>1?'s':''}</div>${cost > 0 ? `<div class="catalog-cost"><i class="fa-solid fa-euro-sign" style="font-size:0.7rem"></i> ${cost.toFixed(2)} € / unité</div>` : ''}</div><div class="catalog-actions"><button class="btn-icon btn-icon-edit" onclick="editRecipe(${r.id})"><i class="fa-solid fa-pen"></i></button><button class="btn-icon btn-icon-trash" onclick="deleteRecipe(${r.id})"><i class="fa-solid fa-trash"></i></button></div></div>`;
  }).join('');
}
function renderNav() {
  const sess = currentSession();
  const todoCount = sess.list.filter(i => !i.done).length;
  const badge = document.getElementById('nav-badge');
  if (todoCount > 0) { badge.textContent = todoCount; badge.style.display = ''; } else { badge.style.display = 'none'; }
}

function render() {
  renderSessionSelector();
  renderProdView();
  renderListView();
  renderLabo();
  renderNav();
}

// ======================== IMPORT JSON ========================
function handleImportFile(input) {
  const file = input.files[0];
  if (!file) return;
  readImportFile(file);
  input.value = '';
}
function readImportFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      const recipes = parseImportedRecipes(data);
      if (!recipes.length) { toast('Aucune fiche valide trouvée', 'error'); return; }
      showImportModal(recipes);
    } catch(err) { toast('Fichier JSON invalide', 'error'); }
  };
  reader.readAsText(file);
}
function parseImportedRecipes(data) {
  let candidates = [];
  if (data && Array.isArray(data.recipes)) candidates = data.recipes;
  else if (Array.isArray(data)) candidates = data;
  else if (data && typeof data === 'object' && data.name && Array.isArray(data.ingredients)) candidates = [data];
  return candidates.filter(r => r && typeof r.name === 'string' && r.name.trim() && Array.isArray(r.ingredients) && r.ingredients.length > 0).map(r => ({ id: r.id || Date.now() + Math.random(), name: r.name.trim(), ingredients: r.ingredients.map(i => ({ name: i.name || '', qty: parseFloat(i.qty) || 0, unit: i.unit || 'pièce', cat: i.cat || 'Autre', price: parseFloat(i.price) || 0 })).filter(i => i.name && i.qty > 0) })).filter(r => r.ingredients.length > 0);
}
function showImportModal(recipes) {
  const existingNames = new Set(state.recipes.map(r => r.name.toLowerCase()));
  const itemsHtml = recipes.map((r, idx) => {
    const cost = r.ingredients.reduce((s, i) => s + (i.price || 0), 0);
    const costText = cost > 0 ? ` · ${cost.toFixed(2)} €` : '';
    const exists = existingNames.has(r.name.toLowerCase());
    const badge = exists ? `<span class="badge-exists"><i class="fa-solid fa-triangle-exclamation"></i> Existe déjà</span>` : `<span class="badge-new"><i class="fa-solid fa-plus"></i> Nouveau</span>`;
    return `<label class="import-recipe-item"><input type="checkbox" class="import-check" data-idx="${idx}" ${exists ? '' : 'checked'}><div class="info"><div class="name">${escapeHtml(r.name)}</div><div class="meta">${r.ingredients.length} ingrédient${r.ingredients.length>1?'s':''}${costText}</div><div>${badge}</div></div></label>`;
  }).join('');
  const modal = document.createElement('div'); modal.className = 'modal-overlay'; modal.id = 'import-modal';
  modal.innerHTML = `<div class="modal-sheet"><div class="modal-handle"></div><div class="modal-title"><i class="fa-solid fa-file-import" style="color:var(--primary);margin-right:8px;"></i>${recipes.length} fiche${recipes.length>1?'s':''} détectée${recipes.length>1?'s':''}</div><div class="modal-sub">Sélectionne les fiches à importer. Les fiches existantes seront <strong style="color:var(--amber)">écrasées</strong> si cochées.</div><div id="import-list">${itemsHtml}</div><div class="modal-actions"><button class="btn btn-neutral" onclick="closeImportModal()">Annuler</button><button class="btn btn-success" id="confirm-import-btn">Importer la sélection</button></div></div>`;
  modal.addEventListener('click', e => { if (e.target === modal) closeImportModal(); });
  document.body.appendChild(modal);
  document.getElementById('confirm-import-btn').onclick = () => confirmImport(recipes);
}
function confirmImport(recipes) {
  const checks = document.querySelectorAll('#import-modal .import-check');
  const selectedIndices = []; checks.forEach(cb => { if (cb.checked) selectedIndices.push(parseInt(cb.dataset.idx)); });
  if (selectedIndices.length === 0) { toast('Aucune fiche sélectionnée', 'error'); return; }
  let added = 0, replaced = 0;
  selectedIndices.forEach(idx => {
    const r = recipes[idx];
    const existingIdx = state.recipes.findIndex(x => x.name.toLowerCase() === r.name.toLowerCase());
    if (existingIdx >= 0) { state.recipes[existingIdx] = { ...r, id: state.recipes[existingIdx].id }; replaced++; }
    else { state.recipes.push({ ...r, id: Date.now() + Math.random() }); added++; }
  });
  closeImportModal(); saveState();
  const msgParts = []; if (added) msgParts.push(`${added} ajoutée${added>1?'s':''}`); if (replaced) msgParts.push(`${replaced} mise${replaced>1?'s':''} à jour`);
  toast(msgParts.join(', ') + ' ✓', 'success');
}
function closeImportModal() { const modal = document.getElementById('import-modal'); if (modal) modal.remove(); }

function init() { loadState(); cancelEdit(); render(); }
init();
</script>
